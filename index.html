对安东尼而言的好结果对贝蒂来说却是坏结果这一明显事实。他的模式能解释安东尼的风险规避，却不能解释贝蒂对风险收益的偏好。这种冒险赌一把的做法在企业家和指挥官们束手无策时总会成为他们的不二选择。"}, {"en": "", "zh": "所有这一切都很明显，不是吗？人们很容易认为是伯努利本人构建了类似的例子并建立了一个更为复杂的理论来解释这些例子，但由于某种原因，他没有这样做。人们也可能认为与伯努利同时代的业界同仁并不同意他的观点，或者说后世学者在读到他的文章时会反对他的观点，但由于某种原因，他们也没有这样做。"}, {"en": "", "zh": "令人费解的是，结果效用这一概念在这些明显的反例面前如此不堪一击，却为何存在了这么长时间？我只能通过我常在自己身上发现的学者思维的一个弱点来解释这一现象。我称这个弱点为理论诱导的盲区（theory，induced blindness），即一旦你接受了某个理论并将其作为一个思考工具，就很难注意到其错误。如果你碰到一个似乎和这个模式不相符的例子，就会认为肯定有一个非常合理的解释，只是不知为什么你没有发现这个解释而已。你认为这个理论无可指摘，而且很信任认同这个理论的那群专家。很多学者都曾有那么一刻想起安东尼和贝蒂或杰克和吉尔这样的例子，而且偶尔会注意到这些例子与效用理论并不吻合。不过，他们没有继续深究，没有说“这个理论严重错误，因为它忽略了效用不仅仅依赖于某人目前的财富，而是依赖其财富的来源这一事实”。正如心理学家丹尼尔·吉尔伯特所观察到的那样，怀疑是件苦差事，而且运用系统2很容易令人疲惫。"}, {"en": "", "zh": "示例：伯努利理论的错误\n“3年前，他有2万美元的奖金，他对此已经很满意了，但他的薪水自那以后只涨了20%，所以他需要更多的奖金来获得同样的效用。”\n“两个人都愿意接受自己拿到的薪水，但他们对这份薪水的满意度不一样，因为他们的参照点是不同的。她目前的薪水更高。”\n“她在申请离婚赡养费。实际上她愿意调解，但他更愿意上法庭。这种分歧是意料之中的，她只能稳赚，所以要规避风险；而他面对的却都是糟糕的结果，所以他更愿意冒险。”"}, {"en": "", "zh": "第26章 更人性化的前景理论"}, {"en": "", "zh": "我和阿莫斯半是凭借能力半是因为无知，在无意中发现了伯努利理论的主要缺陷。我听从阿莫斯的建议，读了他书中的一章。这一章描述了一些实验，在这些实验中，一些著名学者测试了财富的效用，他们让受试者对一些风险作出选择，这些受试者可能会因选择不同而赢得或输掉几便士。实验者将测量的财富量限定在1美元之内，依此来测试财富的效用。这项实验进而引发了一些问题：人们通过财富间的细微差别对风险进行评估这一假设合理吗？人们怎么会通过对区区几便士的得失反应研究就理解了财富心理物理学呢？心理物理学理论的最新进展表明，如果想研究财富的主观价值，你应该问一些与财富直接相关的问题，而不是关于财富变化的问题。我不太明白为何效用理论会让人们因为敬畏而盲从，对此我感到很迷惑。"}, {"en": "", "zh": "第二天和阿莫斯见面时，我告诉他在阅读中我遇到了一些难题，这些难题只是一个笼统的想法，算不得什么新发现。我非常希望他能给我指明方向，解释一下一直困扰着我的这项实验究竟有什么意义，但他既没给我指明方向，也没向我解释，却对现代心理物理学的相关性问题觉得豁然开朗了。他想起经济学家哈里·马科维茨（Harry Markowitz），后来因其对金融领域作出的贡献而获得诺贝尔奖，曾经提出过一个理论，即效用是伴随财富的变化出现的，而不是伴随财富的各种状态出现的。马科维茨的理论存在了近25年，但并没有引起过多关注，我们却很快得出结论：就应该朝着这个方向发展，而且我们酝酿提出的理论会把最终结果界定为盈与亏，而不是财富的状态。关于决策论的感知力和无知对我们的研究都具有推动作用。"}, {"en": "", "zh": "我们很快就知道自己已经成功规避了一桩由理论诱导的盲目性引发的严重事件，因为我们刚刚摒弃的想法看起来不仅是错误的，而且非常荒谬。我们很高兴地意识到，在数以万计的财富区间内，自己其实根本无法评估目前的财富效用。从财富效用中推理对细小变化的态度这一想法现在看来也是行不通的。在自己再也无法解释为何这么久都不能看到明显的结果时，你就应该知道自己已经取得了进展。然而，我们还是用了很多年的时间来探索结果是盈还是亏的界定。"}, {"en": "", "zh": "面对财富，你会选择规避风险还是冒险一搏？"}, {"en": "", "zh": "在效用理论中，对“盈”的效用评估是通过对两种财富状态的效用进行对比来实现的。例如，如果你有100万美元，额外再得到500美元，这500美元的效用就是100.05万美元的效用和100万美元的效用差。而且如果你拥有数目较大的那笔钱的话，损失500美元的负效用仍然是两种财富状态的效用差。在这种理论下，盈亏的不同效用只是在符号上有所不同（正号或者负号）。没有哪种方式可以表明损失500美元的负效用会大于获得同样数目的钱的效用这一事实，尽管事实确实如此。正如在理论诱导存在盲目性的情况下可能出现的问题一样，我们既不能对盈亏之间可能存在的各种区别进行预测，也无法对其进行研究。盈亏之间的区别被认为是无关紧要的，因此研究这一点也没有意义。"}, {"en": "", "zh": "我和阿莫斯没有立即发现我们对财富变化的关注为我们开辟了一条新论题的探索之路。我们主要关注了成功概率不同（或高或低）的风险之间的区别。有一天，阿莫斯随便作了一番假设：“亏损的情况又如何呢？”我们很快就发现，当我们变换焦点时，我们所熟悉的风险规避做法就会被冒险的做法取代。请看下面这两个问题："}, {"en": "", "zh": "问题1：你会选择哪一个？"}, {"en": "", "zh": "肯定会得到900美元，还是有90%的可能性会得到1000美元？"}, {"en": "", "zh": "问题2：你会选择哪一个？"}, {"en": "", "zh": "必定会损失900美元，还是有90%的可能性会损失1000美元？"}, {"en": "", "zh": "你很可能会在问题1中选择规避风险，大多数人都会这样。得到900美元的主观价值肯定比有90%的可能性得到1000美元的价值要大。这个问题中的风险规避情况不会让伯努利感到惊讶。"}, {"en": "", "zh": "现在来看你对问题2的选择。如果与其他大多数人一样，你在这个问题中就会选择风险答案。这次选择冒险的理由与在问题1中选择规避风险的理由如出一辙，即损失900美元的（负面）价值比有90%的可能性损失1000美元的（负面）价值要大。必然的损失肯定会令人反感，也会使你愿意冒险一试。我们以后就会发现，对可能性的评估（90%对应100%）会导致问题1中的风险规避和问题2中的选择冒险这两种不同做法。"}, {"en": "", "zh": "在没有理想的选择时，人们更愿意碰运气，我们不是最先注意到这一现象的人，但由理论误导的盲目性其实早就是普遍现象了。因为占主导地位的理论并未提供一个看似合理的方法来协调人们对盈亏风险的不同态度，于是人们只能忽略态度并不统一这一事实。相反，我们将各种结果视为盈余或者亏损，于是便格外关注这种差异。对是否愿意冒险的不同态度的观察很快便取得了一项重大进展：我们找到了一个论证伯努利理论主要缺陷的方法。请看："}, {"en": "", "zh": "问题3：不管你有多少钱，有人额外又给了你1000美元。现在请从下列两个选项中作出选择：是选有50%的概率赢得1000美元，还是选择肯定会得到500美元？"}, {"en": "", "zh": "问题4：不管你有多少钱，有人额外又给了你2000美元。现在请从下列两个选项中作出选择："}, {"en": "", "zh": "是选有50%的概率失去1000美元，还是选择肯定会失去500美元？"}, {"en": "", "zh": "你很容易就能确定，就财富的最终状态（伯努利理论中最重要的因素）而言，问题3和问题4并没有什么不同。在两种情况下，你都得就相同的两个选项作出选择：你可以选择得到1500美元，这样你肯定会比现在更有钱；或者你可以冒一次险，这样你得到1000美元或2000美元的机会是相同的。因此在伯努利理论中，这两个问题应该引出相似的选择。凭直觉你就可以猜出其他人会作何选择。"}, {"en": "", "zh": "。在第一个选择中，大多数调查对象都选择确定的选项。在第二个选择中，大多数调查对象则更倾向于那个冒险选项。"}, {"en": "", "zh": "问题3和4的选择有所不同，这一发现是伯努利理论核心观点的绝对反例。如果财富效用至关重要，那么对相同问题的等义陈述就应产生同样的选择。对这几个问题的对比凸显了对选择进行评估时所选的参照点有着十分重要的作用。问题3中的参照点比当前财富多出1000美元，而问题4中则多出了2000美元。所得增至1500美元在问题3中是赢利500美元，在问题4中却是亏损500美元。显然，相同类型的其他例子也很容易发生，安东尼和贝蒂的故事便与此类似。"}, {"en": "", "zh": "在选择之前，你对得到1000美元或2000美元这样馈赠的关注程度如何呢？如果你和大多数人一样，那么你几乎都注意不到这一点。的确，你没理由去注意这一点，因为这笔馈赠包含在参照点中，而参照点通常会被忽略掉。你对自己的选择有所了解，而效用理论却并不了解这些，如果你的净资产高至几千美元或低至几千美元（除非你很穷），你对风险的态度就会不同。你还知道自己对盈亏的态度并非源自对所拥有财富的自我评估。你想得到100美元而不想失去100美元，其原因并非因为这些钱使你的财富状态有了变化。你只是喜欢得到，不喜欢失去，几乎可以肯定地说，你对失去的厌恶程度远大于你对得到的喜欢程度。"}, {"en": "", "zh": "这4个问题凸显了伯努利理论的弱点。他的理论太过简单，缺少令人信服的因素。这个缺失的变量就是参照点，它是得失评估所依据的初始状态。在伯努利理论中，你只需要了解财富的状态就可以决定其效用，但在前景理论中，你还需要知道参考状态，因此前景理论比效用理论更复杂。在科学中，复杂性被视为一种成本，要想厘清其中原理，就必须有一套足够丰富、新颖且（最好是）有趣的预测来解释已有的理论往往解释不了的事实。这曾是我们过去必须要面对的挑战。"}, {"en": "", "zh": "尽管我和阿莫斯那时并没有研究大脑的双系统模式，但现在我们已经明确地知道，前景理论的核心内容有三个认知特征，这三个特征在金融状况评估工作中扮演着非常重要的角色，在感知、判断和情感等许多自动过程中也很常见，它们应该被看做是系统1的运行特征。评估与一个中性参照点相关，这个参照点有时也被视为“适应水平”。你可以很轻松地对这一原则作出令人信服的论证。在你面前放上3碗水，左边的碗中放冰水，右边的碗中放温水，中间碗中的水温则与室温相同。把你的双手分别浸在冰水和温水中约一分钟，然后再浸到中间的碗中。虽然一手凉一手热，但两只手对中间碗中水的温度的感觉是一样的。对金融状况而言，最常见的参照点就是现状，但也可能是你期待的那个结果，或者是你感觉实至名归的结果，比方说，你的同事获得晋升或者得到奖金。高于参照点的结果就是所得，低于参照点的结果就是损失。一种降低敏感度的原则在感觉维度和财富变化评估活动中都是适用的。在漆黑的房间里，即使灯光再微弱，效果也会很明显。而同等亮度的灯在非常明亮的房间里也许都令人难以察觉到。同样，900美元和1000美元之间的主观差别也比100美元和200美元之间的差别小得多。第三个原则是损失厌恶。当我们对盈亏进行直接比较或权衡时，亏似乎比盈影响更大。积极和消极的期盼或体验之间的力量不对称状况由来已久，将各种威胁当成“危”而不是“机”的有机体的存活和繁殖的概率更大。"}, {"en": "", "zh": "损失厌恶：人们对亏损的反应比对盈余的反应大得多"}, {"en": "", "zh": "我们在生活中面对的很多选择都是喜忧参半的：既有损失的风险也有获利的可能，我们必须要决定是接受这个风险还是拒绝它。对新成立的企业进行评估的投资商，思忖是否上诉的律师，定夺是否出击的战时将军，以及必须决定自己是否参加竞选的政治家们，都要面对胜利或失败的各种可能性。如果要找一个前景喜忧参半的例子，请看看你对下面问题的反应。"}, {"en": "", "zh": "问题5：现在，用抛硬币来打赌。"}, {"en": "", "zh": "如果是背面，你会输掉100美元。"}, {"en": "", "zh": "如果是正面，你会赢得150美元。"}, {"en": "", "zh": "这个赌局吸引人吗？你想参加吗？"}, {"en": "", "zh": "为了作出选择，你必须平衡得到150美元时的满足感和失去100美元时的失落感。你有何想法？尽管这个赌局的预期值显然是有利的，因为你坐收的赢利铁定比你可能遭受的亏损小，但你可能还是不愿下这个赌注，大多数人都不会愿意这样做。拒绝这个赌局是系统2的行为，但那些关键的输入信息是由系统1产生的情感反应。对于大多数人来说，对失去100美元的恐惧比得到150美元的愿望更强烈。我们从众多此类观察中得出结论，即“失去比得到给人的感受更强烈”，因此人们往往会规避损失。"}, {"en": "", "zh": "问自己一个问题，你就能测量出自己能在多大的程度上规避损失，这个问题就是：要想平衡100美元的可能损失，我需要得到的最少收益是多少？对很多人来说，这个问题的答案是约为200美元，是损失的2倍。有几个实验曾对“损失厌恶系数”作出估计，这个系数通常在1.5~2.5之间。当然，这是个平均值。有些人规避损失的能力比别人更强。金融市场中的专业风险投资者更能容忍损失，可能是因为他们不会对每一次经济波动都产生情绪上的反应吧。当实验人员要求参与实验的受试者“像商人那样思考”时，他们对损失的规避感就不那么强烈了，他们对损失的情绪反应（通过情感激励的心理指数来测量）也大大减弱了。"}, {"en": "", "zh": "为了检测你对不同风险的损失厌恶率，请思考下面的问题。忽略所有社会因素，不要试图表现得胆大无礼或者谨小慎微，只关注可能的损失和抵消盈余的主观影响即可。来看一个赌局，在这个赌局中你有50%的可能性会损失10美元。你最少需要得到多少钱才会觉得这个赌局能吸引你呢？如果你说10美元，那就说明你对风险根本就不在意；如果你给出的答案不到10美元，那就说明你在寻求冒险；如果你的回答超过10美元，这就说明你有损失厌恶的概念。要是在抛硬币的赌局中你可能会损失500美元，又会怎样呢？你需要多少钱才能抵消这一损失？要是会损失2000美元，又会怎样呢？"}, {"en": "", "zh": "在做这个实验时，你可能会发现自己的损失厌恶系数在风险增大时也会提高，但并不是急速提高。当然，如果这种可能的损失具有潜在的破坏性，或者你的生活方式受到了威胁，所有的赌注也就荡然无存了。在这些情况下，损失厌恶系数会非常大，甚至也许会无穷大，如果你很幸运，非常有可能赢钱，但不管赢得几百万美元，你总有不想承担的风险。"}, {"en": "", "zh": "在第1章中我曾两次断言，有些读者也许会认为这两种说法是矛盾的：在得失都可能出现的赌局中，损失厌恶会产生极力规避风险的选择。在肯定会有损失和有可能会损失更多的选择中，降低敏感度会引发冒险之举。"}, {"en": "", "zh": "两者之间并不矛盾。在得失都可能出现的赌局中，可能的损失是可能的获利的2倍。在肯定会有损失的情况下，价值曲线（降低敏感度）的弯曲度会导致冒险之举。必定损失900美元的痛苦比有90%的可能失去1000美元的痛苦要强烈。这两种见解是前景理论的精髓。"}, {"en": "", "zh": "对财富状态的态度可以解释人们对小风险的极端规避，这样的说法可信吗？伯努利理论这个明显的缺陷在250多年里都未能引起学者的注意，这的确可以算做理论导致盲目性的典型案例了。2000年，行为经济学家马修·拉宾（Matthew Rabin）最终从数学角度证明了通过财富效用来解释损失厌恶是荒谬的，注定会失败，他的证明引起了广泛的关注。拉宾的原理显示，从数学角度来看，任何拒绝低风险的有利赌局的人，都是为了获得更大的赌注从而坚决将风险规避推向一个荒谬的水平。例如，他注意到大多数人都排斥下面这种赌法："}, {"en": "", "zh": "有50%的概率损失100美元，有50%的概率得到200美元。"}, {"en": "", "zh": "他之后表明，根据效用理论，排斥这种赌法的人最终也会拒绝下面这种赌法："}, {"en": "", "zh": "有50%的概率损失200美元，有50%的概率得到20000美元。"}, {"en": "", "zh": "当然，思维正常的人都不会拒绝这种赌法！在某篇文章中，马修·拉宾和理查德·泰勒记录了这些证据，他们评论说，这个更大的赌局“有9900美元的预期收益，损失绝对不会超过200美元。如果你拒绝了这个赌局，即使是最差劲的律师也会认定你就是法律意义上的精神病患者”。"}, {"en": "", "zh": "也许是被热情冲昏了头，他们竟然以回顾著名的“巨蟒”小组的幽默短剧作为文章的结束语，短剧中一位倍感挫败的顾客想把一只死掉的鹦鹉送回宠物店去。顾客用了一长串短语来描述这只鹦鹉的状态，高潮部分说的是“这就是那只前鹦鹉”。拉宾和泰勒继续说道：“经济学家应该认识到预期效用是一种‘过气的假设’。”很多经济学家认为这种草率的说法颇有些亵渎神明的意味。然而，认为财富效用可以解释人们对小损失的态度堪称受伯努利理论引导的盲目做法，这种盲目做法正是幽默评论理所应当抨击的目标。"}, {"en": "", "zh": "前景理论无法应对令人失望的事"}, {"en": "", "zh": "在本书这一部分中，我已经赞扬了前景理论的优点，批评了理性模式和期望效用理论。现在应该平衡一下两者了。"}, {"en": "", "zh": "大多数经济学研究生都曾听说过前景理论和损失厌恶，但在经济学书籍的索引中不会出现这些术语。有时候，这种缺失让我有些伤心，但事实上这也是合理的，因为基础经济学理论中理性扮演着主要角色。那些研究生学到的大多数标准概念和理论在经济人不会犯下愚蠢错误的前提下很容易理解。这个假设的确没有什么必要，而且也会随着人们对前景理论的逐渐了解而瓦解，它对各种结果的评估总是太过目光短浅。"}, {"en": "", "zh": "经济学的基本概念都是重要的智力工具，这些工具掌握起来并不容易，即便是利用那些简化了的且不切实际的假设（这些假设都是关于在市场中相互作用的经济动因的本质的）来解释这些概念也是很困难的。在引入阶段就对这些假设提出种种问题的做法的确令人费解，也许还会使人泄气。把帮助学生掌握这一学科的基本工具作为首要任务才是硬道理。此外，前景理论中的理性缺失通常与经济理论的相关预测并不相干，这些预测在某些情况下会很精确，在其他许多情况下还会提供令人满意的近似值。然而在有些情况下，有所区别变得很重要：在前景理论的描述中，对人类产生直接情绪影响的是得与失的情绪，而不是财富和普遍效用的长期前景。两个多世纪以来，在我谈到伯努利理论的缺陷并强调其中因理论诱导而产生的盲目性之前，没有人质疑过伯努利理论。当然了，因理论诱导而产生的盲目性并不仅限于期望效用理论。前景理论自身也有缺陷，而且这些缺陷中存在的因理论诱导而产生的盲目性使得这一理论成为效用理论的主要攻击对象。"}, {"en": "", "zh": "试想前景理论的假设（即参照点），通常就是现状，其价值就是零。这个假设看来是合理的，但它却导致了一些荒唐的后果。请看下面的各项预测，有了这些预测之后会是什么样子呢？\nA.有百万分之一的概率赢得100万美元。\nB.有90%的概率赢得12美元，有10%的概率什么也得不到。\nC.有90%的概率赢得100万美元，有10%的概率什么也得不到。"}, {"en": "", "zh": "“什么也得不到”在三种情况下都是可能会出现的结果，前景理论在这三种情况下给这种结果分配了相同的价值。“什么也得不到”是个参照点，且其价值是零。这些说法和你的经历相符吗？当然不是。“什么也得不到”在前两种情况下是被期望但未能实现的事，没有给其分配价值也是讲得通的。相反，在第三种情况下，没能获利就会让人非常失望。这就好比私下里向你保证会给你加工资，赢得一大笔钱的可能性那么大，这就建立了一个新的暂时参照点。相对于你的期望而言，“什么也得不到”无异于一种巨大的损失。前景理论无法应对这种情况，因为在结果（在这里是指“什么也得不到”）出现的可能性很小或另外一种选择很有价值时，前景理论是不会允许这种结果的价值发生改变的。简而言之，那就是前景理论无法应对令人失望的事。失望和对失望的预感都是真实的感觉，而人们不能承认这种感觉的情形正好印证了我在批判伯努利理论时提出的那些反例。"}, {"en": "", "zh": "前景理论和效用理论没有给我们留下回旋的余地。这两种理论都有这样的假设，即某种选择中选项都是分开的，需要独自评估的，价值最大的选项就会被选中。这种假设显然是错的，请看下面的例子。"}, {"en": "", "zh": "问题6：选择有90%的机会赢得100万美元，还是选择肯定会得到50美元？"}, {"en": "", "zh": "问题7：选择有90%的机会赢得100万美元，或者选择肯定会得到15万美元？"}, {"en": "", "zh": "请比较一下两种情况下选择赌一把却赢不了的痛苦孰大孰小。在两种情况下，不能赢都会带来失望，但在问题7中，潜在的痛苦是多重的，因为知道如果选择赌一把又输了的话，你会后悔自己“贪婪的”决定，后悔放弃了拿到15万美元的机会，后悔这种体验依赖于你本应该采取却没有采取的意见。"}, {"en": "", "zh": "有些经济学家和心理学家依据对后悔和失望的情感提出了决策制定的模式。如果说这些模式没有前景理论那样有影响力的话也是说得通的，且其中的原因也很有启示意义。后悔和失望的情感是真实的，做出决策的人当然在做决策时会预测到这些情感。问题是后悔理论会产生一些惊人的预言，使得前景理论中这些情绪的作用变弱，这也就使问题变简单了。前景理论的复杂度在与期望效用理论进行对比时容易被大家接受，因为它确实预言了期望效用理论无法解释的一些现象。"}, {"en": "", "zh": "更丰富且更切实际的假设还不足以使一种理论获得成功。科学家把理论作为工具，但他们很难接受新的工具，除非这个新工具非常有用。前景理论为众多学者所接受不是因为它是“真实的”，而是因为它在效用理论基础上增加了一些概念，比如说参照点和损失厌恶等，这些都值得大家花费时间和精力来研究。它们产生的新预测最后都被证实是真实的。所以说我们是很幸运的。"}, {"en": "", "zh": "示例：前景理论\n“他是损失厌恶的典型例子，因而连非常有利的机会也被他拒绝了。”\n“她非常有钱，因而她对微不足道的所得反应那么强烈着实让人费解。”\n“他把损失看得比所得要重一倍。不过这也很正常。”"}, {"en": "", "zh": "第27章 禀赋效应与市场交易"}, {"en": "", "zh": "在经济学入门课程中，学生们会了解到：图中每一个点都代表了收入与休假天数的特殊结合。每条“无差异曲线”都与两种情况的结合相关联，收入和休假都是大家想要的，都有同样的效用。如果人们不管自己有多少收入、有多少休假时间，只想以同样的价格“出卖”休假时间以换取更多收入的话，这些曲线就会变成平行的直线了。凸出的部分表明边际效用递减，即你的休假天数越多，就越不会在意自己是否还想多休息一天，而且每多一天，这一天的意义就比前一天更小。同样，你的收入越高，就越不关心自己是否会额外再得到一美元，而且为换取一天的额外休假，你愿意放弃的钱数也会有所增加。"}, {"en": "", "zh": "每条“无差异曲线”上所有的位置都同样吸引人，这也正是“无差异”三个字的真实体现：你并不在意自己到底处在“无差异曲线”上的哪个位置。所以，如果A和B都在你的无差异曲线上，你对它们的位置并不在意，而且也不需要刻意在两点之间来回移动。在过去100年里出版的所有经济学教科书中都曾出现过这个图的不同版本，数百万学生都曾仔细研究过这个曲线图，却很少有人注意到图中缺失了什么。理论模式的影响和简洁再一次蒙蔽了这些学生和学者，使得他们没有看到这个曲线图的严重缺陷。"}, {"en": "", "zh": "如果你是个雇员，劳动待遇便说明了你应得的薪水和休假日。这个点就是你的参照点、你的现状，那些理论家没能展示出这一点，所以你便相信参照点并不重要，但现在你知道参照点是很重要的。这又是一个不折不扣的伯努利式错误。无差异曲线的表现含蓄地给出了假设，即所有时间点的效用完全是由当前的情况决定的，与过往毫不相干，而且你对一项可能的工作的评估并不依赖于自己当前的工作待遇。在这种情形以及其他许多情形下，这些假设完全是不切实际的。"}, {"en": "", "zh": "忽略无差异曲线图中的参照点这一做法正好印证了由理论导致的盲目性，堪称一个令人惊讶的案例，因为我们常碰到一些参照点非常重要的案例。在劳资谈判中，双方都清楚其参照点是现行合同，而且谈判关注的是就参照点作出让步时双方的共同要求是什么。在讨价还价时，损失厌恶的作用也很容易理解：作出让步让人很痛心。"}, {"en": "", "zh": "你对参照点的作用肯定有很深刻的亲身感受。如果你曾换过工作或职位，哪怕是曾想过要换一换，你就会以自己现在的情况作为参照点，看看新的工作和职位的特点是更好了还是更差了。你也许还会注意到，在评估中不利之处比有利之处更加突出，这说明损失厌恶发生了作用。人们很难接受比原来还糟糕的改变。例如，想要得到新工作的失业人员能接受的最低工资平均来看是其之前工作的90%，在一年的时间内下降不到10%。"}, {"en": "", "zh": "为了弄明白参照点对选择的影响，请看艾伯特和本这两位的例子，他们是“快乐双胞胎”，有相同的品位，第一份工作也是一样的，这份工作工资低、假期短。他们当前的状况和图中点1的情况相同。公司给他们提供了两个更好的位置A和B，并让他们自己选择谁要1万美元的加薪（位置A），谁要每月带薪休假一天的机会（位置B）。由于他们两人对这两种选择都无所谓，便用抛硬币的方式来决定。于是艾伯特获得了加薪机会，而本则得到了额外的每月一天带薪假期。一段时间过后，这对双胞胎习惯了各自的位置。现在公司告诉他们，如果他们愿意，可以互换位置。"}, {"en": "", "zh": "标准理论给出的假设为：人们的选择偏好很稳定，不会随时间推移发生改变。位置A和B对这对双胞胎来说具有相同的吸引力，而且他们几乎没有或者根本就不会产生想要改变的想法。前景理论的断言则截然相反，该理论认为两人肯定会留在自己当前位置上的原因是他们想规避损失。"}, {"en": "", "zh": "现在让我们来看看艾伯特。他刚开始在图中的位置1，在那个参照点上，他发现了两个同样吸引人的选择："}, {"en": "", "zh": "选择A：加薪1万美元"}, {"en": "", "zh": "或者选择B：得到12天的额外假期"}, {"en": "", "zh": "选择位置A改变了艾伯特的参照点，当他想要换到位置B时，他又有了新的选择："}, {"en": "", "zh": "停留在A点上：无所得也不损失"}, {"en": "", "zh": "或者换到B点：获得12天的额外假期，少赚1万美元"}, {"en": "", "zh": "你刚刚对损失厌恶有过主观体验，能感受到：少赚1万美元是个非常糟糕的消息。即使获得12天额外假期和得到1万美元同样令人惊喜，多出来的假期也不足以补偿损失的1万美元。艾伯特之所以会留在A点上是因为移动的不利之处大于有利之处。对本来说同样如此，他也想保住自己当前的职位，因为失去眼前这宝贵的假期比损失额外的收入更划不来。"}, {"en": "", "zh": "这个例子凸显了“无差异曲线”的标准模式没有预见到的选择的两个方面。第一，人们的偏好并不是一成不变的，它们会随着参照点发生变化。第二，改变的不利之处比有利之处更突出，其有利之处包括对倾向于现状的偏见。当然，损失厌恶并不是说你从未想过要改变自己的处境；一次机会带来的益处也许会超过甚至大大超过损失。损失厌恶只能表明我们的选择总是强烈偏向趋近参照情形的选项（而且通常情况下会偏向较小而不是较大的改变）。"}, {"en": "", "zh": "传统的无差异曲线和伯努利用财富状态来表示结果的做法有一个共同的错误假设，即拟定各项事务状态的效用只依赖于该状态本身，并不受你过往的影响。对这一错误的修正已经成为行为经济学的成就之一。"}, {"en": "", "zh": "人们为什么不愿意割舍自己已拥有的东西？"}, {"en": "", "zh": "一项决策何时付诸实施或一项行动何时开始，这个问题通常很难回答，但我们却可以准确而详尽地追溯到今天所说的行为经济学的发端。20世纪70年代早期，罗彻斯特大学的经济学系还非常保守，理查德·泰勒当时还是那里的研究生，他那时就有一些异端想法。泰勒总是很睿智，言辞犀利，作为学生，他常常乐于观察记录别人的行为，而这些行为只有理性经济行为模式才可以解释。他也很乐于在教自己的那拨教授身上发现他们理财不合理的情况，他发现有一种情况尤其突出。"}, {"en": "", "zh": "R教授（现在已被证实是理查德·罗塞特，他后来成为芝加哥大学商学院的院长）对标准经济理论深信不疑，还对葡萄酒难以割舍。泰勒发现R教授非常不愿意卖掉自己收藏的葡萄酒，即使对方出价高达100美元（当时可是1975年）一瓶也不行。R教授也会从拍卖会上买葡萄酒，但无论质量如何，他出价从不会高过35美元一瓶。若价格在35美元~100美元，他就既不买也不卖。这个巨大的价格差在经济理论上看是相互矛盾的，人们希望这位教授能在这个价格区间为某瓶酒定一个值。如果在他看来某瓶酒值50美元，那么只要出价超过50美元，他就应该会卖掉它；如果这瓶酒本来不是他的，那么他也应该愿意花50美元买下它。这个可以接受的卖价和可以接受的买价应该相同，但事实上，最低卖价（100美元）比最高买价（35美元）高出很多，拥有这件物品似乎会提升它的价值。"}, {"en": "", "zh": "理查德·泰勒发现了很多禀赋效应的例子，那些没有用做定期交易的商品尤其会出现这一效应。你很容易就可以想象自己处于一个类似的情景中。假设你手里有一张票已售罄的演唱会门票，这是一个著名乐队的演唱会。这张票你是以200美元的价格买下的，而你又是个狂热的粉丝，即便是以500美元买下这张票，你也愿意。后来你从互联网上看到有更有钱或更狂热的粉丝愿意花3000美元买下门票。你现在手里有票，你愿意卖吗？如果像票已售罄的各种重大活动中的大多数观众一样，你就不会卖。你的最低卖价也要在3000美元之上，而你的最高买价只是500美元。这就是禀赋效应的一个例子，而一个坚信标准经济理论的人则会对此感到迷惑。泰勒当时正在寻求一种解释来破解这类难题。"}, {"en": "", "zh": "泰勒在一次会议上遇到了我们以前的学生并拿到了前景理论的早期手稿，这才使得上述难题得到破解。他说他非常激动地读完了这份手稿，因为他很快就意识到前景理论中的损失厌恶能够对禀赋效应和其他一些难题作出解释，其解决方法就是摒弃标准理论，即R教授“拥有”某瓶特定葡萄酒的状态具有独特的效用。前景理论表明，是愿意买还是愿意卖这瓶酒取决于参照点，即教授当时是否拥有这瓶酒。如果拥有这瓶酒，他就会考虑“放弃”这瓶酒时的痛苦；如果还没拥有这瓶酒，那他考虑的就是“得到”这瓶酒的乐趣。因为存在损失厌恶，所以两者的价值并不相等，即放弃一瓶好酒的痛苦比得到同一瓶酒所得到的快乐更深刻。我们可以回想一下前一章中的那幅得失图。在对称轴左侧的函数曲线更陡，人们对损失的反应比对相应的所得的反应更强烈。这正是泰勒一直在寻找的对禀赋效应的解释。在今天看来，应用前景理论来解决经济难题的做法应该算做行为经济学发展过程中的里程碑式事件了。"}, {"en": "", "zh": "在泰勒得知阿莫斯和我将会到斯坦福大学工作时，他也计划在那里待上一年。这段时间我们都收获颇丰，我们相互学到了很多知识，也成了好朋友。7年后，我和泰勒又有机会在一起工作一年，继续就心理学和经济学中的问题进行交流。长期以来一直作为行为经济学主要赞助方的拉塞尔·塞齐基金会拨给泰勒一笔钱，目的是让我们两人能在温哥华共事一年。在这一年里，我们和当地的一位经济学家杰克·尼奇（Jack Knetsch）密切合作，他和我们一样，都对禀赋效应、经济公平原则和中国的辛辣食品很感兴趣。"}, {"en": "", "zh": "我们调查研究的起点是禀赋效应并不具有普遍性。如果有人想让你把面值5美元的钞票换成5张1美元的零钞，你递过去5张1美元纸钞时不会有损失感。在商店买鞋时你也不会有损失厌恶，卖鞋赚钱的商人当然也不会感到有什么损失。的确，从他的角度来看，递出去的鞋一直就是钱的代表，钱正是他想要从顾客那里拿来的东西。此外，你付给商家钱也不会感到是种损失，因为你把钱看做是你想要买的鞋的代表。这些日常交易与把面值5美元的钞票换成零钞有相同之处。日常交易中的双方都不存在损失厌恶。"}, {"en": "", "zh": "上述这些市场交易与R教授不情愿出售自己的葡萄酒有什么区别？就像那些持有美国橄榄球超级杯大赛门票的人，即便有人出一个非常高的价格也不愿转让这种做法又有什么区别？这一区别性特征就是，商家要卖给你的鞋和你从预算中拿出来的买鞋钱都是用来“作交换”的。人们想用它们来交易以换取其他商品。其他商品，比如葡萄酒和橄榄球超级杯大赛的票，都是拿来“使用”的，或者说都是用于消费或享受的。你的闲暇时光和收入也都不是用来出售或交换的。"}, {"en": "", "zh": "尼奇、泰勒和我打算设计一个实验来表明用来使用的商品和用来交换的商品之间的不同。我们实验设计的部分内容借鉴了实验经济学的奠基人费农·史密斯（Vernon Smith）的做法，多年以后，我和他共同获得了诺贝尔奖。利用这种做法，在某个“市场”中，我们向受试者发放了少量代币。实验结束时，所有手里还有代币的受试者都可以可将其兑换成现金。为了体现市场中用来交易的商品对某些人来说比对其他人更有价值，不同的人得到的补偿价值不同。同样的代币对你来说可能值10美元，对我来说却价值20美元，在这两种价值之间以任何一种价格进行交换对我们双方而言都是有利的。"}, {"en": "", "zh": "史密斯对供求的基本机制进行了生动的展示。个人会对买卖代币给出连续的公开报价，其他人会对报价做出快速回应。每个人都会关注这些交易，会看到代币的成交价。这些结果和一项物理学实证研究的结果一样合乎规范。那些代币持有者（代币于他们而言价值微乎其微，因为它们的补偿价值很低）为获利最终会将自己的代币卖给某个对代币估值更高的人，这种交易就好比水往低处流那样必然会发生。交易结束后，所有代币都集中到那些能从实验人员那儿拿到最多钱的受试者手中。市场魔力显神威！此外，经济理论还对市场平稳时的最终价格和转手的代币数量作出了正确预测。如果实验人员将这些代币随机分配给市场中的半数受试者，这个理论就会预测有半数代币会被转手。"}, {"en": "", "zh": "我们在实验中用到了史密斯方法的一个变量。每一次实验开始时都会进行几轮代币交易，这种做法完美重现了史密斯的发现。实验预计的交易数量与利用标准理论预测的数量非常接近甚至完全相同。当然，代币之所以有价值只是因为它们能用来交换实验人员的现金，它们没有任何使用价值。随后我们又模拟了一个相似的市场，目的是想让人们关注使用价值：一个好看的咖啡杯，杯子上印有大学校徽，我们在哪所大学做实验，杯子上就印着哪所大学的校徽。这个杯子当时价值6美元（今天这个杯子的价值可能是当时价值的两倍了吧）。我们随机将这些杯子发放给半数受试者。卖方将自己的杯子摆在面前，却热情地让买方去看旁边卖家的杯子；所有杯子都明码标价。要想得到一个杯子，买方必须自己花钱去买。实验结果很有戏剧性：平均卖价接近平均买价的两倍，而且实验预计的交易数量还不到利用标准理论预测数量的一半。市场的魔力对于那些想使用某件商品的所有者（卖家）而言根本就不起作用。"}, {"en": "", "zh": "我们用同一过程的不同变体进行了一系列实验，总是得到相同的结果。在我最喜欢的一项实验中，我们在“买方”和“卖方”之外加入了第三个小组，“选择者”。与那些不得不花自己的钱买东西的“买方”不同，“选择者”可选择是接受一个杯子还是一笔钱，而且他们的选择表明那笔钱和得到那样东西一样吸引人。“卖方”和“选择者”之间的差距很大，因为他们实际上面对的是同一种选择！如果你是“卖方”，你能拿回家的要么是一个杯子要么是钱；而如果你是个“选择者”，也有完全相同的两个选项。这个决定的长期效应对于两组人来说是完全相同的，唯一不同的是当时的情绪。卖方标注的高价反映出他们在放弃自己已经拥有的物品时很不情愿，这种不情愿与婴儿在自己特别看重的某件玩具被拿走时表现出的焦虑一样。损失厌恶是系统1自主评估必然包含的内容。尽管“买方”只能花钱买杯子，而“选择者”却可以免费得到这个杯子，但两者却设定了相似的现金值。如果“买方”不觉得花钱买下这个杯子是种损失的话，这个相似的现金值便与我们的预期正相吻合。大脑成像的证据也证实了这种不同。出售自己常用的商品会激活大脑中与厌恶和痛苦有关的区域，购买行为也会激活这些区域，但只有在（买方）认为价钱太高，即当你觉得卖方的要价超过了交换价值时才会这样。大脑记录还表明以特别低的价格购买商品是件令人愉快的事。"}, {"en": "", "zh": "“卖方”给杯子设定的现金价值比“选择者”和“买方”设定的高出两倍多，这个比例与有风险选择的损失厌恶系数非常接近，不管决策是否有风险，只要运用赚钱和赔钱两种结果中相同的价值功能（函数），我们就能预测到这个比例。在不同经济领域的研究中都出现过大约2：1的比例，包括许多家庭对价格变动的反应。正如经济学家所预测的那样，在价格下降时，顾客往往会增加蛋、橙汁或鱼等商品的购买量；而价格上涨时，他们就会减少其购买量。然而，与经济理论预测不同的是，价格上涨的效应（基于参照价格的相对损失）竟然是收益效应的两倍。"}, {"en": "", "zh": "杯子实验延续了禀赋效应的标准实证研究，这个实验与杰克·尼奇负责的一项更为简单的实验基本上是同期进行的。尼奇让两个班的学生填写了调查问卷，并且给他们每人一份礼物作为回报，这份礼物在实验期间一直放在受试者面前。其中一个班的学生得到的礼物是昂贵的钢笔，而另外一个班的礼物则是一块瑞士巧克力。快下课时，实验人员拿出了另外一份备选礼物，并且告诉学生可以用他们手里的礼物来交换这份礼物。结果只有约10%的受试者选择交换礼物，大多数得到钢笔的人仍然保留了钢笔，那些拿到巧克力的人也没有改变自己的选择。"}, {"en": "", "zh": "像商人那样思考和交易"}, {"en": "", "zh": "前景理论的基本概念是参照点是存在的，而且一定量的损失比等量的所得影响更大。过去这些年在真正的市场中进行的观察表明，这些概念有着很强的影响力。经济衰退期间，对波士顿的公寓大厦市场进行的一项研究调查给出了尤为清晰的结果。参与该项目的人员对那些曾以不同价格购买了相似房产的业主行为进行了对比。对于理性的代理人来说，从前的买价与自己根本就不相干，当前的市场价值才是最重要的。然而对于那些处于住房市场低迷时期的业主来说，情况却并非如此。那些参照点较高同时也面临着较大损失的业主对私有住宅的标价更高，他们会花更多的时间尽量以高价卖掉自己的房子，最终得到更多的钱。"}, {"en": "", "zh": "对卖价和买价之间（更确切地说，是买卖之间）的不对称性最初进行的实证研究，在人们接受参照点和损失厌恶这些概念的早期发挥了非常重要的作用。然而，我们都知道参照点是不稳定的，在不同寻常的实验环境中尤其如此，而且禀赋效应可通过改变参照点而消除。"}, {"en": "", "zh": "当那些业主将其商品看做未来交换中的价值载体时，他们就不想看到禀赋效应出现，这种《“文》态度在日《“人》常商务活动《“书》和金融市场《“屋》上非常普遍。曾通过各种棒球卡大会研究贸易的实验经济学家约翰·李斯特（John List）发现贸易新手不愿割舍自己手中的球员卡，但这种不情愿会随着贸易经验的增多而最终消失。更令人惊讶的是，李斯特发现，就新商品来说，贸易经验对禀赋效应的影响很大。"}, {"en": "", "zh": "在某次大会上，李斯特贴出了一张通告，邀请人们参与一个小调查，而且他们可得到一份小礼物，这份小礼物可能是一个咖啡杯或一块同等价值的巧克力。这些礼物是随机分给大家的。在那些自愿参加调查的人即将离开时，李斯特告诉大家说：“我们给了你一个杯子或一块巧克力，但如果你愿意，你可以用它来换块巧克力或换个杯子。”在完整再现杰克。尼奇的早期实验时，李斯特发现那些缺乏经验的商人中只有18%的人愿意和别人交换礼物。与之形成鲜明对比的是，那些经验丰富的商人并没有表现出任何禀赋效应的迹象：他们中有48%的人进行了交易！至少在一个以交易为基准的市场环境中，他们在交易时没有表现出任何不情愿。"}, {"en": "", "zh": "杰克·尼奇还做了一些实验，在这些实验中只要进行一些细微的操作就可以使禀赋效应消失。在实验人员提到受试者手头的商品有可能用来交易之前，只有在真正拥有该商品一段时间的前提下，他们才会表现出禀赋效应。经济学家也许会说尼奇和心理学家待在一起的时间太久了，因为他的实验操作表现出对一些变量的关注，而这些变量正是社会心理学家认为很重要的因素。的确，实验经济学家和心理学家对方法论的不同关注点在关于禀赋效应的持续辩论中体现得越来越明显。"}, {"en": "", "zh": "经验丰富的商人显然已经学会了正确提问，即“与可以得到的其他东西相比，那个杯子真的是我特别想‘得到’的吗”。经济学家会问这个问题，有了这个问题，禀赋效应就不复存在了，因为得到的快乐和放弃的痛苦之间的不对称性没有关联。"}, {"en": "", "zh": "对“在贫困境遇中做决策”的心理进行的最新研究表明，我们并没有希望从这些贫困的人的身上发现禀赋效应。在前景理论中，贫困就意味着一个人的生活水平低于自己的参照点。有些商品是穷人买不起的，因此他们总是“处于损失中”。他们会觉得自己得到的那一小笔钱算是减少了的损失，而不是所得。这些钱可以帮助一个人向参照点再靠近一点，但穷人却总是徘徊在价值函数坡度最大的地方。"}, {"en": "", "zh": "穷人可以像商人那样思考，但其原动力却有着很大的不同。与商人不同，穷人对获得和放弃之间的区别很在意。他们的问题在于，他们只能在不同的损失之间作出选择。花在某件商品上的钱对于本来可以购买的另外一件商品而言就是损失。对于穷人来说，花钱就意味着损失。"}, {"en": "", "zh": "我们都认识一些认为花钱很痛苦的人，尽管客观来讲他们其实很富裕。对花钱的态度，尤其是对一时兴起买的东西或者一些较小奢侈品（例如买个有装饰的杯子）的态度，常带有文化差异的因素。这种差异也许可以解释美英两国分别进行的“杯子研究”的结果之间存在的重大分歧。在美国，对学生样本所做的实验中买价和卖价存在很大差异；但在英国的学生中，这些差距则要小得多。因此，对禀赋效应的研究还有待深入。"}, {"en": "", "zh": "示例：禀赋效应\n“她不在意自己能得到两个职位中的哪一个，但公告发布一天之后，她就不再想换了。这就是禀赋效应！”\n“这些协商不会有任何进展，因为双方都发现很难作出让步，即使自己能得到补偿也不行。损失的比得到的更多。”\n“他们一涨价，需求量就下降。”\n“他只是不想以低于自己买房的价格卖掉自己的房子。损失厌恶起作用了。”\n“他是个吝啬鬼，只要花钱就觉得赔了。”"}, {"en": "", "zh": "第28章 公平性——经济交易的参照点"}, {"en": "", "zh": "损失厌恶这一概念绝对是心理学对行为经济学最重要的贡献。这很奇怪，因为人们虽然通过这个概念将众多结果评估为得和失，而且损失显得比获得更突出，但这个概念并没有让人们感到惊讶。阿莫斯和我经常开玩笑说，我们正在研究一项连我们的祖母那辈人都耳熟能详的课题。然而事实上，我们比那辈人了解得更多，而且能将损失厌恶与大脑双系统模式相结合进行研究，还特别将一种生理学和心理学观点应用到这些研究中，即相比于积极与靠近而言，消极与规避更能占据主导地位。我们还能通过数量惊人的各种观察研究来探索损失厌恶的结果：当商品在运输中丢失时，只有需现款支付的那部分损失才能得到补偿；大范围的改革通常会失败；职业高尔夫球手短打标准杆比短打小鸟球（高尔夫中某洞的杆数低于标准杆一杆）更精准。就算我的奶奶很有智慧，但如果我们能从她认为平淡无奇的观点中得出精准的预测的话，她应该也会感到惊奇的。"}, {"en": "", "zh": "过了一会儿，你也许就会认出那是双受到惊吓的人的眼睛。右面的图则表达了一种愉悦之感，微笑的脸颊上扬使眼睛变小了，当然这双眼睛还没有达到兴奋的程度。我们把这两幅图拿给做脑CT的人看。每幅图展示的时间都不到0.02秒，之后会被“视觉噪声”掩盖，这个“视觉噪声”是随机展示的黑白图片。这些观看者中没有人意识到自己曾看过那幅眼睛的图片，但他们大脑的一个部分显然意识到了：这个部分即为小脑扁桃核，尽管它在其他情绪状态下也会被激发起来，但其主要角色是担任大脑的“风险中心”。脑部影像显示，小脑扁桃核对观看者无法识别出来的有威胁性的图片有强烈的反应。关于威胁的感觉很可能是通过一个非常快的神经通道传递的，这种感觉会直接传到大脑处理情感的区域，绕过产生“视觉”意识的视觉皮质。同样的通道还会使得生气的面孔（一种潜在威胁）比快乐的面孔更快、更有效地得到处理。有些实验人员描述道，生气的面孔在众多快乐的面孔中会“凸显出来”，但快乐的面孔在众多生气的面孔中却不会很突出。人类的大脑和其他动物的大脑都包含一种机制，这种机制总会优先考虑不好的消息。将察觉掠食者所需的时间减少百分之几秒，通过这种做法，提高了动物的生存概率，使其得以繁衍生息。系统1的自动运行便体现了这种进化史。然而，人们至今尚未找到能够同样快速检测到好消息的机制。当然，我们人类和动物都对交配或进食的信号反应很机敏，因此广告商才会设计许多广告牌。不过，威胁仍然优先于机遇，而且也应该是这样。"}, {"en": "", "zh": "即使是对纯粹象征性的威胁，大脑的反应也很迅速。充满情绪的字眼会引起注意，而不好的字眼（战争、犯罪）比好的字眼（和平、爱）能更快地引起注意。其实并没有真正的威胁，但只是提一下不好的字眼对系统1来说就是一种威胁。之前我们曾提到“呕吐”这个词，只是看到这个词就会自然联想起很多对真实事情的反应，包括生理上的情感流露，甚至有规避或接近、畏缩或向前的趋向。对威胁的敏感性还会延伸到对自己强烈反对的那些意见陈述的处理上来。例如，基于你对安乐死的态度，你的大脑用不到四分之一秒的时间就可以在“我认为安乐死是一种可以（不可以）接受的……”这句话中识别出“威胁”的意味。"}, {"en": "", "zh": "保罗·罗津（Paul Rozin）是位对厌恶很有研究的心理学家，他观察到一只蟑螂可使一碗樱桃不再诱人，而一个樱桃对一碗蟑螂却不会起任何作用。他指出，负面情况在众多方面都可战胜正面情况，而且损失厌恶是负面占优势的典型例子之一。其他学者在一篇题为“坏消息比好消息强”的文章中将原因总结为以下几点：“负面情绪、不负责任的父母和糟糕的反馈比好的情况更具影响力，且人们处理坏消息时比处理好消息更彻底，我们会更在意避开负面的自我定义，而不是追求正面的自我定义，不好的印象和不好的模式比好的情况更容易形成，且不易消失。”他们引用了研究婚姻关系的著名专家约翰·葛特蒙（John Gottman）的话，他观察到长期健康的婚姻关系不仅仅依赖于寻求幸福，更在于避免负面的情况出现。葛特蒙预测一种稳健的关系需要良好的互动与不好的互动间的比例至少为5：1。其他社会方面的不协调则更吸引人，我们都知道，也许一件事就会毁掉数年时间培养的友谊。"}, {"en": "", "zh": "我们生来就能对好与坏的某些区别进行分辨。婴儿来到这个世界上，就知道苦是不好的，（某种程度的）甜是好的。然而在很多情况下，好和坏之间的界限是种参照点，会随着时间的改变而改变，而且依赖于当时的情况。假设你在一个寒冷的晚上来到乡村，适逢大雨，而身上的衣服又不足以挡雨，衣服都湿透了。不凑巧的是，冷风又起，这下真的是糟糕透顶。就在你不知如何是好时，发现了一大块岩石可暂时挡风避雨。生物学家米歇尔·卡巴纳克（Michel Cabanac）说这种体验会令人非常快乐，因为这种体验与我们平时可能感到快乐的原因相似，都指明了生理状况的重要改善方向。当然，这种感到获救的快乐感不会持续很长时间，不一会儿你就会在岩石后面冻得哆嗦起来。新遭受的痛苦又会驱使你去寻找更好的庇护之所。"}, {"en": "", "zh": "目标就是参照点"}, {"en": "", "zh": "损失厌恶系数指的是两种动机的相对强度：我们想要规避损失的动机要强于获得利益的动机。参照点所关注的是现状，但它还会是将来的目标，即没有实现的目标就是种损失，超过了目标就是种所得。正如我们从消极主导中可能推断出来的那样，这两种动机的影响程度并不形同。对没能实现目标的损失厌恶比想要超过目标的愿望更为强烈。"}, {"en": "", "zh": "人们通常会设定一些短期目标，对于这些目标他们会努力去实现，但并不是必须去超越。人们在实现一个最接近的目标后往往不再那么努力，而这样做有时候会违背经济逻辑。例如，纽约市的计程车司机对月收入或年收入有个目标，但能控制他们努力程度的目标则是每天的收入目标。当然，每天的目标有时容易实现（或超过），而有时则难以实现。下雨天时，纽约市的计程车是不会长时间空车的，司机很快就可以实现自己的目标；而在天气晴好时，情况则大不相同，此时那些计程车只能在大街小巷逡巡，希望能载到客人，时间都浪费在路上了。经济逻辑表明，计程车司机应该在下雨天多干几个小时，晴天时则要多休息，因为晴天时能以较低价格“买”到轻松闲暇。损失厌恶背后的逻辑却正相反：每天有固定目标的司机会在客人少的日子多干几个小时，在浑身湿透的客人巴望打到车的日子里，他们也早早回到家里。"}, {"en": "", "zh": "宾夕法尼亚大学的经济学家德文·波普（Devin Pope）和马利斯·施韦泽（Maurice Schweitzer）认为，高尔夫球对参照点给出了很好的说明，即标准杆数。高尔夫球场上每个洞都有许多击球数，标准杆数给好球（而不是相当出色的球）提供了一个基准点。对于职业高尔夫球员来说，小鸟球（即低于标准杆的一击）即是所得，而超过标准杆数的球则是种损失。经济学家比较了一个球员在球洞附近时可能会碰到的两种情形。避免击超过标准杆数的球打出小鸟球。"}, {"en": "", "zh": "在打高尔夫时，每一击都算数，在职业高尔夫球比赛中更是如此。然而依据前景理论，有几次击球要比其他击球更重要。没能达到标准杆是种损失，但没有击中小鸟球则是种可预知的所得，不是损失。波普和施韦泽从损失厌恶中推断出球员击标准球（避免超过标准杆数）时会比击小鸟球时更努力。他们仔细分析了250多万次击球以验证这个预测。"}, {"en": "", "zh": "他们是正确的。不论击球是易还是难，不管离球洞有多远，球员在击标准球（而不是小鸟球）时会更成功。在击标准球（避免超过标准杆数）或击小鸟球时，他们成功概率之间的区别是3.6%。这个区别不算小。老虎伍兹是他们的一个“受试者”。在伍兹成绩最好的那几年里，如果他的小鸟球和标准杆都击得那么好的话，他联赛的平均绩点就会提高1杆，而且他的收入每个季度都会增加100万美元。这些激烈的竞争者当然不会轻视小鸟球，但他们对超过标准杆的规避显然会使他们对当前的任务格外关注。"}, {"en": "", "zh": "对击球的研究说明理论概念的力量可协助思考。谁会认为花几个月的时间去研究击标准球和小鸟球是值得的呢？除了一些经济学家以外，大多数人都不会对损失厌恶的概念感到惊讶。但是，损失厌恶形成了一个精确且非直觉性的假设，还引导研究者得出了一个让所有人都震惊的发现。当然，这里的所有人也包括职业高尔夫球运动员。"}, {"en": "", "zh": "我们为什么不愿意改变现状？"}, {"en": "", "zh": "避免损失的动机和获得收益的动机强度并不对称，这一点在许多情况下都有体现。在商务谈判中，尤其是在对现有合同的重新商谈中、在典型的劳动商议和在贸易或限制军备的国际谈判中，这种不对称是长期存在的一个特征。现有的条款确定了参照点，协议中任何方面拟定的变更都会被看成是一方对另一方作出的让步。损失厌恶会产生一种不对称，使得双方难以达成共识。你对我作出的让步是我的所得，但它们却是你的损失；损失使你产生的痛苦会比它们给我带来的快乐更多。因此，你对这种让步的价值会比我赋予它的价值高。当然，你要求我作出的让步对于我来说也会是这样，你对我作出的让步也不会给予足够的价值评价！对越来越小的蛋糕进行商讨非常困难，因为即使损失，也要将其分配出去。人们在蛋糕越来越大时，显得更随和。"}, {"en": "", "zh": "在讨价还价时，双方交换的信息都是想找到一个参照点并给对方提供一个锚定。这些信息并不都是真实的。商议双方对有些利益（也许是商谈裁军问题时提到的某一特定类型的导弹）假装很在意，尽管他们实际上是将这种利益看成讨价还价的筹码并最终想要将其交换出去。因为商议双方都受互惠原则的影响，一个看似令人痛心的让步就需要对方作出同样使他们痛心（可能这种痛心也是伪装的）的让步。"}, {"en": "", "zh": "所有动物（包括人）都想有所得，但他们会更努力地避免有所失。在这样一个所有动物都想有自己地盘的世界中，这项原则解释了防御者成功的奥秘。一位生物学家观察到，“拥有领地的动物受到对手的挑战时几乎总会获胜，往往就是几秒钟的事”。对于人类来说，同样简单的原则也能解释社会机构的改革问题，公司的“重组”和“调整”行为就是如此，官僚主义的合理化、简化免税代码以及降低医疗费用等方面的努力同样如此。起初我们认为，在改革计划中，总体的提升会产生赢家和输家。如果受影响的一方有某种政治影响力，可能成为输家的人就会变得比赢家更积极、更有决心，结果也会更倾向于输家，也一定会比起初计划的代价更高、作用更小。改革通常包括保护利益相关者的不追溯条款，例如以下情形：劳动力减少是由于（退休、辞职、死亡等原因造成的）人员缩减而不是开除；工资或福利的缩减只会在将来的工人身上施行。损失厌恶是一种强大而保守的力量，它偏爱机构或个人对当前生活的细小改变。这种保守主义做派使得我们在邻里间、婚姻中和工作中保持一个稳定的状态，是引力作用让我们的生命无限靠近参照点。"}, {"en": "", "zh": "商人提价或降低员工工资的行为公平吗？"}, {"en": "", "zh": "理查德·泰勒、杰克·尼奇和我一起在温哥华工作的那一年，我们三人对经济交易中的公平性研究产生了兴趣，这不仅是因为我们对这个话题很感兴趣，还因为我们每周都可以（也可以说是必须）制定一份新的调查问卷。加拿大的渔业及海洋部针对多伦多市失业的专业人员制订了一项计划，他们让这些专业人员负责电话调查，并且会支付他们一些薪酬。这一大群调查者每晚都要工作，因而我们也需要不断为他们供应新的问卷调查。由于杰克·尼奇的原因，我们同意每周设计一份调查问卷，用4种颜色印刷。我们什么都可以问，唯一的一个限定条件是问卷应至少提到一次鱼，这样也好跟渔业及海洋部扯上点儿关系。这项工作进行了几个月，这几个月里我们疯狂地收集数据。"}, {"en": "", "zh": "是什么造成了商人、雇主以及房主的不公平交易行为？我们研究了公众对这一问题的看法。问卷中的首要问题是：因为这种不公平行为招来的骂名是否会使他们追逐利润的行为收敛些？我们的发现是：会。而且我们还发现，公众评估哪家公司也许真的（不）会收敛时所依照的道德原则可以明鉴得失。其基本原则是，当前的工资、价格或租金设定了一个参照点，不可违背这个参照点。有些公司将自身的损失强加给顾客或工人，使自己回到交易参照点，这样做是不公平的，除非这样做是为了保护自身的权利。请思考下面的例子："}, {"en": "", "zh": "一家五金店一直以15美元的价格出售雪铲。某日下了大雪，第二天早上店主就将雪铲的价格提高到了20美元。"}, {"en": "", "zh": "你认为这种行为：完全公平可以接受不公平很不公平"}, {"en": "", "zh": "按标准的经济行为模式来看，这家五金店的行为是公平的：通过提高价格来回应需求的增加。而调查对象却不这么认为，82%的人选择了不公平或很不公平。他们显然是将大雪前的雪铲价格看成了参照点，而将提升的价格看成是店主强加给顾客的损失，因为这家店并不是不得已才这样做的，而是因为它选择这样做。我们发现公平性的一条基本原则是：不可利用市场的力量将损失强加给他人。下面的例子在另一个情境下（因为这些数据是1984年收集的，所以美元的价值应该调至约100%的通货膨胀状态）说明了这条原则："}, {"en": "", "zh": "有一家小型复印店，店里只有一位雇员，他在这里工作有6个月了，每小时赚9美元。店里的生意还算景气，但当地一家工厂倒闭了，失业人数上升。现在其他小商店里雇用的可靠员工工资都是每小时7美元，工作量和复印店里那位雇员的工作量相似。之后，这家复印店店主也将其雇员的工资降到了7美元。"}, {"en": "", "zh": "那些调查对象不赞成这种做法，83%的人觉得这种行为不公平或很不公平。然而，略微变动一下这个问题就可以澄清雇主的责任。同样是在高失业率的地区，同样是一家赢利的商店，但情况是："}, {"en": "", "zh": "现在的雇员辞职了，雇主决定支付新的雇员每小时7美元的工资。"}, {"en": "", "zh": "大多数人（73%）觉得这种行为是可以接受的。这表明雇主并没有支付每小时9美元的道德义务。这种权利是个人的：即使市场允许雇主降低工资，雇员也有权利维持自己的工资。新雇员没有权利以之前雇员的工资作参考，因而雇主可以降低其工资，这样做不应该被看做不公平。"}, {"en": "", "zh": "这家公司有其自身的权利，即保持当前的收益。如果该公司面临损失的危险，也可以将损失转嫁给别人。大多数调查对象认为，在收益下降时降低工资是不公平的。我们称这种原则是公司和与公司有关联的个人之间的典型双向权利。受到威胁时，公司的自私行为可被看做是公平行为。人们甚至认为这家公司连部分损失也不必承担，它完全可以将这种损失转嫁给个人。"}, {"en": "", "zh": "不同的原则制约着公司追求利益或避免利益损失的行为。当公司生产成本低时，公平性原则就不会限制公司将财富分给顾客或雇员。当然，若公司分摊赢利，我们的调查对象就会更喜欢这家公司，并觉得这家公司更公平；若不分摊，他们也不会认为该公司做法失当。他们只会在公司利用权力违背与雇员或顾客间的非正式合同时，或者在公司为自身赢利而将损失强加给别人时才会表现出愤怒。研究经济公平性的学生们不应该去评判公司最应该有的举措，而应该找到区分遭人厌恶、应得到惩罚的行为和可接受的行为之间的分界线。"}, {"en": "", "zh": "在把这篇研究报告提交给《美国经济评论》（American Economic Review）时，我们当时并不是很乐观。我们的文章是对当时经济学家们公认的知识的挑战，即经济行为是受自身利益驱使的，而与是否公平无关。我们的研究依赖于调查结果，而经济学家对此并无多大兴趣。杂志的编辑把我们的文章送给两位经济学家评估，这两位经济学家并没有受到传统观念的束缚（我们后来才知道他们的身份，他们是编辑能找到的最和善的人了）。编辑的做法是明智的。这篇文章如今常被引用，而且其结论也经受住了时间的考验。最近有很多研究都支持这个以参照点为基础的公平性实验的结果，而且这些研究还表明公平性在经济学中是很重要的，关于这一点我们过去曾经怀疑过，但没有得到验证。违背了公平原则的雇主会受到生产力下降的惩罚，标价不合理的商人也会失去一部分销售市场。以较低价格卖出近期以较高价格购进的商品会使这位商人此后从这家商品供应商进货的量减少15%，即每位顾客都会分摊到90美元的损失。顾客显然将低价位看成了参照点，而且由于多付了钱，他们会认为自己也遭受了损失。尽管反应最强烈的顾客是那些以较高价钱买了更多商品的人，而且新价目表中较低的价格增加了产品销量，但按底价购物的那些顾客的损失其实远远超过他们所得的。"}, {"en": "", "zh": "如果认为自己遭遇了不公平的人想反抗，那么这种将损失强加给别人的行为就会有风险。实验表明，不公平行为的旁观者也常会被卷入惩罚当中。神经经济学家（将经济学和大脑研究联系起来进行研究的科学家）使用核磁共振成像仪检测了人们的大脑，这些人惩罚某人对他人做出的不公平行为。令人惊讶的是，利他惩罚会伴有大脑“快乐中心”的活动加强的情形出现。这表明保持社会秩序和公平原则的做法会通过利他惩罚而得到回报。利他惩罚能将这个社会凝聚到一起。然而，我们的大脑在奖赏无私慷慨行为时不能像在惩罚自私吝啬行为时那样实在。我们在这里又发现了得失间的不对称。"}, {"en": "", "zh": "损失厌恶和权利的影响远不只存在于金融交易领域中。法官很快就能看出它们对法律和司法行政的影响。在一项研究中，戴维·科恩（David Cohen）和杰克·尼奇发现，在法律决策中真正的损失和可预测的所得之间有着明显区别。例如，在运输中丢失货物的商人可得到实际损失的赔偿，但损失的利润却不可能得到补偿。90%的财产起诉存有的相似原则也证实了参照点的道德地位。在近期的一场讨论中，埃亚尔·扎米尔（Eyal Zamir）提出了一个颇具挑衅性的论点，即法律对挽回损失和补偿失去的所得之间的区分，也许可以凭借其对个人幸福的不对称影响使自身的行为合理化。如果遭受损失的人比没能赢利的人遭受更大的损失，他们也许应该得到更多的法律保护。"}, {"en": "", "zh": "示例：损失问题\n“这项改革肯定无法通过。那些必然受损的人会比那些必然获利的人更加强烈地反对这种做法。”\n“他们都认为对方作出让步时不会感到痛心。当然，他们都错了。这正是损失的不对称性的表现。”\n“如果他们觉得利益的蛋糕的确在变大，就会发现再次商议更容易。因为他们不是在分配损失，而是在分配所得。”\n“这儿的租赁价格直线上涨，但房客认为我们不应该提高租金。他们觉得自己有权利享受当前的利益。”\n“我们的客户对价格上涨并无抱怨，因为他们知道我们的成本也上涨了。他们尊重我赢利的权利。”"}, {"en": "", "zh": "第29章 对结果可能性的权衡"}, {"en": "", "zh": "对于你要买的汽车、你的女婿或者不确定的形势这样复杂的对象，你会形成一个总体评估，而在作这个评估时，你会对这个对象的特征加以权衡。这么说有些烦琐，简单来讲就是，某些特征比其他特征更容易对你的评估产生影响。这种权衡在发生时你可能意识不到，这是系统1在起作用。评估一辆车时多少会权衡其燃油情况、舒适程度或外观等。评估女婿也多少会考虑他的经济状况、相貌或是否可靠等。同样，对于不确定形势的评估也会权衡其可能出现的结果。权衡时，你肯定会考虑到这些结果的可能性：有50%的概率赢得100万美元当然要比只有1%的概率更吸引人。权衡有时是有意识的，有时是经过深思熟虑的。然而，大多情况下，这些总体评估都是由系统1作出的。"}, {"en": "", "zh": "可能性效应与确定性效应"}, {"en": "", "zh": "在研究决策制定时，我们以打赌为例，效果不错，其中一个原因是打赌是对预期结果加以权衡的一种很自然的方式：结果的可能性越大，就越应该受到关注。一个赌局的预期值即为其结果的平均值，而每个结果又要靠其可能性来权衡。例如，如果“有20%的概率赢得1000美元和有75%的概率赢得100美元”，这种情况的预期值就是275美元。在伯努利开始研究前，赌注是通过其预期值加以评估的。伯努利也使用了这一方法来权衡结果，人们将这一方法称为预期原理，但却将其应用到研究结果的心理价值中去了。在伯努利理论中，打赌的效用是其结果效用的平均值，每个结果都是通过其可能性来加以权衡的。"}, {"en": "", "zh": "预期原理没有正确地描述你对有风险的可能性是怎么想的。若在以下4种情况中，得到100万美元的概率都提升了5%，你认为这个消息给人的感觉是一样的吗？"}, {"en": "", "zh": "A.从零提升到5%。"}, {"en": "", "zh": "B.从5%提升到10%。"}, {"en": "", "zh": "C.从60%提升到65%。"}, {"en": "", "zh": "D.从95%提升到100%。"}, {"en": "", "zh": "依据预期原理来看，每种情况下你得到100万美元的效用都提升了5%。但这么说与你的经验相符吗？当然不相符。"}, {"en": "", "zh": "大家都知道：从零提升到5%和从95%提升到100%要比从5%提升到10%或从60%提升到65%更具诱惑力。从零提升到5%意味着情况完全转变，从无到有，产生了赢得奖金的希望，这是一种实质性改变；而从5%到10%只是一种数量上的提升，是将赢得奖金的可能性翻倍，但这种情况下的心理价值并没有翻倍；从零到5%的巨大转变表明了“可能性效应”（possibility effect），这一效应会是我们高估那些出现可能性极低的结果的发生频率。大量买彩票的人表明，他们愿意花超出预期价值的钱来换取赢得大奖的渺茫机会。"}, {"en": "", "zh": "从95%提升到100%是另一种实质性改变，也会产生巨大的影响，是“确定性效应”（certainty effect）。那些几乎可以确定会出现的结果受到的重视程度要小于其理应受到的重视程度。为了更好地理解确定性效应，假设你继承了100万美元，但你那同母异父的妹妹不甘心，在法庭上对这份遗嘱提出了质疑。判决结果明天就会出来，你的律师向你保证你赢得官司的概率很大，有95%，但他又煞费苦心地提醒你法律判决并不都是尽如人意的。现在，有个风险调整（校正）公司找到了你，想立即以91万美元与你交易，接不接受是你的事。公司的报价比等待判决的预期价值（95万美元）要少（少了4万美元），但你确定你会拒绝这个提议吗？如果这样的事在你的生活中确确实实发生了，你应该知道“结构性和解”这个大产业是以不菲的价格来提供保障的，他们充分利用了确定性效应。"}, {"en": "", "zh": "可能性和确定性在损失研究方面具有同样强大的效应。当心爱的人被推进手术室时，即使截肢的可能性只有5%，也是个噩耗，这个5%的风险带来的痛苦要远大于10%的可能性带来的痛苦的一半。这是由于可能性效应，即我们往往看重轻风险，更愿意花比预期价值更多的钱将其排除掉。在可能性效应中，有95%的可能性会遭受灾难和必然会遭受灾难两者间的心理差别甚至更大；虽然“一切都会没事的”这样的希望很渺茫，但人们却总是将这种希望无限放大。过于看重很小的概率，使得风险和保险政策更具诱惑力。"}, {"en": "", "zh": "结论很明显：与预期原理相反，人们对结果的重视程度和对结果可能性的重视程度不同。可能性效应会重视不大可能的结果，而几乎肯定的结果相对于确定的结果来说，受到的重视程度要小。预期原理通过可能性来判定价值，这是一种不可取的心理。"}, {"en": "", "zh": "然而这个问题却越来越复杂，因为有个有力的论点指出：想变得理性的决策制定者“一定”要遵从预期原理。这也是冯·诺依曼和摩根斯坦恩在1944年提出的公理版效用理论的主要观点。冯·诺依曼和摩根斯坦恩指出，有些不确定结果与可能性并不相符，对这些结果的权衡会导致不一致性和其他恶果。他们由理性选择的公理推出的期望效用理论当时立即就被视为一项重大成果，也使得期望效用理论成为经济和其他社会科学理性模式的核心内容。30年后，阿莫斯带着一种敬畏把他们的研究介绍给我，当时他还向我介绍了一项针对这个理论的著名挑战。"}, {"en": "", "zh": "著名经济学家也难逃阿莱斯悖论的陷阱"}, {"en": "", "zh": "1952年，即冯·诺依曼和摩根斯坦恩的效用理论发表几年后，在巴黎召开的一次大会讨论了风险经济学的问题。很多当时著名的经济学家都参加了这次会议。来自美国的与会者中包括了后来的诺贝尔奖得主保罗·萨缪尔森（Paul Samuelson）、肯尼斯·阿罗（Kenneth Arrow）、米尔顿·费里德曼（Milton Friedman）和统计学界的带头人吉米·萨维奇（Jimmie Savage）等人。"}, {"en": "", "zh": "巴黎大会的一位组织人莫里斯·阿莱斯（Maurice Allais）几年后也获得了诺贝尔奖。阿莱斯准备了几个关于选择的问题来问与会嘉宾。那次大会与本章内容相关的问题就是，阿莱斯想要表明那些嘉宾容易受确定性效应的影响，因此才违背了期望效用理论和该理论所依据的理性选择的公理。以下的一套选择是对阿莱斯构建的难题的简单表示。在问题A和问题B中，你会选择哪一个？"}, {"en": "", "zh": "A.61%的概率赢得52万美元或者63%的概率赢得50万美元"}, {"en": "", "zh": "B.98%的概率赢得52万美元或者100%的概率赢得50万美元"}, {"en": "", "zh": "如果你和其他人一样，便会在问题A中偏向前面的选项，在问题B中偏向后面的选项。如果你的确是这样选择的，就说明你犯了逻辑上的错误，并且违背了理性选择的原则。这些齐聚巴黎的著名经济学家在“阿莱斯悖论”中也犯了同样的错误。"}, {"en": "", "zh": "为了弄明白为什么这些选择有问题，我们可以将其看成是从罐子里随意抓取弹珠的游戏，即若罐子里装有100颗弹珠，抽到红色的弹珠就算赢，抽到白色的就算输。在问题A中，几乎所有人都偏向前面的选项，我们可以将其看成左边的罐子，即使里面所含的红弹珠少，赢的概率也小，但奖品的大小比赢得奖品的概率更吸引人。在问题B中，大多数人都选择能确保得50万美元的那个罐子。且人们对自己作的两个选择（即问题A选左边，问题B选右边）都感到很满意，不过在他们了解了问题背后的逻辑之后，就不这么认为了。"}, {"en": "", "zh": "比较一下这两个问题，你会发现问题B中的两个罐子比问题A中的两个罐子更具吸引力，因为问题B的两个罐子中有37个白球替换成能赢的红球了。左边那个罐子的改进明显比右边的大，因为左边的罐子中每个红球都有能使你赢得52万美元的机会，而选右边的罐子只能赢得50万美元。你本会对左手边的罐子感兴趣，毕竟这个罐子作了改进，情况比右手边的好，但是，现在你喜欢的却是右手边的！这个选择的模式没有什么逻辑意义，但却可以从心理上作出解释：确定性效应起了作用。在问题B中，100%的概率和98%的概率之间虽然就差两个百分点，但相比于问题A中63%和61%之间相差的两个百分点来说，这个差距的影响则要大得多。"}, {"en": "", "zh": "正如阿莱斯所预测的那样，那些经验老到的与会者并没有注意到自己的偏向已经违反了效用理论，直到大会快结束了他们才注意到这个事实。阿莱斯本想向外界公布这个情况，制造一条爆炸性新闻：那些世界上顶尖的决策理论学家也存在偏好，这种偏好和他们自己对理性的见解完全背道而驰！阿莱斯显然相信众位来宾会接受劝说，放弃那种他蔑称为“美国式”的分析方法，转而采取另一种由他提出的选择逻辑。不过，当时的情况令他极为失望。"}, {"en": "", "zh": "那些对决策理论不是很热衷的经济学家大都忽视了阿莱斯提到的问题。当某个为人们广泛采纳并被认为非常有用的理论遭到挑战时，都会出现类似的情况：他们将阿莱斯提出的这个问题视为非常规问题，仍旧使用期望效用理论来解决这一问题，就像什么事都没发生过一样。相反，那些决策理论专家，包括统计学家、经济学家、哲学家和心理学家等各路高人在内，对阿莱斯的挑战却非常重视。在阿莫斯和我开始我们的工作时，我们的初衷就是对阿莱斯悖论给出令人满意的心理学解释。"}, {"en": "", "zh": "大多数决策理论家，当然也包括阿莱斯在内，坚定地相信人类的理性，他们还试图改变理性选择的规则以使阿莱斯模式可以为人们所接受。过去这些年中，他们为找到一个似乎合理的理由来解释确定性效用一直在进行各种各样的尝试，但所有的理由都无法令人信服。阿莫斯对这些人的努力几乎失去了耐心，他将那些试图使违背效用理论做法合理化的理论家称为“为举措失当的人辩护的律师”。我们没有步他们的后尘。我们将效用理论看成是理性选择的逻辑基础，但并不认为人们都是非常棒的理性选择者。我们承担了一项建立一种心理学理论的任务，不管人们作出的选择是否是理性的，这一理论要能够对其进行描述。在前景理论中，决策的权重和可能性的权重不可同日而语。"}, {"en": "", "zh": "决策权重的大小取决于人们的担忧程度"}, {"en": "", "zh": "在我们发表前景理论多年以后，阿莫斯和我进行了一项研究，在这项研究中，我们衡量了决策权重，这个权重解释了人们在打赌时为什么会选择保守的赌注。"}, {"en": "", "zh": "你会发现，在极端情况下，决策权重和相应的可能性是相同的：当结果不可能出现时，两者都是零；当结果肯定会出现时，两者都是100。但是，在这些点附近，决策权重却明显与可能性拉开了距离。在距离最远处，我们发现了可能性效应：不可能出现的事往往受到重视。例如，相对于可能性为2%的决策权重是8.1。如果人们遵从理性选择的公理，决策权重将会是2，罕见事件被过分看重了。因此对罕见事件偏重的程度增加了4倍。可能性范围右端的确定性效应更显著。“无法”得奖的2%的风险使得风险效用从100降低到87.1，降低了13%。"}, {"en": "", "zh": "想要理解可能性效应和确定性效应之间的不对称性，先假设你有1%的概率能赢得100万美元，明天就会揭晓结果。现在，再假设你几乎确定自己能赢得100万美元，但还是有1%的可能性赢不了，同样是明天揭晓结果。第二种情况中的焦虑情绪显然比第一种情况下的期望心理更明显。如果结果是手术失败而不是钱财得失，确定性效应就要比可能性效应更显著。与对1%的风险的担忧相比，你对一项成功希望渺茫的手术（这项手术几乎可以确定会致命）的关注程度又如何呢？"}, {"en": "", "zh": "在可能性变化范围的两端，确定性效应和可能性效应的双重作用不可避免地会伴随着对中间概率不够敏感的情形出现。从上表中可以看出，从5%到95%之间的可能性和范围更小的决策权重（从13.2到79.3）之间密切相关，约占理性期望的三分之二。神经科学家已经证实了这些观察结果，发现了对得奖可能性的不同变化做出反应的大脑区域。大脑对可能性变化的反应和从选择中估测出来的决策权重惊人地相似。"}, {"en": "", "zh": "极小或极大的可能性（低于1%或高于99%）都是特殊的情况。权衡极罕见的情况是很难的，因为这些情况常常会被彻底忽视，事实上人们赋予它们的决策权重为零。另一方面，在没有忽视这些罕见的情况时，你肯定又会过于重视它们。大多数人很少有时间去关心核能外泄问题，也几乎不会幻想从素未谋面的亲戚那里继承到大笔遗产。然而，当不大可能出现的事情成为关注的焦点时，我们对它的重视程度就要超过其本身出现的概率应该引起的关注度。此外，人们对于可能性较小的各种风险几乎完全是迟钝的。人们很难说出0.001%的癌症风险与0.00001%的癌症风险之间的区别，尽管前者是指美国人口中有3000人罹患癌症，而后者则说明只有30个美国人患癌症。"}, {"en": "", "zh": "当你关注某种威胁时，你就会担忧，而且决策权重会反映出你的担忧程度。根据可能性效应，这种担忧和威胁出现的可能性并不相符。仅仅减少或降低风险还不够；若想消除这种忧虑，必须将其出现的可能性降低为零。"}, {"en": "", "zh": "下面的问题改编自对消费者评估健康风险时所体现的理性的研究。1980年，一个由经济学家组成的团队公布了这项研究，并把调查结果交给了小孩子的家长们。"}, {"en": "", "zh": "假设你正在使用一种杀虫剂，每瓶要10美元，每使用10000瓶杀虫剂就可使15个人吸入中毒和15个孩子中毒。"}, {"en": "", "zh": "你了解到有一种更昂贵的杀虫剂，它可使以上两种风险降低，即每使用10000瓶出现上述两种风险的人数分别为5人。你愿意花多少钱买这瓶杀虫剂呢？"}, {"en": "", "zh": "这些父母愿意多花平均2.38美元的钱来降低三分之二的风险（从10000分之一15降低到10000分之5）。他们愿意花8.09美元去完全排除风险，这个价钱是2.38美元的3倍多。其他的问题表明这些父母将这两种风险（吸入中毒和儿童中毒）视为不同的烦恼，只要能完全消除其中任何一种风险，他们都愿意支付一定数额的钱。这个数额与担忧的心理很吻合，但和理性模式并不相符。"}, {"en": "", "zh": "四重模式：可能性与决策权重的关系模型"}, {"en": "", "zh": "阿莫斯和我在研究前景理论时，很快就得出了两个结论：相对于现有财富来说，人们更看重得失，而且关于结果的可能性和决策权重方面，表现大不相同。这并不是全新的观点，但它们一旦结合起来，就可以对一种偏好的特殊模式作出解释，我们将这一特殊模式称为四重模式。名字是固定的，具体阐述如下。"}, {"en": "", "zh": "每栏中的第一行都对前景作了解释。第二行对前景引起的情绪作了特征描述。第三行表明，在风险和与期望价值相符合的必然获得（或损失）之间作选择时（例如在“有95%的概率赢得10000美元”和“肯定能赢得9500美元”之间作出选择），大多数人是如何表现的。第四行描述了在被告和原告讨论民事案件的解决方法时可能会出现的态度。"}, {"en": "", "zh": "偏好的“四重模式”被视为前景理论的核心成果之一。上面四栏中有三栏是相似的；只有第四个（右上角）是新的，是完全出乎意料的。左上角一栏是伯努利曾讨论过的：当人们觉得未来获得一大笔收益的概率很大时，会选择风险规避。人们在打赌时愿意接受比预期价值少的赌注，以确保肯定能有所得。左下角一栏的可能性效应解释了为什么人们都愿意买彩票。若头彩很大，人们会疯狂地买，会忽视赢的概率很小这一事实。买彩票是可能性效应最好的例子。没有彩票，就不能赢，有了彩票就有了机会，概率小不小并不重要。彩票能获得的东西要比赢得的概率更重要，梦想赢是人们的权利。右下角一栏说明了什么时候应该买保险。人们愿意支付比期待价值更高的价格去买保险，保险公司就是这样支付成本、获得利益的。有些灾难不太可能发生，但人们更愿意买个保障。他们消除了自己的忧虑，买个心里踏实。"}, {"en": "", "zh": "刚开始时，右上角那一栏的内容着实让我们惊讶了一番。除了左下角那栏，其他几栏都会让我们习惯性地想到风险规避，而在左下角一栏的情况中，人们往往会选择碰运气。在审视自己的选择是否错误的时候，我们在处于损失的情况下会选择冒险；处于赢利的情况下会选择规避。我们不是用负面前景的观点观察研究冒险的开先河者，至少有两位作者曾经提到这一事实，但他们的讲述不是很详尽。不过我们对冒险的研究有个理论框架作支撑，这样研究就会更容易些，这也是我们思想发展的里程碑。我们已经找到两点来解释这个效应了。"}, {"en": "", "zh": "第一，敏感性不断降低。人们对损失900美元的反应比损失1000美元的90%的反应程度更强烈，这也说明了为什么人们会避免必然的损失。第二个原因也许更有说服力：90%这一可能性的相应决策权重只有71，比可能性小很多。出现这种情况的结果是，当你在必然的损失和很可能会承受很大损失之间做决策时，降低敏感度可使你更愿意规避必然的损失，而且确定性效应也降低了对赌注的规避。这两个相同的因素，在结果是正面时，加强了确定性事件的吸引力，使赌注的吸引力得以削弱。"}, {"en": "", "zh": "价值函数和决策权重的曲线共同促成了图中首行所描述的模式。然而，在底行描述的模式中，这两个因素却背道而驰：降低敏感度会使得你在所得面前选择规避，在损失面前选择冒险，但对较小可能性的过分看重则会战胜这种效应，产生我们前面所观察到的那种模式，即为收益愿冒风险，对损失保持谨慎。"}, {"en": "", "zh": "人类的很多不幸处境都在右上角那栏中得到了体现，也就是说人们在面临的抉择比较糟糕时会孤注一掷，尽管希望渺茫，他们也宁愿选择使事情更糟的较大可能性以换取避免损失的希望，这种做法常会使可控制的失误变成灾难。一想到即将会有一大笔损失就很痛苦，完全的解脱也很吸引人，因而我们难以做出明智的决策，难以相信时间可以使人摆脱损失所带来的痛苦。这也正是那些屈从于高科技的企业浪费了自己的剩余资产却什么也没有得到的原因。失败总是难以让人接受，所以失败的一方常会保持战斗力，即使在知道对方的胜利只是时间问题的情况下，输的这一方还是会作无谓的挣扎。"}, {"en": "", "zh": "可能性效应影响下的风险决策"}, {"en": "", "zh": "法学家克里斯·格思里（Chris Guthrie）将四重模式应用到两种情况中，在这两种情况中，民事诉讼的原告和被告都认为这一模式可能会解决双方存在的问题。这两种情况在原告案例中体现的强度有所不同。"}, {"en": "", "zh": "就像我们之前看到的情况那样，假设你是一起民事诉讼案件中的原告，你要求一大笔损失赔偿。这个案件进行得非常顺利，你的律师给出了他的专业见解，说你有95%的概率会赢，但也不能掉以轻心，“在陪审团出庭前，你永远都不会知道结果”。你的律师劝你接受庭外调解，但你只能得到90%的赔偿金。你正处于四重模式左上角的一栏中，你脑中的问题是：“即便什么也得不到的概率不算大，可我真的愿意冒险打官司吗？即便得到90%的赔偿金也是一大笔钱了，而且我又能马上拿走。”这种情景引发了两种情绪，而且两种情绪都向相同的方向发展：对必然所得（一大笔钱）的渴望以及拒绝庭外和解又输了官司的极度失望与后悔。你能感受到在这种情况下，有种压力使人们的行为更谨慎。若原告打赢官司的可能性很大，则更趋向于风险规避。"}, {"en": "", "zh": "现在从被告的角度审视一下这个案件。尽管为了自己的利益没有完全放弃决策的希望，但你会发觉这个案件的进展非常糟糕。原告的律师提出庭外和解，即只需提供给原告所要赔偿金的90%（显然原告不会接受更少的金额）。你会接受这种解决方案吗？还是更愿意打官司？要记住你遭受损失的可能性较大，情况属于右上角一栏。你希望能再搏一搏，因为庭外和解与你将要面对的最糟结果几乎同样令你痛苦，而且毕竟打赢官司的希望还是有的。于是，两种情绪再一次被唤起：人们不愿面对必然的损失，而且能在法庭上赢的可能性还是很有吸引力的。案件前景不乐观的被告更愿意采取冒险手段，更愿为打赌作好准备，而不是接受对自己不利的解决方案。在规避风险的原告和冒险的被告的对峙中，被告有更多的掌控机会。被告更高的谈判地位应该反映在协议解决中，原告则满足于能通过法庭获得更少的钱。通过四重模式作出预测的模式已经由法律系的学生和执业法官所做的实验和民事案件中的实际谈判证实了。"}, {"en": "", "zh": "若原告胜算不大却索赔一大笔钱的话，请思考一下“无意义诉讼”问题。双方都意识到可能性的大小，也都知道在商讨解决方案时，原告只能得到索赔的一小部分。商谈是受最下面一行中那个四重模式引导的。原告的情况属于左侧的类型，赢得一大笔钱的概率很小。无意义诉讼的索赔就像是买一张会中大奖的彩票一样。过分看重成功的较小概率在这种情况下是很自然的，原告也会在商谈中变得厚颜无耻或咄咄逼人。对于被告来说，起诉是件很烦人的事，但结果不好的风险很小。有些损失虽大，但概率较小，过分看重这样的损失会导致风险规避，而且选择用合适的索赔解决这个案子就像是买了份保险，以防判决对自己不利。现在换一个角度：原告愿意赌一次，而被告想要保险之策。作出无意义诉讼的原告很可能会接受一个比这个案件应该付出的钱更多的解决方法。"}, {"en": "", "zh": "这些通过四重模式来描述的决策并非不合理。你可以在每种情况下都体会一下原告和被告的心情，这些心情会使得他们采取或挑战或顺从的立场。然而，从长远角度来看，期望值的偏差代价可能会很大。试想一个大型组织，比如纽约市，它每年要处理200起“无意义”案件，每个案件都有5%的可能花掉这个城市的100万美元。再假设：对于每个案件，这个城市都能用10美元解决。这个城市认为有两种政策能用于所有的案件，即自己解决或法庭上见。（为了方便起见，我在此忽略了诉讼费。）如果这个城市同意受理200起诉讼案件，就会输掉10起，总计损失达1000万美元。如果这个城市处理每个案件都要花10万美元，那么总共的损失就会高达2000万美元。"}, {"en": "", "zh": "若要对相似的决策从长计议的话，你就可以看到，支付额外费用以避免不大可能出现的大笔损失代价就太高昂了。相似的分析适用于四重模式中的任何一栏：从长远来看，期望值的系统偏差的代价还是很高的，这个原则适用于风险规避和冒险之举。一贯看重不大可能会出现的结果，这也是直觉性决策制定的一个特征，最终会导致不好的结果出现。"}, {"en": "", "zh": "示例：四重模式\n“他试图用庭外和解的手段来解决这个无意义的诉讼案件，以避免损失，然而却不大可能。这是过分看重较小可能性的结果。既然会面对很多相似的问题，他最好还是不要放弃。”\n“我们从不在最后一秒才享受自己的假期，我们愿意为了确定性而付出努力。”\n“只要有可能不赚不赔，损失就不会减少。这就是损失中的冒险。”\n“他们知道瓦斯爆炸的可能性很小，但他们想要消除这种可能性。这是可能性效应，而且他们想要的是再无后患。”"}, {"en": "", "zh": "第30章 被过分关注的罕见事件"}, {"en": "", "zh": "在以色列巴士遭遇自杀式炸弹袭击相对频繁的那段期间，我去了那里几趟。当然，如果按绝对值计算的话，这样的袭击是相当罕见的。2001年12月至2004年9月，以色列总共发生了23起炸弹袭击事件，造成236人死亡。而在这期间，以色列境内每天乘巴士的人大约有130万。对于每一位乘客来说，遭遇袭击的概率是极小的，但人们并不这样认为，大家都尽量不乘巴士，而不得不乘巴士的人则会焦虑地扫视邻座乘客的行李或其宽松的衣服，害怕里面藏有炸弹。"}, {"en": "", "zh": "我在以色列开的都是租来的车，很少乘巴士，但即便如此，也受到了炸弹袭击的影响，这着实令我懊恼。在等红灯时，我不愿停在巴士旁，绿灯一亮，我会用比平时更快的速度将车开离。为此，我感到很惭愧，因为我比其他人更清楚遇袭的概率其实很小。遇袭的风险真的可以被忽略掉，但其对我行为的影响使这个极小的概率有了极大的决策权重。实际上，与把车停在巴士旁（而遭遇爆炸事件的概率）相比，我更有可能在车祸中受伤。但并不是出于对活命的理性考虑我才躲避巴士，而是当时的体验驱使我这样做：在巴士旁边停车使我联想到了炸弹，而且这些想法令我很不愉快。我躲避巴士是因为我想要思考别的事。"}, {"en": "", "zh": "我的经历说明了恐怖主义是如何产生影响的，也解释了为什么人们这么害怕恐怖主义：因为它降低了效用层叠。极其生动的死亡或爆炸画面的影响因媒体的关注以及人们的频繁交谈而不断加强，在身处具体的情境时，尤其如此，例如看见了一辆巴士时。此类情绪一触即发、身不由己且无法控制，会使人们本能地想要保护自己。系统2可能“知道”发生危险的概率很小，但即使知道也无法消除人们内心的不安和躲避危险的冲动。我们无法停止系统1的运行。情绪的紧张程度不仅和概率不相符，对概率的估测也不够敏感。假设有两座城市都被警告有自杀式炸弹袭击者出没，其中一座城市的居民被告知有两名袭击者准备袭击该城市，而另一个城市的居民被告知只有一名袭击者。后一座城市的风险降低了一半，但那里的人们会感到更安全吗？"}, {"en": "", "zh": "纽约市有很多商店都卖彩票，生意也不错。其实，中彩票大奖的心理与对恐怖主义事件抱持的心理是类似的。能赢大奖必然令人激动，整个社区也会为之兴奋，而且人们在工作场合和家里聊到此事时，会更兴奋。买彩票之后会有一种愉快的幻想，就像躲避巴士之后恐惧会减轻一样。这两个例子的实际发生概率其实都非常小，人们更在意的是可能性。人们对前景理论的最初构想包括这样的观点：“罕见事件不是被忽视就是被过度重视。”不过，这个说法并没有详细说明在什么情况下事件会被忽视，什么情况下会被过度重视，也没有从心理学上对此作出解释。对决策制定过程中情感和生动性作用的最新研究影响了我对决策权重的看法。过高权衡不太可能的结果是系统1的特点，我们对此已经很熟悉了。情感和生动性会影响顺畅性、可得性以及对概率的判断，因此也就解释了人们为什么过分关注那些没有被自己忽略掉的罕见事件。"}, {"en": "", "zh": "你认为一支三流球队获得NBA总冠军的可能性有多大？"}, {"en": "", "zh": "你认为下一届美国总统是第三党派候选人的概率有多大？"}, {"en": "", "zh": "如果下一届美国总统是第三党派候选人，你会得到1000美元；如果不是的话，你将一分钱也得不到。你准备下多大的赌注？"}, {"en": "", "zh": "这两个问题虽不同，但明显有关联。第一题要求你评估罕见事件的概率，第二题想让你通过下赌注来权衡第一题那件事的决策权重。"}, {"en": "", "zh": "人们是怎样作出判断，怎样确定决策权重的呢？让我们先来看两个简化的回答，然后再对答案进行证实。以下就是这两个十分简单的答案：人们高估了罕见事件的概率。人们在做决策时过高权衡了罕见事件。"}, {"en": "", "zh": "尽管过高估计和过高权衡是两个不同的现象，却有着同样的心理机制，即集中注意力、证实性偏差以及认知放松。"}, {"en": "", "zh": "明确的描述激发了系统1的联想机制。当你想到第三党派候选人胜出的可能性不大时，你的联想机制会像平时那样在验证性模式下工作，会有选择地提取使表述正确的信息、事例以及画面。这个过程有偏见存在，但并不是在幻想下进行的。你寻找的是符合现实条件制约的可能情况，你不会天真地想象是“西方的仙女”任命了一位第三党派的总统。你对概率的判断最终总是由认知放松或顺畅性决定的，因此你的脑海中总会出现貌似正确的情形。"}, {"en": "", "zh": "你并不总是关注要求你作出评估的事件。如果目标事件发生的可能性很大，你就会关注这个事件的其他可能性。请思考下面这个例子："}, {"en": "", "zh": "在你们当地医院里出生的新生儿在3天内就出院的概率有多大？"}, {"en": "", "zh": "你现在要估测婴儿出院回家的概率，但你肯定会关注造成婴儿不能在正常期间出院的事件。我们的大脑有个有用的机能，它会不由自主地去关注奇怪、不同或是不寻常的事。你很快就会意识到，在美国（不是所有国家都设有同样的标准），婴儿于分娩后的两三天出院是很正常的。所以，你将注意力转移到反常的情况上去了。罕见事件成了焦点，这些事件很可能唤起可得性启发模式：你的判断可能由你所制造的许多医疗问题的发生场景以及想起这些问题时的感受决定。因为你处于确定性模式下，你对医疗问题出现频率的估计很有可能会非常高。"}, {"en": "", "zh": "当某件事的其他可能不太明确的时候，罕见事件的概率就很容易被高估。我常爱引用的一个例子是心理学家克雷格·福克斯（Craig Fox）的一项研究。开始这项研究的时候，他还是阿莫斯的学生。福克斯召集了一些职业篮球赛的球迷并引出了几个关于NBA季后赛冠军的判断与决策。他特别要求受试者分别估计参与季后赛的8支篮球队取得最后胜利的概率。因此，每支球队的胜利都成了焦点事件。"}, {"en": "", "zh": "你肯定可以猜到发生了什么，但福克斯所观察到的影响程度可能会令你感到惊讶。假设某个球迷被要求去估计芝加哥公牛队赢得联赛的概率。此时焦点事件已经确定，但其他情况，其他7支球队中的某支球队赢得比赛，往往会被忽略。球迷在肯定性模式下的记忆和想象都在努力构建公牛队胜利的情况。还是这个受试者，在被问到湖人队的胜算时，相同的选择性激活又会偏向支持湖人队。这8支美国最好的职业篮球球队都很优秀，所以设想其中一支相对较弱的球队成为冠军也是有可能的。结果是：把相继对这8支球队进行判断的概率相加，得到了240%！这样的结果当然是荒谬的，因为这8支球队的胜算相加结果应该是100%。当裁判被问到冠军是出自西部联盟还是东部联盟时，这种荒谬就不存在了。因为在这个问题中，焦点事件及其他情况同样详细，他们判断的概率相加就是100%。"}, {"en": "", "zh": "在评估决策权重时，福克斯请了球迷对联赛结果下注。他们对每个赌局都标明了金额（金额大小与赌局的风险大小相匹配）。赢得赌局的人可获得160美元。而这8支球队的现金标价总额为287美元。也就是说，如果某个受试者对8支球队都下了注，他肯定会损失127美元！受试者肯定知道联赛有8支球队，对8支球队都下注的平均回报不可能超过160美元，尽管如此，他们还是过高地估计了结果的可能性。球迷不仅高估了他们所关注的事件的可能性，还更愿意对它们下注。"}, {"en": "", "zh": "这些发现对规划谬误以及其他乐观主义的表现形式作出了新的阐述。当某个人努力预测某个方案的结果时，就可以切实且轻松地成功执行某项方案。相反，失败的可能性则会被忽略，因为事情出问题的情况错综复杂。对自己职业前景进行评估的那些企业家与投资者很容易高估自己的机会，也喜欢过高权衡自己的估值。"}, {"en": "", "zh": "画面感越强，决策权重越大"}, {"en": "", "zh": "正如我们所看到的那样，前景理论与效用理论的不同体现在概率与决策权重的关系上。在效用理论中，概率与决策权重是相同的。对已经确定的事情的决策权重是100，某件事有90%的概率，说明人们对这件事的决策权重是90，是概率为10%的事件的决策权重的9倍。在前景理论中，各种概率对决策权重的影响较小。我早前提到的一项实验发现，概率为90%的事件的决策权重是71.2；概率为10%的事件的决策权重是18.6。两个概率的比率是9，但其决策权重的比率只有3.83，这说明在那个范围内人们对概率的敏感度不够。在这两个理论中，决策权重只依赖于概率，与结果无关。两种理论都认为，概率为90%的事件的决策权重与赢得100美元、收到一束玫瑰花或是遭到一次电击的权重相同。这个理论预测后来被证实是错误的。"}, {"en": "", "zh": "芝加哥大学的心理学家们发表了一篇文章，《钱、吻与电击：对待风险的情感心理》，他们发现，人们评估风险时，如果（假想的）结果与情感相关（“碰见了你最爱的明星并亲了他一下”或“遭受了一次疼痛但没有危险的电击”），这种评估对概率的敏感度要低于有关金钱得失的结果。这并不是一个孤立的发现。通过生理检测（比如心跳）的手段，其他研究者发现，对将要遭受的电击的恐惧与遭到电击的概率从本质上说是毫不相关的。仅仅是电击的可能性便会让人心生恐惧。芝加哥的这个团队提出“满溢意象”（affect，laden imagery）完全盖过了对可能性的回应。10年后，普林斯顿大学一个心理学家团队对这个结论发起了挑战。"}, {"en": "", "zh": "普林斯顿的这个团队说，他们已经观察到人们对与情感相关的结果的出现概率的敏感度很低，这种情况很正常。赌钱属于例外情况。赌钱时，人们对概率的敏感度相对较高，因为他们有确切的预期值。"}, {"en": "", "zh": "下面两个赌局的吸引力与多少现金的吸引力是等价的？"}, {"en": "", "zh": "A.有84%的概率赢得59美元。"}, {"en": "", "zh": "B.有84%的概率赢得一束装在玻璃瓶里的玫瑰花。"}, {"en": "", "zh": "你注意到了什么？其中显著的不同在于A问题比B问题更为简单。你不用停下来去估算这个赌金的预期值，就能很快知道其价值在50美元左右（事实上其价值为49.56美元），在你寻找一个具有同样吸引力的现金等价物时，这个大概的估算已足以提供一个有帮助的锚定。问题B却不存在这样的锚定，因此也就更难回答。调查对象还对两个赌局的等价现金进行了评估，认为同时赢得两个赌局中的等价现金的概率为21%。不出所料，高概率的赌博与低概率的赌博之间的不同在于，进行高概率赌博的人更可能是为了金钱，而不会是为了玫瑰。"}, {"en": "", "zh": "普林斯顿团队认为，对概率不敏感并非因为情绪原因。为了支持这个观点，他们比较了人们花钱避开风险的意愿："}, {"en": "", "zh": "利用某个周末粉刷某人的三居室公寓的概率为21%（或84%）。"}, {"en": "", "zh": "打扫使用了一周的一座公寓厕所中的三个小隔间的概率为21%（或84%）。"}, {"en": "", "zh": "第二个结果肯定比第一个更能引发情感，但这两个结果的决策权重并无不同。显然，情感强烈程度不会影响概率。"}, {"en": "", "zh": "另一个实验产生了一个惊人的结果。在这个实验中，受试者得到了奖品的明确价格以及文字描述信息。例如："}, {"en": "", "zh": "有84%的概率可以赢得一束装在玻璃花瓶里的玫瑰花，价值59美元。"}, {"en": "", "zh": "有21%的概率可以赢得一束装在玻璃花瓶里的玫瑰花，价值59美元。"}, {"en": "", "zh": "对这些赌注预期的货币价值进行评估很简单，但增加一个具体的货币价值并不会改变其结果：即使在那样的情况下，评估依然对概率不敏感。想到奖品是玫瑰花的人不会将奖品信息作为评估风险的锚定。正如科学家有时说的那样，这是一个令人惊喜的发现，它想告诉我们一些事情。那么，现在这个实验想要告诉我们什么呢？"}, {"en": "", "zh": "我认为，这种说法体现了结果的丰富性和生动性，无论结果是否会激发情感，它都会降低概率在评估不确定的前景时本应起到的作用。这个假设提出了一种预测（我对这一预测信心满满）：若对货币形式的结果附上毫不关联但却非常生动的细节描述，同样也会影响估算结果。比较一下你对下面这些结果的现金等价物的估值："}, {"en": "", "zh": "有21%（或84%）的概率在下个周一收到59美元。"}, {"en": "", "zh": "有21%（或84%）的概率在下个周一上午收到一个内含59美元的蓝色大信封。"}, {"en": "", "zh": "新的假设为，在第二个案例中，对概率的敏感度会更低，因为与“一笔钱”这个抽象的概念相比，蓝色信封能唤起更为丰富的想象。你在脑中构建这个事件时，即使知道赢的概率很小，但奖品的生动画面仍然会浮现出来。认知放松同样也对确定性效应产生了影响：当你脑海中闪现关于某个事件生动的画面时，这个事件不发生的可能性所带来的影响同样也很生动，因此就会被过度权衡。增强的可能性效应与增强的确定性效应相结合以后，决策权重很难在21%的概率和84%的概率之间发生改变。"}, {"en": "", "zh": "对风险的表述方式不同，所做决策可能截然相反"}, {"en": "", "zh": "顺畅性、生动性以及想象的轻松程度等因素会影响决策权重，这个观点已得到许多其他观察实验的支持。一个著名的实验要求受试者从两个罐子中选一个，从里面拿球，若拿到红球，则有奖励："}, {"en": "", "zh": "A罐中有10个球，其中有1个是红色的。"}, {"en": "", "zh": "B罐中有100个球，其中有8个是红色的。"}, {"en": "", "zh": "你会选哪个罐子呢？因为选A罐的胜算是10%，选B罐是8%，所以作出正确选择应该不难，但实际并非如此：大约有30%~40%的学生选择了红球数量较多的那个罐子，而不是胜算率高的那一个。希莫·爱泼斯坦（Seymour Epstein）说，这个结果说明的是系统1（他称为经验系统）表面的运作特点。"}, {"en": "", "zh": "正如你可能想到的那样，人们在这种情况下作出的愚蠢选择已经引起众多研究者的关注。他们对这种偏见也有不同的命名，而我使用的是保罗。斯洛维克的命名“分母忽视”。如果你将注意力集中在能使你胜利的球上，就不会去关注那些不能使你赢的球。生动的画面也是产生分母忽视的原因，至少我有过这样的经历。当我想到小罐子时，我看到的是一个小红球在一片白色的背景中；当我想到大罐子时，我看到的是8个红球在一堆白球当中，这样的画面增强了我对胜利的信心。能使我胜利的生动画面增强了我对那个事件的决策权重，增强了可能性效应。当然，对确定性效应来说也是同样原理。如果我有90%的概率赢得奖品，那么相较于10个球中有一种“不能制胜”的情况而言，100个球中那10个“不能制胜”的球更会突出输的可能性。"}, {"en": "", "zh": "分母忽视这个观点有助于解释为什么不同的风险表达方式所造成的效果会有这么大的不同。如果你看到“能使儿童免受某种疾病侵袭的疫苗有0.001%的风险将导致终身瘫痪”这样的说法时，就会觉得这个风险看似很小。现在，请考虑用另外的方式描述这一风险：“在10万名接种疫苗的儿童中，有一个将会终身瘫痪。”第二种说法使你产生了一些第一个说法不会引起的想法：它唤起了某个儿童因接种疫苗而终身瘫痪的画面；而另外99999名安全接种疫苗的儿童则被完全忽视了。正如分母忽视原则预测的那样，与抽象术语相比，例如“风险”或是“概率”（多大可能），用相对频率（有多少）来描述会使小概率事件得到更大的权重。我们已经知道系统1更善于处理独立事件，而不是整个范畴的事件。"}, {"en": "", "zh": "频率格式（frequency format）的影响很大。在一项研究中，看到“每10000个人中有1286人因某种疾病而死亡”的人比看到“某种疾病导致24.14%的人口死亡”的人更有可能认为此疾病的危害性很大。尽管患第一种疾病的风险只是第二种的一半，但第一种却看似比第二种更危险！在一个更为直接的分母忽视的例子中，某种疾病会“使100人中的24.4人死亡”，与之相比，“每10000人中有1286人因某种疾病而死亡”这种说法听上去更危险。若要求受试者对这两种表述作一个直接的对比（系统2肯定会参与到这个任务当中），这种效果肯定会削弱或是消除。然而，生活就像是受试者的组间实验，你一次只能看到一种表述。系统2只有在格外活跃的情况下才会对你看到的那个说法有另外的表述，才会发现这些说法能引发不同的回应。"}, {"en": "", "zh": "有经验的法庭心理学家和精神病学家也不能避免因对风险的不同表述而带来的影响。在一个实验中，有关专业人员需评估让一位精神病患者出院的安全性。这个精神病患者叫琼斯，有暴力倾向。他们收到的信息包括某位专家对风险的评估，但同样的统计数据是用两种方式表述出来的："}, {"en": "", "zh": "评估那些与琼斯类似的病人，专家发现他们在出院后最初的几个月里对他人使用暴力的概率是10%。在100个类似琼斯的病人中，大约有10个人在出院后的前几个月里对他人使用暴力。"}, {"en": "", "zh": "看到第一种描述的专业人员让病人出院的概率几乎是看到第二种描述的专业人员的2倍（概率分别为41%和21%）。对相同的可能性，更加生动的描述产生了更高的决策权重。"}, {"en": "", "zh": "不同的表述使人们做出不同的决策，使他们对该怎么做生成不同的意见。斯洛维克与他的同事引用了某篇文章的一段话：“一年之中，全美有接近1000起谋杀事件是由没有服用药物的严重精神病患者制造的。”有一种表达同一事实的说法是“每年每2.73亿美国人中，有1000人是被精神病患者杀死的”。另外一种说法是，“每年，（我们）被这样（患有精神病）的人杀死的概率接近0.00036%”。还有一种说法是：“每年死于严重精神病患者之手的美国人有1000人，比自杀人数的三分之一0还少，是因喉癌而死亡的人数的四分之一左右。”斯洛维克指出，“这些说法使得他们的动机很明显，他们想要通过强调精神病患者的暴力来造成大众恐慌，进而使有关部门增加心理卫生服务业的资金注入”。"}, {"en": "", "zh": "如果一名优秀的律师想要引起法官对DNA证据的怀疑，他不会说，“DNA不匹配的概率是0.1%”，反而会说“1000起死刑案件中就有一起案件的DNA会出现不匹配”，这样更有可能使法官产生怀疑。听到这个陈述的陪审团会想到坐在他们对面审判室里的人可能会因为错误的DNA证据而被误判。当然，检察官会更偏爱抽象框架，希望陪审团的大脑中充满小数点。"}, {"en": "", "zh": "罕见事件又为何会被人忽视？"}, {"en": "", "zh": "有证据支持下面这个假设：主要注意力和显著性会导致人们过高评估罕见事件的发生概率，也会过高权衡低概率的结果。单纯提及某个事件，通过对其进行生动性以及特有的概率描述模式就会增强其显著性。当然也有例外情况，即人们对某一事件的关注并没有提高它的出现概率：那些含有一个荒谬的论调使你想起它就觉得不可能发生的事件，或是因不能想象结果会怎样而使你认为它根本不会发生的事件都属于此类事件。对显著事件的过高估计或过度权衡这种偏见不是绝对的规则，但其影响却很普遍，也是根深蒂固的。近年来，对“根据经验作出选择”这一课题的研究引起了人们的广泛兴趣，其遵循的原则与前景理论中分析的“根据描述作出选择”的研究原则不同。在一个典型实验中，受试者面前有两个按钮。按下按钮有可能会得到金钱奖赏，也有可能什么都得不到。结果是根据前景理论随机出现的（例如，“有5%的概率赢得12美元”或“有95%的概率赢得1美元”）。这个过程是真正随机的，所以不能保证某位受试者所见的样本完全符合统计设置。这两个按钮的预期值几乎是相当的，其中一个比另一个风险更大、更多变（例如，一个按钮的结果可能是有5%的概率得到10美元，另一个按钮则是有50%的概率得到1美元）。通过为受试者提供多次按按钮的机会，使她可以观察到一次又一次按按钮后的结果，这样她就能够凭经验作出选择。通过描述性文字作选择可通过给受试者提供关于每个按钮的预期风险的文字描述（例如“5%的概率赢得12美元”），并让她选择其中一个来实现。根据前景理论可知，通过描述性文字作选择会产生可能性效应，低概率结果的可能性被过高权衡。与之形成鲜明对比的是，凭经验作选择不会出现过高权衡的情况，而较低权衡的情况却较为普遍。"}, {"en": "", "zh": "凭经验作选择的实验情景旨在代表许多情境，在这些情境中，我们会接触到来源相同结果却各不相同的许多情况。一间较普通的餐厅会偶尔做出一道超级美味或很难吃的菜。你的朋友通常很好相处，但有时也会变得喜怒无常、咄咄逼人。加州容易发生地震，但实际却很少发生。许多实验的结果表明，当我们做类似于选择餐厅或是固定好水壶以应对地震这样的决策时，罕见事件不会被过高权衡。"}, {"en": "", "zh": "现在仍然没有能够阐释凭经验选择的方法，但无论在实验中还是在现实世界里，大家都普遍认同一点，即对罕见事件的决策权重较低有一个绝对主要的原因：许多受试者从未经历过罕见事件！大多数加州的市民从未体验过大地震，2007年时也没有银行家切身经历过大规模的金融危机。拉尔夫·赫特维希（Ralph Hertwig）和伊多·伊雷夫（Ido Erev）注意到“根据它们的主观可能性，罕见事件的概率（例如房贷泡沫破灭）受到的影响比它们应得的影响更小”。他们指出，公众对长期威胁的回应很冷淡就是这样一个例子。"}, {"en": "", "zh": "这些关于忽略的例子很重要，也很好解释，但当人们真正经历罕见事件时，低权重的情况也会出现。假设你有一个复杂的问题，与你同楼层的两个同事可能会回答这个问题。你认识他们俩很多年了，也有很多机会观察或是在接触中了解他们的个性。阿黛尔做事持之以恒，也乐于助人，尽管有时也帮倒忙；布莱恩并不特别友好，和阿黛尔一样爱帮助人，但有时候又表现得过于热情。你会找谁帮忙？"}, {"en": "", "zh": "考虑关于这个决定两个可能的观点：你在两种风险中作出选择。阿黛尔更可靠；对布莱恩的期望更可能会导致一个稍逊一筹的结果，产生好的结果的概率较小。罕见事件可能会因为可能性效应而被过高权衡，所以最好选布莱恩。你在对阿黛尔的总体印象和对布莱恩的总体印象之间作出选择。你与他们之间或好或坏的经历都会影响你对他们日常行为的看法。除非这个罕见事件非常极端，你才单独想起了这件事（布莱恩曾有一次辱骂了向他求助的同事），因而标准会偏向于典型事例及最近发生的事，所以该选阿黛尔。"}, {"en": "", "zh": "在一个双系统的大脑里，第二种阐述似乎更为合理。系统1产生了对阿黛尔和布莱恩的总体印象，包括对他们的情感态度以及靠近或是回避他们的倾向。你的选择就取决于对这些倾向的比较。除非你明确地想到了某个罕见事件，否则就不会出现过高权衡。将相同观点应用到凭经验选择上很简单。因为他们对结果有长时间的观察，这两个按钮似乎也形成了情感回应所依附的综合“人格”。"}, {"en": "", "zh": "与前景理论刚被廓清之时相比，现在我们可以更好地了解罕见事件被忽视或是被过高权衡的情况了。由于记忆存在证实偏差，罕见事件的概率会（经常但不总是）被高估。当想起某个事件时，你会尽可能地将其视为真实的。当某个罕见事件特别吸引你的注意力时，这个事件就会被过高权衡。当前景得到明确描述时（例如“有99%的概率赢得1000美元，1%的概率什么也得不到”），注意力就一定会分散。过多关注（耶路撒冷的大巴）、生动的画面（玫瑰花）、具体的表述（1000中的1个），以及明确的提醒（以描述为基础作出选择）都是引起过高权衡的原因。没有过高权衡，就会存在忽视。就罕见事件而言，我们的大脑并不能总是作出正确判断。碰上一些任何人都未曾经历过的事情，这可不是什么好消息。"}, {"en": "", "zh": "示例：罕见事件\n“即使在日本，海啸也很少发生，但是海啸在我们头脑中的画面非常生动形象，游客也因此会高估海啸发生的可能性。”\n“这是我们都熟悉的灾难循环，即先是言过其实，之后作出过高权衡，最后忽视此事件。”\n“我们不应该将注意力集中在单一情境中，否则我们会高估它的可能性。想想其他的选择吧，然后将所有选择的概率相加，得到100%。”\n“他们想让人们意识到风险是存在的。这也就是他们会使用‘每1000人中有1人死亡’这个说法的原因，这种做法利用了分母忽视效应。”"}, {"en": "", "zh": "第31章 能带来长远收益的风险政策"}, {"en": "", "zh": "设想你需要做下列两组决策。首先查看全部决策，然后作出选择。"}, {"en": "", "zh": "决策（1）：从A、B中作出选择："}, {"en": "", "zh": "A.肯定能赚到240美元"}, {"en": "", "zh": "B.有25%的概率得到1000美元，75%的概率什么也得不到"}, {"en": "", "zh": "决策（2）：从C、D中作出选择："}, {"en": "", "zh": "C.肯定会损失750美元"}, {"en": "", "zh": "D.有75%的概率损失1000美元，25%的概率没有损失"}, {"en": "", "zh": "这一对选择题在前景理论的发展历程中有着重要的地位，它们使我们重新理解了理性的含义。看到这两个问题时，你对确定事件（A和C）的第一反应肯定是被A吸引，排斥C。对“肯定获得”和“肯定损失”的情感评估是系统1的自动反应，肯定会发生在估计两种风险的预期值（分别为获得250美元和损失750美元）之前，因为这样的估计需要付出更多努力（作更多选择）。大多数人的选择都与系统1的预测一致，绝大多数人都会选A不选B，选D不选C。在其他一些可能性中等或较大的选项出现时也一样，人们在收益状态下更倾向于规避损失，在亏损状态下更倾向于承担风险。我与阿莫斯所做的实验的结果是，有73%的受试者在决策（1）中选了A，在决策（2）中选了D，只有3%的人选择了B、C选项。"}, {"en": "", "zh": "按照要求，你在首次作出选择后要再次查看所有选项，你可能也这样做了，但有一件事你肯定没有做，即你没有估计4种不同选项组合的可能结果（A和C，A和D，B和C，B和D），以推测哪一种组合是你最想选的。直觉上，你只会分别考虑这两个问题，分开选择，并且不会觉得这样做比较麻烦。此外，综合考虑两个决策性问题需要费些劲儿，你可能需要笔和纸才能完成。所以，你并没有这样做。现在，请思考下面的选项问题："}, {"en": "", "zh": "AD.25%的概率获得240美元，75%的概率损失760美元"}, {"en": "", "zh": "BC.25%的概率获得250美元，75%的概率损失750美元"}, {"en": "", "zh": "这个问题很容易！BC选项明显比AD选项更“占优势”（某个选项明显优于其他选项时使用的专业术语）。你已经知道我接下来要说什么了吧？在第一组决策问题中有压倒性优势的选项AD（在第二个决策问题中）是不被看好的那两个，只有3%的受试者一开始就选择了它们，而现在却有73%的受试者选择（上次）概率不理想的选项BC。"}, {"en": "", "zh": "宽框架还是窄框架？"}, {"en": "", "zh": "这些选择题使我们意识到人类理性的局限性。这些选项首先让我们了解到人类偏好的逻辑一致性，无论人们偏好的是什么，甚至是永远到达不了的海市蜃楼。再看一下最后那个简单的问题，你是否曾想过将这个答案明显的问题进行分解之后，会有很多人选择比较不理想的选项呢？每个有关得失的简单问题都可以通过无数方法分解为选项组合，而分解后的选择很可能和最初的选择不一致。一般来说，这是个事实。"}, {"en": "", "zh": "这个例子还说明处于收益状态时规避损失、处于亏损状态时承担风险是需要付出代价的。这些态度会使你不愿冒险，而愿付出额外的费用去得到肯定可获得的赢利，还会使你愿意付出额外费用（包含在预期价值中）以避免肯定的亏损。两种情况下付出的这些钱来源都一样，在同时面临这两种问题时，你的矛盾态度就不会很乐观。"}, {"en": "", "zh": "决策（1）和决策（2）有两种解释方式：窄框架：分别思考两个简单的决策问题。宽框架：一个有4个选项的综合决策问题。"}, {"en": "", "zh": "在这个例子中，选择宽框架明显更好。的确，在任何情况下，将多种决策综合考虑都会更有优势。假设同时考虑5个简单的（二选一）决策问题。宽（综合）框架需要考虑的是包含32个选项的综合选择，窄框架需要考虑的则是一连串5个简单的选择。5个连续的选择会是宽框架中32个选择的一部分。利用宽框架是最好的做法吗？有可能，但人们却不太可能这样做。一个理性的经纪人当然会利用宽框架进行考虑，但人们天生喜欢用的却是窄框架。"}, {"en": "", "zh": "这个例子说明，我们有限的大脑很难达到逻辑一致性的理想状态，因为我们易受眼见即为事实原则的影响，不愿动脑筋。另外，即使有人告诉我们应该综合考虑问题，我们自己还是倾向于在问题刚出现的时候立刻做出决策。我们既没有意愿也没有精力去增强偏好的一致性，我们的偏好也不会自动变得一致，它们处于理性代理模式。"}, {"en": "", "zh": "聪明的投资者不会每天都看股票行情表"}, {"en": "", "zh": "保罗·萨缪尔森是20世纪著名的经济学家。他曾问过他的某个朋友是否愿意玩一个抛硬币的游戏，玩这个游戏可能会损失100美元，也可能会获得200美元。他的朋友答道：“我不会接受，因为我觉得获得200美元的满足感无法抵消我损失100美元的痛苦。但如果你保证将硬币抛100次的话，我就和你玩这个游戏。”除非你是决策理论家，否则，你就不会有萨缪尔森的朋友的那种直觉：反复打一个有趣却也有风险的赌可以降低主观风险。萨缪尔森觉得他朋友的回答很有意思，便继续进行分析。他证明，在一些特定情况下，最注重效用的人拒绝了一次赌局，也会拒绝多次。"}, {"en": "", "zh": "值得注意的是，萨缪尔森的证明虽然是有效的，但这个证明引出的结论却有违常识，打100次赌当然是个吸引人的提议，心智正常的人都不会拒绝，可他本人似乎并没有意识到这个事实。马修·拉宾（Matthew Rabin）和理查德·泰勒指出，“在100个赌局中，输100美元和得200美元的比率是50：50，因此，期望回报是5000美元。另外，只有二分之1300的概率会输钱，会输掉超过1000美元的钱的概率仅为62000分之1”。当然，他们想要说明的是，如果效用理论在任何情况下都与如此愚蠢的偏好相一致的话，这个理性选择模式肯定出什么问题了。拉宾对一些小额赌注严重的规避损失做法的荒谬结果进行了证明，但萨缪尔森没有看到这些证明，即便他看到过也不会感到惊讶。他甚至很愿意考虑很有可能被理性的人拒绝的交易的发生概率，这一意愿证实了理性模式的强大影响力。"}, {"en": "", "zh": "假设用非常简单的价值函数来描述萨缪尔森的朋友（我们称之为山姆）的偏好。为了表明自己规避损失的程度，山姆首先改变了赌注，将亏损金额改为原来的2倍。然后，他开始计算这个改变后的赌局的预期值。下面是他抛一次、两次、三次硬币的结果。做这些工作肯定需要极为专注。"}, {"en": "", "zh": "从上中可以得知，这个赌注的预期值是50。然而第一次掷硬币对山姆来说毫无价值，因为他感到输掉1美元的痛苦程度是赢得1美元的满足程度的2倍。改变赌注来体现自己的损失厌恶之后，山姆就会发现这个赌局的价值为零。"}, {"en": "", "zh": "现在，请考虑抛两次硬币的情况。输钱的概率降低到25%。两个极端结果（损失200美元或赢得400美元）在价值上相互抵消，它们的概率相同，且输的痛苦程度是赢的满足程度的2倍。但中间结果（一次输，一次赢）是积极的，所以抛两次硬币可以视为赌一次。现在，你就能看到窄框架的成本和多次打赌的奇妙之处了。当山姆分开来看的时候，就会认为它们毫无价值。如果在不同的场合中分别问他是否愿意打这两个赌，他都会拒绝。然而，当它们同时出现时，它们的共同价值就是50美元！"}, {"en": "", "zh": "若抛3次硬币的话，这个赌局就更有利了。极端结果仍然相互抵消，而且也不那么重要了。第三次抛硬币，尽管单独来看没什么价值，但却为整个赌注增加了62.5美元的价值。当山姆打的赌变为抛5次硬币时，这个赌局的期望价值就会是250美元，而山姆输钱的可能性是18.75%，他的现金等价物是203.125美元。这个例子中值得注意的一点是山姆的损失厌恶度从未改变过。然而，随着抛硬币次数的增多，输的可能性很快就降低了，损失厌恶对其偏好的影响也就相应减弱了。"}, {"en": "", "zh": "现在，如果山姆拒绝只赌一次的话，我已经准备好了一套说辞。如果你和山姆一样，也有不合理的损失厌恶的话，这套说辞也同样适用于你："}, {"en": "", "zh": "我理解你对赌输的反感情绪，但这种情绪会让你损失很多钱。请考虑一下这个问题：你已经活不长了吗？这是你这辈子需要考虑的最后一个小赌注吗？当然，你不太可能再碰到和这个完全一样的赌局，但你会有很多机会碰到吸引人但赌注相对你的财产来说很小的赌局。如果你能将这些赌局看做一个整体的一部分，并重复念咒语：有赚有赔。这样，你在经济上就会更理性，也能在无形中帮自己赚到一大笔钱。那句咒语的主要目的是在你输的时候帮助你控制你的情感反应。如果你相信自己这样做是有效的，在你在决定是否该承担某个有正面预期值的小风险时，就应该用这句咒语提醒自己。在说这句咒语时，还需记住以下几个条件：当所有赌局都真正相互独立时，它才适用；它不适用于同一行业的多种投资，因为这些投资可能会同时遭遇失败。只有在可能的损失不会使你的全部资产处于危险时它才有效。如果你不想某一次损失成为影响你经济前景的重要阻碍的话，就请注意！若一个赌局中每次下注赢的可能性都非常小，就不该将咒语用在这个风险大的赌注上。"}, {"en": "", "zh": "如果你有这条规则所要求的情绪戒律，就永远不会孤立地考虑一个小的赌注，或是在小的赌注上规避损失，直到你快要进入棺材的那一刻（或许在那个时候还是不会这样做）。"}, {"en": "", "zh": "遵循这条建议不是没有可能的。金融市场中有经验的交易者每天都以此建议为生，他们通过宽框架来减轻亏损带来的痛苦。正如书中已提及的那样，我们知道可以通过引导受试者“像商人那样思考”，使他们不去规避损失，这就正如有经验的棒球卡商人不会像新手那样受到禀赋效应的影响一样。学生在不同的指导下可能会做出有风险的决策（接受或拒绝他们有可能会输掉的赌局）。在窄框架的情况下，他们被告知在做决策时应该“将每一个决策都当做你唯一需要做的决策”，并且要体会这些决策带给自己的情绪反应。在宽框架的情况下做决策的建议，包括“将自己想象为商人”，“你总是做这样的事”，以及“将它看做众多财政决策中的一个，这样一个决策会在将来一起被并入‘证券投资组合’中”。实验者通过心理学方法评估了受试者对盈与亏的情绪反应，方法包括测谎时用的测试皮肤电导率等。正如人们期望的那样，宽框架缓解了人们对损失的情绪反应，增强了他们承担风险的意愿。"}, {"en": "", "zh": "损失厌恶和窄框架的结合是一个代价更大的祸端。个人投资者可以通过降低查看自己投资结果的频率来避免这一祸端，并在获得宽框架带来的情感收益的同时节约时间、减轻痛苦。时刻关注每日的经济波动是种亏本的对策，因为频繁的低额损失带来的痛苦比同样频率的低额收益带来的快乐程度更为强烈。一个季度查看一次就足够了，对于个人投资者来说，这样的频率还要高一些。刻意避免查看短期结果，除了可使投资者的心情更为愉快以外，还可以提升决策和结果的品质。对坏消息典型的短期反应就是加剧损失厌恶。查看总体反馈的投资者很少能得到类似的坏消息，就更有可能不规避损失，结果也会赚得更多。如果你不知道每只股票每天（每周甚至每月）的情况，也就不会对你的证券投资组合进行无效的变动。在几个周期内都不改变某个投资的承诺（“锁定”投资的相同说法）可以改善财务状况。"}, {"en": "", "zh": "风险政策可以抵消风险厌恶的偏见"}, {"en": "", "zh": "善于使用窄框架的决策制定者在每次面临风险决策时都会带有偏见。每当相关问题出现时，他们就会使用风险政策，而风险政策确实可以改善他们的表现。我们熟悉的风险政策有“在买保险时，总是选择最高的免赔额”以及“绝不要买延长保险”等。风险政策是一种宽框架。在保险的例子中，你期望偶尔的损失是完全免额的，或是无保险产品损坏的频率别太高。与之相关的问题是，你设想自己接触的这个风险政策从长远来看肯定会为你带来收益，而你减少或是消除偶尔的损失所引起的痛苦的能力如何呢？"}, {"en": "", "zh": "风险政策与我前面提到的外部意见类同。外部意见将注意力从当前情境的特性转移到类似情境结果的数据上。外部意见是思考计划的宽框架。风险政策在一组类似的选项中嵌入了一个特别有风险的选项，也利用了宽框架。"}, {"en": "", "zh": "外部意见和风险政策是补救两种不同偏见的方法，而这两种偏见会影响许多决策的制定：规划谬误中的过度乐观以及损失厌恶中的过度谨慎。这两种偏见相互对立。过度乐观使个人和组织免于损失厌恶的不好影响；损失厌恶使人们不会产生过度自信的乐观主义。这样的结果对于决策制定者来说是有益的。乐观主义者认为他们做决策时比在实际情况下更为谨慎，而损失厌恶者则会正确地拒绝危险的提议（在没有外部意见的情况下，他们是可能接受这些提议的）。当然，我们不能保证这些偏见会在所有情况下都相互抵消。能够同时消除过度乐观以及过度规避风险的机构应该采取这种做法，将外部意见与风险政策结合来考虑应该可以实现其目的。"}, {"en": "", "zh": "理查德·泰勒曾与一家大型企业的25名部门总经理进行过有关决策制定的讨论。他请他们考虑一个有风险的选择，作这一选择，他们可能赔掉自己的大量资金或是使那笔资金翻倍，其中赔和赢的可能性是相当的。没有一位经理愿意接受这个如此大风险的赌局。泰勒又询问了这家企业执行总裁的意见，他当时也在场。这个执行总裁毫不犹豫地回答道：“我想要他们所有人都冒险。”在这个谈话的情境之下，这位执行总裁很自然地采用了宽框架，这个框架综合权衡了所有25个赌注。就像面对100次抛硬币机会的山姆一样，这位总裁可以依靠统计结果来使整体风险降低。"}, {"en": "", "zh": "示例：风险政策\n“告诉她应该像商人那样思考！有赚，当然也有赔。”\n“我决定每个季度查看一次我的证券投资组合。我总是选择规避损失，因此在面对每天价格波动的情况下总是不能做出理性的决策。”\n“他们从不买延长保险，这是他们的风险政策。”\n“我们公司每个部门经理在其所在领域都采取损失厌恶的做法。这很正常，但造成的后果是，这个机构不敢冒险。”"}, {"en": "", "zh": "第32章 心理账户是如何影响我们的选择的？"}, {"en": "", "zh": "除了那些非常穷、要靠收入来养家糊口的人以外，绝大多数人赚钱都未必是出于经济动机。亿万富翁再赚几亿美元不是出于经济原因，实验经济学项目的参与者获取额外的赞助也不是出于经济原因，钱是衡量一个人自身利益与自我成就感的标尺。"}, {"en": "", "zh": "奖励与惩罚、承诺与威胁，都在我们的脑中，我们谨慎地将其记录下来。这些因素如同社会环境中的诱因一样影响着我们的偏向，激发我们的行为。于是，我们拒绝减少损失，因为有时这样做就相当于承认失败；我们对可能使人后悔的行动存有偏见；我们虽然不能界定对玩忽职守和拿人钱财之间的区别，却也能够将两者区分开来；我们不会不停地做事，因为责任感总是因人而异的。奖励和惩罚带来的最终价值通常会使人有情绪反应，这是一种精神上的自我交易，而当个人成为某个机构的代理人时，就不可避免地会与该机构发生利益冲突。"}, {"en": "", "zh": "你会卖掉赢利的股票还是亏损的股票？"}, {"en": "", "zh": "理查德·泰勒多年来一直对会计行业与心理账户的类似之处很感兴趣。心理账户是我们用于组织和经营生活的账户，它有弊也有利，并且有多种来源。现实生活中，我们可能会将自己的钱存在不同的银行账户里，而有时我们仅仅是将钱存在了不同的心理账户中。我们有零用钱和普通存款，也有支付孩子教育费用或急诊的预留存款。该用哪些存款来满足现在的资金需求，我们有明确的先后顺序。就像为家庭开支作预算、限制每天喝黑咖啡的数量或是增加锻炼时间一样，存款也是为了自我控制。通常我们会为了自我控制而付出代价，例如，一面把钱存入储蓄账户，一面却透支信用卡。理性代理模式下的经济人并不依赖心理账户：他们对结果的看法是经过综合分析得来的，是受外部诱因驱使的。对于人类来说，心理账户是窄框架的一种形式；他们通过有限的大脑使所有事情都得到掌控，易于管理。"}, {"en": "", "zh": "心理账户在记录得分上应用广泛。回想职业高尔夫球手在避免击出超过标准杆的球而不是小鸟球时，往往打得更出色。我们可以得出的结论是，优秀的高尔夫球手会为球场上的每个球洞都创立账户，他们不会将整体的成功押在唯一的账户上。泰勒在此前的一篇文章中阐述的一个颇具讽刺意义的例子就很好地说明了心理账户是怎样影响行为的："}, {"en": "", "zh": "两个狂热的球迷计划到离他们约64公里远的地方看篮球赛。其中一个人买了门票；另一个人在买票的途中遇见了一个朋友，免费得到了票。现在，有预报称比赛当晚会有暴风雪。这两位持票的球迷谁会更愿意冒着暴风雪去看比赛？"}, {"en": "", "zh": "答案很明显，我们知道买了票的那个球迷更有可能会去。心理账户也为此提供了解释。假设两个球迷都为这场比赛开设了账户，而错过比赛就是在负差额（逆差）的情况下关闭了这两个账户。那么无论是怎样得到门票的，他们都会很失望。但是，关闭账户对于买票的那个人来说影响更为消极，因为现在他的钱没有了，还不能看比赛。对这个人而言，待在家里是个更糟糕的选择，所以他更愿意去看比赛，也就更可能会冒着暴风雪开车去看比赛。这是系统1自动对情绪平衡作出的内在分析。在标准的经济学理论中，人们由心理账户引发的情绪并没有得到普遍认可。经济人可能会意识到这张票已经付了钱，而且已经不能退换。票的成本已经“沉没”了，这位经济人不会再在意这张球赛门票是自己买的还是朋友赠的（如果该行为人有朋友的话）。想要实施这个理性行为，系统2应该会考虑反事实的（指在不同条件下有可能发生但违反现存事实的）可能性：“如果我的票是从朋友那儿得来的，我还会冒着暴风雪驾车吗？”但只有积极的、受过相关训练的大脑才会想到提出这样的难题。"}, {"en": "", "zh": "当个人投资者将他们的证券投资组合中的一些股票卖掉时，犯一个错误也会使他们痛苦不堪："}, {"en": "", "zh": "你需要钱来操办女儿的婚礼，所以想卖掉一些股票。你记得自己每一只股票的买进价，也能分辨出某只股票是“赢利股”（即当前价值高于你的买进价的股票），或是亏损股。在你所有的股票中，蓝莓牌瓷砖是一只赢利股；如果你在今天将其售出，就会得到5000美元的收益。你持有蒂芙尼电机相同的股份，现值是5000美元，但低于你的买进价格。你更有可能出售哪一只股票？"}, {"en": "", "zh": "作出这个选择的可行方法是：“我会关闭蓝莓牌瓷砖股票账户，记录下一笔成功的投资。或者，我可以关闭蒂芙尼电机股票账户并记下失败的一笔。我更愿意怎么做？”如果将这个问题看做是在给你带来的快乐和给你造成的痛苦中作选择，你肯定会卖掉蓝莓牌瓷砖，以享受成功投资的乐趣。可以预料，金融研究中已经记录了大量人们售出自己的赢利股、保留亏损股的偏好，这被视为一种偏见，关于此还有一个晦涩难懂的名字：处置效应。"}, {"en": "", "zh": "处置效应是窄框架的一个例子。投资者为她买的每一只股票都开设了账户，并想在关闭每一个账户时都能获利。理性的代理人会对证券投资组合有一个整体的看法，会售出最无可能在未来赢利的股票，而不是去考虑它是赢利股还是亏损股。阿莫斯跟我说了他与一名财务顾问的谈话。这名顾问询问阿莫斯他的证券投资组合中所有股票的相关信息，包括每只股票的买入价格。当时阿莫斯温和地问：“难道这个问题很要紧吗？”这个顾问当时看起来非常吃惊，他显然一直认为心理账户的状态是值得考虑的因素。"}, {"en": "", "zh": "阿莫斯对这个财务顾问的观念的猜测可能是对的，但他将买入价视为无关紧要的却是错误的。即使对经济人来说，买入价也很重要，应该将其考虑在内。处置效应是需要付出代价的偏见，因为对于售出赢利股还是亏损股这个问题，答案很明确，但并不是说选择卖哪只股票都无关紧要。如果你在意的是自己的财富，而不是直观感受，就会售出蒂芙尼电机这只亏损股，保留蓝莓牌瓷砖这只赢利股。至少在美国，税收能给人很大的刺激：你会意识到，卖掉亏损股可以减免税赋，而卖掉赢利股就必须得纳税。全美国的投资者都知道这个金融方面的基本事实，这个事实还决定了他们所做的一个决策，投资者会在12月卖掉更多的亏损股，因为这个月的税赋一直令他们忧心忡忡。一年中每个月都有税收优惠，但是在其他11个月份中，心理账户在人们心中的分量都重于金融常识。另一个反对出售赢利股的论据是对市场反常现象的详细记录，即最近升值的股票有可能还会继续升值至少一小段时间。这个净效应很大：预计卖掉蒂芙尼股而非蓝莓股的税后额外回报率在第二年是3.4%。在赢利的情况下关闭心理账户会令人心情愉悦，但这种愉悦是你花钱买来的。一个经济人不会犯这样的错误，在这一点上，那些运用系统2的经验丰富的投资者比新手更容易犯这种错误。"}, {"en": "", "zh": "理性的决策者只会对当前投资的未来结果感兴趣，经济人不会去考虑纠正先前的错误。当有更好的投资项目时，对亏损账户进行额外投资的决策被称为“沉没成本悖论”，这是一个代价高昂的错误决策，在大大小小的许多决策中都能看到其身影。由于买了门票而冒着暴风雪开车去看演出就是一种沉没成本悖论。"}, {"en": "", "zh": "设想一家公司已经在某个项目中投入了5000万美元。现在，这个项目误了工期，其最终回报的预计收益也没有最初计划的那样好。如果想要实现这个项目的最初目标，则需要6000万美元的额外投资。另一个提议是将同样的资金投入到一个新的项目中，且这个项目似乎可以带来更高的回报。这家公司会怎么做呢？通常的情况是，像冒着暴风雪开车那样，受到沉没成本影响的公司会继续将钱砸在那个不好的项目上，因为关闭这个项目的账户就相当于承认自己的失败，这是一种耻辱。这个情景属于四重模式中右上角那一栏的情况：在这种情况下，我们需要在必然的损失和不利的风险中作出选择，这样做通常是不明智的。"}, {"en": "", "zh": "从公司的角度来看，向失败的尝试增加投入是个错误做法，但对“拥有”这个前景并不明朗的项目的高管来说，却未必如此。撤销这个项目会给这个高管的履历上留下难以抹掉的污点，只能依靠该组织的资源再赌一把才能最大限度地保住个人利益，才有希望收回投资成本，至少可以尝试着延长清算日期。在沉没成本的状态下，高管的动机与公司的目标以及股东的利益都会不一致，这就是我们所说的代理问题中常见的类型。董事会非常清楚这样的冲突，所以当某位执行总裁因受困于先前的决策影响而不愿避免再造成损失的话，董事会就会将其替换掉。董事会成员不见得认为新的执行总裁比原先的更有能力，但他们知道新的总裁不会有与原总裁一样的心理账户，在评估当前机会的选择时，他也就更容易忽视过去投资的沉没成本。"}, {"en": "", "zh": "沉没成本悖论导致人们在不被看好的事情上浪费了太多时间，例如不幸福的婚姻、没有希望的研究项目等。我常注意到，一些年轻的科学家宁愿苦苦挣扎于注定会失败的项目，也不会选择放弃，重新开始。不过，好在有研究表明这样的悖论至少在某些情况下是可以克服的。在经济学和商贸学的课堂上，沉没成本悖论也被视为一种错误理论。这样做显然会产生积极影响，有证据表明，这些领域的毕业生比其他人更有可能放弃会失败的项目。"}, {"en": "", "zh": "哪种选择会让你更后悔？"}, {"en": "", "zh": "后悔是一种情绪，也是一种自我惩罚。人们做出的许多决策都是因为不想后悔（“不要这样做，否则你会后悔的”是个非常常见的警告），现实生活中我们也有很多后悔的事。有两位荷兰的心理学家对这种情绪状态作了很好的描述，他们注意到，后悔“总是与一个人本该更加了解的情感、不祥的预感以及对做错的事或失去的机会念念不忘等情绪形影相随，与严厉自责和改正错误的倾向形影相随，与‘此事如果没有发生该多好’或是‘如果再有一次机会该多好’之类的想法形影相随”。当你想象自己正在做某事而不是在想曾经做过的事情时，就会感到强烈的悔意。"}, {"en": "", "zh": "后悔是由替代现实的可用性引发的反事实情绪。每架飞机失事后，都会有关于一些乘客“本不应该”在那架飞机上的特别报道，他们有的是在最后几秒才订到的位子，有的是从另一条航线转机过来的，还有的理应早飞一天，但不幸延迟了才上了这架飞机。这些令人痛苦的事例有个共同特点，即它们都属于反常规事件。与正常事件相比，人们更容易凭想象搞砸这些反常规事件。联想机制包含了正常世界的典型及其规则。反常规事件会吸引人的注意力，还会使人们认为在相同情况下这些事件也应该是正常的。"}, {"en": "", "zh": "为了理解后悔与常态的关系，请思考下列情境："}, {"en": "", "zh": "布朗先生几乎从不让旅行者搭便车。昨天他让一个男人搭了便车，然后他被抢了。"}, {"en": "", "zh": "史密斯先生经常让旅行者搭便车。昨天他让一个男人搭了便车，然后他被抢了。"}, {"en": "", "zh": "这两个人谁更可能感到后悔？"}, {"en": "", "zh": "答案不出我们所料：有88%的受试者认为布朗先生会更后悔，12%的受试者认为是史密斯先生。"}, {"en": "", "zh": "后悔与责备并不是一回事。实验人员问了其他受试者与上述事件相关的一个问题："}, {"en": "", "zh": "谁会受到他人更严厉的责备？"}, {"en": "", "zh": "结果是：认为是布朗先生的占23%，认为是史密斯先生的占77%。"}, {"en": "", "zh": "与常态的对比可引起后悔和责备，但相关的常态是不相同的。布朗先生和史密斯先生体验到的情绪主要是由他们平时对待旅行者的方式决定的。让旅行者搭便车对于布朗先生来说是一件反常规事情，因此，大多数人认为他会更后悔。然而，带有批判性的观察者会将这两个人的行为与合理行为的传统常态相比较，更可能会批评史密斯先生，因为他总是习惯性地承担这种不可预知的风险。我们会忍不住说，史密斯先生是自食其果，布朗先生是走了霉运。但布朗先生更应被指责，因为他在这件事上的做法与他平时的性格不符。"}, {"en": "", "zh": "决策制定者容易感到后悔，而痛苦的情绪则对很多的决策制定都有影响。后悔的直觉非常一致，而且还很明显，下面这个例子就说明了这一点。"}, {"en": "", "zh": "保罗在A公司持有股份。在过去一年里，他想要将股份转移到B公司，但最终决定还是不那样做。现在，他了解到，如果他当时将股份转到了B公司的话，可以多赚1200美元。"}, {"en": "", "zh": "乔治在B公司持有股份。在过去一年里，他将股份转移到了A公司。现在，他了解到，如果他当时坚持保留B公司股份的话，可以多赚1200美元。"}, {"en": "", "zh": "谁会更后悔呢？"}, {"en": "", "zh": "结果很明显：8%的受试者说是保罗，92%的受试者说是乔治。"}, {"en": "", "zh": "这很令人好奇，因为从客观上来说，这两位投资者的情况是一样的。他们现在都拥有A股，而且如果拥有B股可多赚同样多的钱。唯一的区别在于，乔治没能赚更多钱是因为他采取了行动，而保罗则是因为没有采取行动。这个小事例说明了一个大道理：人们对由于不采取行动而导致的结果，会比因行动而产生的结果有更为强烈的情绪反应（包括后悔）。这个观点在赌博的情境下也得到了证实：人们下注并赢了钱会比其不赌但得到同样多的钱更快乐。这种不对称至少对于损失来说是强烈的，还可用来解释责备和后悔的原因。问题的关键并不在于玩忽职守和拿人钱财的不同，而在于默认选择和偏离默认的行动间的区别。你在偏离了默认情况之时，会很容易联想到常态，想知道默认情况是否会导致糟糕的结果。如果真会这样，那你的偏离和常态就可能成为自己痛苦的来源。当你持有一只股票时，你默认的选择不是卖，但当你早上碰见某个同事时，你默认的选择又变成了同意他的观点，即卖掉股票。出售一只股票与违背你同事意愿都是对默认选择的违背，也都可能让你后悔或招来责骂。"}, {"en": "", "zh": "在一个证明默认选择的影响力的实验中，受试者在计算机上模拟了21点游戏。一些玩家被问道：“你想要拿牌吗？”而另一些人则被问道：“你想要停牌吗？”无论问题是什么，如果结果并不理想的话，说“是”肯定会比说“不”更令人感到后悔。很显然，这个问题表明了一个默认的回答，即“我们有很强的意愿这样做”。另一个默认行动的例子是说球队在决赛中惨败与教练有关。这个教练理应对人员和战术进行调整，但他却没有这样做，因此，他被人责备，他自己也感到后悔。"}, {"en": "", "zh": "后悔的风险是不平衡的，其不平衡性体现在偏向于常规的、厌恶风险的选择这种偏见存在于许多情境中。如果某位顾客在购物时被提醒，他可能就会因为自己的选择而后悔，这名顾客在选择时就会偏向于常规选项，即更看好品牌。接近年末时，财务经理的行为也显示出了预期评估的影响：他们易于清理那些并非传统投资组合或是让人质疑的股票。另外，即使是关乎生死的决策都能被预期的评估所影响。"}, {"en": "", "zh": "设想有个医治重病患者的医生，某个治疗手段是正常且标准的，另一个则是不同寻常的。这个医生有理由相信这个非传统的治疗手段可提高病人的康复概率，但证据不足。使用这个与众不同的治疗手段的医生可能会面对极度的悔恨、严厉的责备，还可能被人起诉。以后见之明来看，医生很容易想到常规的选择，总是希望自己没有作非常规的选择。如果结果是好的，这个敢于冒险的医生就会得到好的名声。这是事实。但是，这种可能的利益小于可能的成本，因为成功通常是比失败更为正常的结果。"}, {"en": "", "zh": "因为害怕将来后悔而作出不理性的选择"}, {"en": "", "zh": "在许多情境中，损失的痛苦是获得的快乐的两倍，例如下赌注、禀赋效应以及对物价变动的反应等。损失厌恶系数在某些情况下会更高。你更容易在生活中比钱更加重要的方面产生损失厌恶，例如健康。另外，当“卖掉”重要的基金可能使你承担可怕的后果时，你会更加不愿卖掉这些基金。理查德。泰勒早期在消费者行为方面的经典实验就用了一个著名的例子，我将这个例子作了细微调整："}, {"en": "", "zh": "你接触到了一种疾病，感染这种病会使你在一星期内快速且没什么痛苦地死去。得这种病的概率是十分之一。在此病尚未出现任何症状之前，有一种疫苗是有效的。你愿意付多少钱来打这种疫苗？"}, {"en": "", "zh": "大多数人都愿意付钱，但钱不是很多。面对死亡的可能令人不安，但是死亡的概率很低，所以想要躲避死亡而花掉大量积蓄是不合理的。"}, {"en": "", "zh": "现在，请考虑下面这个作了细微调整的例子："}, {"en": "", "zh": "研究上面这种疾病需要一些志愿者。对志愿者的唯一要求是必须接触这种病，也就是说，你会有十分之一的概率会感染上这种病。那么，要是去做志愿者，你最低要多少钱？（你不能购买疫苗。）"}, {"en": "", "zh": "正如你可能预料的那样，人们当志愿者要的薪水会比他们买疫苗的最高定价高很多。根据泰勒的非正式报告，其常规比率大约是50：1。极高的售价说明了这个问题的两个特点。首先，你不会“出售”健康。这种交易不是合法的，高的定价反映了人们并不愿意参与其中，而可能因此而承担的不好结果或许也是你不愿“出售”健康的最重要因素。如果你在某天早上起床的时候，发现自己有了疾病的症状并将在不久后死去，你就会觉得去当志愿者比起没买疫苗更会令你后悔。因为你本可以拒绝“出售”自己的健康的，甚至是能在完全不考虑可以得多少钱的情况下拒绝。你本来可以坚持自己的默认选择，什么都不做。现在，这种与事实相反的情况会让你的余生都不得安宁。"}, {"en": "", "zh": "前面提到过的关于家长对有潜在危险的杀虫剂的反应也存在着是否愿意冒险的问题。受试者需回想自己正在使用的某种杀虫剂，且这10000瓶杀虫剂里有15瓶可能造成误吸和儿童中毒。另外，还有一种稍便宜的杀虫剂，但其导致中毒的风险也有所增加：10000瓶中有16瓶可使人中毒。实验者问家长，第二种杀虫剂（更不安全）要比第一种便宜多少时，他们才会去买？超过三分之二的受试者回应，无论这种新的杀虫剂定价多少，他们都不会买。他们显然反对拿自己孩子的健康做交易。若第二种杀虫剂与第一种的价格差额足够大的话，也有少数人是愿意买的，但愿意接受较小的折扣而买第二种杀虫剂的少数人会要求得到一笔钱，这笔钱比他们愿意为提高产品安全而支付的钱更多。"}, {"en": "", "zh": "任何人都明白也理解，为什么家长不愿为了钱而让孩子承担风险，哪怕只是增加一点风险。值得注意的是，这种态度对于我们想保护的人的安全来说，是不合逻辑且有潜在危害的。即使是最慈爱的父母，他们用来保护自己孩子的时间和金钱也是有限的（保护孩子安全的心理账户预算有限），因此，使这些资源的作用发挥到极致似乎很合理。通过买稍差的杀虫剂可以节约一小笔钱，但会增加孩子中毒的风险。然而，节约的这笔钱却可以更好地用在消除其他威胁孩子健康的事情上，例如买一个更为安全的儿童汽车座椅或是插座罩。禁忌权衡反对任何增加风险的可能，但这并不是利用健康预算的有效方法。事实上，相较于想要保障孩子安全的愿望，这种抗拒可能更多的是出于害怕自己会后悔。任何在考虑后接受了这种交易的家长都会假设，想到杀虫剂带来危害时他们后悔和羞愧的画面。"}, {"en": "", "zh": "人们极度厌恶为得到其他好处而以增加风险为代价的交易，监管风险的法律与规章充分体现了人们的这种厌恶。这种趋势在欧洲特别强劲。在欧洲，防止一切可能造成危害行为的预警原则是一个被普遍接受的学说。在监管的体制下，预警原则将安全检测的全部目标都放在了可能会做出对他人和环境有害行为的人的身上。多个国际组织都已说明，潜在危害的科学证据的缺失并不是承担风险的充分理由。正如法学家卡斯·桑斯坦指出的那样，预警原则代价高，而且对它作严格解读的话，它是经不起考验的。他提到了一连串无法通过预警原则考验的创新发明，包括“飞机、空调、抗生素、汽车、氯气处理、麻疹疫苗、心脏手术、收音机、电冰箱、天花疫苗以及X射线”。强势的预警原则明显是站不住脚的，但加强的风险规避却根植于我们强烈且普遍的道德直觉中，它源于系统1。强烈的风险规避意识与有效的风险管理形成的两难问题，还没有一个简单而又令人信服的解决方案。"}, {"en": "", "zh": "我们花了很多时间预测，并尝试去回避由我们自身造成的情感创伤。我们该怎样对待那些难以捉摸的结果，以及当我们记录自己生活时的那些自我惩罚（或偶尔的奖励）？经济人不应有这些情绪，而这些情绪对于人类来说却代价沉重。这些情绪会导致人们做出损害个人财富、政策力度以及社会福利的行为。后悔情绪与道德责任是真实存在的，没有后悔情绪和道德责任的经济人也许与这样的行为并无关联。"}, {"en": "", "zh": "因为害怕将来后悔而影响了你的选择，这样合理吗？对后悔的预感就像对自己快要昏厥的预感一样，是生活中的事实，并且需要在发现以后作出调整。如果你是位富有又谨慎的投资者，你也许可以支付某个昂贵的投资组合，这个组合即使不能够使你的财富收益达到最大，也可将你可能会感到的后悔程度降至最轻。"}, {"en": "", "zh": "你还可以采取一些预防措施，以防止将来后悔。也许最有效的方法就是做到对可能会后悔的事心中有数。如果你能够在情况变糟糕时，先仔细考虑自己是否会后悔再作决定，那么你将来的遗憾也就可能会更少一些。你应该也知道，后悔总是伴随着后见之明的偏见而来，所以，任何你能做的、防止后见之明的措施都有可能是有益的。我个人躲避后见之明的方法是：在做有长远影响的决策之时，不要太过周密，但也不要完全凭偶然行事。如果你考虑到了一点点，你可能在事后说，“我本可以作出更好的选择”，这种后见之明就更会令你很不甘心。"}, {"en": "", "zh": "丹尼尔·吉尔伯特与他的同事们说，人们预见的后悔感觉往往会比实际体验的程度深，因为他们会低估自己的心理防御能力，即“心理免疫系统”。对此，吉尔伯特和他同事们的建议是，不应该过于关注自己是否会后悔，即使你有些后悔，其令你痛心的程度也绝对会比你想象中的程度轻。"}, {"en": "", "zh": "示例：心理账户\n“他对现金支付和信用卡支付有不同的心理账户。我不断地提醒他，钱就是钱，并没有多大区别。”\n“他一直保留着那只股票，只是因为不想在关闭心理账户时处于损失状态。这就是处置效应。”\n“我们在那家餐馆里发现了一道极其美味的菜，因为害怕会后悔，所以我们就不愿意再尝试别的菜了。”\n“售货员给我看了最贵的儿童汽车座椅，还说它是最安全的，我就不敢买比较便宜的了。这似乎是禁忌权衡在作祟。”"}, {"en": "", "zh": "第33章 评估结果的逆转"}, {"en": "", "zh": "假设，某人走进了附近的一家便利店，里面恰巧发生了抢劫案，他不幸中弹。你认定他是因中弹而导致右臂残疾。你的任务就是给这起抢劫案中的受害者设定赔偿金额。"}, {"en": "", "zh": "此人住所附近有两家商店，其中一家是这个人常去的。请思考以下两种情况：抢劫案发生在此人常去的那家商店。此人常去的那家商店的店主要去参加一个葬礼，商店不营业，这个人就去了另一家商店，而就在那家商店里，他中弹了。"}, {"en": "", "zh": "此人中弹的那家商店是否会对此人的赔偿有影响？"}, {"en": "", "zh": "你会通过联合评估对此作出判断，即将两种情况同时考虑在内并进行对比。你可以有自己的一套原则。如果你认为第二种情况会得到更高的赔偿，你就会给这种情况分配更高的美元价值。"}, {"en": "", "zh": "大家都会认同这个答案，即在这两种情况下，赔偿金应该相同。赔偿针对的应该是受害者受到的重创伤害，而抢劫案发生的地点对赔偿会有何影响呢？对这两种情况的联合评估会使你对赔偿过程中的相关情况产生同情。对于大多数情况来说，地点不是相关情况中的一个。在其他需要鲜明对比的情况中，思考较慢，且系统2也参与其中。"}, {"en": "", "zh": "这两种情况最初是由心理学家戴尔·米勒（Dale Miller）和凯茜·麦克法兰（Cathy McFarland）设计的，他们将这两种情况展示给不同的人看，并请他们作出评估。在他们这一跨学科的实验中，每位受试者都只看到了一种情况，并用金钱来衡量这个人的受害程度。他们发现（你肯定也猜到了）如果受害者受伤的商店是他不常去的那家而不是他常去的那家，他得到的赔偿会更多。人们自然会想“要是他去的是常去的那家店就……”正是这种想法引起了心酸这种与事实相反的感觉。系统1的替代和强度匹配机制将用金钱来表达对某件事的情感反应强度，使得金钱价值有了很大的不同。"}, {"en": "", "zh": "两项实验对比鲜明。几乎所有将两种情况放到一起来看（受试者包括在内）的人都同样认为悲痛不是合理的想法这一原则。不幸的是，只有在将两种情况放到一起看时，才能得出这个原则，而现实生活中，这两种情况不可能同时发生。我们通常用受试者组间模式体验生活，在这种模式中，可能会改变你的想法且有鲜明对比的方案并不存在，当然了眼见即为事实。因此，你的道德观不一定能支配你的情感反应，并且从内心角度看，在不同情况下大脑中生成的道德直觉都不是一致的。"}, {"en": "", "zh": "抢劫案中单一评估和联合评估的不一致属于判断和抉择中的逆转。偏好逆转（preference reversals）是在19世纪70年代被首次提出来的，此后几年，其他方面的逆转也相继被提出来。"}, {"en": "", "zh": "开启经济学与心理学的跨界交流"}, {"en": "", "zh": "偏好逆转在心理学家和经济学家间的对话中有着重要的地位。引起注意的逆转是由萨拉。利希滕斯坦和保罗。斯洛维克提出的，他们都是心理学家，在密歇根大学做毕业设计时，他们和阿莫斯是同一届的。他们就赌注的偏好逆转做了项实验，关于此实验，我会做简要说明。"}, {"en": "", "zh": "将有36个格的轮盘转两次，你可以在两个赌注中选择一个。"}, {"en": "", "zh": "赌注A：1三分之一6的概率赢得160美元，36分之25的概率损失15美元。"}, {"en": "", "zh": "赌注B：35、36的概率赢得40美元，三分之一6的概率损失10美元。"}, {"en": "", "zh": "你可以在无风险和有风险的赌注间选择：一个几乎肯定会赢，但赢得不多；另一个是赢的概率小，但可以赢一大笔，还有很大可能会输钱。"}, {"en": "", "zh": "现在请单独考虑每个赌注：如果你是该赌注的持有者，你最低会以多少钱卖掉它？记住，你不是在和别人讨价还价，你的任务是决定你真的愿意放弃这一赌注时，可以接受的最低价钱是多少。你来尝试一下。你可能会发现，在这项任务中，赢得的钱数尤为突出，你对赌注的评估被锚定在了其价值上。A赌注中支撑这一猜想的结论和卖价都要比B赌注的好。这就是偏好逆转，即人们会选择B而不是A。不过，如果他们只能在其中选一个的话，他们会认为A比B有更高的价值。就像是抢劫案中的那种情况，偏好逆转之所以会发生是因为联合评估将注意力集中到了情况的一个方面上，即A赌注没有B更稳妥，而这点在单一评估中则没那么突出。当选择联合评估时，致使单一评估中产生不同观点判断的特征就会受到克制或认为不相关，这种特征包括第一个例子中走错商店的受害者的悲痛和第二个例子中锚定奖品的心酸。系统1的情绪反应很可能会决定单一评估；而联合评估中出现的对比也常需要更仔细、更需要付出努力的评估，这其中需要系统2的参与。"}, {"en": "", "zh": "偏好逆转可在受试者间（within，subject）的实验中得到证实。在这个实验中，受试者对很多商品作出两套定价并从中作出选择。受试者都没有意识到自己选择时的不一致性，而且在面对这种不一致性时，他们的反应很好笑。1968年，萨拉·利希滕斯坦曾采访该实验中的一名受试者，这次采访堪称业界经久不衰的经典。萨拉和这个困惑的受试者（该受试者后来又愿意花一笔钱放弃自己刚选择的赌注，选择自己刚放弃的赌注，而且他多次改变主意）进行了详细的交谈。"}, {"en": "", "zh": "理性的经济人当然不易受偏好逆转的影响，因而偏好逆转现象被看成是对理性因素模式以及建立在理性因素模式之上的标准经济理论的一种挑战。这种挑战本可以被忽略，但却没有。就在偏好逆转现象被报道的前几年，有两位知名的经济学家戴维·格雷瑟（David Grether）和查尔斯·普莱特（Charles Plott）在《美国经济评论》上发表了一篇文章，其中就对利希滕斯坦和斯洛维克所描述的现象谈了自己的研究。这也许是实验心理学家第一次作出了引起经济学家关注的发现。对于学术论文来说，格雷瑟和普莱特的文章简介部分写得有些夸张，他们的意图很明确：“经济学家应该对心理学感兴趣，而且正是在心理学领域中构建起了数据和理论体系。从表面价值的角度来看，数据与偏好理论并不一致，而且会就研究重点生成更多经济学上的含义启示……”该论文指出了心理学研究成果不适用于经济学领域而设计的一系列实验。"}, {"en": "", "zh": "格雷瑟和普莱特列出了13种理论来解释最初的发现，并指出了精心设计的、可测试这些理论的实验。他们提出了很多假设，其中一种（当然心理学家会认为这种假设有些做作）是实验的结果本应该是心理学家得出来的！最后只有一种假设经受住了检验：即心理学家是正确的。格雷瑟和普莱特承认，从标准的偏好理论来看，这种假设是最不令人满意的，因为“如此一来，个人选择可依赖作出选择时的环境”，这显然与一致性学说相悖。"}, {"en": "", "zh": "你可能会觉得这一惊人结果使得经济学家们的理论基础假设受到了质疑，会引起经济学家的自我反思。但在社会科学领域中，包括心理学和经济学，事情不应该是这样发展的。理论基础应该是强有力的，而且要质疑某一既定的理论，只有一项发现是不够的。事实上，格雷瑟和普莱特那篇直言不讳的文章对认定经济学家（也可能包括格雷瑟和普莱特）的疏忽有着直接的影响。不过，这篇文章却对经济学家们正视心理学的研究起到了促进作用，而且促进了两个学科间的跨界交流。"}, {"en": "", "zh": "联合评估引发偏好逆转"}, {"en": "", "zh": "“约翰高吗？”如果约翰高5英尺，你的回答就会取决于他的年龄。如果他6岁，他自然是很高；如果他16岁，这个身高就算矮的了。你的系统1会自动检索相关信息，同时，你对高的概念也会随之调整。你还会根据类别来匹配各项参数，比如回答：“在餐馆里吃饭，多少钱的一顿饭可以和约翰的身高相匹配？”你的回答会取决于约翰的年龄，即如果他16岁，这顿饭就比他6岁时更便宜。"}, {"en": "", "zh": "但是，请看下面的说法："}, {"en": "", "zh": "约翰6岁，他身高5英尺。"}, {"en": "", "zh": "吉姆16岁，他身高5.1英尺。"}, {"en": "", "zh": "在单一评估中，由于每个人的参照标准不一样，大家都会觉得约翰很高，而吉姆不高。如果你需要对比，比如“约翰是和吉姆一样高吗”，你会回答不是。这个问题不会引起疑问，也没有模糊不清的地方。不过，在其他情况下，即事物和事件在它们各自的情境中进行比较时，会造成对重要事情的选择不一致。"}, {"en": "", "zh": "你不应该形成单一评价和综合评价总是不一致的印象，也不应该认为判断完全是混乱的。我们生活的这个世界有多个范畴，因为我们有标准，例如，6岁的孩子或者桌子。判断和偏好在同一种类中是一致的，但当事物从属于不同的种类时，就是不一致的了。例如以下3个问题的答案："}, {"en": "", "zh": "你喜欢苹果还是桃？"}, {"en": "", "zh": "你喜欢牛排还是炖菜？"}, {"en": "", "zh": "你喜欢苹果还是牛排？"}, {"en": "", "zh": "第一个问题和第二个问题中的事物属于同一个种类，你能立即回答出自己喜欢哪一个。此外，你可以从单一评估（“你有多喜欢苹果”和“你有多喜欢桃子”）中得到自己的喜好评价，因为苹果和桃子都是水果。由于不同的水果是通过相同的标准进行对比的，在单一评估和联合评估中，每种水果都可以直接进行对比，因而也就不存在偏好逆转了。与种类内的问题不同的是，苹果和牛排的对比没有固定的回答。"}, {"en": "", "zh": "苹果和牛排与苹果和桃子不同，从本质上讲，它们是不可以相互替换的，它们也不能满足同样的需求。有时你会想吃牛排，有时又想吃苹果，但你很少会在想吃苹果时说吃牛排也一样，或者在想吃牛排时说吃苹果也一样。"}, {"en": "", "zh": "假设你收到一封自己信赖的组织发来的电子邮件，要求你对某一事业作出贡献："}, {"en": "", "zh": "很多繁殖海豚的地方都受到了污染的威胁，这导致海豚的数量减少。一个由私人捐献的特殊基金会成立了，并给海豚提供无污染的繁殖区。"}, {"en": "", "zh": "这个问题能引发什么样的联想呢？你是否意识到脑中闪现了相关事业的想法和记忆？你很可能会想起保护濒危动物的工程。你的系统1会自动评估其好坏，并对海豚在濒危动物中的排名生成一个大致的印象。海豚要比白釉、蜗牛或鲤鱼这样的动物更惹人喜爱，也就是说海豚比大脑自动进行对比的动物更受欢迎。"}, {"en": "", "zh": "你必须要回答的问题不是你是否更喜欢鲤鱼，你需要对此进行美元价值评估。当然，你可以从以往的经验中知道你从没有对这种要求做出过回应。设想你就是对这种要求作出贡献的人。"}, {"en": "", "zh": "和其他难题一样，对美元价值的评估可以用替代和强度匹配来解决。美元的问题是很难，但可以通过更简单的问题来回答。因为你喜欢海豚，你很可能会觉得拯救海豚是项善举。下一步（也正是自动进行的一步），你会将你对海豚的喜爱用贡献的大小来表达。你对以前对环境事业作出的贡献大小有意识，这份贡献与对政治或母校足球队的贡献有所不同。你知道对自己来说多大的贡献是份“巨大的贡献”，多大的贡献是“大贡献”或“一般贡献”，又或是“小贡献”。你对不同动物的态度也有所不同（从“非常喜欢”到“一点也不喜欢”）。因此你也能将自己的态度用美元价值来表达，自动从“非常大”到“较大”再到几美元。"}, {"en": "", "zh": "在另一种情况下，你接手了另一种诉求："}, {"en": "", "zh": "雇农要在阳光下暴晒多个小时，他们患皮肤癌的概率要比一般人高很多。定期体检可以降低其风险。现要建立一个基金会支持面临患皮肤癌风险的雇农的体检项目。"}, {"en": "", "zh": "这是个紧急的问题吗？你在评估紧急事件的时候，这件事属于哪种类别呢？如果你自主地将这件事归为公共卫生问题，你很可能会发现雇农患皮肤癌的风险在这些公共卫生问题中排名不是很靠前，它的排名相对于濒危动物中海豚的排名来说，肯定会靠后。若将皮肤癌问题的相关重要性用美元价值来表示的话，你对其作出的贡献就会比对濒危动物的贡献要小。在实验中，海豚在单一评估中吸引到的贡献量要比雇农吸引到的多。"}, {"en": "", "zh": "其次，思考联合评估中的这两个例子。在这两种例子中，是海豚还是雇农应该得到更大的那笔捐款呢？联合评估中关注了单一评估中没有被注意到的一点特征，但其在被发现时，却被认为是有决定性的因素：雇农是人，海豚不是。你当然认识到了这一点，但这点在单一评估中判断时是不相关的。“海豚不是人”这一事实没有引起注意，是因为在脑中被激活的所有事情都具备这一特点。“雇农是人”这一事实没有在脑中浮现是因为所有的公共卫生问题涉及的都是人。单一评估的窄框架使得海豚有更高的强度得分，通过强度匹配，海豚会得到相应更多的捐款。联合评估改变了事情的表述：这一“人Vs.动物”的特点只有在将两者综合在一起看时才会凸显出来。在联合评估中，人们对雇农表现出偏好，并愿意捐献更多，比保护可爱的动物要捐得多。在打赌和抢劫案射杀人的例子中，单一评估和联合评估是不一致的。"}, {"en": "", "zh": "芝加哥大学的奚恺元对下面这个同等类型中的偏好逆转例子作出了贡献。被评估的对象是二手音乐词典。"}, {"en": "", "zh": "在单一评估时，词典A要更有价值，当然，偏向在联合评估中会改变。其结果正好表明了奚恺元的可评价性假设（evaluability hypothesis），即词条数在单一评估中没有价值，因为数量自身是没有价值的。而在联合评估中，这一点则显然使词典B更具吸引力，而且词条数比封皮状况更重要。"}, {"en": "", "zh": "同类案件判罚的力度为何不一样？"}, {"en": "", "zh": "我们有理由相信公正的管理在不同领域中受可预测的不一致性的影响。其中的证据部分可从实验中获得，比如对模拟陪审团的研究；部分可从对立法、管理和诉讼模式的观察研究中获得。"}, {"en": "", "zh": "在一项实验中，从得克萨斯州的陪审团中挑出了模拟陪审员，并要求他们去评估几起民事案件的惩罚性赔偿。这些案件是两个为一组呈上来的，其中一个案件提出人身赔偿，另一个案件是经济损失。模拟陪审员首先评估了其中一个案件，然后给他们看了同组中的另一个案件，并要求他们进行对比。下面是关于一组案件的总结："}, {"en": "", "zh": "案例1：某个孩子在玩火柴时不小心点着了自己的睡衣，造成中度烧伤。生产这种睡衣的公司没有将这种睡衣制成耐燃的。"}, {"en": "", "zh": "案例2：由于某家银行的不慎处理，另一家银行损失了1000万美元。"}, {"en": "", "zh": "一半的受试者在将两个案例进行联合评估时，会先评判案例1（用单一评估）。其他的受试者在评估时，会将案件的顺序颠倒过来。在单一评估时，陪审员判给诈骗银行的惩罚性赔偿要比判给烧伤孩子的高，很可能是因为诈骗银行的案例中涉及的金额要大，是个高锚定。"}, {"en": "", "zh": "然而综合来看案件时，对受害个体的同情心会比锚定效应占更大的影响比重，因而陪审员判给孩子的赔偿金要比判给诈骗银行的高。平均来看几组这样的案件，联合评估中人身伤害的受害者所得的赔偿是单一评估中得到的赔偿的2倍。只看到孩子烧伤案件的陪审员作出的决定和他们的感觉相匹配。他们不能预测到给那家金融机构的大笔赔偿金会使给孩子的赔偿金显得不够。在联合评估中，关于银行的惩罚性赔偿金仍然锚定在损失上，而给烧伤孩子的赔偿金却有所提升，这其中反映出了陪审员对因疏忽而导致孩子受伤的愤怒。"}, {"en": "", "zh": "我们可以看到，理性通常会受到更广泛、更综合的框架的限制，而且联合评估显然比单一评估更广泛。当然，当能控制你所看到的人对你的选择有既定的兴趣时，你应该在联合评估时谨慎些。售货员很快就意识到改变购物环境能影响顾客的偏好。除了故意的改变外，你可以设想判断时用对比的方法（一定会包括系统2）会比单一评估更稳定，单一评估常会反映出系统1的情绪反应强度。我们希望任何想要得出周全判断的机构都能在评估单个案件时，为所作的判断提供更广泛的背景。我从卡斯。桑斯坦那儿了解到评估惩罚性赔偿的陪审员明显未能考虑到其他案例，这让我很惊讶。法律体系和心理学常识不同，法律判决更倾向于单一评估。"}, {"en": "", "zh": "在法律体系另一项关于不一致性的研究中，桑斯坦对比了不同美国政府部门实施的行政处罚，包括职业安全与保健管理总署和环境保护局。他总结道：“在范畴内，惩罚似乎是理智的，至少更严重的伤害会受到更严厉的惩罚。对于违背职业安全与保健的行为，最重的惩罚是针对不断的违反行为，其次的惩罚是针对蓄意且严重的违反行为，最轻的惩罚是针对未能保持其良好记录的行为。”然而，如果不同部门惩罚的力度不一样，你也不会感到惊讶，因为不同部门的惩罚反映了其特有的政治和历史，而不是所有地方都关心的公正。工人“严重违反”安全原则最多罚款7000美元；而违反野生鸟类保育行动可导致最高25000美元的罚款。每个部门制定的罚款与该部门制定的其他罚款相比都是明智的，但将不同部门的罚款相对比就显得很奇怪了。就像此章中的其他例子那样，只有将两个案例放在一个大框架下时，你才能看出其中的奇怪之处。同种类间的行政处罚系统是具有一致性的，但与其他种类综合在一起来看，却是不一致的。"}, {"en": "", "zh": "示例：逆转\n“我对英国的热量单位没有什么概念，但在看到空调装置的改变后，我对此就有所了解了。联合评估非常重要。”\n“你认为这个演讲非常成功，这是因为你将这个演讲和她的其他演讲作了对比。要是和其他人对比的话，她仍然不怎么样。”\n“当你将框架放大时，你就会做出更明智的决策，事实往往如此。”\n“当你单独看某件事时，你很容易受系统1的情感反应的支配。”"}, {"en": "", "zh": "第34章 善用框架效应，让生活更美好"}, {"en": "", "zh": "2006年世界杯总决赛是意大利队和法国队之间的较量。“意大利队赢了”，“法国队输了”，两个句子描述了这场比赛的结果，这两句含义相同吗？回答要看怎么理解“含义”这个词了。"}, {"en": "", "zh": "从逻辑推理的角度来看，这两个描述比赛结果的句子是可以互换的，因为它们所指的状况相同。正如哲学家曾说的，它们的真值条件是相同的：如果其中一个句子是正确的，另一个也是正确的。这正是经济人理解事情的办法。经济人的观点和偏好都是基于现实的，尤其是他们选择的对象，都是对这个世界的陈述，而且他们不会受到陈述所用字眼的影响。"}, {"en": "", "zh": "含义还有另一层观念，在这层观念中“意大利队赢了”和“法国队输了”的意思并不相同。在这层观念中，对某个句子含义的理解发生在你的联想机制中。这两个句子引发了不同的联想。“意大利队赢了”让人们想起了意大利队，以及该队为了赢得比赛所作的努力。“法国队输了”会让人们想起法国队，还有法国队为什么会失败，包括法国队的球星齐达内用头撞了意大利队队员。这两句话引起大脑的联想，即系统1如何对此反应，这确实有不同的“含义”。逻辑上相同的陈述引发了不同的反应，这一事实使得人们无法像经济人那样可靠且有理性。"}, {"en": "", "zh": "情感的框架效应很难抵挡"}, {"en": "", "zh": "阿莫斯和我将框架效应运用到了研究构想对信念和偏好的不公平影响中。以下就是我们曾使用的一个例子："}, {"en": "", "zh": "若某赌注有10%的概率赢得95美元，有90%的概率损失5美元，你会接受这个赌注吗？"}, {"en": "", "zh": "若某彩票有10%的概率赢得100美元，有90%的概率什么也得不到，你愿意花5美元买这张彩票吗？"}, {"en": "", "zh": "首次，要花点时间弄明白这两个问题是相同的。在这两个问题中，你都要决定是否愿意接受某一不确定的可能，即拿到95美元或损失5美元。有人作选择会基于理性，他们会给出两个相同的答案，但这样的人是少数。事实上，其中有一个问题引起了很多正面的答复，这个问题是第二个。一个不好的结果如果被架构为不会赢的彩票的成本，比被简单地描述成输掉一个赌注更易被接受。我们对以下这个说法不应该感到惊讶：损失能比成本引起更强烈的负面感觉。选择不是基于现实的，因为系统1就不是基于现实的。"}, {"en": "", "zh": "从理查德·泰勒那儿学到的东西影响了我们构建的问题。泰勒告诉我们当他还是个研究生时，他就在一块木板上钉一张卡片，上面写着：成本就是没有损失。他在早期研究消费行为的文章中讲了一次争辩，那次争辩是关于加油站是否可以向用现金或信用卡付款的人收取不同的价钱。用信用卡支付的人强烈坚持不同的价格是不合法的，但也有可商量的余地：只要价钱上的不同是现金折扣，而不是信用卡附加费。他们的心理信念是合理的：相对于附加费来说，人们更容易放弃折扣。附加费和折扣也许在钱数上来看是相等的，但它们在情感上是不等的。"}, {"en": "", "zh": "在某项实验中，伦敦大学的一组神经科学家将框架效应的研究和大脑不同位置的活动记录相联系。为了得到大脑反应的可靠测量值，实验作了很多次的尝试。例图表明了其中一次尝试的两个阶段。"}, {"en": "", "zh": "第一，要求受试者想象自己收到了一笔钱，在此例子中是50英镑。"}, {"en": "", "zh": "然后要求受试者在肯定的结果和在轮盘赌中作出选择。如果轮盘指针停在了白色区域，她就会“得到”全部的钱；如果指针停在黑色区域，她就什么也得不到了。赌博的预期值当然是确定的结果，在这个例子中就是得到20英镑。"}, {"en": "", "zh": "同样的确定结果可以被构架成两种不同的方式：即得到20英镑或损失30英镑。客观的结果在两个框架下完全相同，而且基于现实的经济人会以相同的方式对这两个结果做出反应（不管框架的限制，只是选择确定的事情或赌一把），但我们已经知道人类大脑不会受限于现实。是接近还是逃避是经由文字引起的，而且当获得是确定的时候，系统1便会偏向于获得；若损失是确定的时候，系统1便又会规避损失。"}, {"en": "", "zh": "实验人员作了很多尝试，而且每位受试者都需要在获得和损失的框架内解决几个选择问题。正如所预期的那样，20位受试者都表现出了框架效应：在获得的框架下，他们更愿意选择确定的事；在损失框架下，他们更愿意选择赌一把。但是，受试者不都是这个样子的。有些人易受到问题框架的影响；而有些人不管框架，但他们作出的选择几乎和基于现实的人作出的选择一样。实验者相应地对20位受试者进行排序，并给这个排序一个惊人的标签：合理指数。"}, {"en": "", "zh": "受试者做每个决策时，大脑活动都被记录了下来。然后，所作的尝试被分为两组："}, {"en": "", "zh": "1.受试者的选择遵从框架的尝试。在获得时，偏向确定的事在损失时，偏向赌一把"}, {"en": "", "zh": "2.受试者的选择不遵从框架的尝试"}, {"en": "", "zh": "惊人的结果让人们看到了神经经济学这一新兴学科的潜质，即研究在人们做决策时的大脑活动。神经经济学学家做了上千种这样的实验，而且他们了解到：大脑特定区域的“活跃”（表明氧气需求量增大，即神经活动加强）取决于任务本身。在个人专心于某一视觉对象、在幻想中踢足球、识别一张脸或思考一所房子时，大脑的不同区域会变得活跃。当个人有某种情感共鸣、情感冲突或注意力集中于解决某个难题时，大脑的其他区域会变得活跃。尽管神经科学家出于谨慎，没有使用“大脑的这种模式会……”这种说法，但他们对于不同大脑区域的“个性”已经很了解了，而且知道大脑活动对心理解释的分析已经大有进展。对框架的研究产生了三个主要的发现：在受试者的选择和框架相一致时，与情绪激发相联系的大脑区域（大脑扁桃体）会很活跃。这正是可引发情绪反应的词，如获得或损失产生趋向于确定事件（当该确定事件被构架成获得时）或避免确定事件（当该确定事件被构架成损失时）的动力时我们所预测的那样。因为情绪刺激词的缘故，大脑扁桃体可被快速访问，这点很可疑，很有可能是因为系统1的参与。在受试者没有顺从自己的意识时（即他们在已知确定的事是损失时，依然选择确定的事），和矛盾以及自我控制相联系的大脑区域（前扣带）会更活跃。拒绝系统1参与其中，显然会产生矛盾。最“理性的”受试者，即那些最不易受框架效应影响的人，大脑额叶区的活动会加强，该区域可将情绪和引导做出决策的理性联系起来。我可以从中明显地看出来，“理性的”个体不会都显示出强有力的神经冲突。似乎这些理性的受试者都是（经常，或不总是）基于现实做出决策的，少有冲突。"}, {"en": "", "zh": "这项研究通过把对真实选择的观察和神经活动的测量联合起来，对文字如何引起情绪反应，并“泄露”出最后的选择作出了很好的说明。"}, {"en": "", "zh": "阿莫斯和他的同事在哈佛医学院做的一项实验是情感框架一个经典的例子。受试者都是医生，实验者给受试者看了两种肺癌治疗结果的数据，分别是手术治疗和放射治疗。手术治疗可保证有5年的存活时间，因此，大家都愿意选择手术，但在短期内，手术要比放射治疗的风险更大。一半的受试者读到了关于存活率的数据，其他人收到了关于死亡率的相关信息。对手术短期结果的两种描述是："}, {"en": "", "zh": "第一个月的存活率是90%。"}, {"en": "", "zh": "在第一个月里，有10%的死亡率。"}, {"en": "", "zh": "你已经知道了结果：在第一个框架下（84%的医生选择了它），手术治疗要比在第二个框架下（50%的受试者选择放射治疗）更受欢迎。两种描述的逻辑等价很明显，而且基于现实的决策制定者会作出同样的选择，不管她看到的是哪种描述。不过，我们都知道，系统1对于引起情绪的文字很敏感，在第二个描述中，死亡率就是会引起负面情绪的词，而存活率是引发正面情绪的词；90%的存活率听上去让人心安，而10%的死亡率却让人感到恐惧。这项研究的一个重要发现是医生和对医学涉猎不深的人（比如病患和商学院的研究生）一样，也容易受到框架效应的影响。显然，医学培训也阻挡不了框架效应的出现。"}, {"en": "", "zh": "“获得，损失”研究和“存活率，死亡率”的研究没有什么本质的不同。脑部造影研究中的受试者作的很多尝试时也碰到了不同的框架。他们能够认识到框架有分散注意力的作用，而且可通过采用一个共同的框架，或将“损失”转换成等量的“所得”，可使问题变得简单些。聪明的人（和机警的系统2）也需要学一学，而且有专长的几位受试者也会出现在实验者发现的“理性的”人中。相反，在存活率框架下读到关于两种治疗数据的医生没理由怀疑自己若在死亡率框架下读到相同的数据会作出不同的选择。重新构架是要付出努力的，而且系统2通常很懒惰。除非有明显的理由需要这样做外，否则，大多数人都会被动地接受在框架下的决策问题，因此很少有机会发现我们的偏好受框架约束而不是现实约束的程度。"}, {"en": "", "zh": "用框架性政策助推人们作出更好的选择"}, {"en": "", "zh": "阿莫斯和我通过一个例子来引入我们对框架问题的讨论，这个例子被认为是“亚洲病害问题”。"}, {"en": "", "zh": "假设美国正为一场来自亚洲的异常疾病作准备，这场疾病估计会夺取600人的性命。为战胜这一疾病，我们提出了两种方案。假设对方案结果准确的科学估测如下："}, {"en": "", "zh": "如果采用了方案A，200人会获救。"}, {"en": "", "zh": "如果采用了方案B，有三分之一的可能会救600人，有三分之二的可能一个人也救不了。"}, {"en": "", "zh": "很多受试者都会选择方案A：他们更愿意选择确定的选项，而不想赌一把。"}, {"en": "", "zh": "方案的结果在第二种说法中有了不同的框架，如："}, {"en": "", "zh": "如果采用了方案A，400人会死。"}, {"en": "", "zh": "如果采用了方案B，有三分之一的可能没人会死，而有三分之二的可能有600人都会死。"}, {"en": "", "zh": "请仔细看并对比两种说法：方案A和A的结果是相同的，方案B和B的结果也是相同的。然而在第二个框架下，很多人都选择赌一把。"}, {"en": "", "zh": "两种框架下不同的选择都符合前景理论。在前景理论中，根据结果的好坏，我们对打赌还是确定的事的选择也会不同。当结果是正面的时候，决策制定者更愿意选择确定的事（他们是风险规避者）；当结果都是负面的时候，他们更愿意拒绝确定的事，愿意赌一把（他们会冒险）。这些结论在钱的问题上是选择赌还是确定的事时很适用。疾病问题显示出，当结果关乎生命时，同样的原则也适用。在这个情况下，框架实验显示：对风险规避或冒险的偏向都不是基于现实的。在同样客观的结果中，做出的偏向会随着不同的制定情况而反转。"}, {"en": "", "zh": "阿莫斯曾跟我说过他的某次体验，这次体验使得我们的故事更值得关注。阿莫斯受邀为一组公共卫生专家作演讲，这些专家要对疫苗和其他项目做出决策。他利用这个机会让这些医生们关注“亚洲病害问题”：一半的人看的是“拯救生命”的那个说法，而其他人回答的是关于“失去生命”的说法。如一般人一样，这些专家也易受到框架效应的影响。制定关于健康决策的专家也会被表面现象所左右，这的确让人焦虑，但我们必须适应重要的决策也受系统1影响（而不是掌控）的事实。"}, {"en": "", "zh": "更让人苦恼的是，人们在面对自身不一致时所发生的事情：“你在一种指定情况下选择肯定能拯救200条性命的选项；在另一种情况下，选择赌一把而不是接受丢失400条性命的事实。现在，你知道这些选择是不一致的，你要怎么抉择呢？”回答常是让人窘迫的沉默。作出原始选择的直觉来自系统1，而且并没有比偏爱获得20英镑而规避损失30英镑存在更多的道德偏见。确定能拯救的性命当然是好事，死亡是大家都不愿看到的。大多数人都发现他们的系统2在回答这些问题时没有道德直觉。"}, {"en": "", "zh": "我对伟大的经济学家托马斯·谢林心存感激，他为框架效应提供了一个很好的例子，他在《选择与结果》（Choice and Consequence）一书中描述了这个例子。在我们开始对框架进行研究前，谢林的书就已出版了，框架效应并不是他主要讨论的问题。他提到了在哈佛大学肯尼迪学院授课的经验，他授课的内容是税法中儿童的免征额问题。谢林告诉他的学生们说，每个孩子都应有标准的免征额，而且免征总额和纳税人的收入是不相关的。他问学生们对下面这个问题有何看法："}, {"en": "", "zh": "富人的生育免税额是不是应该比穷人的更高？"}, {"en": "", "zh": "你的直觉会和谢林的学生们的直觉很相似，即认为给富人更大的免税额是不可接受的。谢林之后指出，税法的制定是恣意的。现有税法认定没有孩子的家庭是默认情况，每多生一个孩子，就多享有一些免税额。当然，税法也可以将另一种情况视为默认值，比如设定一个有两个孩子的家庭为默认情况。在这种情况下，有比默认情况中的孩子数量少的家庭就要额外缴纳免税额了。谢林又问他的学生们对于另一情况的看法："}, {"en": "", "zh": "没有孩子的贫穷家庭是否要和没有孩子的富人家庭缴纳同样多的附加费？"}, {"en": "", "zh": "对此问题，你可能还会有和谢林的学生同样的反应，即和对第一个问题的反应一样，持强烈否定态度。但谢林告诉他的学生们，从逻辑上讲，他们不应该对这两个问题都持否定态度。纵观这两种情况，对于第一个问题来说，与没有孩子的家庭相比，有两个孩子的家庭相当于是在减税。但对于第二个问题来说，与没有孩子相比，有两个孩子相当于是在增税。如果在第一个问题中，你想要穷人因为多生孩子而享受到与富人多生孩子相同（或更大）的好处，那你就也该认为，穷人必须因为没有孩子而付出至少与没有孩子的富人相同的金钱。"}, {"en": "", "zh": "我们能看到，系统1在其中发挥了作用。它能对贫富问题产生快速的反应：在怀疑时，你会倾向于穷人。谢林的问题中令人意外的一点是，道德原则在其中没有发挥作用。对于同样的问题，受问题框架影响，道德原则往往会生成相互矛盾的回答。当然，你已经知道下一个问题会是什么了。你已经了解到你对问题的反应受到框架的影响，那么对于这个问题：应如何公平处理贫富两种家庭中儿童的免税问题？"}, {"en": "", "zh": "现在，你一定已经瞠目结舌了。对于穷人和富人间的不同，你有道德直觉，但这些直觉依赖于任意的参照点，而且它们并不是真正的问题所在。关于《‘文》世界上真实《‘人》情况的问题是《‘书》每个家庭应该《‘屋》缴纳多少税，以及如何填写免税代码。你没有能指导你解决这些问题的强有力的道德直觉。你的道德感觉与框架相联系，与对实际情况的描述相联系，而不是实际情况本身。关于框架本质的描述是很刻板的：框架不应该被看成是种掩饰或曲解了潜在偏向的干预。至少在这个例子中（以及亚洲病害问题和是手术治疗肺癌还是辐射治疗的问题中），没有被框架掩饰或曲解的潜在偏向。我们的偏向是关于被架构的问题，且我们的道德直觉是关于描述的，而不是关于其实质的。不是所有的框架都是平等的，而且有些框架显然比其他对相同问题的描述（或思考）的方式要好。请看下面这组问题："}, {"en": "", "zh": "一位女士买了两张价格为80美元的电影票。当她到了电影院时，打开钱包却发现票不见了。她会再买两张票吗？"}, {"en": "", "zh": "一位女士到了电影院，本想要买两张80美元的票，但排到时，她打开钱包却发现用来买票的160美元不见了。她可以用信用卡买票，但你觉得她会买吗？"}, {"en": "", "zh": "基于框架效应，看到此问题不同版本的受试者会得出不同的结论。大多数人都会认为：第一个故事中的那位女士如果丢了票会回家，不看电影了。而且大多数人相信，如果她丢了钱，她就会赊购票看电影。"}, {"en": "", "zh": "其中的解释大家应该已经很熟悉了，这个问题涵盖了心理账户和沉没成本悖论。不同的框架会触发不同的心理账户，且损失的严重性如何要看其指向的账户。若看某场表演的票丢了，人们很自然地会将损失指向“表演”这个账户。损失显然已经翻倍了，且远超过其应有的价值。相反，丢掉的钱会被记在“一般收入”的账户上：她会想电影院的常客比自己更穷，而且她会自问，自己可支配财富的减少是否会改变自己买票的决定。多数受试者都认为不会。"}, {"en": "", "zh": "对丢钱的规避可得到更合理的决策，产生更好的框架，因为损失已经（即使票丢了）“沉没”了，且沉没成本应该被忽略。已发生的事是不相关的，唯一要紧的事是电影院常客现有的选择及其可能的结果。无论她损失什么，相关事实是她在打开钱包前损失了些钱。如果丢票的人要问我的意见的话，我会说：“如果你丢了同等价值的钱，你还会再买票吗？如果会，就请再去买票吧。”广泛的框架和包括情况多的账户往往会导致更理性的决策。"}, {"en": "", "zh": "在下面这个例子中，两种框架引起了不同的数学直觉，其中一个比另一个更好。在2008年《科学》杂志中《每加仑汽油所跑英里数的错觉》的文章中，心理学家理查德·拉里克（Richard Larrick）和杰克·索尔（Jack Soll）确定一个案例，其中被动地接受错误的框架会产生高昂的成本和严重的政策后果。很多买车的人都列出了每辆车每英里所需的汽油量，并将其看成是影响他们决策的一个因素。他们知道高里程车的成本都较低。但美国常用的框架，即每加仑汽油能跑的英里数，却将个人和政策制定者引向了一个糟糕的方向。请看下面这两位想要降低其成本的车主："}, {"en": "", "zh": "亚当原来的车耗油，每加仑汽油能跑12英里，现在他换了一辆更省油的车，每加仑汽油能跑14英里。"}, {"en": "", "zh": "贝斯爱护环境，她把原来每加仑汽油跑30英里的车换成了每加仑汽油跑40英里的车。"}, {"en": "", "zh": "假设这两位司机一年中的行程是相同的。换了车之后，谁的车更省油？你的直觉可能会和大多数人一样，几乎会肯定地认为贝斯比亚当更省油：她每加仑汽油多跑10英里，而不是2英里，也就是说她省了三分之一（从30英里提升到40英里）而不是六分之一（从12英里提升到14英里）。现在，请启动你的系统2算一算。如果两位车主都行驶了10000英里，亚当就是从833加仑减至714加仑，共省了119加仑。贝斯的耗油量就会从333加仑降到250加仑，只省了83加仑。每加仑汽油行驶的英里数的框架是错误的，应该被每英里耗油量框架（或每100英里耗油量框架，这在其他国家应用得较广泛）来代替。正如拉里克和索尔提出的，由每加仑行驶路程引起的错误直觉很容易误导政策制定者和买车的人。"}, {"en": "", "zh": "卡斯·桑斯坦在奥巴马政府中任信息与规制事务办公室主任。和理查德·泰勒一起合著了《助推》一书，该书是将行为经济学应用到政策中的基本手册。恰巧，从2013年开始，每辆新车上都会贴上“节约燃料和环保”的标志，而且此标志还包含每英里耗油量，这在美国尚属首次。不过，正确的构想框架都是用小字体排印的，而我们所熟悉的每加仑耗油量的信息却用大字体排印，但无论如何，大致的方向还是正确的。在《每加仑汽油所跑英里数的错觉》的发表和实施部分正确改革的5年内，也许是将心理科学应用于公共政策的重要时期。"}, {"en": "", "zh": "在很多国家，意外死亡后是否愿意捐献器官会在此人的驾照上标注。这则标注的构想又是另一回事了，在此，一种框架要比另一种框架更优越。很少有人会质疑是否愿意捐献器官的决定是不重要的，但有证据显示，大多数人会草率地作出决定。这个证据来自欧洲各个国家器官捐献率的对比（此对比显示出临近的且文化相似的国家有着惊人的不同）。2003年发表的一篇文章中表示，器官捐献率在奥地利接近100%，在德国有12%，在瑞典有86%，而在丹麦只有4%。"}, {"en": "", "zh": "这些巨大的不同就是种框架效应，是由这个关键问题的模式引发的。高捐献率的国家要填决定不捐献的表格，不想捐献的人一定要填上某一项，如果他们不这么做了，则被认为是自愿的捐献者。低捐献率的国家要填决定捐献的表格，你必须填上某一项，才能成为捐献者。这就足够了。预言人们是否会捐献自己器官的最好且唯一的标志是默认选项的设计，这个设计不用勾选某项内容就可被采用。"}, {"en": "", "zh": "器官捐献效应与系统1控制下的框架效应不同，它可用系统2的懒惰给出很好的解释。若人们已经决定自己想干什么，会勾选这一项；如果他们还没有想好，则要想想是否要勾选这一项。我认为，人们要填的这张是否愿意捐献的表格与他们的决定相对应。我将器官移植表想象成要求人们解决算术问题：2加2等于？另一项中又有另一个问题：13乘以37等于？捐献率当然会受到这些数字的影响。"}, {"en": "", "zh": "当构想的作用得到认可后，一个政策问题产生了：应该采用哪种构想呢？在这个问题中，回答很明显。如果你相信大量捐献器官对于这个社会有好处，你就不会在有100%捐献率的情形和有4%的司机的捐献率的情形间保持中立立场。"}, {"en": "", "zh": "从这些例子中我们能反复看到，某个重要的决定是受该情况下完全无关紧要的特征的控制的。这似乎令人困窘，这不是我们想要的作出重要决定的办法。而且，这也不是我们想要体验到的大脑的工作方式，但这些认知错觉的实例确实是不容诋毁的。"}, {"en": "", "zh": "讨论的事项有理由与理性代理理论相抗衡。一个名副其实的理论可确定某些事件是不可能的，如果理论是正确的，某些事件就不会发生。当观察到“不可能”事件发生时，该理论就是被伪造的。有确切证据证明理论是虚假时，理论也还会存在很长时间，理性代理理论模式当然也能经受住我们看到的和许多其他证据的检验。"}, {"en": "", "zh": "器官捐献的例子表明了人类理性对现实世界有很大的影响。理性代理模式的信从者和怀疑者之间的一个重要不同是信从者只会理所当然地认为关于选择的构想不能决定对重要问题的偏向。即使在探讨这个重要问题时，他们也不会感到有兴趣，因此我们的决策常会有不好的结果。"}, {"en": "", "zh": "对此，对理性持怀疑态度的人不会感到惊讶。他们对无关紧要的因素会成为偏向的决定因素比较敏感，我希望读到本书的人能有这种敏感。"}, {"en": "", "zh": "示例：框架和现实\n“如果他们能对自己会得到多少钱而不是会损失多少钱有个框架的话，就会对将要发生的事有心理准备。”\n“通过改变参照点来重新架构问题吧，假想我们没有拥有过某个东西，我们会认为它值多少钱呢？”\n“对于损失，要在大脑中将其引入‘一般收入’，这样你就会感觉好一点！”\n“他们要你在他们的邮件列表中勾选以表明不加入他们。如果他们要你在他们的邮件列表中勾选表明参与的话，他们的邮件列表就会很短。”"}, {"en": "", "zh": "第五部分 两个自我"},
