● 有未导出的改动」的红点，就是在提醒你：该导出了。\u003c/li>\n\u003c/ol>\n\n\u003ch2>四、分享到 GitHub\u003c/h2>\n\u003col>\n\u003cli>先按上面第三步导出 index.html；\u003c/li>\n\u003cli>登录 GitHub → 新建一个仓库（Public）→ 把 index.html 上传进去；\u003c/li>\n\u003cli>进入仓库的 Settings → 左侧 Pages → Branch 选 main → Save；\u003c/li>\n\u003cli>等一两分钟，页面上会出现一个网址，把它发给别人即可在线阅读；\u003c/li>\n\u003cli>以后每次更新内容：重新导出 → 到仓库里上传覆盖同名的 index.html。\u003c/li>\n\u003c/ol>", "b": ""}}]</script>

<script>
/* ===================== 双语阅读图书馆 v2 ===================== */
/* 新增：封面页 / 图文文章(Markdown·HTML片段) / 完整HTML文档 / 对开分屏续读 / 编辑 / 未保存提醒 */

/* ---- 持久化键 ---- */
var LS = {
  theme:'bilib_theme', layout:'bilib_layout', fs:'bilib_fs',
  fav:'bilib_fav', prog:'bilib_prog', rfont:'bilib_rfont',
  rmode:'bilib_rmode', dmode:'bilib_dmode', link:'bilib_link',
  lib:'bilib_lib', cfg:'bilib_cfg'
};

/* ---- 封面配置：色块为程序绘制的覆盖层，可换图、调色块 ---- */
var DEFAULT_CFG = {iw:945, ih:2048,
  hot:{x:0.3520, y:0.3946, w:0.2854, h:0.2142, color:'#fa4500', alpha:1}};
var _cfg=null, _coverImg='', _editing=false;

/* ---- 全局状态 ---- */
var _lib=[], _fav={}, _prog={};
var _theme='light', _layout='split', _rfont='serif', _fs=18;
var _rmode='single';       // 图文文章视图: single|lang|spread|b
var _dmode='single';       // HTML文档视图: single|spread
var _linked=true;          // 对开分屏是否续读联动
var _cur=null, _q='', _favOnly=false;
var _saveTimer=null, _dirty=false, _editId=null, _tab='bi';
var _byCode=false;         // 联动滚动防回环

/* ---- 启动 ---- */
function init(){
  _lib   = readLib();
  readCfg();
  _theme = localStorage.getItem(LS.theme) || 'light';
  _layout= localStorage.getItem(LS.layout)|| 'split';
  _rmode = localStorage.getItem(LS.rmode) || 'single';
  _dmode = localStorage.getItem(LS.dmode) || 'single';
  _linked= localStorage.getItem(LS.link)!=='0';
  _rfont = localStorage.getItem(LS.rfont) || 'serif';
  _fs    = parseInt(localStorage.getItem(LS.fs)) || 18;
  _fav   = getJson(LS.fav, {});
  _prog  = getJson(LS.prog, {});
  applyTheme(); applyRfont();
  document.documentElement.style.setProperty('--fs', _fs+'px');
  renderCover();
  window.addEventListener('beforeunload', function(e){
    if(_dirty){ e.preventDefault(); e.returnValue='还有未导出的改动'; }
  });
}

function readLib(){
  var arr=[], el=byId('__LIB__');
  try{ arr = JSON.parse(el.textContent) || []; }catch(e){ arr=[]; }
  var fileT = parseInt(el.getAttribute('data-t')||'0') || 0;
  var local = getJson(LS.lib, null);
  if(local && local.t > fileT && Array.isArray(local.lib)){
    arr = local.lib;
    _dirty = true;
    setTimeout(function(){
      toast('\u5DF2\u6062\u590D\u4E0A\u6B21\u672A\u5BFC\u51FA\u7684\u6539\u52A8\uFF08\u5171 '+arr.length+' \u7BC7\uFF09\uFF0C\u8BB0\u5F97\u300C\u5BFC\u51FA\u300D\u4FDD\u5B58\u6587\u4EF6');
    }, 900);
  }
  arr.forEach(function(a){ if(!a.kind) a.kind='bi'; });
  return arr;
}
/* 自动缓存：每次增删改立即写入浏览器本地存储，重开自动恢复 */
function persistLib(){
  try{ localStorage.setItem(LS.lib, JSON.stringify({t:Date.now(), lib:_lib})); }
  catch(e){ toast('\u672C\u5730\u7F13\u5B58\u5DF2\u6EE1\uFF0C\u8BF7\u5C3D\u5FEB\u300C\u5BFC\u51FA index.html\u300D\u4FDD\u5B58\u6587\u4EF6'); }
}
function getJson(k,d){ try{ return JSON.parse(localStorage.getItem(k)) || d; }catch(e){ return d; } }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function byId(id){ return document.getElementById(id); }

/* ---- 主题 / 偏好 ---- */
function applyTheme(){ document.documentElement.setAttribute('data-theme', _theme); }
function toggleTheme(){ _theme=_theme==='dark'?'light':'dark'; localStorage.setItem(LS.theme,_theme); applyTheme(); refreshBarIcons(); }
function refreshBarIcons(){ var b=byId('themeBtn'); if(b) b.textContent=(_theme==='dark'?'\u2600\uFE0F':'\uD83C\uDF19'); }
function applyRfont(){ document.body.setAttribute('data-rfont', _rfont); }
function toggleRfont(){ _rfont=_rfont==='serif'?'sans':'serif'; localStorage.setItem(LS.rfont,_rfont); applyRfont();
  var b=byId('rfontBtn'); if(b) b.textContent=(_rfont==='serif'?'\u5B8B':'\u9ED1'); }
function changeFont(d){
  _fs=Math.max(13,Math.min(30,_fs+d)); localStorage.setItem(LS.fs,_fs);
  document.documentElement.style.setProperty('--fs',_fs+'px');
  var l=byId('fsLab'); if(l) l.textContent=_fs+'px';
  applyDocZoom();
}
function applyDocZoom(){
  var z=(_fs/18);
  ['docF','docFA','docFB'].forEach(function(id){
    var f=byId(id);
    try{ if(f && f.contentDocument && f.contentDocument.body) f.contentDocument.body.style.zoom=z; }catch(e){}
  });
}

/* ---- 封面配置读写（与文章相同的缓存恢复机制） ---- */
function readCfg(){
  var el=byId('__CFG__');
  var fileT = el ? (parseInt(el.getAttribute('data-t')||'0')||0) : 0;
  try{ _cfg = JSON.parse(el.textContent); }catch(e){ _cfg=null; }
  if(!_cfg || !_cfg.hot) _cfg = JSON.parse(JSON.stringify(DEFAULT_CFG));
  _coverImg = byId('__COVER__') ? byId('__COVER__').textContent.trim() : '';
  var local = getJson(LS.cfg, null);
  if(local && local.t > fileT && local.cfg){
    _cfg = local.cfg;
    if(local.img) _coverImg = local.img;
    _dirty = true;
  }
}
function persistCfg(imgChanged){
  _dirty=true;
  try{
    var pack={t:Date.now(), cfg:_cfg};
    var prev=getJson(LS.cfg,null);
    if(imgChanged) pack.img=_coverImg;
    else if(prev && prev.img) pack.img=prev.img;
    localStorage.setItem(LS.cfg, JSON.stringify(pack));
  }catch(e){ toast('\u672C\u5730\u7F13\u5B58\u5DF2\u6EE1\uFF0C\u8BF7\u5C3D\u5FEB\u300C\u5BFC\u51FA index.html\u300D\u4FDD\u5B58'); }
}
function writeCfgToDom(){
  var el=byId('__CFG__'); if(el) el.textContent=JSON.stringify(_cfg);
  var cv=byId('__COVER__'); if(cv) cv.textContent=_coverImg;
}

/* ================= 封面 ================= */
function renderCover(){
  _cur=null; window.onscroll=null; _editing=false;
  document.body.classList.remove('reading');
  byId('app').innerHTML =
    '<div class="cover" id="cover">'+
      (_coverImg?'<img id="coverImg" alt="" src="'+_coverImg+'">':'')+
      '<div class="hot" id="coverHot" role="button" tabindex="0" aria-label="进入图书馆" onclick="enterLib()"></div>'+
      '<div class="carrow" id="coverArrow" onclick="enterLib()"><i></i></div>'+
      '<button class="cgear" title="\u5C01\u9762\u8BBE\u7F6E" onclick="toggleCoverPanel()">\u2699</button>'+
      '<div class="coverpanel hidden" id="coverPanel"></div>'+
    '</div>';
  var hot=byId('coverHot');
  hot.addEventListener('keydown',function(e){ if(e.key==='Enter'||e.key===' ') enterLib(); });
  bindHotDrag(hot);
  positionHot();
  window.addEventListener('resize', positionHot);
  setTimeout(function(){ var h=byId('coverArrow'); if(h) h.classList.add('show'); }, 1600);
}
function positionHot(){
  var hot=byId('coverHot'); if(!hot) return;
  var W=window.innerWidth, H=window.innerHeight;
  var iw=_cfg.iw, ih=_cfg.ih, h=_cfg.hot;
  var s=Math.max(W/iw, H/ih);
  var ox=(W-iw*s)/2, oy=(H-ih*s)/2;
  hot.style.left  =(ox+h.x*iw*s)+'px';
  hot.style.top   =(oy+h.y*ih*s)+'px';
  hot.style.width =(h.w*iw*s)+'px';
  hot.style.height=(h.h*ih*s)+'px';
  hot.style.background=h.color;
  hot.style.opacity=h.alpha;
  var ar=byId('coverArrow');
  if(ar){
    ar.style.left=(ox+(h.x+h.w/2)*iw*s - 14)+'px';
    ar.style.top =(oy+(h.y+h.h)*ih*s + 22)+'px';
  }
}
/* 编辑模式下可直接拖动色块调整位置，箭头实时跟随 */
function bindHotDrag(hot){
  var sx,sy,ox,oy,drag=false;
  hot.addEventListener('pointerdown',function(e){
    if(!_editing) return;
    drag=true; sx=e.clientX; sy=e.clientY; ox=_cfg.hot.x; oy=_cfg.hot.y;
    hot.setPointerCapture(e.pointerId); e.preventDefault();
  });
  hot.addEventListener('pointermove',function(e){
    if(!drag) return;
    var W=window.innerWidth, H=window.innerHeight;
    var sc=Math.max(W/_cfg.iw, H/_cfg.ih);
    _cfg.hot.x=Math.min(1-_cfg.hot.w, Math.max(0, ox+(e.clientX-sx)/(_cfg.iw*sc)));
    _cfg.hot.y=Math.min(1-_cfg.hot.h, Math.max(0, oy+(e.clientY-sy)/(_cfg.ih*sc)));
    positionHot();
  });
  hot.addEventListener('pointerup',function(){ if(drag){ drag=false; persistCfg(false); syncPanel(); } });
}
/* ---- 封面设置面板 ---- */
function toggleCoverPanel(){
  var p=byId('coverPanel');
  _editing = p.classList.contains('hidden');
  if(_editing){ buildCoverPanel(); p.classList.remove('hidden'); }
  else p.classList.add('hidden');
  var hot=byId('coverHot');
  if(hot) hot.classList.toggle('editing', _editing);
}
function buildCoverPanel(){
  var h=_cfg.hot;
  byId('coverPanel').innerHTML=
    '<div class="cprow cphead"><b>\u5C01\u9762\u8BBE\u7F6E</b><span class="cphint">\u53EF\u76F4\u63A5\u62D6\u52A8\u8272\u5757\u6362\u4F4D\u7F6E\uFF0C\u7BAD\u5934\u81EA\u52A8\u8DDF\u968F</span></div>'+
    '<div class="cprow"><button class="btn ghost sm" onclick="byId(\'coverPick\').click()">\uD83C\uDF04 \u66F4\u6362\u5C01\u9762\u56FE</button>'+
      '<input type="file" id="coverPick" accept="image/*" style="display:none" onchange="onCoverFile(this)">'+
      '<button class="btn ghost sm" onclick="resetHot()">\u21BA \u6062\u590D\u9ED8\u8BA4\u8272\u5757</button></div>'+
    '<div class="cprow"><label>\u989C\u8272</label><input type="color" id="cpColor" value="'+h.color+'" oninput="cfgSet(\'color\',this.value)">'+
      '<label style="margin-left:14px">\u900F\u660E\u5EA6</label><input type="range" id="cpAlpha" min="10" max="100" value="'+Math.round(h.alpha*100)+'" oninput="cfgSet(\'alpha\',this.value/100)"><span class="cpval" id="vAlpha">'+Math.round(h.alpha*100)+'%</span></div>'+
    '<div class="cprow"><label>\u5BBD\u5EA6</label><input type="range" id="cpW" min="5" max="90" value="'+Math.round(h.w*100)+'" oninput="cfgSet(\'w\',this.value/100)"><span class="cpval" id="vW">'+Math.round(h.w*100)+'%</span></div>'+
    '<div class="cprow"><label>\u9AD8\u5EA6</label><input type="range" id="cpH" min="5" max="90" value="'+Math.round(h.h*100)+'" oninput="cfgSet(\'h\',this.value/100)"><span class="cpval" id="vH">'+Math.round(h.h*100)+'%</span></div>'+
    '<div class="cprow"><label>\u6A2A\u5411</label><input type="range" id="cpX" min="0" max="100" value="'+Math.round(h.x/(1-h.w||1)*100)+'" oninput="cfgSet(\'x\',this.value/100)"><span class="cpval" id="vX"></span>'+
      '<label style="margin-left:14px">\u7EB5\u5411</label><input type="range" id="cpY" min="0" max="100" value="'+Math.round(h.y/(1-h.h||1)*100)+'" oninput="cfgSet(\'y\',this.value/100)"><span class="cpval" id="vY"></span></div>'+
    '<div class="cprow"><div class="spacer"></div><button class="btn sm" onclick="toggleCoverPanel()">\u5B8C\u6210</button></div>';
}
function cfgSet(k,v){
  var h=_cfg.hot;
  if(k==='color') h.color=v;
  else if(k==='alpha'){ h.alpha=v; var e=byId('vAlpha'); if(e) e.textContent=Math.round(v*100)+'%'; }
  else if(k==='w'){ var cx=h.x+h.w/2; h.w=v; h.x=Math.min(1-h.w,Math.max(0,cx-h.w/2)); var e2=byId('vW'); if(e2) e2.textContent=Math.round(v*100)+'%'; }
  else if(k==='h'){ var cy=h.y+h.h/2; h.h=v; h.y=Math.min(1-h.h,Math.max(0,cy-h.h/2)); var e3=byId('vH'); if(e3) e3.textContent=Math.round(v*100)+'%'; }
  else if(k==='x') h.x=v*(1-h.w);
  else if(k==='y') h.y=v*(1-h.h);
  positionHot(); persistCfg(false);
}
function syncPanel(){
  if(!_editing) return;
  var h=_cfg.hot;
  var x=byId('cpX'), y=byId('cpY');
  if(x) x.value=Math.round(h.x/((1-h.w)||1)*100);
  if(y) y.value=Math.round(h.y/((1-h.h)||1)*100);
}
function resetHot(){
  _cfg.hot=JSON.parse(JSON.stringify(DEFAULT_CFG.hot));
  positionHot(); persistCfg(false); buildCoverPanel();
  toast('\u8272\u5757\u5DF2\u6062\u590D\u9ED8\u8BA4');
}
function onCoverFile(input){
  var file=input.files && input.files[0];
  input.value='';
  if(!file) return;
  var img=new Image(), url=URL.createObjectURL(file);
  img.onload=function(){
    URL.revokeObjectURL(url);
    var MAXL=1800, w=img.naturalWidth, hh=img.naturalHeight;
    var sc=Math.min(1, MAXL/Math.max(w,hh));
    var cv=document.createElement('canvas');
    cv.width=Math.round(w*sc); cv.height=Math.round(hh*sc);
    cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
    var uri=cv.toDataURL('image/webp',0.82);
    if(uri.indexOf('data:image/webp')!==0) uri=cv.toDataURL('image/jpeg',0.8);
    _coverImg=uri;
    _cfg.iw=cv.width; _cfg.ih=cv.height;
    var ci=byId('coverImg');
    if(ci) ci.src=uri;
    else{ var c=byId('cover'); var im=document.createElement('img'); im.id='coverImg'; im.alt=''; im.src=uri; c.insertBefore(im,c.firstChild); }
    positionHot(); persistCfg(true);
    toast('\u5C01\u9762\u5DF2\u66F4\u6362\uFF08'+fmtKB(Math.round(uri.length*0.75))+'\uFF09\uFF0C\u8BB0\u5F97\u300C\u5BFC\u51FA\u300D\u4FDD\u5B58');
  };
  img.onerror=function(){ URL.revokeObjectURL(url); toast('\u56FE\u7247\u8BFB\u53D6\u5931\u8D25'); };
  img.src=url;
}

function enterLib(){
  if(_editing) return;
  var c=byId('cover');
  window.removeEventListener('resize', positionHot);
  if(c){ c.classList.add('out'); setTimeout(renderHome, 420); }
  else renderHome();
}

/* ================= 首页 ================= */
function goHome(){ _cur=null; window.onscroll=null; window.scrollTo(0,0); renderHome(); }

function helpArt(){ return _lib.filter(function(a){ return a.help; })[0]; }
function openHelp(){ var h=helpArt(); if(h) openArticle(h.id); else { openImport(); toggleHelp(); } }
function filterList(){
  var q=_q.trim().toLowerCase();
  return _lib.filter(function(a){
    if(a.help) return false;
    if(_favOnly && !_fav[a.id]) return false;
    if(!q) return true;
    var t=((a.title.en||'')+' '+(a.title.zh||'')+' '+((a.meta&&a.meta.tags||[]).join(' '))).toLowerCase();
    return t.indexOf(q)>=0;
  });
}
function listHtml(){
  var list=filterList(), q=_q.trim();
  return list.length ? '<div class="grid">'+list.map(cardHtml).join('')+'</div>'
    : '<div class="empty"><h2>'+(_favOnly?'\u8FD8\u6CA1\u6709\u6536\u85CF':(q?'\u6CA1\u6709\u5339\u914D\u7684\u6587\u7AE0':'\u56FE\u4E66\u9986\u662F\u7A7A\u7684'))+'</h2><p>\u70B9\u51FB\u53F3\u4E0A\u89D2\u201C\u5BFC\u5165\u201D\u6DFB\u52A0\u53CC\u8BED\u3001\u56FE\u6587\u6216 HTML \u6587\u7AE0\u3002</p></div>';
}
function renderHome(){
  document.body.classList.remove('reading');
  document.getElementById('app').innerHTML =
    '<div class="bar">'+
      '<div class="apptitle" onclick="renderCover()" title="\u56DE\u5230\u5C01\u9762">\u9605\u8BFB</div>'+
      '<div class="search"><span>\uD83D\uDD0D</span><input id="q" placeholder="\u641C\u7D22" value="'+esc(_q)+'" oninput="onSearch(this.value)"></div>'+
      '<button class="barlink" onclick="openHelp()">\u8BF4\u660E</button>'+
      '<button class="iconbtn" id="themeBtn" title="\u5207\u6362\u4E3B\u9898" onclick="toggleTheme()">'+(_theme==='dark'?'\u2600\uFE0F':'\uD83C\uDF19')+'</button>'+
      '<button class="btn imbtn" onclick="openImport()">\uFF0B<span class="btxt"> \u5BFC\u5165</span></button>'+
    '</div>'+
    '<div class="wrap">'+
      '<div class="filters">'+
        '<button class="chip '+(!_favOnly?'on':'')+'" onclick="setFavOnly(false)">\u5168\u90E8 ('+_lib.filter(function(a){return !a.help;}).length+')</button>'+
        '<button class="chip '+(_favOnly?'on':'')+'" onclick="setFavOnly(true)">\u2605 \u6536\u85CF</button>'+
        (_dirty?'<span class="dirtynote">\u25CF \u6709\u672A\u5BFC\u51FA\u7684\u6539\u52A8</span>':'')+
      '</div>'+ listHtml() +
    '</div>';
}
function firstImgSrc(html){
  var i=String(html||'').indexOf('<img');
  if(i<0) return '';
  var j=html.indexOf('src="', i); if(j<0) return '';
  var k=html.indexOf('"', j+5); if(k<0) return '';
  return html.slice(j+5, k);
}
function kindInfo(a){
  if(a.kind==='rich') return {badge:'\u56FE\u6587', meta:'\u7EA6 '+Math.round(String(a.body&&a.body.a||'').replace(/<[^>]*>/g,'').length)+' \u5B57'};
  if(a.kind==='doc')  return {badge:'HTML \u6587\u6863', meta:'\u72EC\u7ACB\u6392\u7248'};
  return {badge:'\u53CC\u8BED', meta:(a.segs?a.segs.length:0)+' \u6BB5'};
}
function cardHtml(a){
  var p=progRatio(a.id), ki=kindInfo(a);
  var tags=((a.meta&&a.meta.tags)||[]).map(function(t){return '<span class="tag">'+esc(t)+'</span>';}).join('');
  var date=(a.meta&&a.meta.date)||'';
  var thumb='';
  if(a.kind==='rich'){ var s=firstImgSrc(a.body&&a.body.a); if(s) thumb='<div class="thumb"><img alt="" src="'+esc(s)+'"></div>'; }
  return '<div class="card" onclick="openArticle(\''+a.id+'\')">'+ thumb +
      '<button class="star '+(_fav[a.id]?'on':'')+'" title="\u6536\u85CF" onclick="event.stopPropagation();toggleFav(\''+a.id+'\')">'+(_fav[a.id]?'\u2605':'\u2606')+'</button>'+
      '<button class="del" title="\u5220\u9664" onclick="event.stopPropagation();deleteArticle(\''+a.id+'\')">\uD83D\uDDD1</button>'+
      '<button class="edit" title="\u7F16\u8F91" onclick="event.stopPropagation();openEdit(\''+a.id+'\')">\u270E</button>'+
      '<div class="ttl-en">'+esc(a.title.en||a.title.zh||'\u672A\u547D\u540D')+'</div>'+
      (a.title.zh&&a.title.en?'<div class="ttl-zh">'+esc(a.title.zh)+'</div>':'')+
      '<div class="meta"><span class="kbadge">'+ki.badge+'</span><span>'+ki.meta+'</span>'+(date?'<span>'+esc(date)+'</span>':'')+'</div>'+
      (tags?'<div class="tags">'+tags+'</div>':'')+
      (p>0.005?'<div class="prog"><i style="width:'+Math.round(p*100)+'%"></i></div>':'')+
    '</div>';
}
function onSearch(v){
  _q=v;
  var holder=document.querySelector('.wrap .grid')||document.querySelector('.wrap .empty');
  if(holder) holder.outerHTML=listHtml();
}
function setFavOnly(v){ _favOnly=v; renderHome(); }
function toggleFav(id){ if(_fav[id]) delete _fav[id]; else _fav[id]=1; localStorage.setItem(LS.fav,JSON.stringify(_fav));
  if(_cur) renderReader(_cur); else renderHome(); }

/* ================= 阅读器 ================= */
function openArticle(id){ _cur=id; window.scrollTo(0,0); renderReader(id); }
function getArt(id){ return _lib.filter(function(x){return x.id===id;})[0]; }

function readerBar(a){
  return '<div class="bar" id="rtop">'+
    '<button class="iconbtn" title="\u8FD4\u56DE" onclick="goHome()">\u2190</button>'+
    '<div class="logo" style="font-size:15px;overflow:hidden;text-overflow:ellipsis;font-weight:600">'+esc(a.title.zh||a.title.en)+'</div>'+
    '<div class="spacer"></div>'+
    '<button class="iconbtn" title="\u6536\u85CF" onclick="toggleFav(\''+a.id+'\')">'+(_fav[a.id]?'\u2605':'\u2606')+'</button>'+
    '<button class="iconbtn" id="themeBtn" title="\u5207\u6362\u4E3B\u9898" onclick="toggleTheme()">'+(_theme==='dark'?'\u2600\uFE0F':'\uD83C\uDF19')+'</button>'+
  '</div>';
}
function rheadHtml(a){
  var date=(a.meta&&a.meta.date)||'', src=(a.meta&&a.meta.source)||'', ki=kindInfo(a);
  return '<div class="rhead">'+
    '<div class="ttl-en">'+esc(a.title.en||a.title.zh)+'</div>'+
    (a.title.zh&&a.title.en?'<div class="ttl-zh">'+esc(a.title.zh)+'</div>':'')+

        var r=progRatio(a.id);
        var ha=fa.contentDocument.documentElement.scrollHeight-wa.innerHeight;
        if(r>0) wa.scrollTo(0,ha*r);
        wb.scrollTo(0, wa.scrollY+wa.innerHeight);

          if(_linked && !_byCode){ _byCode=true; wb.scrollTo(0, wa.scrollY+wa.innerHeight); setTimeout(function(){_byCode=false;},0); }
          clearTimeout(_saveTimer);
          _saveTimer=setTimeout(function(){
            var h2=fa.contentDocument.documentElement.scrollHeight-wa.innerHeight;
            _prog[a.id]=h2>0?Math.min(1,Math.max(0,wa.scrollY/h2)):0;
            localStorage.setItem(LS.prog,JSON.stringify(_prog));
          },300);
        });
      }catch(e){}
    }
    fa.onload=ready; fb.onload=ready;

/* ---- 分屏区域几何 & 联动 ---- */
function layoutPanes(){
  var top=byId('rtop'), pw=byId('pw');

}
function setupSpreadPanes(id){
  layoutPanes();
  var pA=byId('pA'), pB=byId('pB');
  var r=progRatio(id);
  requestAnimationFrame(function(){
    var h=pA.scrollHeight-pA.clientHeight;
    if(r>0) pA.scrollTop=h*r;
    pB.scrollTop=pA.scrollTop+pA.clientHeight;
  });
  pA.addEventListener('scroll',function(){
    if(_linked && !_byCode){ _byCode=true; pB.scrollTop=pA.scrollTop+pA.clientHeight; _byCode=false; }
    savePaneProg(id,pA);
  });
}
function setupLangPanes(id){
  layoutPanes();
  var pA=byId('pA'), pB=byId('pB');
  var r=progRatio(id);
  requestAnimationFrame(function(){
    var h=pA.scrollHeight-pA.clientHeight;
    if(r>0){ pA.scrollTop=h*r;
      var hb=pB.scrollHeight-pB.clientHeight; pB.scrollTop=hb*r; }
  });
  pA.addEventListener('scroll',function(){
    if(_linked && !_byCode){
      _byCode=true;
      var h=pA.scrollHeight-pA.clientHeight, hb=pB.scrollHeight-pB.clientHeight;
      if(h>0) pB.scrollTop=hb*(pA.scrollTop/h);
      _byCode=false;
    }
    savePaneProg(id,pA);
  });
  pB.addEventListener('scroll',function(){
    if(_linked && !_byCode){
      _byCode=true;
      var h=pB.scrollHeight-pB.clientHeight, ha=pA.scrollHeight-pA.clientHeight;
      if(h>0) pA.scrollTop=ha*(pB.scrollTop/h);
      _byCode=false;
    }
  });
}
function savePaneProg(id,pane){
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(function(){
    var h=pane.scrollHeight-pane.clientHeight;
    _prog[id]=h>0?Math.min(1,Math.max(0,pane.scrollTop/h)):0;
    localStorage.setItem(LS.prog,JSON.stringify(_prog));
  },300);
}
/* 阅读记忆：整页模式按“段落”记忆——重开时回到上次读到的那一段，并短暂高亮 */
function progRatio(id){ var v=_prog[id]; if(!v) return 0; return (typeof v==='number')?v:(v.r||0); }
function progBlocks(){
  var c=document.querySelector('.pairs')||document.querySelector('.reader .prose');
  return c ? Array.prototype.slice.call(c.children) : [];
}
function topBlockIndex(){
  var top=(byId('rtop')?byId('rtop').offsetHeight:0)+10;
  var blocks=progBlocks();
  for(var i=0;i<blocks.length;i++){
    if(blocks[i].getBoundingClientRect().bottom > top) return i;
  }
  return blocks.length?blocks.length-1:0;
}
function restoreWinProg(id){
  var pr=_prog[id];
  var ratio=(typeof pr==='number')?pr:(pr&&pr.r)||0;
  var para=(pr&&typeof pr==='object'&&typeof pr.p==='number')?pr.p:-1;
  requestAnimationFrame(function(){
    var blocks=progBlocks();
    if(para>0 && blocks[para]){
      var barH=byId('rtop')?byId('rtop').offsetHeight:0;
      var y=blocks[para].getBoundingClientRect().top+window.scrollY-barH-10;
      window.scrollTo(0,Math.max(0,y));
      blocks[para].classList.add('lastread');
      setTimeout(function(){ blocks[para].classList.remove('lastread'); },2400);
    }else if(ratio>0){
      var h=document.documentElement.scrollHeight-window.innerHeight;
      window.scrollTo(0,h*ratio);
    }
  });
  window.onscroll=function(){
    clearTimeout(_saveTimer);
    _saveTimer=setTimeout(function(){
      var h=document.documentElement.scrollHeight-window.innerHeight;
      var r=h>0?Math.min(1,Math.max(0,window.scrollY/h)):0;
      _prog[id]={r:r, p:topBlockIndex()};
      localStorage.setItem(LS.prog,JSON.stringify(_prog));
    },300);
  };
}

/* ================= Markdown 迷你解析 ================= */
function mdInline(s){
  s=esc(s);
  s=s.replace(/!\[([^\]]*)\]\(([^)\s]+)\)/g,'<img alt="$1" src="$2">');
  s=s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
  s=s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/\*([^*]+)\*/g,'<em>$1</em>');
  return s;
}
function mdToHtml(src){
  var lines=String(src||'').replace(/\r\n/g,'\n').split('\n');
  var out=[], i=0, n=lines.length;
  function isTableRow(l){ return /^\s*\|.*\|\s*$/.test(l); }
  while(i<n){
    var l=lines[i];
    if(/^\s*$/.test(l)){ i++; continue; }
    if(/^```/.test(l)){                                   // 代码块
      var buf=[]; i++;
      while(i<n && !/^```/.test(lines[i])){ buf.push(lines[i]); i++; }
      i++;
      out.push('<pre><code>'+esc(buf.join('\n'))+'</code></pre>'); continue;
    }
    var h=l.match(/^(#{1,6})\s+(.*)$/);
    if(h){ var lv=h[1].length; out.push('<h'+lv+'>'+mdInline(h[2])+'</h'+lv+'>'); i++; continue; }
    if(/^\s*(---|\*\*\*)\s*$/.test(l)){ out.push('<hr>'); i++; continue; }
    if(/^\s*>/.test(l)){                                  // 引用
      var qb=[];
      while(i<n && /^\s*>/.test(lines[i])){ qb.push(lines[i].replace(/^\s*>\s?/,'')); i++; }
      out.push('<blockquote>'+mdToHtml(qb.join('\n'))+'</blockquote>'); continue;
    }
    if(/^\s*[-*+]\s+/.test(l)){                           // 无序列表
      var ub=[];
      while(i<n && /^\s*[-*+]\s+/.test(lines[i])){ ub.push('<li>'+mdInline(lines[i].replace(/^\s*[-*+]\s+/,''))+'</li>'); i++; }
      out.push('<ul>'+ub.join('')+'</ul>'); continue;
    }
    if(/^\s*\d+[.)]\s+/.test(l)){                         // 有序列表
      var ob=[];
      while(i<n && /^\s*\d+[.)]\s+/.test(lines[i])){ ob.push('<li>'+mdInline(lines[i].replace(/^\s*\d+[.)]\s+/,''))+'</li>'); i++; }
      out.push('<ol>'+ob.join('')+'</ol>'); continue;
    }
    if(isTableRow(l) && i+1<n && /^\s*\|[\s:|-]+\|\s*$/.test(lines[i+1])){ // 表格
      var head=l.split('|').slice(1,-1).map(function(c){return '<th>'+mdInline(c.trim())+'</th>';}).join('');
      i+=2; var rows=[];
      while(i<n && isTableRow(lines[i])){
        rows.push('<tr>'+lines[i].split('|').slice(1,-1).map(function(c){return '<td>'+mdInline(c.trim())+'</td>';}).join('')+'</tr>'); i++;
      }
      out.push('<table><thead><tr>'+head+'</tr></thead><tbody>'+rows.join('')+'</tbody></table>'); continue;
    }
    var pb=[];                                            // 段落
    while(i<n && !/^\s*$/.test(lines[i]) && !/^(#{1,6}\s|```|\s*>|\s*[-*+]\s|\s*\d+[.)]\s)/.test(lines[i]) && !isTableRow(lines[i])){
      pb.push(mdInline(lines[i])); i++;
    }
    if(pb.length) out.push('<p>'+pb.join('<br>')+'</p>');
    else i++;
  }
  return out.join('\n');
}

  var warn=r.ca!==r.cb && r.ca>0 && r.cb>0;

  el.className='count'+(warn?' warn':'');

function splitParas(t){ return String(t||'').replace(/\r\n/g,'\n').split(/\n\s*\n/).map(function(s){return s.trim();}).filter(Boolean); }
function computeSegs(en,zh){
  var a=splitParas(en), b=splitParas(zh), n=Math.max(a.length,b.length), segs=[];
  for(var i=0;i<n;i++) segs.push({en:a[i]||'', zh:b[i]||''});
  return {segs:segs, ca:a.length, cb:b.length};
}

/* -- 加粗：选中文字一键包上/去掉标记 -- */
function boldSel(){
  var ta=activeTa(); if(!ta) return;
  var isHtml = byId('mdFmt').value==='html';
  var L=isHtml?'<b>':'**', R=isHtml?'</b>':'**';
  var s0=ta.selectionStart, e0=ta.selectionEnd, v=ta.value;
  var sel=v.slice(s0,e0);
  if(sel && sel.slice(0,L.length)===L && sel.slice(-R.length)===R){        // 选区本身带标记 → 取消
    var inner=sel.slice(L.length, sel.length-R.length);
    ta.value=v.slice(0,s0)+inner+v.slice(e0);
    ta.setSelectionRange(s0, s0+inner.length);
  }else if(v.slice(s0-L.length,s0)===L && v.slice(e0,e0+R.length)===R){    // 标记在选区外侧 → 取消
    ta.value=v.slice(0,s0-L.length)+sel+v.slice(e0+R.length);
    ta.setSelectionRange(s0-L.length, s0-L.length+sel.length);
  }else{                                                                    // 加上标记
    ta.value=v.slice(0,s0)+L+sel+R+v.slice(e0);
    if(sel) ta.setSelectionRange(s0, s0+L.length+sel.length+R.length);
    else ta.setSelectionRange(s0+L.length, s0+L.length);                    // 空选区：光标停在标记中间
  }
  ta.focus();
}

/* -- 粘贴保格式：剪贴板里的富文本自动转成 Markdown 标记 -- */
function htmlToMd(html){
  var doc=new DOMParser().parseFromString(html,'text/html');
  function walk(node){
    var out='';
    for(var i=0;i<node.childNodes.length;i++){
      var c=node.childNodes[i];
      if(c.nodeType===3){ out+=c.nodeValue.replace(/[\r\n\t]+/g,' '); continue; }
      if(c.nodeType!==1) continue;
      var t=c.tagName.toLowerCase(), inner=walk(c);
      if(t==='script'||t==='style') continue;
      else if(t==='b'||t==='strong'){ out+= inner.trim()?'**'+inner.trim()+'**':''; }
      else if(t==='i'||t==='em'){ out+= inner.trim()?'*'+inner.trim()+'*':''; }
      else if(/^h[1-6]$/.test(t)){ out+='\n\n'+'#'.repeat(+t[1])+' '+inner.trim()+'\n\n'; }
      else if(t==='br'){ out+='\n'; }
      else if(t==='li'){ out+='\n- '+inner.trim(); }
      else if(t==='ul'||t==='ol'){ out+='\n'+inner+'\n'; }
      else if(t==='blockquote'){ out+='\n\n> '+inner.trim()+'\n\n'; }
      else if(t==='code'&&c.parentNode.tagName!=='PRE'){ out+='`'+inner+'`'; }
      else if(t==='pre'){ out+='\n\n```\n'+c.textContent+'\n```\n\n'; }
      else if(t==='img'){ var sr=c.getAttribute('src')||''; if(/^(data:|https?:)/.test(sr)) out+='![]('+sr+')'; }
      else if(t==='a'){ var hf=c.getAttribute('href')||''; out+= /^https?:/.test(hf)?'['+inner.trim()+']('+hf+')':inner; }
      else if(t==='p'||t==='div'||t==='section'||t==='article'||t==='tr'){ out+='\n\n'+inner+'\n\n'; }
      else out+=inner;
    }
    return out;
  }
  return walk(doc.body).replace(/\n{3,}/g,'\n\n').replace(/[ ]{2,}/g,' ').trim();
}
function mdPaste(e){
  if(byId('mdFmt').value!=='md') return;                       // HTML片段模式不拦截
  var cd=e.clipboardData; if(!cd) return;
  var h=cd.getData('text/html');
  if(!h || !/<(b|strong|em|i|h[1-6]|li|blockquote|img|pre)\b/i.test(h)) return;  // 无格式就走默认粘贴
  e.preventDefault();
  var md=htmlToMd(h);
  var ta=e.target, s0=ta.selectionStart, e0=ta.selectionEnd;
  ta.value=ta.value.slice(0,s0)+md+ta.value.slice(e0);
  ta.selectionStart=ta.selectionEnd=s0+md.length;

/* 图片压缩：优先 WebP（不支持则 JPEG），超大图逐级降档，肉眼几乎无损 */
function compressImage(img, origBytes, cb){
  function encode(maxW, q){
    var w=img.naturalWidth, h=img.naturalHeight;
    var scale=Math.min(1, maxW/w);
    var cv=document.createElement('canvas');
    cv.width=Math.round(w*scale); cv.height=Math.round(h*scale);
    cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
    var uri=cv.toDataURL('image/webp', q);
    if(uri.indexOf('data:image/webp')!==0) uri=cv.toDataURL('image/jpeg', q);  // Safari 回退
    return uri;
  }
  /* 逐级尝试：1400px/0.86 → 1200px/0.82 → 1000px/0.78，直到 ≤450KB 或到底 */
  var steps=[[1400,0.86],[1200,0.82],[1000,0.78]];
  var uri='';
  for(var i=0;i<steps.length;i++){
    uri=encode(steps[i][0], steps[i][1]);
    if(uri.length*0.75 <= 450*1024) break;
  }
  cb(uri, Math.round(uri.length*0.75));
}
function fmtKB(n){ return n>=1024*1024 ? (n/1024/1024).toFixed(1)+' MB' : Math.round(n/1024)+' KB'; }
function onImgPicked(input){
  var file=input.files && input.files[0];
  input.value='';
  if(!file || !_imgTarget) return;
  var img=new Image(), url=URL.createObjectURL(file);
  img.onload=function(){
    URL.revokeObjectURL(url);
    if(file.type==='image/png' && file.size<250*1024){        // 小 PNG（图标/透明图）原样保留
      var rd=new FileReader();
      rd.onload=function(){ placeImage(rd.result, file.size, file.size); };
      rd.readAsDataURL(file); return;
    }
    compressImage(img, file.size, function(uri, outBytes){
      placeImage(uri, file.size, outBytes);
    });
  };
  img.onerror=function(){ URL.revokeObjectURL(url); toast('\u56FE\u7247\u8BFB\u53D6\u5931\u8D25'); };
  img.src=url;
}
function placeImage(uri, inBytes, outBytes){
  var ta=byId(_imgTarget); if(!ta) return;
  var isHtml = byId('mdFmt').value==='html';
  var snippet = isHtml ? '\n<img src="'+uri+'" alt="">\n' : '\n![\u63D2\u56FE]('+uri+')\n';
  var s=ta.selectionStart||0, e=ta.selectionEnd||0;
  ta.value=ta.value.slice(0,s)+snippet+ta.value.slice(e);
  ta.focus(); ta.selectionStart=ta.selectionEnd=s+snippet.length;
  if(inBytes && outBytes && outBytes<inBytes)
    toast('\u5DF2\u63D2\u5165\u56FE\u7247\uFF08'+fmtKB(inBytes)+' \u2192 '+fmtKB(outBytes)+'\uFF09');
  else toast('\u5DF2\u63D2\u5165\u56FE\u7247');
}

function runAddArticle(){
  var ten=byId('imTitleEn').value.trim();
  var tzh=byId('imTitleZh').value.trim();
  var src=byId('imSrc').value.trim();
  var tags=byId('imTags').value.trim();
  var art={
    id:_editId || ('a'+Date.now().toString(36)),
    title:{en:ten, zh:tzh},
    meta:{ source:src,
      date:(_editId && getArt(_editId) && getArt(_editId).meta.date) || new Date().toISOString().slice(0,10),
      tags: tags?tags.split(/[,\uFF0C]/).map(function(s){return s.trim();}).filter(Boolean):[] }
  };
  if(_tab==='bi'){
    var r=computeSegs(byId('imEn').value, byId('imZh').value);
    if(!r.segs.length){ toast('\u6B63\u6587\u4E3A\u7A7A'); return; }
    art.kind='bi'; art.segs=r.segs;
  }else if(_tab==='md'){
    var fmt=byId('mdFmt').value;
    var a=byId('mdA').value, b=byId('mdB').value;
    if(!a.trim()){ toast('\u539F\u6587\u5185\u5BB9\u4E3A\u7A7A'); return; }
    art.kind='rich';
    art.body={ a: fmt==='html'?a:mdToHtml(a), b: b.trim()?(fmt==='html'?b:mdToHtml(b)):'' };
    art.raw={ fmt:fmt, a:a, b:b };
  }else{
    var d=byId('docSrc').value;
    if(!d.trim()){ toast('\u8BF7\u9009\u62E9 HTML \u6587\u4EF6\u6216\u7C98\u8D34\u6E90\u7801'); return; }
    art.kind='doc'; art.doc=d;
    if(!ten && !tzh) autoDocTitle();
    art.title={en:byId('imTitleEn').value.trim(), zh:byId('imTitleZh').value.trim()};
  }
  if(!art.title.en && !art.title.zh){ toast('\u8BF7\u81F3\u5C11\u586B\u4E00\u4E2A\u6807\u9898'); return; }
  if(_editId){
    var idx=_lib.findIndex(function(x){return x.id===_editId;});
    if(idx>=0) _lib[idx]=art; else _lib.unshift(art);
  }else _lib.unshift(art);
  writeLibToDom(); markDirty();
  closeImport(); clearImport();
  goHome();
  toast((_editId?'\u5DF2\u4FDD\u5B58\uFF1A':'\u5DF2\u6DFB\u52A0\uFF1A')+(art.title.zh||art.title.en)+'\uFF08\u8BB0\u5F97\u300C\u5BFC\u51FA\u300D\u4FDD\u5B58\u6587\u4EF6\uFF09');
  _editId=null;
}

          '<div class="field"><textarea id="mdA" class="tall pad" placeholder="\u539F\u6587\uFF1A\u50CF\u8BB0\u4E8B\u672C\u4E00\u6837\u76F4\u63A5\u5199\u6216\u7C98\u8D34\u3002\u9009\u4E2D\u6587\u5B57\u70B9 B \u52A0\u7C97\uFF1B\u4ECE\u7F51\u9875/\u6587\u6863\u7C98\u8D34\u65F6\u52A0\u7C97\u4F1A\u81EA\u52A8\u4FDD\u7559\u3002\u652F\u6301 # \u6807\u9898\u3001\u5217\u8868\u3001> \u5F15\u7528\u3001| \u8868\u683C |\u3001```\u4EE3\u7801```\uFF0C\u70B9\u300C\u63D2\u56FE\u300D\u5728\u5149\u6807\u5904\u63D2\u5165\u56FE\u7247\u3002"></textarea>'+
          '<textarea id="mdB" class="tall pad hidden" placeholder="\u8BD1\u6587\uFF08\u53EF\u9009\uFF09\uFF1A\u586B\u5199\u540E\u9605\u8BFB\u65F6\u53EF\u5DE6\u53F3\u5206\u5C4F\u5BF9\u7167\u3002\u64CD\u4F5C\u4E0E\u539F\u6587\u533A\u76F8\u540C\u3002"></textarea></div>'+
          '<div id="mdPv" class="pvbox hidden"></div>'+
        '</div>'+
        '<div id="pane_doc" class="hidden">'+
          '<div class="field"><label>\u9009\u62E9 HTML \u6587\u4EF6\uFF08\u6574\u9875\u81EA\u5E26\u6837\u5F0F\uFF0C\u539F\u6837\u6536\u5165\uFF09</label>'+
            '<input type="file" accept=".html,.htm,text/html" onchange="onDocFile(this)"></div>'+
          '<div class="field"><label>\u6216\u76F4\u63A5\u7C98\u8D34\u5B8C\u6574 HTML \u6E90\u7801</label>'+
            '<textarea id="docSrc" class="tall mono" oninput="autoDocTitle()" placeholder="&lt;!DOCTYPE html&gt;\u5F00\u5934\u7684\u5B8C\u6574\u7F51\u9875\u6E90\u7801\u3002\u6807\u9898\u4F1A\u81EA\u52A8\u4ECE &lt;title&gt; \u63D0\u53D6\u3002"></textarea></div>'+
          '<div class="count">\u6587\u6863\u5C06\u5728\u72EC\u7ACB\u753B\u5E03\u4E2D\u6E32\u67D3\uFF0C\u4FDD\u7559\u5B83\u81EA\u5DF1\u7684\u5B57\u4F53\u3001\u914D\u8272\u4E0E\u811A\u672C\uFF08\u5982 intro_number_structure.html \u8FD9\u7C7B\u9875\u9762\uFF09\u3002</div>'+
        '</div>'+
      '</div>'+
      '<div class="mfoot">'+
        '<button class="btn ghost" id="expBtn" onclick="runExport()">\u2B07 \u5BFC\u51FA index.html</button>'+
        '<div class="spacer"></div>'+
        '<button class="btn ghost" onclick="closeImport()">\u53D6\u6D88</button>'+
        '<button class="btn" id="imAddBtn" onclick="runAddArticle()">\u6DFB\u52A0\u5230\u56FE\u4E66\u9986</button>'+
      '</div>'+
    '</div>';
  ov.addEventListener('click', closeImport);
  document.body.appendChild(ov);

  ['mdA','mdB'].forEach(function(id){ var ta=ov.querySelector('#'+id); if(ta) ta.addEventListener('paste', mdPaste); });

  var t=document.createElement('div'); t.id='toast'; t.className='toast'; document.body.appendChild(t);
  var fp=document.createElement('input'); fp.type='file'; fp.id='imgPick'; fp.accept='image/*';
  fp.style.display='none'; fp.addEventListener('change',function(){ onImgPicked(fp); });
  document.body.appendChild(fp);
})();

init();

</script>
