<!DOCTYPE html>
<html lang="zh" style="--fs: 16px;"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>阅读</title>
<style>
  /* ---------- 主题变量 ---------- */
  :root{
    --bg:#faf9f5; --card:#ffffff; --ink:#2b2620; --muted:#7a736a; --faint:#a89f93;
    --line:#e8e1d4; --accent:#b15a3a; --accent2:#8a4327; --hl:#fff4e6; --hlbd:#f0d9bf;
    --en:#2b2620; --zh:#33302a; --shadow:0 1px 4px rgba(0,0,0,.08);
  }
  [data-theme="dark"]{
    --bg:#1b1916; --card:#262320; --ink:#e9e3d8; --muted:#9b9286; --faint:#6f675c;
    --line:#3a352e; --accent:#e0875f; --accent2:#f0a079; --hl:#332a20; --hlbd:#4a3a28;
    --en:#e9e3d8; --zh:#e4ddd0; --shadow:0 1px 6px rgba(0,0,0,.35);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;line-height:1.6;-webkit-text-size-adjust:100%}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,textarea{font-family:inherit}

  /* ---------- 顶栏 ---------- */
  .bar{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:10px;
    padding:10px 16px;background:var(--bg);border-bottom:1px solid var(--line);
    padding-top:calc(10px + env(safe-area-inset-top))}
  .bar .logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:17px;white-space:nowrap}
  .bar .logo .dot{width:22px;height:22px;border-radius:6px;background:var(--accent);
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-family:Georgia,serif}
  .bar .spacer{flex:1}
  .iconbtn{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;
    font-size:17px;color:var(--muted);border:1px solid transparent}
  .iconbtn:hover{background:var(--card);border-color:var(--line);color:var(--ink)}
  .search{flex:1;max-width:360px;display:flex;align-items:center;gap:8px;background:var(--card);
    border:1px solid var(--line);border-radius:10px;padding:8px 12px}
  .search input{flex:1;border:none;background:none;color:var(--ink);font-size:14px;outline:none}
  .btn{padding:8px 14px;border-radius:10px;background:var(--accent);color:#fff;font-size:14px;font-weight:600;white-space:nowrap}
  .btn:hover{background:var(--accent2)}
  .btn.ghost{background:var(--card);color:var(--ink);border:1px solid var(--line)}
  .btn.ghost:hover{border-color:var(--accent);color:var(--accent)}

  /* ---------- 首页 / 列表 ---------- */
  .wrap{max-width:1000px;margin:0 auto;padding:20px 16px 60px}
  .filters{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .chip{padding:6px 12px;border-radius:20px;border:1px solid var(--line);background:var(--card);
    color:var(--muted);font-size:13px}
  .chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;
    box-shadow:var(--shadow);cursor:pointer;transition:transform .12s,border-color .12s;position:relative}
  .card:hover{transform:translateY(-2px);border-color:var(--accent)}
  .card .ttl-en{font-family:Georgia,"Times New Roman",serif;font-size:18px;font-weight:600;color:var(--en);line-height:1.35}
  .card .ttl-zh{font-size:15px;color:var(--zh);margin-top:4px}
  .card .meta{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;font-size:12px;color:var(--faint)}
  .card .tags{margin-top:10px;display:flex;gap:6px;flex-wrap:wrap}
  .tag{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--hl);color:var(--accent);border:1px solid var(--hlbd)}
  .card .star{position:absolute;top:14px;right:14px;font-size:18px;color:var(--faint)}
  .card .star.on{color:#e8a33d}
  .card .del{position:absolute;top:14px;right:42px;font-size:15px;color:var(--faint);opacity:0;transition:opacity .12s}
  .card:hover .del{opacity:.7}
  .card .del:hover{opacity:1;color:#e25555}
  .card .prog{height:3px;background:var(--line);border-radius:2px;margin-top:14px;overflow:hidden}
  .card .prog i{display:block;height:100%;background:var(--accent)}
  .empty{text-align:center;color:var(--muted);padding:80px 20px}
  .empty h2{font-weight:600;margin-bottom:8px;color:var(--ink)}

  /* ---------- 阅读器 ---------- */
  .reader{max-width:1100px;margin:0 auto;padding:16px 16px 100px}
  .rhead{margin:8px 0 22px}
  .rhead .ttl-en{font-family:Georgia,"Times New Roman",serif;font-size:28px;font-weight:600;color:var(--en);line-height:1.3}
  .rhead .ttl-zh{font-size:20px;color:var(--zh);margin-top:6px}
  .rhead .meta{margin-top:10px;font-size:13px;color:var(--faint);display:flex;gap:12px;flex-wrap:wrap}
  .pairs{display:flex;flex-direction:column;gap:6px}
  .pair{display:grid;gap:0 36px;border-radius:10px;padding:13px 14px;transition:background .12s}
  .pair.split{grid-template-columns:1fr 1fr}
  .pair.stack{grid-template-columns:1fr}
  .pair:hover{background:var(--hl)}
  .pair .en{color:var(--en);font-size:var(--fs);line-height:1.78}
  .pair .zh{color:var(--zh);font-size:var(--fs);line-height:1.85}
  /* 阅读字体：衬线(book)/黑体(sans) 可切换 */
  body[data-rfont="serif"] .pair .en{font-family:Georgia,"Times New Roman",serif}
  body[data-rfont="serif"] .pair .zh{font-family:"Songti SC","Noto Serif SC","Noto Serif CJK SC","SimSun",serif}
  body[data-rfont="sans"] .pair .en{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  body[data-rfont="sans"] .pair .zh{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}
  .pair.stack .zh{margin-top:10px;padding-top:10px;border-top:1px dashed var(--line)}
  .pair.split .zh{border-left:1px solid transparent}
  @media(max-width:700px){ .pair.split{grid-template-columns:1fr} .pair.split .zh{margin-top:8px;padding-top:8px;border-top:1px dashed var(--line)} }

  .rbar{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(16px + env(safe-area-inset-bottom));
    z-index:60;display:flex;align-items:center;gap:4px;background:var(--card);border:1px solid var(--line);
    border-radius:30px;padding:6px;box-shadow:0 4px 20px rgba(0,0,0,.18)}
  .rbar button{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:16px;color:var(--muted)}
  .rbar button:hover{background:var(--hl);color:var(--accent)}
  .rbar .sep{width:1px;height:22px;background:var(--line);margin:0 2px}
  .rbar .lab{font-size:13px;color:var(--muted);padding:0 8px;min-width:54px;text-align:center}

  /* ---------- 导入面板 ---------- */
  .overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.45);display:none;
    align-items:flex-start;justify-content:center;overflow:auto;padding:30px 16px}
  .overlay.show{display:flex}
  .modal{background:var(--bg);border:1px solid var(--line);border-radius:16px;width:100%;max-width:820px;
    box-shadow:0 12px 50px rgba(0,0,0,.3)}
  .modal .mhead{display:flex;align-items:center;padding:16px 20px;border-bottom:1px solid var(--line)}
  .modal .mhead h3{font-size:17px;flex:1}
  .modal .mbody{padding:20px;display:flex;flex-direction:column;gap:14px}
  .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:600}
  .field input,.field textarea{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;
    background:var(--card);color:var(--ink);font-size:14px;outline:none}
  .field input:focus,.field textarea:focus{border-color:var(--accent)}
  .field textarea{min-height:160px;resize:vertical;line-height:1.5}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:640px){.two{grid-template-columns:1fr}}
  .count{font-size:12px;margin-top:6px;color:var(--faint)}
  .count.warn{color:var(--accent)}
  .field.jsonfill{background:var(--card);border:1px dashed var(--line);border-radius:12px;padding:13px 14px}
  .field .jsonbox{min-height:84px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12.5px}
  .jsonrow{display:flex;align-items:center;gap:10px;margin-top:8px}
  .jsonrow .hint{font-size:12px;color:var(--faint)}
  .btn.sm{padding:7px 13px;font-size:13px}
  .mfoot{display:flex;gap:10px;justify-content:flex-end;padding:16px 20px;border-top:1px solid var(--line);flex-wrap:wrap}
  .mfoot .spacer{flex:1}

  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:200;
    background:var(--ink);color:var(--bg);padding:10px 18px;border-radius:24px;font-size:14px;
    opacity:0;pointer-events:none;transition:opacity .25s}
  .toast.show{opacity:1}
  .hidden{display:none!important}

  /* ---------- 封面 ---------- */
  .cover{position:fixed;inset:0;z-index:90;background:#0e130d;opacity:1;transition:opacity .45s ease}
  .cover.out{opacity:0;pointer-events:none}
  .cover img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;user-select:none;-webkit-user-drag:none}
  .cover .hot{position:absolute;cursor:pointer;border-radius:3px;-webkit-tap-highlight-color:transparent}
  .cover .hot::after{content:'';position:absolute;inset:-7px;border:1.5px solid rgba(255,246,232,0);border-radius:6px;
    animation:hotpulse 2.8s ease-in-out infinite}
  @keyframes hotpulse{0%,100%{border-color:rgba(255,246,232,0)}50%{border-color:rgba(255,246,232,.7)}}
  @media(prefers-reduced-motion:reduce){.cover .hot::after{animation:none;border-color:rgba(255,246,232,.45)}}
  /* 神秘箭头：块下方一枚上指的细雪佛龙，缓缓浮动 */
  .cover .carrow{position:absolute;width:28px;height:28px;opacity:0;transition:opacity 1.6s;cursor:pointer;
    -webkit-tap-highlight-color:transparent}
  .cover .carrow.show{opacity:1}
  .cover .carrow i{position:absolute;left:5px;top:9px;width:16px;height:16px;
    border-left:2px solid rgba(255,246,232,.85);border-top:2px solid rgba(255,246,232,.85);
    transform:rotate(45deg);border-radius:1px;
    filter:drop-shadow(0 1px 6px rgba(0,0,0,.55));
    animation:arrowfloat 2.6s ease-in-out infinite}
  @keyframes arrowfloat{0%,100%{transform:rotate(45deg) translate(0,0);opacity:.85}
    50%{transform:rotate(45deg) translate(-4px,-4px);opacity:.45}}
  @media(prefers-reduced-motion:reduce){.cover .carrow i{animation:none}}

  /* ---------- 卡片补充 ---------- */
  .card .thumb{margin:-18px -18px 14px;height:110px;overflow:hidden;border-radius:13px 13px 0 0;border-bottom:1px solid var(--line)}
  .card .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .card .edit{position:absolute;top:14px;right:70px;font-size:14px;color:var(--faint);opacity:0;transition:opacity .12s}
  .card:hover .edit,.card:hover .del{opacity:.7}
  .card .edit:hover{opacity:1;color:var(--accent)}
  @media(hover:none){.card .edit,.card .del{opacity:.55}}
  .kbadge{font-size:11px;padding:1px 7px;border-radius:9px;border:1px solid var(--line);background:var(--card);color:var(--muted)}
  .dirtynote{font-size:12px;color:var(--accent);margin-left:auto}

  /* ---------- 图文正文（prose） ---------- */
  .prose{font-size:var(--fs);line-height:1.9;color:var(--ink);max-width:760px;margin:0 auto;overflow-wrap:break-word}
  .prose p{margin:0 0 1.05em}
  .prose h1,.prose h2,.prose h3,.prose h4{line-height:1.35;margin:1.5em 0 .6em;color:var(--ink)}
  .prose h1{font-size:1.55em}.prose h2{font-size:1.32em}.prose h3{font-size:1.15em}.prose h4{font-size:1.02em}
  .prose img{max-width:100%;height:auto;display:block;margin:20px auto;border-radius:10px;box-shadow:var(--shadow)}
  .prose blockquote{margin:16px 0;padding:8px 16px;border-left:3px solid var(--accent);background:var(--hl);
    border-radius:0 8px 8px 0;color:var(--muted)}
  .prose blockquote p:last-child{margin-bottom:0}
  .prose pre{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 16px;overflow:auto;
    font-size:.86em;line-height:1.6;margin:16px 0}
  .prose code{font-family:ui-monospace,Menlo,Consolas,monospace;background:var(--hl);padding:1px 5px;border-radius:5px;font-size:.9em}
  .prose pre code{background:none;padding:0}
  .prose table{border-collapse:collapse;width:100%;margin:18px 0;font-size:.92em}
  .prose th,.prose td{border:1px solid var(--line);padding:8px 11px;text-align:left;vertical-align:top}
  .prose th{background:var(--hl);font-weight:600}
  .prose ul,.prose ol{padding-left:1.6em;margin:0 0 1.05em}
  .prose li{margin:.25em 0}
  .prose hr{border:none;border-top:1px solid var(--line);margin:26px 0}
  .prose a{color:var(--accent)}
  body[data-rfont="serif"] .prose{font-family:Georgia,"Songti SC","Noto Serif SC","Noto Serif CJK SC","SimSun",serif}
  body[data-rfont="sans"] .prose{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}

  /* ---------- 分屏面板 ---------- */
  .paneswrap{position:fixed;left:0;right:0;bottom:0;display:flex;background:var(--bg);z-index:10}
  .pane{flex:1;min-width:0;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
  .pane+.pane{border-left:1px solid var(--line)}
  .pane .pane-inner{padding:16px 18px 120px;max-width:680px;margin:0 auto}
  .pane .plabel{display:inline-block;font-size:11px;letter-spacing:.15em;color:var(--accent);border:1px solid var(--hlbd);
    background:var(--hl);border-radius:10px;padding:2px 10px;margin-bottom:14px}
  .paneswrap iframe{flex:1;min-width:0;border:none;height:100%;background:#fff}
  .paneswrap iframe+iframe{border-left:1px solid var(--line)}
  .docwrap{position:fixed;left:0;right:0;bottom:0;z-index:10}
  .docwrap iframe{width:100%;height:100%;border:none;background:#fff}

  /* ---------- 导入面板补充 ---------- */
  .tabs{display:flex;gap:18px;border-bottom:1px solid var(--line)}
  .tabs button{padding:10px 2px;font-size:14px;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px}
  .tabs button.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
  .mdbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .mdbar select{padding:7px 10px;border:1px solid var(--line);border-radius:9px;background:var(--card);color:var(--ink);font-size:13px}
  .field textarea.tall{min-height:200px}
  .field textarea.mono{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12.5px}
  .pvbox{border:1px solid var(--line);border-radius:12px;background:var(--card);padding:18px;max-height:340px;overflow:auto;margin-top:4px}
  .helpbox{margin:14px 20px 0;padding:14px 16px;border:1px dashed var(--hlbd);background:var(--hl);border-radius:12px;
    font-size:13px;line-height:1.8;color:var(--ink)}
  #expBtn.dirty::after{content:' \25CF';color:var(--accent)}
  #pane_bi,#pane_md,#pane_doc{display:flex;flex-direction:column;gap:14px}

  /* ---------- 顶栏（紧凑，手机不溢出） ---------- */
  .bar{flex-wrap:nowrap;min-width:0}
  .apptitle{font-weight:700;font-size:17px;letter-spacing:.08em;cursor:pointer;white-space:nowrap;
    -webkit-tap-highlight-color:transparent}
  .apptitle:active{color:var(--accent)}
  .search{flex:1 1 auto;min-width:0;max-width:360px}
  .search input{min-width:0;width:100%}
  .barlink{font-size:14px;color:var(--muted);padding:8px 6px;white-space:nowrap}
  .barlink:hover{color:var(--accent)}
  .btn.imbtn{flex:0 0 auto}
  @media(max-width:480px){
    .bar{gap:7px;padding:10px 12px;padding-top:calc(10px + env(safe-area-inset-top))}
    .btn.imbtn{padding:8px 11px}
    .btn.imbtn .btxt{display:none}
    .search span{display:none}
    .search{padding:8px 10px}
  }

  /* ---------- 阅读页（Substack / X 文章风格：干净白底、大标题、宽松行距） ---------- */
  body.reading{background:var(--card)}
  body.reading .bar{background:var(--card)}
  body.reading .reader{max-width:680px;padding:26px 18px 130px}
  body.reading .rhead{margin:6px 0 0;padding-bottom:20px;border-bottom:1px solid var(--line);margin-bottom:28px}
  body.reading .rhead .ttl-en{font-size:30px;letter-spacing:-.012em;line-height:1.25}
  body.reading .rhead .ttl-zh{font-size:21px;font-weight:600;margin-top:8px}
  body.reading .rhead .meta{margin-top:14px}
  body.reading .pair{padding:8px 2px;border-radius:8px}
  body.reading .pair:hover{background:none}
  body.reading .pane,.paneswrap{background:var(--card)}
  .prose img{width:100%}
  @media(max-width:700px){
    body.reading .reader{padding:20px 16px 130px}
    body.reading .rhead .ttl-en{font-size:26px}
    /* 图片通栏，与 X 文章一致 */
    .reader .prose img{width:calc(100% + 32px);max-width:none;margin-left:-16px;border-radius:0;box-shadow:none}
  }

  /* ---------- 上次读到的段落高亮 ---------- */
  .lastread{animation:lastflash 2.4s ease}
  @keyframes lastflash{0%{background:var(--hl);box-shadow:inset 3px 0 0 var(--accent)}70%{background:var(--hl)}100%{background:transparent}}
  @media(prefers-reduced-motion:reduce){.lastread{animation:none;background:var(--hl)}}

  /* ---------- 封面：绘制色块 / 设置面板 ---------- */
  .cover .hot.editing{cursor:grab;touch-action:none}
  .cover .hot.editing:active{cursor:grabbing}
  .cover .hot.editing::after{border-style:dashed;animation:none;border-color:rgba(255,246,232,.9)}
  .cgear{position:absolute;right:14px;bottom:calc(14px + env(safe-area-inset-bottom));width:38px;height:38px;
    border-radius:50%;font-size:17px;color:rgba(255,248,238,.85);background:rgba(20,26,18,.38);
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);-webkit-tap-highlight-color:transparent}
  .cgear:active{background:rgba(20,26,18,.6)}
  .coverpanel{position:absolute;left:10px;right:10px;bottom:calc(60px + env(safe-area-inset-bottom));
    background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:0 12px 40px rgba(0,0,0,.35);
    padding:14px 16px;max-height:46vh;overflow-y:auto;z-index:5}
  .coverpanel.hidden{display:none}
  .cprow{display:flex;align-items:center;gap:8px;margin:10px 0;flex-wrap:wrap}
  .cprow.cphead{margin-top:0;justify-content:space-between}
  .cprow b{font-size:15px;color:var(--ink)}
  .cphint{font-size:11.5px;color:var(--faint)}
  .cprow label{font-size:12.5px;color:var(--muted);white-space:nowrap}
  .cprow input[type=range]{flex:1;min-width:70px;accent-color:var(--accent)}
  .cprow input[type=color]{width:40px;height:30px;border:1px solid var(--line);border-radius:8px;padding:1px;background:var(--card)}
  .cpval{font-size:11.5px;color:var(--faint);min-width:34px;text-align:right}

  /* ---------- 编辑器：原文/译文小标签 + 记事本式编辑区 ---------- */
  .subtabs{display:flex;align-items:center;gap:14px;margin:2px 0 0}
  .subtabs button{font-size:13.5px;color:var(--muted);padding:7px 2px;border-bottom:2px solid transparent}
  .subtabs button.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
  .subtabs .hint{font-size:11.5px;color:var(--faint)}
  .field textarea.pad{min-height:300px;line-height:1.75;font-size:14.5px;padding:14px}
  textarea.hidden{display:none}
</style>
</head>
<body data-rfont="serif">

<script id="__LIB__" type="application/json" data-t="0">[{"id": "amqpbzcwh", "title": {"en": "", "zh": "思考，快与慢"}, "meta": {"source": "", "date": "2026-06-22", "tags": ["[美]丹尼尔·卡尼曼"]}, "segs": [{"en": "", "zh": "思考，快与慢"}, {"en": "", "zh": "作者：[美]丹尼尔·卡尼曼\n译者：胡晓姣、李爱民、何梦莹"}, {"en": "", "zh": "目录"}, {"en": "", "zh": "本书所获赞誉\n序言"}, {"en": "", "zh": "【第一部分 系统1，系统2】\n第1章 一张愤怒的脸和一道乘法题\n第2章 电影的主角与配角\n第3章 惰性思维与延迟满足的矛盾\n第4章 联想的神奇力量\n第5章 你的直觉有可能只是错觉\n第6章 意料之外与情理之中\n第7章 字母“B”与数字“13”\n第8章 我们究竟是如何作出判断的？\n第9章 目标问题与启发性问题形影不离"}, {"en": "", "zh": "【第二部分 启发法与偏见】\n第10章 大数法则与小数定律\n第11章 锚定效应在生活中随处可见\n第12章 科学地利用可得性启发法\n第13章 焦虑情绪与风险政策的设计\n第14章 猜一下，汤姆的专业是什么？\n第15章 琳达问题的社会效应\n第16章 因果关系比统计学信息更具说服力\n第17章 所有表现都会回归平均值\n第18章 如何让直觉性预测更恰当有效？"}, {"en": "", "zh": "【第三部分 过度自信与决策错误】\n第19章 “知道”的错觉\n第20章 未来是不可预测的\n第21章 直觉判断与公式运算，孰优孰劣？\n第22章 什么时候可以相信专家的直觉？\n第23章 努力养成采纳外部意见的决策习惯\n第24章 乐观主义是一柄双刃剑"}, {"en": "", "zh": "【第四部分 选择与风险】\n第25章 事关风险与财富的抉择\n第26章 更人性化的前景理论\n第27章 禀赋效应与市场交易\n第28章 公平性——经济交易的参照点\n第29章 对结果可能性的权衡\n第30章 被过分关注的罕见事件\n第31章 能带来长远收益的风险政策\n第32章 心理账户是如何影响我们的选择的？\n第33章 评估结果的逆转\n第34章 善用框架效应，让生活更美好"}, {"en": "", "zh": "【第五部分 两个自我】\n第35章 体验效用与决策效用的不一致\n第36章 人生如戏\n第37章 你有多幸福？\n第38章 思考生活"}, {"en": "", "zh": "结语\n附录A 不确定性下的判断：启发法和偏见\n附录B 选择、价值以及框架\n致谢"}, {"en": "", "zh": "本书所获赞誉"}, {"en": "", "zh": "生活就像点菜，饥饿时菜会点得特别多，但吃一阵就会意识到浪费；如果慢条斯理地盘算怎么点菜，别人已经要吃完了。这就是决策的复杂性。本书会帮助你真正理解这一切。\n——秦朔，《第一财经日报》总编辑"}, {"en": "", "zh": "卡尼曼在书中从容不迫地展现了大师级的思考方式和辩证精神。他既一针见血地挑战传统，指出“经济人”这一司空见惯的模型假设有诸多不合理之处，同时又未将慢速、审慎思维的优势绝对化、理想化。在这个需要经常做出迅速判断和决策的时代，快速思的必要性不言而喻，无论从商还是生活，处事时权衡两种思维模式的优劣得失，规避风险才是应有的态度。\n——潘海东，互动百科CEO"}, {"en": "", "zh": "“丹尼尔·卡尼曼是人类历史上最具影响力的心理学家之一，当然也是至今仍健在的最重要、最优秀的心理学家。他有着独特的天赋，可以揭示人类思想的许多显著特征，其中很多特征已经成为教材中的经典内容，成了我们传统观念的一部分。他的工作打开了社会心理学、认知科学、对理性和幸福的研究以及行为经济学研究的新局面，其中行为经济学这一领域是丹尼尔与他的合作者阿莫斯·特沃斯基共同开辟的。本书的面世是一件大事。”\n——史蒂文· 平克，哈佛大学约翰· 斯通家族心理学教授，《大脑是如何工作的》及《唤醒心中的天使》两书的作者"}, {"en": "", "zh": "“这是社会思想的一部里程碑式著作，堪与亚当· 史密斯的《国富论》和西格蒙德· 弗洛伊德的《梦的解析》相媲美。”\n——纳西姆· 塔勒布，《黑天鹅》一书作者"}, {"en": "", "zh": "“本书是一位智慧巨人的力作，可读性强，睿智，深刻。赶紧买，慢慢读，而且要反复读。这本书会改变你的思考方式。读了它，你对工作、世界以及自己的生活的看法都会改变。”\n——理查德· 泰勒，芝加哥大学经济学教授，《助推》一书作者"}, {"en": "", "zh": "“本书堪称杰作——由我们这个时代最伟大、最深邃的一位思想家推出的恢弘巨作，闪耀着智慧的光芒。卡尼曼在获得诺贝尔奖之后应该再得一个普利策奖才对。”\n——丹尼尔· 吉尔伯特，哈佛大学心理学教授，著有《哈佛幸福课》，《情感生活》节目主持人"}, {"en": "", "zh": "“丹尼尔· 卡尼曼是我们这个时代最有独创性、最有趣的思想家之一。也许我们这个星球上再无第二个人比他更懂我们怎样作出选择、为什么这样选择了。在这本精彩绝伦的书中，他用一种简单而又吸引人的方式为我们展示了令人受益一生的智慧。尽管方式简单，其内容却十分深刻。本书是所有怀有好奇之心的人的必读之作。”\n——史蒂文· 列维特，芝加哥大学杰出经济学教授，《魔鬼经济学》与《超爆魔鬼经济学》作者"}, {"en": "", "zh": "序言"}, {"en": "", "zh": "我想每位作者都会在脑海中勾勒读者因为读自己的书而受益的情形。我的这本书就像是办公室饮水机旁的闲谈一样，读者对它不会感到陌生。人们在饮水机旁或交流，或闲谈，很随意。我希望这本书能丰富人们的词汇，这样大家在谈论别人的判断与决策、公司的新政策或是同事的投资时，这些新词汇就能派上用场了。书中为何还会涉及闲谈的内容呢？因为利用闲谈来发现和分析别人犯的错误比分析自己的错误更容易，也更有意思。在人生最辉煌的时候，我们很难对自己的信念和需求产生怀疑，越是在最需要质疑自己的时候越难做到这一点，但我们可以从他人的真知灼见中受到启迪。很多人都会不由自主地推想朋友和同事会对自己的选择作何评价，而这些预先推断的中肯程度和内容都是十分重要的。对别有见地的闲谈有所期待是进行严厉的自我批评的强大动力，其作用比新年计划更大，更能提升我们在工作和生活中的决策能力。"}, {"en": "", "zh": "一名内科医生要想成为优秀的诊断专家，就必须掌握多种疾病的大量特征，每种疾病都有其病理和症状，有其自身可能出现的发病前兆及病因、病情发展、结果和治疗或干预手段等。学医，当然也包括对医学用语的学习。要想对他人的判断和决策有更深入的了解，就要有更丰富的词汇，日常生活用语中的词汇还远远满足不了这一要求。我们很可能在闲谈中发现人们出错的方式各不相同，而一再出错就会令人印象深刻，而且我们可以预料到这种情况在特定环境中会再次发生。例如，一个潇洒自信的演讲者刚踏上舞台，观众往往就会对其大加赞赏，他可能并没有那么优秀，但这好评如潮的结果在他踏上舞台的一刹那便可预见。这种先入为主的情形是有据可依的，即光环效应，这一效应使我们更容易预测结果，更容易赏识和理解这位演讲者。"}, {"en": "", "zh": "当别人问你正在想什么时，你一般都能回答上来。你觉得自己知道脑子里在想什么，通常就是一种意识自然而然导出另一种来，但这不是大脑工作的唯一方式，也不是其典型的工作方式。大多数印象和想法都是从意识经验中得来的，而人们是感知不到这一过程的。你无从知道自己是如何晓得面前的书桌上有盏灯，无从知道己如何能通过电话听出爱人有些不耐烦，也无从知道自己如何毫无意识地成功规避了一场车祸。印象、直觉、决策，所有这些脑力活动都在无声地进行着。"}, {"en": "", "zh": "本书讨论的很多内容都与直觉的成见相关。然而，对过失的关注并不意味着我们在诋毁人类智慧，这就如同关注疾病并非否定健康一样。大多数人在通常情况下都是身体健康的，他们做出的决策、采取的行动往往也是恰当的。生活中，我们往往跟着印象和感觉走，凭直觉引导行事，而且我们觉得这种直觉和偏好很可靠，这种自信通常也是正当合理的。不过，也不尽然。我们经常在自己出现失误的时候还信心满满，此时，旁观者往往比我们自己更容易发现这些失误。"}, {"en": "", "zh": "因此，我和大家一起在“饮水机旁交谈”，其目的就是：给读者提供更丰富精确的语言来讨论他人乃至自己在判断和决策上的失误，提升发现和理解这些失误的能力。至少有些例子表明，正确的判断能有效地干预错误，以降低错误的判断和决策经常造成的损失。"}, {"en": "", "zh": "关于判断与决策的有趣研究"}, {"en": "", "zh": "本书展现了我对判断和决策的理解，这种理解受到近几十年来心理学领域新发现的影响。然而，本书中心思想的形成还要追溯到1969年那个幸运的日子。当时我在耶路撒冷希伯来大学的心理学系教书，那天有个研讨会，我请我的一位同事阿莫斯·特沃斯基（Amos Tversky）在会上发言。他当时被视为决策研究领域的一颗新星，不过我觉得在其涉足的任何领域中，他都是耀眼的新星，因此我知道我们那天一定会交谈甚欢。很多认识阿莫斯的人都认为，在自己所见过的人中他是最聪明的。他才华横溢，十分健谈，魅力非凡。他有着超强的记忆力，记得很多有趣的笑话。他还拥有一种超常的能力，那就是利用记住的那些笑话阐明自己的观点。有阿莫斯在，你永远也不会感到沉闷。那时，他32岁，我35岁。"}, {"en": "", "zh": "那天，阿莫斯给同学们讲了密歇根大学正在研究的一个项目，这个项目试图回答这样一个问题，即人是否是优秀的直觉型统计者。我们都知道人是优秀的直觉型文法家：4岁的孩子虽然对世界上存在语法这件事完全没有概念，但她在说话时会努力遵循语法规则。人们对统计的基本原则是否也有这种直觉感受呢？阿莫斯指出，研究得出的结论是附条件的肯定（肯定，但是附有一定条件）。我们在研讨会上进行了激烈的讨论，最终认为较为稳妥的结论应当是附条件的否定（否定，但是附有一定条件）。"}, {"en": "", "zh": "阿莫斯和我很喜欢这种交流活动，我们认为直觉型统计者是个很有意思的话题，要是一起探索的话会很有意思。那个周五，我们在里蒙餐馆吃午餐，那里是波西米亚人和耶路撒冷的教授们最中意的去处。我们两人打算对一些经验丰富的研究人员的统计直觉进行一番研究。在此前那场研讨会上我们曾得出结论：人的直觉是有缺陷的。虽然这些年来一直在教书，在运用统计学原理，但我们也没能培养出一种直觉，无法利用这种直觉感知从小样本中观察到的统计结果的可靠性。我们的主观判断是存在成见的：我们特别容易相信在没有足够证据的基础上得出的研究结果，而且研究中对观察样本的收集也不足。我们两人此番研究的目的，就是要看看其他研究人员是否也和我们一样有着同样的苦恼。"}, {"en": "", "zh": "我们准备了一项调查，其中包括一些研究中出现的实际统计问题。阿莫斯收集了数学心理学协会与会的专家小组的回复，包括曾出版两本统计学教科书的几位作者的问卷。不出所料，我们发现那些专家同行也跟我们一样，总是夸大其词，他们认为一个实验的原创性结果可以被成功复制的概率很大，即使用一个小样本也可以做到这一点。关于实验要收集多少观察数据的问题，他们给一个假定的毕业生的建议也很糟糕。如此看来，即使是统计学家，也算不上是出色的直觉型统计者。"}, {"en": "", "zh": "在撰写这些发现时，阿莫斯和我都觉得我们在一起工作是件很享受的事。阿莫斯总是很风趣，有他在的时候，我也变得幽默了，所以我们总会在轻松愉快的气氛中度过几个小时连续不间断的工作时光。工作中的乐趣使我们变得格外有耐心，人在放松惬意的情况下，更容易取得完美的结果。也许最重要的是，我们把批评的态度都抛在门外了吧。我和阿莫斯都是爱挑剔、好辩论的人，甚至比我更甚，但在我们合作的这些年里，我们从没有不假思索地否定对方。事实上，我发现我们在合作时，阿莫斯总能更清楚地看出我模糊的观点中要表达的意思。我们两人中，阿莫斯的逻辑思考能力更强，他的意见总是有据可依，言之凿凿，令人信服。我则凭直觉走，深受心理学的影响，我的很多观点也都是从心理学中得来的。我们俩有很多相似之处，因此很容易理解对方；我们也有很多不同的地方，这些差异常常令对方吃惊。我们重新安排各自的日程，这样就有很多工作日可以在一起工作，工作之余，我们常会一起散步。此后的14年里，共同合作就成了我们生活的中心，对我们两人而言，那些年里所作的研究是我们一生中最精彩的篇章。"}, {"en": "", "zh": "我们很快便形成了固定的工作模式，并且一直多年保持这一模式。我们的研究采用的是对话形式，对话中的问题是我们自拟的，那些凭直觉做出的答案也是经过我们两人共同检验过的。研究中的每个问题都是一个小实验，仅一天中就会做很多实验。我们并没有刻意寻求自己提出的那些统计问题的正确答案，只是想确认和分析直觉的回答，大脑中最先出现的、即使知道是错的我们也愿意拿来分析的回答。当时，我们认为其他人也会有我们两个人都有的直觉，事实也正是这样。如此说来，直觉对判断的影响便显而易见了。"}, {"en": "", "zh": "我们曾经很高兴地发现，我们俩对几个认识的孩子的未来职业的预想竟如出一辙。我们确信那个3岁大却善辩的孩子将来会做律师，那个有点呆板的孩子可能成为教授，那个体谅他人、循循善诱的孩子可以做个心理咨询师。当然，这些预测都是荒谬的，不过却很有意思。我们都清楚一点，那就是我们对这些孩子的直觉，来自他们自身的特点与特定职业特点的相似度。这种有趣的做法使我们当时就在脑海中创立了一种理论，即预测角色的相似度。此后我们做了许多实验来验证和详细阐述这个理论，下面便是一例。"}, {"en": "", "zh": "在你思考下文中的问题时，请记住史蒂夫是从一个有代表性的样本库中被随机挑选出来的："}, {"en": "", "zh": "邻居如此描述这个孩子：“史蒂夫非常腼腆，少言寡语，很乐于助人，却对他人或者这个现实世界没有兴趣。他谦恭有礼，做事井井有条，中规中矩，关注细节。”请问史蒂夫更可能从事哪种职业，图书管理员还是农民？"}, {"en": "", "zh": "很显然，史蒂夫的个性和典型的图书管理员有着惊人的相似，但这些与职业密切相关的统计学因素却很少有人关注。你们是否注意到，在美国，农民与图书管理员的比例超过20：1，由于农民数量要多得多，所以那些“谦恭有礼，做事井井有条”的人也常常只能成为坐在拖拉机上的农民，而不可能是坐在图书馆咨询台后的管理员。但是，我们发现实验对象往往忽略这些相关的统计数据，而仅仅依赖于相似度来作出判断。于是，我们提出如下观点：人们把相似度当成一种简单的启发手段（简单地说就是经验法则）来作艰难的判断。对这种启发性手段的依赖必然会造成其预测带有成见（系统性失误）。"}, {"en": "", "zh": "还有一次，阿莫斯和我想知道我们这所大学的教授们的离婚率是多少。我们注意到这个问题立即勾起了我们脑海中的记忆，我们俩不由想起自己知道或听说的那些离了婚的教授。于是我们就凭着脑海中这些事例对这个离婚率问题作出判断。我们把这种依靠记忆作出判断的方法称为可得性法则。在一项研究中，我们让调查对象回答一个简单的问题，这个问题与指定的一篇英语课文中的单词相关："}, {"en": "", "zh": "请思考字母K。"}, {"en": "", "zh": "请问字母K是更多地出现在单词的首字母位置上还是第三个字母位置上？"}, {"en": "", "zh": "玩拼字游戏的人都知道，想起以某个字母开头的单词要比想起它在第三个字母位置上的单词容易得多。字母表中任何一个字母都适用于此法则。因此我们料到，尽管有些字母（比如K、L、N、R、V）出现在第三个字母位置上的频率更高，但是被调查对象的回答肯定会夸大所有字母出现在单词首字母位置上的频率。这种情形再一次表明，对经验法则的依赖必然会导致人们判断时的成见。例如，我曾一度认为通奸在政客中较普遍，在医生或律师中则没那么多见，但我最近对此产生了怀疑。我甚至曾为原来的那个“事实”作出若干解释，包括权力的催情效果、出门在外受到的诱惑等。而我最终意识到，政客的过错只不过更容易被曝光而已，而医生和律师的过错却少有人报道。我的直觉印象可以完全归咎于记者对主题的选择和我对可得性法则的依赖。"}, {"en": "", "zh": "阿莫斯和我用几年的时间来研究并记录在不同任务中体现的直觉思考所存在的成见，这些任务包括对事件的概率赋值、对未来进行预测、对假设进行评估，以及对频率进行预估等。在合作的第五年，我们撰文将这项研究的主要发现发表在《科学》杂志上，这份杂志的读者包括很多领域的学者。那篇文章（本书的最后附有全文）描述了直觉思考的简单快捷，列出了在启发法中表现出的大约20种成见，还包括启发法在判定中的作用。"}, {"en": "", "zh": "科学史学家常指出，某一特定领域的学者在任何时候都愿意和他人分享关于本学科的观点。社会科学家也是如此。他们把一切问题都归结为人性，认为大多数关于人类特有行为的讨论都应以此为背景，这一观点几乎从未受到质疑。关于人性，20世纪70年代的社会科学家广泛接纳了两种观点。第一，人大体而言都是理性的，其想法通常也是合理的。第二，恐惧、喜爱和憎恨这样的情感能够为人们失去理智的大部分情形作出解释。我们这篇文章虽然没有直接讨论上述观点，却是对这两种观点的挑战。我们记录下正常人思考时出现的系统性失误，认为这些失误是由认知机制的构造造成的，并非由情感引起的思想腐化导致的。"}, {"en": "", "zh": "这篇文章所受到的关注远远超出了我们的预期，而且它至今仍是社会科学著作中被引用次数最多的文章之一（2010年有300多篇学术文章参考了这篇文章）。其他学科的学者也觉得这篇文章很有用处，启发法和成见等概念被广泛应用于众多领域中，包括医学诊断、法律判决、情报分析、哲学、金融、统计学和军事战略等。"}, {"en": "", "zh": "例如，学习政策的学生就曾注意到，可得性法则能解释为什么有些事人们记得很清楚，而有的却被遗忘了。人们是根据从记忆中提取信息的容易程度来估测事情的重要程度的，而这往往也与媒体报道的广泛程度有关。常被提到的话题就在脑中变得鲜活，而其他的则会慢慢被遗忘。也就是说，媒体选择报道的内容和人们脑中存在的信息不谋而合，所以专制政体对独立媒体施压的现象也不是偶然的了。因为重大事件和名人很容易引起公众的兴趣，媒体能借此煽动狂潮也就见怪不怪了。例如，在迈克尔·杰克逊死后的几周里，电视台几乎未报道别的事。相反，媒体对那些带有批评性的、不能引起公众兴趣、掀不起大波澜的事往往很少报道，比如说去年日趋下滑的教育标准，还有医疗资源的投资过剩等。（我在写这篇文章的时候发现自己选择的“很少报道”的例子都是受可得性限制的。我选为例子的话题经常被提到，那些同等重要却不常被提到的事我往往想不到。）"}, {"en": "", "zh": "有一点我们当时并没有充分意识到，即“启发法和成见”这样的心理学概念在其他领域中也具有广泛的启发作用，这便是我们这项研究的一个附带成果：我们总是把为自己和被调查者设计的全部问题都写进文章里，这些问题可以为读者提供范例，使其认识到自己的想法是如何受认知性成见牵绊的。我希望你在读到“史蒂夫是个图书管理员”这样的问题时能有切身的体验，这样能帮助你更好地体会到相似度在引导可能性上的力量，并且能体验到我们多么容易忽略相关事实的统计。"}, {"en": "", "zh": "这些实证材料的使用可为不同领域的学者（主要是哲学家和经济学家）提供一次不寻常的机会，使他们关注自己在思考时可能出现的纰漏。看到自己的纰漏，这些学者才更有可能质疑当时普遍存在的那种武断想法，即人类很理性、很有逻辑性。方法的选择很重要：如果我们只报道传统实验的结果，这篇文章就不会那么令人关注，也不会令人如此难忘了。而且，那些持怀疑态度的读者会将自己的判断失误归咎于参与这些心理学研究的大学生，认为是这些学生一贯不负责任的做法使他们不愿相信实验结果。当然，我们摒弃传统的实验方法，采用事例展示的方式，并非只为影响那些哲学家和经济学家。我们采用这种方法，是因为将事例展示出来更有思。我们很幸运，因为我们选择了正确的方法，其他各方面的选择也做对了。本书重复出现的一个主题就是，幸运在每个成功的事例中都扮演重要角色。我们总能很容易地发现，这个事例中一个小小的改变就会将伟大的成就变得平淡无奇。我们展示的这些事例也不例外。"}, {"en": "", "zh": "对我们研究的反馈也不全是正面的。我们对成见予以关注的做法受到非常多的批评，反对者认为我们过分否定了人类的思维能力。与对常规科学的反应一样，有些研究者对我们的观点加以改进，有些人则另外提出了一些貌似合理的见解，但有一个观点如今是得到普遍认可的，即我们的大脑容易受系统性误差的影响。我们关于判断（能力）的研究对社会科学产生的影响远远超出我们当时的预料。"}, {"en": "", "zh": "研究完判断这一论题后，我们马上将目光转向面对不确定因素时的决策过程。我们的目标是创立一种心理学理论，研究人们在简单的赌博中如何作决定。例如：投硬币时如果是正面朝上你就能得到130美元，背面朝上就输掉100美元，你愿意打这个赌吗？这些简单的选择很久以来一直被用来检验各种与决策相关的问题，例如人们如何在确定的事物和不确定的结果之间进行权衡。我们的研究方法没有变：还是花很多天设计一些选择题，而后分析我们根据直觉进行的选择是否与通过逻辑判断作出的选择一致。在作判断时，我们会观察自己做出决策时出现的系统性成见，还会对一贯违背理性选择规律的直觉性选择进行观察。在《科学》杂志刊出那篇文章5年之后，我们又发表了《前景理论：风险下的决策分析》一文，据统计，该文中提出的决策理论比我们此前对判断的研究更具影响力，该理论也为行为经济学奠定了一定的基础。"}, {"en": "", "zh": "在合作过程中，阿莫斯和我经常交流思想，两个人的智慧总要胜过一个人的想法，良好的关系也使我们的工作有趣且高效，这段时光是我人生中宝贵的财富。后来，我和阿莫斯离得远了，很难继续共同研究这一课题。我们在判断和决策制定方面的研究使我在2002年获得了诺贝尔经济学奖。如果阿莫斯没有于1996年去世（时年59岁）的话，他应该和我一起去领这个奖。"}, {"en": "", "zh": "快思考，慢思考"}, {"en": "", "zh": "本书并非为展示我和阿莫斯共同合作的早期研究，过去几年里很多作者已经出色地完成了这项工作。我的主要目标是，在认知心理学和社会心理学最新发展的基础上展示大脑的工作机制，在这些发展中有一些内容比较重要，其中一项就是我们认为瑕瑜互见的直觉思维。"}, {"en": "", "zh": "阿莫斯和我没有对直觉下准确的定义，只简单说明了判断启发法“很有用，但有时也会导致严重的系统性误差”。我们的重点放在成见上，因为在人们的大脑高速运转时研究成见非常有意思，而且成见为启发性判断提供了研究依据。我们没有自问在面对不确定因素时所有的直觉性判断是否都是通过我们研究的启发法而产生的。"}, {"en": "", "zh": "不过现在我们知道事实并非如此。专家们的直觉往往很准确，这种准确性与其说是启发法在发生作用，还不如说是长期实践的结果。我们现在可以描绘一幅更加美好、更加和谐的画面，在这幅画面里，熟练和启发法皆可成为直觉性判断和决策的选择依据。心理学家加里·克莱因（Gary Klein）曾讲过一个故事：一支消防队进入一座房屋，屋子里的厨房着火了。他们刚开始用水管浇厨房，指挥官喊道：“全部撤离！”其实他自己也不知道为什么要这样做。在消防员全部撤离的一刹那，厨房的地板轰然塌陷。事后指挥官才回想自己曾意识到这场火并不大，但他的耳朵特别烤得慌。这些他所谓的“对危险的第六感”闪进他的脑海，虽然不知道哪里不对劲儿，但他知道情况不妙。最后大家才知道这场火灾的火源根本不是厨房，而是消防员脚下的地下室。我们都听过一些关于专家的直觉的故事：比如某位象棋大师路过街边棋局，无须驻足观看就知道“白方三步之内将杀”；又如某位医生只需一瞥便能作出全面的诊断。专家式直觉像谜一样吸引着我们，但它们不是谜。我们每个人每天都会多次表现出很强的直觉能力。大多数人在接电话时听到第一个词就能感知对方是否生气了；刚进门就能发现自己是大家谈论的对象；对细微的信号能迅速做出反应，断定旁边车道上的汽车司机正处于危险中。我们日常的直觉能力并不逊于一位经验丰富的消防员或者医生，只是无处施展罢了。"}, {"en": "", "zh": "魔法不属于准确的直觉心理的范畴。也许对此有最精辟论述的人要数伟大的赫伯特·西蒙（Herbert Simon）了，他对多位象棋大师进行过研究，发现在练习数千个小时之后，这些大师看到的棋盘上的棋子和我们眼里的棋子是不一样的。西蒙写道：“这个棋局已经给了我们提示，根据这个提示我们可以搜寻到大脑存储的信息，而这些信息就能给出答案。直觉只不过是人们的认知而已。”看到这种说法，你也许就能感受到西蒙对神化专家直觉的做法不以为然了。一个两岁的小孩看到一只狗时会说“小狗狗”，这没什么好大惊小怪的，因为我们已经对孩子认识事物并叫出很多事物名字这种“奇迹”习以为常了。西蒙认为灵性的直觉所创造的“奇迹”也是如此，不值得大惊小怪。如果专家在新情境中能察觉熟悉的因素，并且采取十分得体的做法来顺应这种情境，这便是正确的直觉。在喊出“小狗狗”的同时，孩子的大脑中就会出现正确的直觉性判断。"}, {"en": "", "zh": "不幸的是，专业的直觉并非全部是从真实的经验中得来的。很多年前，我采访了一家大型金融公司的首席投资官，他告诉我他刚刚买了福特汽车公司上千万美元的股票。我问他是如何做出这样的决策的，他回答说他刚参加了一个车展，感觉很好。他的解是：“这还用问，他们生产的汽车太霸道了！”他非常明确地说，他相信自己的感觉，他对自己和自己的决定都很满意。我很吃惊地发现，他忽视了一个任何经济学家都会注意到的相关问题，特公司的股票最近不是走低吗？而他反而在跟着自己的直觉行事：他喜欢汽车，喜欢福特公司，也喜欢持有其股票的感觉。按照我们的理解，买入股票要谨慎，这位仁兄恐怕根本不知道自己在做什么。"}, {"en": "", "zh": "关于这位投资官投资福特公司股票的问题，阿莫斯和我所研究的特定启发法恐怕是解释不了了，但现在关于启发法还有一种更宽泛的概念，这种概念能对上述行为作出更好的解释。这一宽泛的概念是一个重大进步，即情感因素在我们对直觉判断和决策的理解上发挥了比以往更大的作用。这位投资官的决策在今天可能会被视为受启发法的影响，而判断和决策是直接受好恶这样的情感所左右的，没有什么思忖和推理可言。"}, {"en": "", "zh": "当碰到像走哪步棋或决定是否投资股票这样的问题时，直觉思维机制就会充分发挥其作用。如果某个人有相关的专业知识，她就能更好地认清情况，头脑中形成的直觉性解决方案也很可能是正确的。象棋大师看到复杂的棋局时大脑会迅速反应：刹那间想到的那几步棋一定是好棋。要是问题很难，一时也想不到巧妙的主意，直觉就可能会发挥作用：脑海里可能马上会有个答案，但这个答案却不一定是原题的答案。这位投资官所面对的问题（我是否要投资福特公司股票）就很难，但更简单且相关的问题（我喜欢福特汽车吗）却很快在他的脑海中形成了答案，并且让他就是否作出投资这个问题也作出了相应的选择。这就是直觉启发法的核心观点：当面对难题时，我们往往会对相对简单的问题进行回答，却忽略了自己已经置换了原始问题这个事实。"}, {"en": "", "zh": "有时，我们无法自然地凭直觉找出问题的解决方案，不论是专业的解决方法还是启发式的答案。在这种情况下，我们往往想要找到一种更慢、更严谨、需要投入更多脑力的思考形式，这就是本书中提到的慢思考。快思考既包括直觉思维的不同形式，比如专家式的和启发式的，也包括感觉和记忆等所有无意识的大脑活动，这些活动会让你知道桌上有盏台灯或者想起俄罗斯首都的名字来。"}, {"en": "", "zh": "在过去的25年里，已经有很多心理学家对快思考和慢思考的区别进行了研究。我用两个因素来描述人的思维活动，即系统1和系统2，在后文中我将对分类原因进行更详细的阐述。系统1和系统2分别产生快思考和慢思考。我认为直觉和严谨思考的特点就像是大脑中两种性格的特征和性情。在近期的研究中，系统1的直觉性作用比我感觉到的还要大，它是做出的决策和判断的幕后主使。本书大部分内容是关于系统1的运作以及系统1和系统2间的相互影响的。"}, {"en": "", "zh": "主要内容"}, {"en": "", "zh": "本书共分为五部分，第一部分讲述的是通过双系统进行判断与做出决策的基本原理。这部分内容详细说明了系统1的无意识运作和系统2受控制运作的区别，并且说明了系统1的核心，即联想记忆是如何不断对世界上所发生的事作出连贯的解释的。关于直觉性思考的自主且无意识过程的复杂性和丰富程度，以及这些自主过程如何能解释判断的启发法等问题，我试图说出自己的见解，目的是要引入一套用于思考和表达思想的语言。"}, {"en": "", "zh": "第二部分对判断启发法的研究作了更新，还探索了一个难题，即为什么很难具备统计型思维。我们思考时总是会把多种事情联系起来，会将一件事情比喻成另一件，会突然想起一件事来，但统计学要求同一时间把多件事情串联起来，而这一点系统1是做不到的。"}, {"en": "", "zh": "本书第三部分描述了我们大脑有说不清楚的局限：我们对自己认为熟知的事物确信不疑，我们显然无法了解自己的无知程度，无法确切了解自己所生活的这个世界的不确定性。我们总是高估自己对世界的了解，却低估了事件中存在的偶然性。当我们回顾以往时，由于后见之明，对有些事会产生虚幻的确定感，因此我们变得过于自信。我对这个问题的看法受《黑天鹅》（The Black Swan）的作者纳西姆·塔勒布（Nassim Taleb）的影响。我希望我这“饮水机旁的闲谈”能明智地借鉴以往经验，同时抵制后见之明和虚幻的确定之感的诱惑。"}, {"en": "", "zh": "第四部分的重点是在决策制定的性质和经济因素为理性的前提下讨论经济的原则。1979年，阿莫斯和我发表了关于前景理论的决策模式，此部分在双系统下对前景理论的重要概念提出了新的看法。余下的几章讲的是人们从理性角度出发做出决策的几种方式。可悲的是，人们总是孤立地看待问题，表现出框架效应，即决策的制定往往因为对所回答问题不合逻辑的选择而受到影响。系统1的特征完全能解释这些观察结果，这对标准经济学所倾向的理性假设发起了很大的挑战。"}, {"en": "", "zh": "第五部分是近期研究中关于两个自我的区别性描述，即经验自我和记忆自我，两者间没有共性。例如，我们可以让人们体验两种痛苦。其中一种比另一种要更痛苦，因为体验的时间更长。系统1有一大特点，即记忆的自主形成是有其原则的，如此一来，较为痛苦的那段体验会留下更深刻的记忆。所以，此后当人们选择要回想哪段经历时，他们自然会受记忆自我的引导，将其自身（即经验自我）处于不必要的痛苦中。两种自我间的区别被用来测试人的幸福感，而我们发现使经验自我快乐的事不一定会让记忆自我满足。两种自我同时存在的个体要如何去追求幸福，这一问题引起了把居民的幸福看做政策目标的个人和社会的众多思考。"}, {"en": "", "zh": "最后的章节是按倒叙来探索本书所述的三个区别的：经验自我和记忆自我的区别，古典经济学和和行为经济学（从心理学借鉴而来）的区别，以及自主的系统1和需费脑力的系统2的区别。书中还谈及了有价值的闲谈的好处，以及哪些内容有助于提升判断和自行决策的效能。"}, {"en": "", "zh": "在最后，我附上了我和阿莫斯一起写的两篇文章，第一篇是我早期写的关于在面对不确定性因素时作出判断的评论。第二篇发表于1984年，总结了前景理论和我们关于框架效应的研究成果。文章中有被诺贝尔委员会引用的投稿，你可能会惊讶地发现这些投稿是多么简单。读这些能让你明白我们早期的知识有多少，也能让你知道我们这几十年来的进步有多大。"}, {"en": "", "zh": "第一部分 系统1，系统2"}, {"en": "", "zh": "第1章 一张愤怒的脸和一道乘法题"}, {"en": "", "zh": "审视这位女性的脸时，你正在很自然地将我们平时所说的观察和直觉思考结合在一起。你可以确定且迅速地判断这位年轻女性的头发是黑色的，你还知道她正在生气。此外，你还可以根据自己的观察对其行为进行推测。你感觉到这位女性正要说一些刻薄话，也许声音又大又刺耳。推测被观察对象即将做出的举动并不难，这种活动是无意识的，而且毫不费力。你并非有意评论她的情绪或是推测她可能要做的事，你对这张照片的反应跟你做过的事情没有丝毫关系，一切都是自然而然发生的。这就是快思考的一个例子。"}, {"en": "", "zh": "现在，请看下面的问题："}, {"en": "", "zh": "17乘以24"}, {"en": "", "zh": "你能立刻知道这是一道乘法题，也许你还会想到若有纸笔，就能算出答案。你还会对答案的大体范围有个模糊的直观认识，能很快知道12609和123不可能是答案。但如果不花点时间来计算的话，你就无法确定568不是正确答案。由于想不出一个准确的答案，你认为自己得想想是不是要做这道题。如果你还没有做这道题的话，就该试着做一做，哪怕完成其中的一部分也好。"}, {"en": "", "zh": "按部就班的运算过程便是慢思考。首先，你会从记忆中重新提取读书时所学的乘法相关知识，然后加以运用。这个过程不容易，你得记住很多内容，你要知道自己算到哪一步了，知道下一步该怎样做，同时还要记住已得到的结果。这个计算过程是脑力工作，需要刻意、努力并且有序地进行，这也是慢思考的一个特征。这种计算不仅是大脑活动，身体也会参与其中，在计算时你的肌肉会紧张，血压会上升，心跳会加速。若在你解决这个问题时，有人在近处看你的眼睛，他会发现你的瞳孔也会扩大。结束计算时，得出正确答案（顺便提一下，答案是408）或是放弃计算都被视为结束计算，你的瞳孔便会恢复到正常大小。"}, {"en": "", "zh": "行为与注意力"}, {"en": "", "zh": "近几十年来，许多心理学家对人的两种思维模式一直保持着浓厚的兴趣，这两种思维模式是由一张愤怒女性的照片和一道乘法题所引发的，他们还指出了两种模式的许多特征。这里我且采用由心理学家基思·斯坦诺维奇（Keith Stanovich）和理查德·韦斯特（Richard West）率先提出的术语，用以说明大脑中的两套系统，即系统1和系统2系统1的运行是无意识且快速的，不怎么费脑力，没有感觉，完全处于自主控制状态。系统2将注意力转移到需要费脑力的大脑活动上来，例如复杂的运算。系统2的运行通常与行为、选择和专注等主观体验相关联。系统1和系统2的定义广泛应用于心理学领域，但我在本书中所作的阐释更加深入，读者可将此书视为有两个人物的心理剧。"}, {"en": "", "zh": "我们在审视自己时，往往更容易采用系统2，认为自己头脑清醒，富有逻辑，抱有信仰，善作抉择，能够决定自己想要什么和该做些什么。尽管系统2的运行体现在行动中，但自主运行的系统1才是本书的重点。我将系统1描述成自主而初始的印象和感觉，这种印象和感觉是系统2中明确信念的主要来源，也是经过深思熟虑后作出抉择的主要依据。系统1的自主运作诱发了极其复杂的理念模式，但只有相对缓慢的系统2才能按部就班地构建想法。我还描述了继而发生的系统2的环境条件，在此条件下，系统1中随性的冲动及其诱发的联想都会受到抑制。读过此书后，你会觉得这两种系统各有千秋，各司其职。"}, {"en": "", "zh": "依据复杂性进行粗略预估，试举以下系统1引发的自主行为的例子：确定两件物品孰远孰近。确定突然出现的声源。将短语“面包和……”补充完整。看到恐怖画面后做出厌恶的表情。察觉语气中的不友善。回答2加2等于？读大型广告牌上的字。在空旷的道路上驾车行驶。下象棋时看出一步好棋（前提是你是位象棋大师）。理解简单的句子。听到“畏首畏尾，追求完美”的说法时，知道其意指古板的员工。"}, {"en": "", "zh": "上述所有思维活动都和那位愤怒的女性相关，这些活动都是自主发生且毫不费力的。系统1的诸多能力当中包括一些与生俱来的能力，这些能力与其他动物的本能一样。我们生来就能感知周围的世界，能够认识事物，可以集中注意力，会规避风险，会害怕蜘蛛，思维时快时慢。大脑的其他思维活动也因长期的训练而变得快速自主。系统1除了能将我们已有的知识（比如法国的首都是哪里）联系起来之外，还能使我们掌握一些技能，比如看出并理解一些社交场合的细微差别。有些技能只有专家才能掌握，比如象棋中出奇制胜的那几招；而其他的技能，普通人都能掌握。例如，要想看出刻板员工的个性有哪些相似之处，还需要我们掌握大量的语言及文化知识，而大多数人都具备这些知识，这些知识就储存在我们的记忆中，不必刻意也无须努力便可随意存取。"}, {"en": "", "zh": "以上列出的大脑活动是完全无意识的。你不必刻意学习便可领会一些母语中的简单句子；听到突然的一声响后会自发地确定声源；看到“2加2”就知道等于4；提到法国的首都时会不由自主地想到巴黎。其他一些行为可能会受到大脑的控制，比如咀嚼的动作，但大体上还是无意识的。系统1和系统2这两个系统都对注意力有控制作用。确定声源位置通常是在系统1控制下的无意识活动，随后系统2会立即被激发，产生有意识的注意力。拥挤的派对上，你也许会对大声而无礼的谈话置之不理，不过，即使你的头没转过去，你的注意力也已经转移过去了，哪怕只有一会儿。但是，要想将注意力从不想关注的对象上转移开来也容易，去关注另一个目标即可。"}, {"en": "", "zh": "系统2的运作是高度多样化的，但所有这些运作方式都有一个共同特征：所有运作都需要集中注意力，如若注意力分散，运作也会随之中断。以下是一些例子：赛跑时随时作好起跑准备。关注马戏团里的小丑。在一间嘈杂、拥挤的屋子里关注某个人的声音。寻找某位白头发的妇女。搜寻大脑记忆，判定声音是否表达惊喜。保持比平常快的步行速度。观察自己在社交场合的做法是否得体。数出文章中某页字母a的出现次数。告诉某人你的电话号码。在狭小的空间里停车（除车库管理员外，大多数人停车的车位都很狭窄）。比较两款洗衣机的总体功效。填纳税申报表。检验一个复杂的逻辑论证的有效性。"}, {"en": "", "zh": "在上述各种场景中，你都必须集中注意力。若是没有准备好或者没有将注意力集中到正在做的事情上，你的表现就会差强人意，甚至是一塌糊涂。系统2具有某些改变系统1运作方式的能力，通过控制注意力和记忆力的一般自主运行功能的方法可以实现这些改变。例如，在繁忙的火车站等亲戚时，你若是刻意去找某位头发花白的妇女或是长着胡子的人，即使隔着一段距离你也很可能发现自己的亲戚；你也可以在记忆中搜寻哪些国家的首都是以字母N开头的，或者法国有哪些存在主义小说；而当你在伦敦希斯罗机场租车时，地勤人员很有可能会提醒你“在我们国家是右驾左行”。"}, {"en": "", "zh": "在上述所有事例中，没有哪件事情是水到渠成的，你会发现始终如一地保持某种状态需要付出持之以恒的努力，至少要一直耗费精力。"}, {"en": "", "zh": "“注意力要集中”，这个耳熟能详的短语是很有道理的，如果你将原本应分配给某些活动的注意力分散开来，如果分散掉的注意力有限，还可以接受；但是如果你想透支你的注意力，将其过度分散到其他事情上，结果就会失败。这证明了有些费脑力的活动会相互影响，也说明了为什么同时进行几项活动很难，甚至是不可能的。就如同你不能一边向左转入路线复杂的道路，一边计算“17乘以24”这道乘法题的结果一样，两者无法兼做。当然了，最好还是不要尝试。你可以同时做几件事情，但前提是这些事简单易懂，你可以在空旷的高速公路上一边开车一边和别人交谈而不出事故。有些家长可能会感到有些愧疚，因为他们在给孩子读故事时，脑子里还在想别的事。"}, {"en": "", "zh": "每个人都能多多少少地意识到注意力是有限的，在社会生活中我们也会为此作出妥协。例如，当司机正在一条匝道上赶超一辆卡车时，车上的成年乘客会明智地停止与司机攀谈，因为他们清楚地知道，在这个时候让司机分心并不是什么好事，而且他们会认为司机此时会屏蔽掉别人的话语，仿佛暂时性失聪一般。"}, {"en": "", "zh": "当人们太过专注于某件事时，就会屏蔽掉其他事情，即使是平时很感兴趣的事也不例外。在《看不见的大猩猩》（The Invisible Gorilla）一书中，克里斯托弗·查布里斯（Christopher Chabris）和丹尼尔·西蒙斯（Daniel Simons）两位作者为我们提供了一个最具戏剧性的证明。他们设计了一部两队传篮球的短片，其中一队穿的是白色球衣，另一队穿的是黑色球衣。观看短片的人需要数出白衣球队的传球次数，忽略掉另一队传的球。这个任务比较困难，需要完全投入才行。短片播到一半时，一个套着大猩猩服装的女人出现了，她穿过球场，捶着胸，然后继续走动。这只“猩猩”出现了9秒钟。上万人看了这部短片，其中约有一半人并未注意到有什么异。之所以这样，是因为这个计数任务，尤其是那个忽略黑衣球队的要求，造成了这种屏蔽。若没有那项任务，所有观看短片的人都会注意到那只“猩猩”。观看和定位是系统1的自动功能，但在执行时需要将一些注意力分配给相关的刺激物。该书的两位作者提到，在这项研究中，最值得注意的是人们在知道结果后的吃惊反应。那些没有看到“猩猩”的观众刚开始就确信场上没有“猩猩”，他们很难想象自己会错过这件吸引人眼球的事。这个关于“猩猩”的研究阐述了与我们大脑相关的两个重要事实：我们会忽视显而易见的事，也会忽视自己屏蔽了这些事的事实。"}, {"en": "", "zh": "系统1遇到麻烦，系统2会出面解决"}, {"en": "", "zh": "本书紧扣两个系统相互作用这一主题，其内容与结构简洁明了。在书中我将指出，当我们醒着时，系统1和系统2都处于活跃状态。系统1是自主运行，而系统2则通常处于不费力的放松状态，运行时只有部分能力参与。系统1不断为系统2提供印象、直觉、意向和感觉等信息。如果系统2接收了这些信息，则会将印象、直觉等转变为信念，将冲动转化为自主行为。通常情况下，一切都会顺利进行，系统2会稍微调整或是毫无保留地接受系统1的建议。因此，你一般会相信自己的最初印象，并依自己的想法行动。通常情况下，这样也挺好的。"}, {"en": "", "zh": "当系统1的运行遇到阻碍时，便会向系统2寻求支持，请求系统2给出更为详细和明确的处理方式来解决当前问题。系统2在系统1无法提供问题答案时，就会被激活，这好比你碰到了“17乘以24”这样的乘法题，系统1无法给出答案，系统2便被激活来解决问题。当你遇到令人吃惊的事情时，同样会感到自己有意识的那部分注意力会瞬间激增。另外，在系统1所设定的世界里，电灯不会跳，猫不会像狗一样汪汪叫，“猩猩”也不会穿过篮球场。如若事物违反了系统1所设定的关于世界的模式，系统2同样会被激活。"}, {"en": "", "zh": "“猩猩”的实验表明，想要察觉到令人惊讶的刺激物，就要对其予以关注。然后，那种惊讶会激发并引导你的注意力：你会将目光集中在令你瞠目的对象身上，并在记忆中搜寻此事令人惊讶的原因。系统2还会起到持续监督你自身行为的作用，有了它，你在生气时也能保持应有的礼节；有了它，你在夜晚开车时也能保持警惕。"}, {"en": "", "zh": "当你就要犯错时，系统2就会受到刺激，加速运作。回想一下，在冒犯别人的话即将脱口而出时，想把话咽回去是多么困难。总的来说，你（或你的系统2）所想所做的大多数事情都是由系统1引起的，但当事情变得困难时，系统2便会接手难题，系统2出马，所有事情都会迎刃而解。"}, {"en": "", "zh": "系统1和系统2的分工是非常高效的：代价最小，效果最好。通常情况下，这种分工很有效，因为系统1很善于完成自己的本职工作：它在熟悉情境中采取的模式是精确的，所作出的短期预测是准确的，遇到挑战时做出的第一反应也是迅速且基本恰当的。然而，系统1存在成见，在很多特定的情况下，这一系统易犯系统性错误。"}, {"en": "", "zh": "你会发现这个系统有时候会将原本较难的问题作简单化处理，对于逻辑学和统计学问题，它几乎一无所知。系统1还有一个更大的局限，即我们无法关闭它。如果看到屏幕上显示一个你认识的单词，你就能读出这个词，除非你的心思完全不在它上面。"}, {"en": "", "zh": "冲突与自我控制"}, {"en": "", "zh": "图2是由一个经典的实验演变而来的，说明了两个系统之间的冲突。你可以先试着做做下面这个练习，然后再接着往下读。"}, {"en": "", "zh": "你的第一个任务是先浏览一下下面这些文字，说出哪些字较小，哪些字较大。完成第一个任务后，再看一遍这些字，说出每一个字的位置。如若字的位置偏左，则说（默默自语）“左”；如若字的位置偏右，则说“右”。"}, {"en": "", "zh": "这些任务都需要系统2的参与，因为读出“高或低”或是“左或右”和平时由上到下看一列字根本就是两回事。要完成这项任务，你所做的事情中要包括为记忆编程，使相关的字（例如第一个任务中的高和低）能够“脱口而出”。浏览右边一栏文字的时候，你能很快读出该任务所选文字，不大可能将其读成其他文字。但左边一栏文字却有所不同，因为其中所包含的文字与任务所设定的要求是重叠的。你无法忽略掉这样的干扰。通常情况下，你能做出正确的回应，但战胜脑中两种相互冲突的反应会给你造成压力，使你的速度减缓。这便如同经历了一场斗争，斗争双方分别是你打算完成的任务和影响任务完成的自主反应。自主反应和控制这种反应的意图之间存在冲突，这种冲突在生活中极为普遍。我们差不多都有过这样的经历：在餐厅里，自己的邻座是一对穿着怪异的夫妻，但我们会尽量不去盯着他们看。我们也清楚，如果看书时老是重读不知所云的内容，这就说明我们在强迫自己去读一本无聊的书。在冬季严寒的地区，许多司机都有着这样的记忆：当他们的车在冰上滑行失去控制时，他们必须放弃平时的做法，竭力去按照已反复演练过的指示进行操作：“如果车打滑，做什么都行，就是别踩刹车！”另外，每一个人都有强忍着不诅咒别人去死的经历。系统2的众多任务中就包括抑制系统1产生的这些冲动。换句话说，系统2负责人们的自我控制。"}, {"en": "", "zh": "看上去不等长实际上等长的两条线"}, {"en": "", "zh": "既然测量了这两条线的长度，你，你的系统2，即你称为“自我”的意识体，就会有一个新的信念：你知道这两条线是等长的。当被问及它们的长度时，你也会如实说。然而，你肉眼所见的依然是下面那条线比较长。你选择相信测量的结果，但无法控制住系统1带给你的直观感受，即使你知道这两条线长度相同，但是仍然无法把它们视为等长的线。想要消除这种错觉，唯一能做的就是当你再看到两条平行线，并且线的两端有朝向不同方向的箭头时，必须学会怀疑自己的感觉。要贯彻这一规则，你必须具备识别这种错觉模式的能力，能够回忆起你所了解的相关知识。如果可以做到这一点，你就再也不会掉入缪勒·莱耶错觉的陷阱了。但是，你眼中所见的两条线肯定还是一条长一条短。"}, {"en": "", "zh": "不是所有错觉都是视觉上的，还有思维方面的，我们将其称为认知错觉。我读研究生的时候，选修了一些与心理疗法的艺术及科学相关的课程。记得有一次上课时，老师跟我们分享了一些坐诊艺术。他告诉我们：“有时，你会碰到一两个这样的病人，他会像说故事一样，讲述自己以前遭遇的误诊，这些诊断五花八门，让人担心。他看过几个临床医生，但都没多大效果。这个病人还能清楚地描述医生是如何误解他的，但他很快就观察到，你和其他医生是不一样的，你能感同身受，充分理解他，并可以为他提供帮助。”此时，我的老师提高了音量，继续讲道：“千万别有接收这个病人的想法！将他赶走！他很有可能是位精神病患者，而且你也帮不了他。”"}, {"en": "", "zh": "多年以后，我才知道那位老师当时是在提醒我们，要提防病态的假象。精神病研究领域的权威也证实了我们那位老师所给的建议是合理的。这与缪勒，莱耶错觉类似。没人教过我们如何体会患者的心情。所以我们的老师断言，我们对那位患者的同情心是不由自主的，这种同情心可能源自系统1此外，也没有人教过我们不要总是相信自己对患者的感情。有人告诉我们，过多关注一个有数次治疗失败经历的病人是一种危险的信号，正如平行线两端的箭头一样，会让人产生错觉。这是一种认知错觉。我的老师教过我（系统2）如何识别这种错觉，也曾告诉我切莫相信这种感觉，更不要依照感觉行事。"}, {"en": "", "zh": "提到认知错觉，最常被问及的问题就是能否避免这种错觉。上述各例传达的信息不容乐观。因为系统1是自主运行的，我们无法随意使其停止，因此直观思维所导致的错误常常难以避免。我们不可能一直没有成见，因为系统2可能对系统1产生的错误毫无所知。即使对可能发生的错误有所察觉，也需要系统2进行强有力的调控和积极的运作才有可能避免。然而，作为一种生活方式，时刻保持警觉性并不是一件好事，想要这样做也并不实际。总是质疑自己的想法会使我们的生活非常枯燥乏味，因为系统2在代替系统1进行日常抉择时总是耗时很长且非常低效。最好的解决办法就是妥协：学会区别常会出现重大错误的情境，在风险很高的时候，尽力避免这些错误。前文中曾提到过，发现别人的错误总比发现自己的错误更容易。"}, {"en": "", "zh": "两个虚拟出来的角色"}, {"en": "", "zh": "你可以将上述两个系统想象为大脑内部的两个人，他们有着各自不同的特征、能力和局限性。在书中我常会将这两个系统当做一些句子的主语，例如“系统2统计产品数量”。"}, {"en": "", "zh": "在我所在的职业圈子中，使用这样的语言被视为一种过错，因为这种说法貌似通过一个人头脑中那两个小人的思维和行为去解释这个人的思维和行为。从语法上讲，这个关于系统2的句子与“管家监守自盗”的句型类似。我的同事指出，管家的行为实际上就解释了现金的丢失原因，由此他们也很怀疑关于系统2的那个句子同样解释了算错产品数量的原因。我的回答是，这个短小的主动句认为统计是系统2所为，而且这个句子是一种描述而不是一种解释。这样的描述只有在你已经对系统2有一定的了解后才有意义。看看下面这段让人纠结的话吧：“心算是一个需要作出努力的自主活动，人在心算时总会瞳孔放大，心跳加速，因此你绝对不能一边开车左转，一边心算得出结果。”"}, {"en": "", "zh": "同样，“通常情况下，在高速路上行驶的任务要留给系统1来完成”这句话说明驾驶这辆车转弯是自主行为，不用费脑力，也意味着一个驾车新手能够一边与别人攀谈，一边轻松地在空旷的高速路上行驶。最后，“系统2防止了詹姆士因为受到侮辱而做出愚蠢的举动”这句话则表明，如果其努力自控的行为受到干扰（比如他喝醉了），詹姆士就应该会有过分的举动。"}, {"en": "", "zh": "尽管系统1和系统2是本书的主题，但我必须要澄清一个事实，即两个系统并不是真实存在的，它们只是我杜撰出来的角色。系统1和系统2不是标准意义上的实体，没有错综复杂的组成部分，也不是大脑中某个固定的部位。你有可能会问：为什么要在如此严谨的一本书中引进两个名字并不漂亮的虚拟角色呢？答案很简单，这两个角色很重要，因为我们每个人都会有些奇特的想法无法解释。一个句子若是讲一个客体（系统2）做什么，则要比对这个客体及其特征进行描述更容易理解。换句话说，“系统2”比“心算”更适合当句子的主语。我们的大脑，特别是系统1，似乎拥有一些特别的能力，能够构想和领会施动者的故事。这些施动者有其特有的特征、习惯和能力。你很快就会对那个监守自盗的男管家产生坏印象，认为他还会继续偷盗，而且你暂时无法忘掉这个人。这也是我对这两个系统语言所寄予的希望。"}, {"en": "", "zh": "为什么将两个系统命名为系统1和系统2，而不是“自主系统”和“耗力系统”呢？原因很简单：说出“自主系统”比说出“系统1”所需的时间长，因此会占用更多大脑工作记忆（短时记忆）的空间。这一点很重要，因为任何事物占用了大脑的工作记忆，都会削弱你的思考能力。你可以将“系统1”和“系统2”当做昵称，就像鲍勃和乔一样，用这种拟人的方式去了解整本书中出现的各种角色。有了这两个虚拟的系统，我便能更从容地思考有关判断与决策的问题，而你也能更轻松地读懂我的文字。"}, {"en": "", "zh": "示例：系统1和系统2\n“他有印象，只是其中一部分是幻象。”\n“这纯粹是系统1的反应，她在意识到危险之前就果断采取了行动。”\n“这是你系统1的想法，放慢速度，听听系统2的看法吧。”"}, {"en": "", "zh": "第2章 电影的主角与配角"}, {"en": "", "zh": "虽说不太可能，但假设本书真的被拍成电影的话，自视为主角的系统2一定只能做个配角。在这个故事中，系统2的典型特征表现在其各项活动都需要努力，但其自身却很懒惰，除了必需的努力外，它不愿多付出，哪怕是一点点。因此，虽然系统2认为是自己选择了人们的想法和行为，可实际上，这些选择都是在系统1的引导下完成的，系统1才是这个故事的真正主角。然而，一些至关重要的任务却只有系统2才能执行，因为这些任务需要付出努力和控制自我，由此方可抑制系统1产生的直觉和冲动。"}, {"en": "", "zh": "瞳孔是人类思维活动的灵敏指示器"}, {"en": "", "zh": "如果想让你的系统2全力运转，你可以做做下面的练习。这个练习会让你在5秒钟之内达到认知能力的极限。首先，编一串不同的4位数数字，并将这些数字写在一张索引卡上。然后，在桌上放一张空白的卡片。你即将要执行的任务叫做加1，以下是其具体做法："}, {"en": "", "zh": "敲打出稳定的节奏（最好是有一个节拍器，并将其设定为一秒一拍）。移动空白卡纸，大声读出数字。然后等待两个节拍，说出一个新的数字（这个数字是将原来那个数字的每一位都加1得来的）。例如：卡片上的数字是5294，新的数字就应该是6305。另外，跟上节奏很重要。"}, {"en": "", "zh": "很少有人在加1任务中能胜任超过4位数的数字，但如果你想挑战一下自己，可以尝试一下加3的任务。"}, {"en": "", "zh": "如果想知道大脑在快速运转时身体正在干些什么的话，你可以这样做：在书桌上堆两摞书，将你的下巴放在其中一摞上，将一台摄像机放在另一摞上。打开摄像机，在你做加1或加3任务时，盯着摄像机的镜头看。然后，你可以通过摄像机真实的记录发现，你的瞳孔大小会随着你的努力程度而变化。"}, {"en": "", "zh": "很久以前，我就开始练习加1任务了。在我职业生涯的早期，作为研究催眠实验的访问学者，我在密歇根大学待了一年。在寻找有意义的研究课题时，我在《科学美国人》（Scientific American）杂志中看到了心理学家埃克哈特·赫斯（Eckhard Hess）的一篇文章。该文章指出，瞳孔是人类心灵的窗户。最近，我又读了一遍这篇文章，备受启发。赫斯在文章的开头说道，他的妻子注意到当他在观赏美丽的风景图片时，瞳孔会扩大。文章结束处有两张吸引人的照片，照片是同一个漂亮女人，但其中一张照片中的她显得比另一张中的更加漂亮。造成这种不同的唯一原因是：在更漂亮的那张照片中，女人的瞳孔比较大，而另一张的瞳孔比较小。赫斯在文章中还提到了颠茄（belladona），一种使人瞳孔变大的物质，曾作美瞳之用。作者还提到，一些常去赶集的人常常戴着墨镜，因为这样就能隐藏自己对商品的兴趣了。"}, {"en": "", "zh": "赫斯的一个发现让我特别感兴趣。他发现瞳孔就像是大脑运转情况的灵敏指示器，它们在人们进行乘法运算时会扩散，在人们解决更为困难的问题时扩散得更大。他的观察还表明，对脑力工作的回应与唤起情感是不同的。赫斯的这篇文章与催眠关系不大，但我认为，“大脑活动是可以看见的”这一想法是个值得研究的课题。杰克逊·比提（Jackson Beatty）是实验室里的一个研究生，他对这个课题同样很感兴趣。于是，我们一起展开了研究。"}, {"en": "", "zh": "比提和我设计了一个类似于验光仪器的装置，受试者可将头倚在可固定住下巴和前额的支架上，然后一边盯着镜头，一边听事先录好的问题，并跟着节拍器的节拍回答这些问题。每一个节拍都会触发红外闪光拍照。在每期实验结束时，我们都会很快把照片冲洗出来，并将它们投影到屏幕上，然后用尺子测量瞳孔大小。这种方法对年轻人和没有耐心的研究者而言都很适用：我们能很快知道实验的结果，而且这些结果总能说明一些问题。"}, {"en": "", "zh": "比提和我很关注有节奏的任务，例如在加1任务中，我们能准确地了解受试者每时每刻的大脑活动。我们记录了跟着节拍器说出的一串数字，并指示受试者在保持节奏的情况下，逐一重复或是转换这些数字。我们很快发现，瞳孔的大小会逐秒发生变化，这也就反映了任务的难度在不断变化。瞳孔随时间变化的曲线图最后呈倒V字形。如果去做加1和加3任务，你会发现每听到一个新数字，任务难度就会加大一些，最后达到一个几乎令人难以接受的极限。那时，你会在节拍中或停顿时极快地说出转换后的数字，这就相当于“释放”了自己的短时记忆，然后，你才渐渐感到放松了一些。瞳孔大小的数据与受试者的体验非常吻合：数字位数越多，瞳孔扩散得越大；任务的难度与付出的努力相符合；瞳孔扩散到最大的时候也正是付出努力最多的时候。与立刻重复一个7位数相比，4位数的加1任务会使瞳孔扩散得更大。加3任务则更为困难，这项任务是我所观察到的要求最高的任务。仅仅在前5秒钟，瞳孔就扩散了50%，心跳每分钟增加了7拍。这是一个人能达到的最大工作极限，如果超过这个极限，人们就会自动放弃。当我们给实验受试者的数字超过他们所能承受的范围时，他们的瞳孔就会停止扩散或是收缩。"}, {"en": "", "zh": "我们在宽敞的地下室套间里工作了几个月，套间里有相关闭路系统，可以将受试者的瞳孔投影在走廊的屏幕上；我们同时还可以听到实验室里的情况。投射出来的瞳孔直径大约是一英尺；观察受试者工作时的瞳孔变化是件非常有趣的事，引得那些来我们实验室参观的人纷纷驻足。我们预测受试者何时会放弃任务，自娱的同时也给参观者留下了深刻的印象。在心算一道乘法题时，受试者的瞳孔会在几秒之内变大并保持那样的大小，直到她算出答案或是放弃。我们在走廊里观察这些瞳孔时，时常会让受试者和参观者感到惊讶。我们会问受试者：“为什么你刚才停下来了呢？”"}, {"en": "", "zh": "实验室里的人经常会问：“你是怎么知道的？”我们回答：“因为我们看见了你心灵的窗户。”"}, {"en": "", "zh": "我们在走廊里随意的观察有时和正式的实验一样能说明问题。在两个任务的间隙，我随意看了一下某位女性的瞳孔。她把头放在了装置上，所以当她与实验人员进行例行谈话时，我能够观察到她的瞳孔变化。我惊讶地发现，她的瞳孔并没有伴随谈话和倾听而发生明显的扩散或收缩。与我们研究的任务不同的是，平常的谈话明显只需要一点努力或是完全不费力，不会比记住两位或三位数需要的精力多。这是灵感迸发的时刻：我意识到我们选择研究的任务全都是需要付出特别多努力的。我的脑中闪现一个想法：我们大脑的生活步调（现在我爱用系统2的生活步调来代替）大多像是在悠闲地散步，有时候会变成慢跑，只有在极少数的情况下，才会如短跑冲刺。"}, {"en": "", "zh": "执行加1和加3任务时，大脑就像是在短跑冲刺；而平时随意的聊天，大脑就如同在漫步。"}, {"en": "", "zh": "我们发现，如果人的大脑正处于冲刺的状态，就有可能（对次要信息）产生有效的屏蔽。前文提到的《看不见的大猩猩》一书的作者就是通过让观察者持续专注于数传球次数而对那只“猩猩”视而不见的。我们通过加1任务提供了一个不那么夸张的例子。当受试者在执行加1任务时，我们会给他们看一串快速闪过的字母。我们要求受试者对加1的数字任务给予充分的重视，但是在这个任务即将结束时，他们也需要说出字母K是否在整个实验中出现过。这个实验的主要发现是，人们锁定和报告指定字母的能力在执行任务的10秒钟内发生了变化。如果字母K出现在加1任务的开始或结尾，几乎所有观察者都不会错过，但如果字母K出现在大脑活动最为频繁的中间时段，就算彼时他们正睁大眼直直地盯着这个字母，也会生生错过它。没能发现字母K的线形图与瞳孔大小变化所呈现的倒V形是一致的，这种一致性再次证明：瞳孔是衡量与思维活动形影不离的生理刺激的标尺，我们可以通过瞳孔了解大脑的运行状况。"}, {"en": "", "zh": "就像是你家或公寓外安装的电表一样，瞳孔提供了一个关于你大脑使用率的参数。这个类比还可以有更深入的解释。你的用电量取决于你用电来做什么，是开灯还是烤面包。当你打开电灯或是烤面包机时，你就会获得所需要的电量。同样，我们也能决定自己要做什么，但做成这件事得花多少精力我们就说不准了。假设你见到一个4位数，比如9462，然后被告知，你的性命就取决于是否能在10秒内记住这个数字。无论你多想活下去，付出的努力也不会比用同样数字执行加3任务时付出的多。"}, {"en": "", "zh": "系统2和你家里的电表能力都有限，但它们对超负荷的负载反应不同。当用电超负荷时，断路器会跳闸，致使那条线路上的所有电器都断电。相反，如果大脑的使用超负荷，其处理则是有选择性且精确的：系统2会偏向最重要的活动，因此这个活动会得到其所需的注意力，其他“多出来的”注意力再慢慢被分配到其他任务中去。"}, {"en": "", "zh": "我们所做的猩猩实验要求受试者更加关注数字任务。我们确信他们按要求完成了任务，因为可视目标（指“猩猩”）出现的时候并没有对主要任务造成影响。如果那个关键字母K是在大脑活动量最大的时刻闪现的，受试者往往会将其屏蔽掉。而当数字转换任务要求并不那么高时，受试者就更有可能觉察到这个字母。"}, {"en": "", "zh": "注意力这种精细的分配是在大脑漫长的进化过程中形成的。快速判断最严重的困难或者快速锁定最佳时机并做出迅速反应能提高生存概率。当然，这种能力并不专属于人类。即使在现代人中，系统1也会承担起应对突发情况的任务，完成自我保护的最高使命。试想在开车时，车意外地滑到了一大片油区，你会发现，在充分意识到这一点之前，你就已经采取了躲避危险的行为。"}, {"en": "", "zh": "比提和我在一起工作的时间只有一年，但我们的合作对于各自今后的职业生涯都产生了很大的影响。他最终成为“认知瞳孔测量法”的权威，而我则写了《注意与努力》（Attention and Effort）一书。这本书在很大程度上是以我们此前的共同研究为基础而写的，与我后来在哈佛大学所作的后续研究也密不可分。通过类型多样的任务来测量瞳孔大小，我们知道了许多关于大脑工作的知识（现在我都把工作中的大脑视为系统2）。"}, {"en": "", "zh": "当你对执行一个任务越来越熟练时，需要付出的努力程度就会降低。对大脑的各项研究证明，与行动相关的活动模式会随着熟练程度的加强而变化，一些大脑区域将不再参与其中。天才也是如此。通过观察瞳孔变化和大脑活动，我们发现高智商的人往往需要较少的努力便可解决同样的问题。普遍的“最省力法则”不仅适用于体力活儿，还适用于我们的认知行为。这个法则主张，如果达成同一个目标的方法有多种，人们往往会选择最简单的那一种。在经济行为中，付出就是成本，学习技能是为了追求利益和成本的平衡。因为懒惰是人类的本性。"}, {"en": "", "zh": "我们研究的这些任务对瞳孔变化的影响差别很大。从基本水平来看，我们的受试者都是清醒的、有意识的，并时刻准备好投入到任务中去，也许觉醒水平和认知准备比平时还高、还充分。记住一位数或两位数或是学会将数字与词汇相联系（比如3等于门）会对基准线以上的记忆觉醒产生确切的效果。但是，这样做收效甚微，只有5%的瞳孔直径增大与加3任务有关。鉴别两个音调高低的任务也能有效地使瞳孔扩大。最近的研究还表明，抑制住自己读出干扰性单词的倾向同样会产生一定的效果，而在短时间内记住6位或7位数字则需付出更多精力。如你所体验到的那样，当被要求说出你的电话号码或是爱人的生日时，你需要作一番简单却重要的努力，因为你的回应是有逻辑的，你必须将整串数字记在脑中。而心算两位数的乘法题和加3任务则已经接近人们能够做到的极限。"}, {"en": "", "zh": "为什么我们看不见那只“大猩猩”？"}, {"en": "", "zh": "是什么原因使某些认知任务较其他的更加困难、更需付出努力呢？若注意力是种货币，那我们要买些什么样的产品呢？什么又是系统2能做而系统1不能做的呢？我们现在对这些问题给出假设性的回答。"}, {"en": "", "zh": "想要同时记住不同的想法也需要耗费精力，其中有些想法需要按不同方案实施，另一些想法则需与一定的规则结合起来实施，在进超市前重新核实你的购物单，在餐馆吃饭时，在鱼和牛肉之间进行选择，或是根据小样本得来的信息归纳出一个令人惊喜的结果等，都属于此类实例。系统2是唯一一个可以按规则运行、能根据属性来对比物品、能深思熟虑作出选择的系统。自动运行的系统1不具备这些能力。系统1能察觉简单的关系（比如“他们长得一模一样”，“儿子比父亲高得多”），还擅长整合关于一件事的所有信息，但不能快速处理多个独立的话题，也不能利用纯粹的统计学信息。如果一个人被描述成“本性怯懦，做事井井有条，循规蹈矩，关注细节”，系统1就会认为这个人像是个图书管理员，但系统2在结合了直觉以及图书管理员人数少的这个事实进行思考过后，却不会这样认为。只有系统2才能作这种判断。"}, {"en": "", "zh": "系统2一个非常重要的才能是它能够处理“多重任务”，它可以提取记忆去执行抑制习惯性反应的指令。考虑以下的任务：数出这一页“的”字出现的次数。这个任务你以前从来没有做过，做起来很难得心应手，但是你的系统2却可以应付得来。着手这个练习并非易事，尽管在练习的过程中你会有所提高，但真正完成这项任务会很吃力。心理学家用“执行控制”来描述多重任务的执行和最终完成，神经系统科学家已经确认了大脑中负责执行功能的主要区域。当有冲突需要平息的时候，其中一部分区域也会活跃起来。另一部分是大脑前额叶，人类的这个区域要比其他灵长类的更为发达，它是与智力密切相关的重要脑区。"}, {"en": "", "zh": "现在，假设你在看完这一页时，接到了另一个指示：数出下一页有多少个逗号。这项任务更加困难，因为你还要克制住不久前形成的倾向，即将注意力集中在“的”字上。近几十年来，认知心理学家们有很多重大发现，其中一项就是：从一个任务转换到另一个任务上需要付出努力，在时间紧迫的情况下尤其如此。完成加3任务和心算乘法之所以困难，也是因为两项任务都需要快速转换。要完成加3任务，你必须同时在工作记忆中储存好几个数字，并且每个数字都要与一个特定的运行过程相联系：得记住转换完的数字以便稍后说出来，一个数字正在转换中，还有一些数字正等着被转换。当前关于工作记忆的测试要求个人在两个高要求的任务间不停地转换，在记住其中一个结果的同时，还要执行另一个任务。能够很好完成这些测试的人大都能在一般智力测试中取得好成绩。然而，是否能够控制自己的注意力并不是一般智力的衡量标准。要想预测空中交通指挥员和以色列空军飞行员的表现，衡量他们控制注意力的能力比让他们作智力测试更为有效。"}, {"en": "", "zh": "时间制约是人们付出努力的另一个驱动因素。执行加3任务时，你的匆忙一方面是因为节拍器，另一方面是因为记忆负荷。你就好比是同时向空中抛出好几个球的马戏团演员，无法承担减速的后果。记忆减退的速率催促你的步调，迫使你在完全忘记这些信息前不断进行更新和演练。任何需要你同时记住许多想法的任务都是匆忙的。除非你运气较好，有很大的工作记忆容量，否则你就只能硬着头皮继续工作。慢思考最耗费脑力的思考形式就是那些催你思考的形式。"}, {"en": "", "zh": "你肯定已注意到，在执行加3任务时，你的大脑会不同寻常地高速运作。即使你靠脑力劳动谋生，在日常工作中也极少有类似加3或是类似马上记住6位数这样极具挑战性的任务。我们通常会分几个简单的步骤来执行任务，以避免大脑超负荷运行。这样的话，我们可以将中间结果储存在长期记忆中或是记在纸上，而不是简单地堆积在工作记忆中。我们不紧不慢地绕着远路向目标靠近，通过最省力法则来管理我们的思维活动。"}, {"en": "", "zh": "示例：注意力和努力\n“我不会在开车的时候想破脑袋去解决这个问题。这是一个会使瞳孔扩散的任务，太费神了！”\n“他在运用最省力法则，能不多想就不多想。”\n“她没有忘记开会的事，只是会议开始时她完全在想别的事情，根本没有听到你在说什么。”\n“我的脑海中最先出现的想法是来自系统1的直觉。我必须得从头到尾思索一遍，三思而后行。”"}, {"en": "", "zh": "第3章 惰性思维与延迟满足的矛盾"}, {"en": "", "zh": "我每年都要在伯克利待上几个月，在那里，我最大的乐趣就是每天在山间小路上散步4英里，领略旧金山湾的风景。通常我会记录散步所用的时间，也由此对自己在这个过程中所付出的努力有相当的了解。我发现自己大概用17分钟就可以走完1英里的路程。当然我也耗费了体力，以这一速度行走比我坐在靠椅上要消耗更多的热量，但行走中我并没有感受到精神压力，也没有内心矛盾，更无须催促自己前行。以这个速度散步，我还能边走路边思考。事实上，我觉得散步能唤醒身体的感应，使大脑思维更加敏锐。"}, {"en": "", "zh": "系统2也有一个自然的速度。大脑没有专门处理某项任务时，你可以分些精力随意观察自己周围发生了什么。除非你非常小心谨慎，或者自我意识很强，否则观察周围环境或大脑的活动是不需要付出太多努力的。开车时你就能做出一些小决策，读报纸时也能汲取一些信息，和爱人或同事随意说说每天的开心事等，这些都不需要付出多少努力，也没有什么压力，跟散步没什么两样。"}, {"en": "", "zh": "边散步边思考其实是一件很轻松、很惬意的事，但在某些极端情况下，这些活动似乎在争夺系统2有限的资源。只需一个简单的实验就可证实这个假设：在和朋友悠闲地散步时让他心算出“23乘以78”的结果，而且要立刻就算出来，这时他肯定会停下脚步来算。我的体会是，我可以在散步时思考，却无法利用短时记忆来完成这样一项复杂的心算任务。如果我必须在规定时间内构建一个复杂的理论，我希望无人打扰，而且坐着思考要比站着强。当然，不是所有的慢思考都必须要集中精力、认真计算的。和阿莫斯悠闲散步就是我人生中的最佳思考时间。"}, {"en": "", "zh": "加快散步速度会完全改变我的散步体验，因为加快速度会使我的连贯思考能力明显下降。只要一提速，我就要注意逐渐加快行走速度，要刻意保持更快的速度，将一连串想法加以总结的能力便相应下降了。我在山上行走能保持的最快速度是每14分钟走完1英里，不过这样一来，我根本什么事都想不了。沿着小路快速行走不仅要付出体力，还需要大脑的自我控制，以防止自己减速。自我控制和仔细思考很明显要抢夺努力的有限预算。"}, {"en": "", "zh": "通常情况下，大多数人保持连贯的思维或时不时积极思考都需要自我控制力。尽管没有作过系统的研究，但我认为，不断转换任务和提高大脑运转速度从本质上说是不会让人感到快乐的，人们总是尽可能避开这种情况，这就说明了为什么最省力法则能成为法则。即使没有时间的限制，保持连贯的思维也需要此法则。有人曾观察并记录我写作的一个小时内查收电子邮件或打开冰箱的次数，这可以说明我想要逃离写作的欲望，也可以得出一个结论，我的自我控制力完全达不到工作的要求。"}, {"en": "", "zh": "好在并不是所有认知工作都令人厌恶，有时并不需要意志力的支撑，人们也能花很长时间和大量精力进行一项工作。心理学家米哈里·契克森米哈（Mihaly Csikszentmihalyi）对这种无须作出努力的状态的研究比别人都多，他将这种状态命名为心流，而且此名称已成为一个心理学术语了。体验过心流的人将其描述为“一种将大脑注意力毫不费力地集中起来的状态，这种状态可以使人忘却时间的概念，忘掉自己，也忘掉自身问题”，他们对这种状态所带来的愉悦感的描述非常吸引人，米哈里称之为“最优体验”。很多活动都能带来心流体验，不论是画画还是摩托车比赛。我认识几个作者，出书就是他们的最优体验。对于一个作者而言，这样容易满足是件幸事。心流巧妙地区分了两种努力形式：对任务的关注和对注意力的严格控制。以每小时150英里的速度骑摩托车和在象棋大赛中角逐都需要付出努力，然而在心流状态下，集中注意力关注吸引人的事并不要求自我控制。因此，我们要将所有资源都用于手头上的任务才好。"}, {"en": "", "zh": "又累又饿的保释官更可能否定保释申请"}, {"en": "", "zh": "自我控制和认知努力是大脑工作的形式，这一观点已得到广泛认同。有几项心理研究表明，人若既有认知任务在手又同时受到诱惑的影响，就容易屈从于诱惑。如果有人要求你在一两分钟内记住一串7位数的数字，并且告诉你记住这些数字是你的首要任务，而当你将注意力集中在这些数字上时，却有个人端着甜点让你选一种：是选择让人既爱又恨的巧克力蛋糕呢，还是选择什锦水果沙拉。有证据显示，尽管大脑里装满了这些数字，你却更有可能选择诱人的巧克力蛋糕。系统2在忙碌时，系统1对行为的影响会更大。而且，系统1也更偏爱甜食。"}, {"en": "", "zh": "当人们忙于认知活动时，更有可能作出自私的抉择，会用带有性别歧视的字眼，并在社交场合作出肤浅的评判。记住和重复这些数字会减轻系统2对行为的控制，当然，认知负担不是自我控制减弱的唯一因素。喝几杯酒，或者一夜没睡也会产生同样的结果。早起的人的自我控制力会在晚上受到影响，而夜猫子的自我控制能力则会在早晨受到影响。过多关注自己完成一项任务的结果，就会给其短时记忆增加毫无意义的思想负担，进而影响其整体表现。结论非常明显：自我控制需要集中注意力，需要付出努力。换种说法就是，控制思想和行为是系统2的任务之一。"}, {"en": "", "zh": "心理学家罗伊·鲍迈斯特（Roy Baumeister）和他的同事们所做的一系列令人惊讶的实验最终表明，所有自主努力的不同形式，认知上的、情感上的或者身体上的，至少都能对集思广益有所帮助。他们的实验中要求受试者进行的是连续性任务而不是同时发生（不相关联）的任务。"}, {"en": "", "zh": "鲍迈斯特的小组屡次发现，刻意掌控意志和进行自我控制很辛苦。如果你必须强迫自己去做某件事，而此时这件事又面临一个新的挑战，你就会很不情愿或是根本无法进行自我控制。这种现象被命名为自我损耗（ego depletion）。在一次典型的展示活动中，我们要求受试者一边看一部能引起感情共鸣的电影，一边抑制自己的情绪反应。在随后的耐力测试中，他们表现得很糟糕。该耐力测试的内容是握住测力计，这个动作会让人越来越不舒服，看他们能保持多长时间。受试者在实验的初始阶段作出的抑制情感的努力，会削弱其忍受维持肌肉收缩而带来的痛苦的能力，自我损耗型的人因此会很快产生退出实验的冲动。在另一项实验中，受试者要首先经过自我意志的损耗，他们会吃不同的食物，包括小萝卜、芹菜等，同时还要抑制住吃巧克力和饼干的想法。后来，当这些人面对困难的认知任务时，会表现得比通常情况下更轻易放弃。"}, {"en": "", "zh": "如今，我们知道关于自我控制的情形和任务很多，也很复杂。这些情况既包含思想斗争又要抑制自身倾向的需求，见下面的例子：不去想北极熊。对震撼人心的电影抑制情感的共鸣。对矛盾的事作出选择。试着让他人眼前一亮。对同伴不好的行为委婉回应。和其他种族的人交流（这些人还有种族偏见）"}, {"en": "", "zh": "自我损耗的前兆也多有不同：改变日常饮食。疯狂购物，花很多钱。反应过度，有挑衅的意味。对有把握的任务花费较少的时间。在认知任务和逻辑决策的制定中表现得很糟糕。"}, {"en": "", "zh": "其证据很具有说服力：对系统2有高需求的活动同样需要自我控制，而发挥自我控制力既有损耗又很枯燥。与认知负担不同，自我损耗至少会令人丧失一部分动力。在一项任务中控制自我后，在另一项任务中就感受不到自己在努力，但只要你真的想做，就一定能做到。在几次实验中，如果受试者有强大的动力抑制自我损耗的影响，他是完全能够做到的。相反，如果你必须在执行某项任务的过程中以短时记忆记下6个数字，此时即使不断努力也是行不通的。自我损耗和认知投入并非同一种思维状态。"}, {"en": "", "zh": "鲍迈斯特小组最惊人的发现，用他自己的话说就是，大脑能量这一概念不仅仅是个比喻。神经系统消耗的葡萄糖比身体其他部位消耗的都要多，而且需要付出脑力活动的成本显然要比葡萄糖高。在积极进行复杂的认知推理或者忙于要求自我控制的任务时，人的血糖就会下降。这种情况和短跑运动员在短跑时肌肉中的葡萄糖储备量下降是相同的。这一概念的大致含义是，自我损耗的影响能通过注射葡萄糖得到缓解，而且鲍迈斯特和他的同事们也通过几个实验证实了这一假设。"}, {"en": "", "zh": "他们有一项研究是让志愿者们看一个无声的短片，其内容是对一位女士的采访。这些志愿者的任务是解释她的肢体语言。在这些志愿者执行这项任务时，屏幕上有一串单词慢慢闪过，而他们事先已经被告知要忽略这些词，如果发现自己的注意力转移了，他们只能再次将注意力拉回到这位女士身上。研究认为，这种自我控制行为可以引起自我损耗。所有的志愿者在执行第二个任务前都喝了些柠檬汁，其中一半的人所喝的柠檬汁加了葡萄糖，而另外一半人的饮料中混有代糖。然后所有的志愿者开始执行第二项任务，在这项任务中，他们必须克服直觉才能得到正确的答案。通常在自我损耗的人群中，直觉性的错误常有发生。结果是喝了含有代糖饮料的人出现了损耗现象，而喝了含有葡萄糖饮料的人却没有。在大脑中储存一定量的糖，可使自己表现得不那么糟糕。能导致葡萄糖降低的任务是否同样会导致瞳孔放大和心率加快等情形发生呢？要想证明这一说法，恐怕还需要些时间和更深入的研究吧。"}, {"en": "", "zh": "《美国科学院院报》最近报道了损耗对判决的影响这一问题的研究情况。在这项研究中，8位不知情的受试者全部是以色列的保释官。他们每天都要审阅保释申请，而且不是按这些保释申请的时间顺序审阅的，这些保释官在每份申请上所用的时间很少，平均只有6分钟。（弃权相当于拒绝保释，只有35%的申请能获准通过。这些保释官作出每个决定所用的时间都有精确的记录，而且他们一日三餐的餐歇时间也有记录，分别是早餐时间、午餐时间和午间休息时间。）这项研究的设计者对两次餐歇间所能获得批准的申请数量进行了预测，结果发现每次用餐过后，获得批准的申请数量都会增加，有约65%的申请得到了批准。在保释官下一次用餐前的约两个小时内，批准率就开始稳步下降，在用餐之前刚好达到零。如你预想，这种结果令人难以接受，但各位设计者已经认真审核并排除了很多其他的原因。对这个数据最合理的解释却带来了负面信息：又累又饿的保释官容易否定保释申请。疲劳和饥饿都有可能影响他们的决定。"}, {"en": "", "zh": "脱口而出的错误答案"}, {"en": "", "zh": "系统2的一大主要功能是监督和控制思想活动以及由系统1引导的各种行为，使得一些想法直接体现在行动上，或者抑制或改变其他想法。"}, {"en": "", "zh": "例如，下面是一个相对简单的难题。别费力去分析它，凭直觉做做看："}, {"en": "", "zh": "球拍和球共花1.10美元。"}, {"en": "", "zh": "球拍比球贵1美元。"}, {"en": "", "zh": "问球多少钱？"}, {"en": "", "zh": "你会马上想到一个数字，这个数字当然就是10，即10美分。这道简单的难题之所以与众不同，是因为它能引出一个直觉性的、吸引人的但却错误的答案。计算一下，你就会发现。如果球花费10美分的话，总共就要花1.20美元（球10美分，球拍1.10美元），而不是1.10美元。正确答案是5美分。我们可以假设那些最终得出正确答案的人也想到了这个答案，只是他们不知通过什么办法成功抵制住了直觉的诱惑，最终给出了正确的答案。"}, {"en": "", "zh": "肖恩·弗雷德里克（Shane Frederick）和我对基于两个系统的判断理论进行了共同研究，他用这个球拍和球的问题来研究一个核心问题：系统2对系统1的各类方案监视得有多严密？他进行了这样的推理：那些说球为10美分的人让我们了解到这样一个重要的事实，那就是这个人没有认真验证这个答案是否正确，而且他的系统2倾向于直觉性的答案。其实他只要稍稍动脑想一下，就会否定这个直觉性的答案。此外，我们还知道给出直觉性答案的人忽视了一个明显的生活提示，他们应该想一想怎么会有答案这么明显的问题呢。没有验证答案，这是一个明显的失误，因为验证根本不费什么事，只是大脑工作几秒钟（这个问题的难度一般），或者肌肉动一动，抑或睁大眼睛而已，只要稍微动动脑子就可以避免这个令人窘迫的错误。认为答案是10美分的人显然不爱动脑筋，没有给出这个错误答案的人显然思维更活跃。"}, {"en": "", "zh": "上万名大学生都回答了这个球拍和球的问题，其结果令人吃惊。哈佛大学、麻省理工学院和普林斯顿大学中50%以上的学生给出了这个直觉性的错误答案。在声誉稍差一点的大学里，则有80%以上的学生没有验证答案就脱口而出。这个球拍和球的问题是我们所作的第一个作了观测性的研究，这一问题将是本书反复出现的主题：很多人过于自信，过于相信自己的直觉。他们显然觉得认知努力没什么意思，会尽量避免费力思考。"}, {"en": "", "zh": "现在我来为大家作一个逻辑论证，两个前提和一个结论。请你尽量快速地判定这个论证是否符合逻辑。想想结论是否与前提有关联？"}, {"en": "", "zh": "所有的玫瑰都是花。"}, {"en": "", "zh": "有些花会很快凋谢。"}, {"en": "", "zh": "因此，有些玫瑰也会很快凋谢。"}, {"en": "", "zh": "大部分大学生觉得这个推论是合理的。但事实上，这个论证是有问题的，因为玫瑰可能不会很快凋谢。就像球拍和球的问题，貌似正确的答案会马上在大脑中显现。摆脱这种现象需要作出努力，因为坚信自己的观点，认为“这是对的，是对的”，便使人很难去验证自己的答案是否符合逻辑，大多数人根本不愿费力去想明白这个问题。"}, {"en": "", "zh": "这个实验使我们对在日常生活中做出的推论丧失了信心。这个实验使我们认为，当人们相信某个结论是正确的时候，他们很可能会相信支持这个结论的论证，哪怕这些论证不正确。如果系统1也参与到活动中来，人们总会先得出结论，然后才进行论证。"}, {"en": "", "zh": "接下来，请思考以下问题，边读边作答："}, {"en": "", "zh": "密歇根州在一年中发生了多少起谋杀事件？"}, {"en": "", "zh": "这个问题是肖恩。弗雷德里克设计的，仍旧是对系统2的挑战。回答这个问题的“诀窍”在于调查对象是否会记得底特律这个犯罪率相当高的城市就在密歇根州。美国的大学生都了解这个事实，都能准确无误地指出底特律是密歇根州最大的城市。然而，对事实的了解并不重要，重要的是在我们需要这个事实的时候却总是无法立即将其提取出来。记得底特律在密歇根州的人对该州谋杀犯罪率的估计要多于不知道这一点的人，但弗雷德里克那个实验的大多数受试者在看到密歇根州时，根本没有想到该州还有底特律这座城市。实际上，当人们被问及密歇根州和底特律市的谋杀犯罪率时，回答前一个问题的人总认为密歇根州的谋杀犯罪率低，而回答后一个问题的人则认为底特律市的谋杀犯罪率高。"}, {"en": "", "zh": "受试者在回答上面的问题时没能想到底特律市，这既是系统1的问题，也是系统2的问题。提到密歇根州时能否想到底特律市，这在一定程度上要依赖记忆的自主功能，这一功能因人而异。有些人对密歇根州的一切耳熟能详：该州的居民比其他地方的居民更容易回想起关于该州的事实；熟悉地形的人能比棒球统计员回想的更多；聪明的人在大多数事情上的表述上比其他人表述得更好。聪明不仅是指推理的能力，也指在记忆中搜寻相关信息和在必要时调动注意力的能力。记忆功能是系统1的一种属性。但是，每个人都可以选择放慢速度，在记忆中积极搜寻所有可能相关的事实，就像他们在球拍和球的问题中可以放慢速度验证直觉性答案一样。不同的人仔细核对和搜索的程度也各不相同，这是系统2的一个特征。"}, {"en": "", "zh": "球拍和球的问题、玫瑰的问题和密歇根州（底特律）的问题都有共同点。在这些小实验中，答错问题显然在某种程度上说明了其原因是精神动力不足，而不是努力程度不够。能被好大学录取的学生当然能够在前两个问题上作推理判断，在密歇根州的问题上也能够进行思考，能回想起该州的大城市及其犯罪问题。这些学生只要不想接受脑海中出现的似乎是正确的答案，就能够解决更难的问题。若他们满足于现成的答案而不想去思考则会很麻烦。用“懒惰”来形容这些年轻人的自我检测及其系统2似乎有些刻薄，却并非不公平。避免思维上懒惰的人可以被叫做“勤快人”。他们更机警，思维更活跃，不会满足于貌似正确的答案，对自己的直觉也常持怀疑态度。"}, {"en": "", "zh": "心理学家基思·斯坦诺维奇认为他们更理性。"}, {"en": "", "zh": "今天得到1000美元，1年后得到10000美元，你选哪个？"}, {"en": "", "zh": "研究者曾经用各种方式来检验思考和自我控制之间的联系。有些研究者通过询问相关问题来论证其联系：如果分别根据自我控制能力和认知能力将人们分成不同等级，那么不同个体在这两个排序中是否会处于类似的等级呢？"}, {"en": "", "zh": "在心理学发展史中有个很著名的实验，瓦特·米舍（Walter Mischel）和他的学生将一些4岁大的孩子置于残酷的两难处境中。这些孩子可以自行选择，是要一个随时就可以拿到的小奖励（一块奥利奥饼干），还是在充满考验的环境中苦等15分钟，然后得到更大的奖励（两块小甜饼）。每个孩子得单独待在一个房间里，面前有张桌子，桌子上有两件东西：一块饼干和一个铃铛。孩子可以随时摇铃通知研究人员并能领到一片饼干。根据描述，实验如下：“玩具、书、图画或任何其他会使孩子们分心的东西都不在房间里。研究人员离开房间15分钟后才会回来。不过，孩子要是摇了铃、吃掉饼干、站起身来或者表情痛苦，研究人员也会回来。”"}, {"en": "", "zh": "研究人员通过一面单面镜观察这些孩子，他们等待期间的行为总会使观察者大笑。有些孩子成功地经受住了15分钟的考验，其成功原因是他们能把注意力从诱人的奖励上移开。10年或15年之后，那些忍住了诱惑和没忍住诱惑的孩子之间会出现很大差别。忍住了诱惑的孩子在认知任务，尤其是高效地重新分配注意力方面的控制力更强。当他们还年轻时，他们染上毒品的可能性更小。智力水平的巨大区别也随之出现：在4岁时表现出更强的自我控制能力的孩子在智力测验中得到了更高的分数。"}, {"en": "", "zh": "俄勒冈大学的一个研究小组从几个方面研究了认知控制和智力之间的联系，包括通过提升对注意力的控制力来提升智力的做法。研究实验由5个阶段构成，每个阶段40分钟，他们让4~6岁的孩子去玩不同种类的电脑游戏，这些游戏是为检验注意力和控制力而专门设计的。在其中一项游戏中，孩子们要在尽量避开一块泥泞区域的同时，用一个操纵杆将一只卡通猫驱赶到一个长满草的地方。长草的地方会慢慢变少，而泥泞的地方会慢慢扩大，这就需要孩子们不断提高控制的精确度。测试者发现，注意力训练不仅提升了这些孩子的执行控制能力，而且他们在智力测验中的笔试成绩也提高了，并且这种提升的状态可以维持几个月不变。同一个小组所作的其他研究确认了参与了注意力控制的具体基因，表明家长的教育方法也会影响这种能力，研究还证明了，儿童控制其注意力的能力和控制其情感的能力之间有着紧密的联系。"}, {"en": "", "zh": "肖恩·弗雷德里克组织了一个认知反应测试，其中包括球拍和球的问题以及其他两个问题，之所以选这些问题是因为它们可以引发一个吸引人但却错误的直觉性答案（我们将在第5章中讨论这些问题）。他还对这项测试中得分很低的那些学生的特点进行了跟踪研究，发现他们更倾向于用脑海中最先出现的想法来回答问题，而不愿意费事去验证自己的直觉。这些人身上的系统2的监测功能往往较弱。那些遇到各种难题都跟着直觉走的人也易于接受系统1的其他暗示，特别是在冲动、不耐烦以及急功近利的时候，这些人就更易接受系统1的各种暗示了。例如，63%的直觉型受试者说他们宁愿这个月拿到3400美元也不愿等到下个月拿3800美元。而那些正确答出3道难题的人中只有37%持这样目光短浅的看法，希望能马上得到一笔钱，哪怕少些也可以。当被问到要想次日就收到自己订购的书愿意付多少钱时，在认知反应测试中得分低的人比得分高的人愿意多付一倍的价钱。弗雷德里克的发现表明，我们这场心理剧中的两个角色有着不同的“人格”。系统1是冲动、凭直觉的；而系统2则具备推理能力，它很谨慎，但对一些人而言，这个系统也是懒惰的。我们从不同人的不同特点中发现了相关性：有些人倾向于系统2，而有些人则更接近于系统1。这个简单的测试可以较好地反映出惰性思考的特点。"}, {"en": "", "zh": "基思·斯坦诺维奇与其长期合作者理查德·韦斯特首先提出了系统1和系统2这两个术语（他们现在更喜欢将其称为第1类型过程和第2类型过程）。斯坦诺维奇和他的同事们用了几十年的时间来研究不同个体面对各种问题时的不同反应，这也是本书所关注的问题。他们用多种不同的方式问受试者同一个基本问题：为什么有些人比其他人更容易受判断成见的影响？斯坦诺维奇在《理性和反思性思维》（Rationality and Reflective Mind）一书中阐明了他的观点，对书中相关章节的主题进行了大胆而独到的论述。他对系统2的两个部分作了明确区分，这一区分十分明显，斯坦诺维奇称其为泾渭分明的两种“思维”。其中一种思维（他称其为算法）负责的是慢思考和要求很高的计算活动。有些人在这些脑力活动中比他人做得更好，他们在智力测试中超越他人，并且从一项任务转换到另一个任务上时，他们往往更快、更高效。不过，斯坦诺维奇认为，高智商并不能消除成见。要想消除成见，还需具备另一种能力，他称其为理性。斯坦诺维奇对理性之人的定义和我之前说到的“勤快人”有相似之处。他的核心观点是我们应当将理性和智力区分开来。在他看来，肤浅的或者惰性思考是一个反思缺陷，是一个理性错误。这是个引人注目且发人深省的想法。为了论证自己的想法，斯坦诺维奇和他的同事们发现，在某种情况下，球拍和球的问题以及此类问题比传统的智力测验（比如智商测试）更能反映出我们对认知错误的敏感度。关于智力和理性之间的区别是否会引出更多的新发现，时间最终会告知我们答案。"}, {"en": "", "zh": "示例：自我控制\n“连续工作几小时，她也不会感到吃力，她处于一种‘心流’中。”\n“在长达一天的会议之后，他的自我意识出现一定程度的损耗。因此他决定采用标准的操作规程，不再去想这个问题了。”\n“他从来不去想自己的话是否有道理。他是特别习惯用懒惰的系统2呢，还是总是非常累？”\n“不幸的是，她总是喜欢凭直觉随口就说，也许连表达感谢都词不达意吧，弱弱的系统2啊。”"}, {"en": "", "zh": "第4章 联想的神奇力量"}, {"en": "", "zh": "系统1的运行机制出人意料，在对其进行研究前，请先看以下两个词："}, {"en": "", "zh": "香蕉；呕吐"}, {"en": "", "zh": "在刚才的一两秒钟里，你一定想到了很多，脑海中浮现出一些不愉快的图像和记忆，你的脸有些扭曲，露出厌恶的表情，而且你还可能不自觉地把这本书推得更远些。你的心率加快，手臂上的汗毛微微立起，而且你的汗腺开始分泌汗液。总之，你对那个令人反感的词的反应与对真实情况的反应相差无几。这些反应全是自发的，超出了你的控制范围。"}, {"en": "", "zh": "你的大脑会不由自主地将香蕉和呕吐这两个词联系起来，暂时在两者间建立了因果联系，认为是香蕉引起了不适。这就是大脑的自然反应。结果，短期内你会对香蕉失去兴趣（不过别担心，这种感觉总会消失的）。你的记忆状态在其他方面也有所改变：你现在很容易就能识别出与“呕吐”相关的物品和概念，对它们的反应也很敏感，比如不舒服、臭味或者恶心等；看到和“香蕉”有关的词，比如黄色、水果，甚至连苹果和浆果都包括在内，也会有不良反应。"}, {"en": "", "zh": "呕吐一般只在特定的情况下才会发生，比如宿醉过后和消化不良时。你肯定还能找出导致呕吐的其他相关词汇。而且，你的系统1注意到将这两个词相提并论并不常见，以前从没遇到过这种情况。你自己也有些惊讶。"}, {"en": "", "zh": "这些复杂的反应快速地呈现在你的脑海中，而且都是自主发生的，无须费力。你左右不了它，也不能让它停下来。这是系统1的一个运行过程。你看到这些词后出现的一切反应都是循着一个名为“联想激活”的过程发生的：事物在你的大脑中唤起的想法激发出许多其他的想法，而且这些联想的行为在你的大脑中迅速扩展开来。连贯性是这种复杂的思维活动的重要特点，其中每个环节都是紧密相连、相互支持的。能引发记忆的词也会引发情感，还能引发面部表情变化和其他反应，比如常出现的紧张和回避倾向。面部表情和退缩行为强化了引起这两种反应的情感，这些情感反过来还会强化相应的概念。所有这些都是瞬间发生的，形成一种认知、情感和生理反应的自我强化模式，这种模式变化多样又能形成一个整体，被称为联想的连贯性。"}, {"en": "", "zh": "在一秒钟左右的时间里，你就能自主且无意识地完成一件了不起的事。一旦发生了完全出乎意料的事，两个风马牛不相及的简单的词语被放在一起，你的系统1就将这两个词随意联系起来，试图弄清具体情况；还预估了可能会出现（从轻度到中等程度）的危险状况，帮你作好准备去面对这些极有可能会出现的事件，以便为你将来的应对创造条件。同时，系统1还会对过去情形的骇人程度进行评估，为当前的事件发展创造条件。这样你就可以透彻了解过去，从容面对未来了。"}, {"en": "", "zh": "在所发生的事情中有一点很奇怪，那就是你的系统1把两个词的简单联系看做真实的情况。你的身体对这一假想情形的反应要稍逊于对真实情况的反应，情感上的反应和生理上的反感表现可以从某个方面解释这个现象。正如近几年来许多认知科学家强调的那样，认知可以体现出来，你不只是用大脑思考，还用身体思考。"}, {"en": "", "zh": "很久以来，人们一直都知道引起这些思维活动的机制是什么，这个机制就是联想。我们都能从自己的经历中了解到，有意识的思维活动中所有的观点都是井然有序的。17世纪和18世纪的英国哲学家曾经努力探求能解释这些续发事件的规律。在1748年出版的《人类理解研究》（An Enquiry Concerning Human Understanding）一书中，苏格兰哲学家大卫·休谟（David Hume）将联想的原则缩减为三个：相似性、时空相接以及因果关系。自休谟时代以后，我们对联想的定义发生了巨大变化，但他的三原则仍可作为定义所有联想的基础。"}, {"en": "", "zh": "什么是观点？我愿意接受开放性的看法。它可能是具体的，也可能是抽象的，能通过很多方式表达出来：它可以是动词、名词、形容词或者只是握紧的拳头。心理学家认为，观点是一张巨网上的节点，他们称其为联想记忆，这些节点和其他节点相联结。联结的类型多种多样：因果联系；事物及其特性的联系；事物及其种类的联系。有一方面我们超越了休谟，那就是我们不再将思维活动视为一连串顺序出现的有意识的观点。联想记忆的工作原理是什么？当前的研究中有这样一种见解：一瞬间会发生很多事。思维活动唤起一个看法不仅会引发另一个看法，它还会激发出很多其他看法，而这些看法还会让我们想到另外一些看法。此外，只有几个被激发出来的看法是有意识的思维活动；多数联想思维都是无声的，隐藏在有意识的自我之后的。如果说我们对大脑的运转认识有限，我们当然很难接受这种说法，因为这种说法和我们的体验背道而驰，但事实就是如此：你觉得自己很了解自己，但其实你错了。"}, {"en": "", "zh": "启动效应：让人不知不觉微笑的铅笔"}, {"en": "", "zh": "突破是科学研究的重点，而我们理解联想机制的第一个重大突破就是对测量方式的改进。几十年前，唯一研究联想的方法是向众人提问，比如“当你听到‘天’这个词时脑海中最先出现的词是什么”，研究者记录了不同回答出现的频率，比如“夜晚”、“晴天”，或者“日间长”等。在20世纪80年代，心理学家发现，看到一个词时，人的思维就会立刻产生变化，而且这种变化是可测量的，同时，很多相关词汇会被激发出来。如果你最近看到或者听到“喝”这个词，你可能会填上偏旁为“氵”的“汤”字而不会填成“场”。当然，如果你刚看到了“运动”这个词，你可能就会填上“场”字了。我们将此现象称为启动效应，也就是说“喝”这个概念在“汤”之前出现，“运动”先于“场”出现。"}, {"en": "", "zh": "启动效应有多种表现形式。如果你的脑海中此时有“喝”这个概念（不论你是否注意到这一点），恰好此时有人低声跟你说了“汤”字或者在你前面远远的地方放上一碗汤，你肯定会比平时更快地意识到“汤”这个词。当然，你脑海中首先出现的不仅有汤这个概念，还有与食物相关的很多概念，包括猪肉、饿、脂肪、饮食和饼干等。如果最近用餐时几乎都是坐在摇晃的餐桌前吃饭，你的脑海中还会首先浮现摇晃这个概念。此外，启动联想的概念也能引起其他概念，尽管这种能力不算强。就像是池塘里的涟漪一样，概念的激活也是由联想概念这张大网上的一小部分向外逐渐扩展开来的。这个涟漪效应现在是心理学研究中最令人兴奋的探索之一。"}, {"en": "", "zh": "关于记忆理解的另一项重大突破，是研究者发现启动效应不只限于概念和词汇。当然，单纯通过有意识的经验，你是无法了解到这一点的，但你一定要接受这个另类的想法，即你的行为和感情有时会受制于你自己甚至都没有意识到的事件。在一项实验中，心理学家约翰·巴奇（John Bargh）和他的同事们让纽约大学的数位学生从一个包含5个单词的词组中（例如“发现、他、它、黄色的、马上”）挑出4个单词来重组句子。其中一个小组的学生重组的句子中有一半都含有与老年人相关的词汇，例如佛罗里达州、健忘的、秃顶的、灰白的或者满脸皱纹的。当他们完成这项任务时，又被叫到大厅另一头的办公室里去参加另一个实验。从大厅的一头走到另一头是这次实验的关键所在。研究者悄悄地测量了他们所用的时间。正如巴奇预料的那样，那些以老年为主题造句子的年轻人比其他人走得要慢得多。这个实验后来成了经典案例。"}, {"en": "", "zh": "这个“佛罗里达效应”包括信息启动的两个阶段。第一，尽管没有人提过“老年”这个词，但上述那组词令人想到了年迈；第二，这些想法催生了一种行为，即缓慢行走，这个行为与老年人相关。所有这一切的发生都是无意识的。这些学生在回答问题时，谁也没有提及自己注意到这些词有什么共同点，而且他们都坚持认为自己在第一个实验中看到的那些词并未对实验后的行为产生什么影响。“老年”这个概念并非他们的自觉意识，但其行为却因此有了改变。这个由概念影响行为的启动效应被称为概念运动效应，值得我们关注。尽管你自己肯定没有意识到这个效应，但读了上述文字之后，“老年”这个概念肯定对你也产生了一定的影响。假设需要站起来接杯水喝，你起身离开椅子的动作就会比平常稍稍慢上那么一点，除非你恰巧不喜欢“老年”这一概念。有研究案例表明，如果对这一概念反感，人的动作就会比平时稍稍快那么一点。"}, {"en": "", "zh": "在相反的情况下，概念运动效应也同样适用，德国一所大学曾做过的一项实验便证实了这一点。这个实验堪称巴奇和他的同事在纽约所做的那个早期实验的翻版。在实验中，研究人员要求参与实验的学生以每分钟30步的速度在房间里绕着圈走5分钟，这个速度是他们正常行走速度的三分之一。这个简单的实验过后，学生们能更快地辨认出与“老年”相关的词汇，比如“健忘”、“年老”和“孤独”等。启动效应往往能产生连贯的反应：如果首先想到老年，你就会表现得像是上了年纪，而这种上了年纪的表现也会强化你关于“年老”的看法。"}, {"en": "", "zh": "相互联系在联想网络中十分常见。例如，觉得高兴时就会微笑，而微笑也会使你感到高兴。拿支铅笔放在齿间几秒钟，有橡皮的一端指向右边，笔尖指向左边。然后拿起笔来，咬住有橡皮的那一端，笔尖指向你的正前方。也许你并未意识到上述活动中有一个动作让你的眉毛皱了起来，而另一个动作却让你的脸上有了微笑。有人曾经让一些大学生给盖瑞·拉尔森（Gary Larson）的漫画《月亮背面》（The Far Side）评定幽默等级，同时要求他们在评级时咬一支笔。那些“微笑着的”学生（他们完全没有意识到自己在微笑）对这本漫画书幽默程度的评价比那些“皱着眉的”学生高得多。在另一项实验中，那些皱眉的人（眉头紧皱）在看到饥饿的儿童、争论不休的人以及事故现场等令人不舒服的图片时，往往会表现出更强烈的情感反应。"}, {"en": "", "zh": "简单地说，常见的动作也会不知不觉地影响到我们的想法和感觉。在一项实验中，受试者按照要求用新耳机听一些信息。他们被告知这项实验的目的是检测音频设备的质量，研究人员告诉他们要不断地摇晃脑袋，以检查设备是否有声音失真的问题，其中一半受试者要上下点头，而另一半则要左右摇头。他们听到的内容是电台的社论。那些点头（表示同意的动作）的受试者往往易于接受他们听到的信息，而那些摇头的受试者则易于否定那些信息。要强调的是，受试者并没有意识到上述问题，他们只是习惯性地将否定或接受的态度与其常用的身体语言联系起来而已。由此可见，老话讲“不管你怎么想的，都得心平气和”，这真是条很好的建议，只有真正做到心平气和，你才可能有回报。"}, {"en": "", "zh": "你会自觉投到盒子里多少钱？"}, {"en": "", "zh": "我们原以为自己作出的判断和选择是有意识且自主的，但那些关于启动效应的研究所带来的发现却颠覆了我们此前的认识。例如，我们中的大多数人都认为投票选举是经过深思熟虑的行为，它反映了我们对政策的认可程度与评价，不会受到不相关的事的影响。比方说，我们投票不应受到投票地点的影响，但事实上这个因素却实实在在影响了投票结果。一项关于2000年亚利桑那州选区投票模式的研究表明，当投票站设在某个学校时，加大教育投入力度的议案的支持率就会比投票站设在附近其他地方的要高。还有一项实验表明，当人们看到一些教室和学校储物柜的照片时，他们往往也倾向于支持关于教育的提案。这些图片对这些受试者的影响比其家长或其他选民与他们的意见分歧对其产生的影响还要大！对启动效应的研究从最初的实证研究，人们想到“年老”走路就会变慢，到今天已经取得了一定的发展，我们现在已经知道启动效应会影响到我们生活的方方面面。"}, {"en": "", "zh": "让人联想到钱的事物往往令人不安。在一项实验中，受试者看到一个列有5个单词的单子，按照要求，他们得在5个词中选出4个组成以钱为主题的短语（比如“高、一份、薪水、桌子、工作”可组成“一份高薪工作”）。其他一些启动想象的实验则更挑战人的领悟力，包括背景中出现一个与钱没有任何关系的东西，比如一张桌子上放着一堆仿制钱币，或者一台电脑的屏保是水里漂着的一些美钞等。"}, {"en": "", "zh": "起初脑海中就有钱的概念的人比自己没有这方面联想时更独立。他们会持之以恒地解决一个非常难的问题，付出双倍的努力也在所不惜，实在迫不得已时才会向研究人员寻求帮助。这一做法清晰地表明其自力更生能力的提升。脑海中总有钱的概念的人更自私：他们更不愿花时间去帮助另外那位假装对实验任务不大清楚的学生。当一位研究人员不小心将一捆铅笔掉到地板上时，脑子里想着钱的那些受试者（他们自己是无意识的）捡起的笔相对较少。在另一系列的一项实验中，受试者得知他们过会儿会和另一个人进行一次简短交谈，彼此熟悉一下，他们负责摆两把椅子，而研究人员则离开去找那个人。潜意识里有钱这一概念的受试者摆放椅子的距离（118厘米）会比没有这一概念的人摆放的距离（80厘米）更远。那些满脑子都是钱的受试者表现出更强烈的独处意愿。"}, {"en": "", "zh": "上述所有发现有一个共同主题，即钱这一概念会滋生个人主义：不愿和他人在一起，不愿依赖他人，也不愿接受他人的请求。心理学家凯瑟琳·沃斯（Kathleen Vohs）完成了这项意义重大的研究，值得赞赏的是，她并未将自己的众多发现向公众和盘托出，而是留给读者更多的思考空间。凯瑟琳的研究意义深远，她的发现表明我们所处的文化环境中有很多能让人想起钱的事物，这些事物以我们意识不到的方式影响着我们的行为和态度，这些方式也许并不那么光彩。有些文化常常提醒人们尊重他人，另外一些文化则常让人们想起上帝，还有一些国家的人们会对着伟大领袖的照片顶礼膜拜。在一个专制国家中，到处挂着领袖的肖像不仅能向你传达“老大哥在看着你”的感觉，还会使你逐渐丧失自主的思想和独立的行为能力。"}, {"en": "", "zh": "启动效应的研究证据显示，使人牢记“人终将一死”这一说法能让独裁的主张更得人心，因为在人们恐惧死亡的情况下，独裁的主张会让人心安。其他实验证实了弗洛伊德关于无意识关联中符号和比喻作用的见解。比方说，你可以看看下面这两个不完整的单词WH和SP是什么。如果有人近些天想起了自己某个难以启齿的举动，这些人往往会把这两个不完整的词填成WASH和SOAP（“洗”和“香皂”），而很少会填成WISH和SOUP（“希望”和“汤”）。此外，只是想到背后中伤某位同事就会使人更想去买香皂、消毒剂或清洁剂，而不是去买电池、果汁或者糖果。当人们感觉自己的心灵受到了玷污，往往也会引发他们清洗自己身体的想法，这种冲动被称为“麦克白效应”。"}, {"en": "", "zh": "人们清洗的身体部位往往是那些令他们深感罪恶的部位。一项实验要求受试者通过电话或者电子邮件对一位假想中的人“说谎”。在随后对不同产品的需求测试中，那些通过电话说谎的人更想要漱口水，而不是香皂；而那些通过电子邮件说谎的人更想要的则是香皂，而不是漱口水。"}, {"en": "", "zh": "当我向听众阐述关于启动效应的各项研究时，他们的反应通常是将信将疑的。这也不奇怪，因为系统2认为自己掌控一切，认为自己知道为什么要作出这样或那样的选择。你的脑海中也可能会突然出现一些问题：对情境进行微调怎么可能产生这么大的影响呢？这些实验是否表明我们完全任由情境摆布，随时要听从它的指示呢？当然不是。启动思维的影响力虽强，但并不见得很大。在100位投票者当中，只有几位开始时并不确定要选谁，如果投票点设在学校里而不是在教堂里，他们对与学校相关的问题会就作出不一样的选择，但也不排除有那么几个人会作出相反的选择。"}, {"en": "", "zh": "然而，问题的关键是要接受相关研究的结果，而不是对此心存怀疑。这些结果不是捏造出来的，也不是统计上的偶然现象。你别无选择，只能接受这些研究的主要结论是正确的这一事实。更重要的是，你必须承认这些结论对你自己来说也是正确的。如果你看到电脑屏保上有浮动的美钞，你帮那位笨手笨脚的陌生人捡起的铅笔数量可能比你没看到这些钱时更少。你不相信这些结论适用于你，因为这些结论与你的主观体验不相符，你的主观体验主要是由系统2决定的。启动效应来自系统1，而这个效应发生时，你根本就意识不到。"}, {"en": "", "zh": "我用一个关于启动效应的完美展示案例来结束上面的阐述，这个案例是在英国一所大学一间办公室的茶水间进行的。多年来，这间办公室的职员一直都是自掏腰包买茶或咖啡，他们把每杯茶水和咖啡的建议价格写下来贴到墙上，上班时每次去接茶水或者咖啡时都会把相应的费用投到一个“诚实盒”里。某一天，有人在价格表的上方贴了张横条，上面既没有什么警告，也没作什么解释。在接下来的10周时间里，每周横条都贴有一张新的图片，图片上要么是一些花，要么是一双眼睛，好像盯着看着图片的人。没有人对这些新装饰发表过什么评论，但“诚实盒”里的钱却有了明显变化，如图4所示，这值得仔细研究一番。"}, {"en": "", "zh": "实验开始的第一周（从图底端你可以看到相关信息），有一双睁大的眼睛在盯着来喝茶或咖啡的人，他们投进“诚实盒”的钱的平均值是70便士。第二周，图片上是鲜花，盒子中的钱的平均值少了15便士。这个趋势持续着，凡遇到有鲜花图片的那一周，盒子里的钱数就会减少。从平均水平来看，“眼睛周”时盒子中的钱是“鲜花周”时的3倍。显然，仅仅是一种象征性的监视符号便可促使人们改善自身的行为。正如我们预料的那样，产生这个影响的过程中没有任何意识的参与。现在你相信自己也难逃同样的模式了吧？"}, {"en": "", "zh": "几年前，心理学家蒂莫西·威尔逊（Timothy Wilson）曾写过《我们是自己的陌生人》（Strangers to Ourselves）一书。现在你已经认识了自己身体中的那个陌生人，它也许在很多事情上都会为你做主，尽管你几乎从未察觉到它的存在。系统1带给你的各种印象经常会变成你的信念，而且是你作出选择和展开行动的动力源泉。它可以将当下的情形与新近发生的事情联系起来，再结合对近期的各种预期考虑，对发生在你身上或你身边的事作出心照不宣的解释。系统1包含了对这个世界的认知模式，能立即估测哪些事情是正常的，哪些是出人意料的，它是你作出快速直觉性判断的依据，且这种判断十有八九是准确的，而你的所有判断活动几乎都是在这一系统的指引下毫无意识地完成的。然而，系统1也是你直觉中很多系统性错误的根源，这一点将会在后面几章中得到佐证。"}, {"en": "", "zh": "示例：启动效应\n“这些人都穿着刻板的制服，看到他们时我们的大脑中是不会有什么创造性想法的。”\n“这个世界比你想象的要复杂得多，能否对它有个清晰的认识多半要看你的大脑的工作方式。”\n“他们的作用就是发现问题，而他们也的确发现了很多问题。”\n“系统1编了一个故事，而系统2也相信了这个故事。我们每个人都有过这种体验。”\n“我让自己微笑，这样做我也的确感觉好多了！”"}, {"en": "", "zh": "第5章 你的直觉有可能只是错觉"}, {"en": "", "zh": "在头脑清醒的时候，甚至在思绪并不那么清晰的时候，你的大脑一直在进行着多重运算，这些运算可以保留和更新一些关键问题的答案。例如：有什么新情况吗？存在危险吗？事情进展得顺利吗？我需要转移注意力吗？完成这个任务需要投入更多的精力吗？你可以将大脑想象成飞机驾驶座舱，里面有一套刻度盘，上面显示着这些重要变量的当前数值。系统1会自动对当前这些数值进行评估，因为这些数值的一个重要功能就是决定是否需要系统2提供额外帮助。"}, {"en": "", "zh": "其中一个刻度盘测量的是认知放松度。认知放松度介于“放松”和“紧张”之间。放松是事情进展顺利的标志，没有障碍、没有新情况、没必要转移注意力或投入更多精力。紧张说明存在某种问题，且需要不断调动系统2参与其中。如若事情进展不顺利，你便处于认知紧张状态中。认知紧张同时还会受当时的努力程度和未得到满足的需求的影响。令人惊讶的是，一个简单的认知放松过程却与有着多种输入和输出活动的庞大网络相联结。图5对此作了解释。"}, {"en": "", "zh": "说明如果一个句子印刷清晰，或是被多次重复，或是已经深植于脑海，人们就能在认知放松的状态下顺畅地将其解读出来。听别人说话时，如果心情好，或者咬一支笔迫使自己“笑”，都能使认知放松。反之，若说明书印刷模糊，颜色浅，句子冗长，语言晦涩，也许心情也不好，甚至在皱眉，这些情形都会使人处于认知紧张状态。"}, {"en": "", "zh": "造成这种放松或紧张状态的不同原因会相互影响。处于认知放松状态时，你有可能心情不错，因此会喜欢你亲眼所见的事物，相信你亲耳所闻的消息，相信你的直觉，感到当时的状态是舒适而熟悉的。此时，你的想法也有可能相对随意、肤浅。当你感到紧张时，你更有可能警惕、多疑，会对手头上的事情投入更多精力，感觉局促，较少犯错，但你的直觉和创造相较平时会下降。"}, {"en": "", "zh": "由记忆造成的错觉"}, {"en": "", "zh": "错觉这个词会让人马上联想到视错觉，因为我们都很熟悉那些令人产生误解的图片。不过，并不是只有视觉才会产生错觉，记忆也容易产生错觉，并且这种现象更加普遍。"}, {"en": "", "zh": "戴维·斯滕比尔（David Stenbill）、莫妮卡·比格特斯基（Monica Bigoutski）、莎娜·蒂拉纳（Shana Tirana），这些名字都是我自己编出来的。如果在接下来几分钟内再次看到这些名字，你很可能还记得自己在哪里见过它们。你心里清楚这些名字并不是那些为数不多的名人的名字，而且有那么一段时间你会记住这一点。但假设几天后你看到一长串名单，其中包括一些知名度不高的名人和你从未听过的“新”名字，而你的任务是挑出名单中所有名人的名字，这时你很可能会将戴维。斯滕比尔当成名人，尽管你并不清楚自己是否在与电影、体育运动或是政治有关的新闻中听说过他的名字。心理学家拉里·雅各比（Larry Jacoby）是第一位在实验室中论证了这种记忆错觉的学者，且发表了一篇名为“一夜成名”的文章。这种情况是怎样发生的呢？要想弄明白，先问问自己是如何知道一个人是否出名的。一些真正有名的名人，例如爱因斯坦、博诺·沃克斯、希拉里·克林顿等，你会在脑海中为他们建立一个信息丰富的记忆档案。但当你在几天后再次见到戴维·斯滕比尔这个名字时，你并没有关于他的记忆档案，你有的只是一种熟悉感，你曾经在某个地方见过这个名字。"}, {"en": "", "zh": "雅各比巧妙地阐述了这个问题：“熟悉感有着简单而又强烈的‘不可复返性’，这种‘不可复返性’似乎说明这种感觉是对过往经历的一种直接反应。”其一大特性便是错觉。正如雅各比和他的许多同事所说的那样，看到戴维·斯滕比尔这个名字之所以觉得很眼熟是因为你更容易辨认出这个名字。再次见到曾经见过的词时会更容易识别出来，无论是在你面前一晃而过或是在嘈杂的环境中让你指认，你都能更加轻松地识别出这些词，而且你读出这些词的速度要比读出其他词快（快百分之几秒）。简而言之，当你指认一个早已见过的词语时，会感到更加放松。正是这种放松使你产生了那种熟悉的感觉。"}, {"en": "", "zh": "图5给出了检测这一观点的方法。挑选一个全新的单词，使其更容易被识别，它就更可能具有不可复返性。的确，如果你在测试前几毫秒时无意中瞥见了一个新词，或是在一张单词列表中看到了这个词，它跟表中的其他单词就形成了强烈对比，你也更有可能觉得这个新词很眼熟。这样的联系在相反的情况下同样适用。假设你看到了一张多少有些模糊的单词列表，其中一些单词非常模糊，另一些要稍微清楚一点，你的任务是挑出比较清楚的单词，此时你最近见过的单词就会比那些你不熟悉的单词看起来更清晰。正如图5指出的那样，引发认知放松和认知紧张的各种方法是可以相互转换的。你可能并不十分清楚是什么让认知更为放松或更为紧张。这也是熟悉感造成错觉的原因。"}, {"en": "", "zh": "什么样的信息更容易让人信服？"}, {"en": "", "zh": "“纽约是美国第一大城市”，“月亮绕着地球（公）转”，“鸡有4条腿”，在所有这些表述中，你在很短时间内便接收了大量信息，这些信息五花八门，各不相同。读过前面三个表述后，你很快就知道前两个是真实的，最后一个是错误的。但值得注意的是，判断“鸡有3条腿”是错误的，明显要比“鸡有4条腿”更容易。你的联想机制对后一种表述作出判断的速度相对缓慢，之所以这样是因为后一句话让你想到许多动物都有4条腿这一事实，你可能还会想到超市通常也会销售4只一包的袋装鸡腿。系统2负责信息转换，它也许会提出问题（关于纽约的那个问题是否太简单了），也可能要核对“（公）转”这个词的意思。"}, {"en": "", "zh": "想想你最后一次参加驾驶考试的情形吧。你真的需要一张驾驶执照去开一辆载重3吨的车吗？或许你学习认真，连答案在哪一页的什么位置都记得，还知道答案的逻辑关系。但我搬到一个新的州后通过驾驶考试所用的方法跟这些丝毫不沾边儿。我只是快速地读了一遍交规，希望自己能交好运通过考试。我开车有很长一段时间了，还是知道一些交通法规的，但一旦遇到不知怎样回答的问题时，我只能靠认知放松来解决。如果某个答案看起来比较熟悉，我就猜测它可能就是正确答案。如果某个答案看起来比较生僻（或是非常极端），我便排除它。系统1让人产生熟悉感，系统2依靠系统1产生的这种熟悉感来作出正误判断。"}, {"en": "", "zh": "我们还可从图5中得知，如果某个判断是基于认知放松或认知紧张作出的，那就一定会造成错觉。任何能使联想机制运行更轻松、更顺利的事物都会使我们心生偏见。想让人们相信谬误有个可靠的方法，那就是不断重复，因为人们很难对熟悉感和真相加以区别。权威机构和营销商都深谙这个事实。然而，心理学家发现，你不必完整地重复某件事情或某个想法，即使只说一部分，人们也可能相信你的话。经常看到“鸡的体温”这个短语的人会更容易接受“鸡的体温是144华氏度”（或其他随便什么温度都无妨）这一说法。只要熟悉其中一个短语，就会觉得对整个陈述都很熟悉，也会因此对陈述内容信以为真。如果你记不清楚某个陈述的来源，也无法将其与自己知道的事物联系起来，这时你就别无选择，只能跟着认知放松的感觉走了。"}, {"en": "", "zh": "假设你需要写一则能让接收方相信的消息，当然，这则消息是真实的，但人们并不一定相信它是真的。此时，你完全可以利用认知放松来帮助自己，真相错觉的有关知识也可以提供一些具体的建议来帮助你实现这个目标。"}, {"en": "", "zh": "这些建议总的原则是，任何缓解认知紧张的做法都会对你有所帮助，所以，你首先应该让字迹更清晰。请比较下面两个陈述句："}, {"en": "", "zh": "阿道夫·希特勒生于1892年。"}, {"en": "", "zh": "阿道夫·希特勒生于1887年。"}, {"en": "", "zh": "上述两种说法都是错误的（希特勒生于1889年），但实验显示，第一句话更容易使人信服。其次，你的信息应该印刷在质量较好的纸上，并且文字和背景间的反差要达到极致。如果你使用彩色字体的话，亮蓝或大红的文字会比绿、黄、灰蓝等色调更容易让人相信文字内容的真实性。"}, {"en": "", "zh": "如果你很在意自己在别人眼里是否值得信赖、是否聪明睿智，那么说话时就言简意赅吧，能用简单句的时候就别用复杂句。在研究生中有一个广为流传的段子，说的是很多教授眼中那些最令人难忘的词汇。我在普林斯顿大学的同事丹尼·奥本海默（Danny Oppenheimer）反驳了这些学生的说法。在一篇名为“不切实际地运用华丽辞藻的后果：使用长句毫无必要”的文章中，他指出用浮夸的语言来表达熟悉的概念是一种智商低下、可信度差的表现。"}, {"en": "", "zh": "除了应该保持消息简洁外，还应使其易于记忆。如果可以的话，将你的想法以诗歌的形式表达出来，这样人们会更容易相信你的话。在一个多次被引用的实验中，受试者阅读了许多他们并不熟悉的格言，例如："}, {"en": "", "zh": "危难时，敌人团结。"}, {"en": "", "zh": "水滴石穿，绳锯木断。"}, {"en": "", "zh": "亡羊补牢，为时不晚。"}, {"en": "", "zh": "另一些学生读到的格言版本则是没有什么韵脚的："}, {"en": "", "zh": "危险团结敌人。"}, {"en": "", "zh": "再轻的击打也能放倒一棵大树。"}, {"en": "", "zh": "承认错误就相当于得救了一半。"}, {"en": "", "zh": "由上可见，押韵的格言比没有韵脚的格言显得更加深刻。"}, {"en": "", "zh": "最后，如果你需要引用一些内容，选择一些容易上口的名字准没错。在一项实验中，我们要求受试者通过两份经纪公司的报告去评估几家虚拟的土耳其公司的发展前景。每家公司都有两份相关报告，其中一份来自一家名字上口的经纪公司（比如Artan），另一份则来自一个名字很拗口的经纪公司（比如Taahhut）。两份报告有时会持不同意见。观测者能采取的最佳方法就是对两份报告进行综合评估，但他们并没有这样做。相比名字拗口的经纪公司的报告，他们更相信名字上口的经纪公司的报告。记住，系统2是非常懒惰的，它不愿付出努力。如果可能的话，消息的接收方会离所有需要付出精力的事物远远的，包括名字复杂的信息源。"}, {"en": "", "zh": "所有这些都是很好的建议，但是我们不能因此而得意忘形。如果你的信息是明显荒谬的或是与接收方已知的事实相左，那么即使你把高质量的纸、鲜艳的颜色、押韵和简单的语言全都用上，也很难提高信息的可信度。做这些实验的心理学家并不认为其他人是愚蠢和容易骗的。他们认为，我们所有人的生活都受系统1所产生的印象指引，但我们通常不知道这些印象从何而来。你怎么知道某个陈述是否正确呢？如果信息富有逻辑性、与你所持的信念或偏好有联系，或是源自你信任和喜爱的信息源，你便会有认知放松之感。但问题在于，可能还有其他的原因导致你感到放松，包括字体的清晰度和优美的韵律，你无法轻易找到这些感觉的来源。这便是图5带给我们的信息：放松或紧张之感是由多种原因导致的，难以将它们理清。虽然这很难，但也不是不可能。人在备受鼓舞时，就能克服一些导致真理错觉的外在因素。然而，在大多数情况下，系统2都会采纳系统1的建议，并继续运作。"}, {"en": "", "zh": "股票代码上口，回报率也相对较高"}, {"en": "", "zh": "联想关系的对称性是讨论联想连贯性的首要主题。正如前文所述，当人们将铅笔咬在嘴里或是把球放在眉心使自己“微笑”或“皱眉”时，也会感受到平时那种微笑或皱眉时所表达出来的情感。自我强化的相互作用同样也能在认知放松的研究中有所体现。一方面，当系统2参与到那些需要努力的事情中时，我们就会感到认知紧张。另一方面，无论是什么原因引起的认知紧张都有可能将系统2调动起来，改变人们处理问题的方式，使他们不再随意且凭直觉做事，而是转向更加专注的分析性思维。"}, {"en": "", "zh": "前文所提到的球拍和球的问题，测试出人们在回答问题时有这样一个倾向，即不假思索地将脑海中出现的第一个想法当做答案。肖恩·弗雷德里克之所以选择了球拍和球的问题及其他两个问题，是因为它们可以唤起一个最直接但却是错误的直觉性答案。这个认知反应测试的另外两个问题是："}, {"en": "", "zh": "如果5台机器能在5分钟生产5个小零件，那么100台机器生产100个小零件需要多长时间？100分钟还是5分钟？"}, {"en": "", "zh": "湖中有一片睡莲叶子，这片叶子以每天增长一倍的速度向外扩散。如果48天后莲叶就能覆盖整片湖面，那么其覆盖湖面一半的面积需要多长时间？"}, {"en": "", "zh": "24天还是47天？"}, {"en": "", "zh": "本页脚注中有两个问题的正确答案。"}, {"en": "", "zh": "研究人员召集了40名普林斯顿大学的学生来做这个认知反应测试，其中有一半问卷使用的是浅灰色的小字。拿到这部分问卷的学生可以辨认出上面是些什么字，但这样的字体会导致他们认知紧张。测试结果清楚地表明：当问卷上的字体清晰时，90%的学生至少会犯一个错误；但当字体勉强能够辨认时，他们的错误率却降到了35%。是的，你没有看错：字体模糊不清时，学生的表现更好。这是因为，无论认知紧张是由什么原因造成的，它都更有可能激发系统2来抑制系统1所给出的直觉性答案。"}, {"en": "", "zh": "《大脑一放松，脸上现笑容》这篇文章描述了这样一个实验：让受试者快速浏览一些物体的图片，在播放其中一些图片时，先在整个物体出现之前用快得令人难以察觉的速度呈现其轮廓。研究发现，受试者在识别这些图片中的物体时会相对容易。实验人员对受试者面部肌肉的电脉冲进行测量，来记录肉眼难以观察到的细微而短暂的表情变化，并由此测出受试者的情绪反应。不出所料，当图片上的物体更容易识别时，人们会微微一笑，眉头舒展，可见认知放松与良好的感觉相互关联似乎是系统1的一个特点。"}, {"en": "", "zh": "正如所料，朗朗上口的单词会唤起人们的正面态度。若某公司有一个上口的名字，其股票发行第一周往往会取得比其他公司更好的成绩，虽然这样的效果会随着时间推移而逐渐消失。如果股票有一个读起来上口的代码（例如KAR或LUNMOO），这只股票就会比有着PXG或ROD这样拗口代码的股票表现优异，并且这种优越性似乎还会持续一段时间。瑞士的一项研究发现，像Emmi、Swissfirst、Comet等有着顺口名字的股票会比GeBerit、Ypsomed这样名字拗口的股票带来更多的回报。"}, {"en": "", "zh": "如图5所示，重复能引发放松状态和令人舒心的熟悉感。著名心理学家罗伯特·扎伊翁茨（Robert Zajonc）曾潜心关注重复某种刺激和这一刺激最终带来的轻微情感波动之间的关系，扎伊翁茨称之为曝光效应（mere exposure effect）。在密歇根大学和密歇根州立大学这两所大学的校报上所做的实验是我最满意的实验之一。在几个星期的时间里，一个类似广告的板块出现在校报的头版上，上面写着以下某个土耳其语单词（或像土耳其语那样发音的单词）：kadirga，saricik，biwonjni，nansoma，iktitaf。这些词语重复的频率各不相同，其中一个只出现过一次，另外一些分别出现过2次、5次、10次和25次。（在其中一所大学校报上出现得最多的单词在另一校报上出现的频率则最低。）没有人就这个问题作出解释，如有读者询问，得到的回答都是：“买下这个板块的人不愿透露身份。”"}, {"en": "", "zh": "当这一系列神秘的广告结束后，研究人员在校园内散发调查问卷，询问学生对每一个土耳其语的印象，是有“好感”还是很“反感”。结果令人惊奇：相比只重复了一两次的词，受试者对那些重复次数较多的词更有好感。通过使用汉字、人脸和任意形状的多边形所做的实验也都再次证实了这一发现。"}, {"en": "", "zh": "曝光效应并不依赖对熟悉程度有意识的体验，事实上，曝光效应完全脱离了意识：当重复的单词或图片迅速闪过，快到观察者根本没有意识到看见它们时，观察者同样还是更为喜欢重复率高的单词或图片。现在我们应该清楚的是，系统1能对系统2意识不到的那些事的印象做出回应。事实上，当人们完全没有意识到自己看见了刺激物时，其曝光效应会更强。"}, {"en": "", "zh": "扎伊翁茨声称，这种只要不断重复接触就能增加喜欢程度的现象，是一个极其重要的生理现象，可推及所有动物身上。要想在一个危机层出不穷的世界生存，一个有机体对新奇刺激应该谨慎回应，随时保持警惕和逃离的状态。若一种动物对新奇的事物没有心存戒备，其生存概率就会很低。然而，如果了解到这个刺激物是无害的，最初的谨慎便会渐渐消失。扎伊翁茨称，曝光效应的产生是因为一个刺激的重复曝光并没有产生不好的影响，这样的刺激最终会成为一个安全信号，而安全的就是好的。显然，这样的观点并不只适用于人类，同样适用于其他物种。为了证实这一点，扎伊翁茨的一个助手给处于孵化状态的鸡蛋放不同的音乐，随后，孵化出来的小鸡在听见孵化期间所听到的音乐时，发出的哀鸣要少得多。"}, {"en": "", "zh": "扎伊翁茨为他的研究项目作了一个很有说服力的总结："}, {"en": "", "zh": "重复曝光的结果有益于机体适应其所处的有生命和无生命的环境。这一效应能使机体鉴别出安全的物品和栖息地，是最为原始的社会性依附的基础。因此，重复曝光构成了社会组织和社会整合的基础，而社会组织与社会整合又是心理稳定与社会稳定的基础。"}, {"en": "", "zh": "积极情感和系统1的认知放松之间的联系由来已久。"}, {"en": "", "zh": "创新是发生在能让人联想无限的环境中的"}, {"en": "", "zh": "1960年前后，一个名为萨尔诺夫·梅德尼克（Sarnof Mednick）的年轻心理学家认为他已发现了创新的本质。他的观点虽然简单却很有力：创新与出众的记忆力有关（创新是极佳的联想记忆）。他设计了一个测试，名叫远隔联想测验（Remote Association Test，RAT），这个测验直到今天还常常被用来研究创造力问题。"}, {"en": "", "zh": "举一个简单的例子，请考虑下面三个词语："}, {"en": "", "zh": "村舍；瑞士人；蛋糕"}, {"en": "", "zh": "你能想到一个与这三个词都有关联的词吗？也许你想到了答案是奶酪。再看看下面这个例子："}, {"en": "", "zh": "潜水；灯光；火箭"}, {"en": "", "zh": "这个问题要难得多，但它的确有一个独一无二的答案。尽管这个答案是每个说英语的人都知道的，但在受试者中，只有不足20%的人在15秒内想到了这个词。问题的答案是天空。当然，不是任意三个词都能与同一个词相联系。例如，“梦、球、书”这三个词就不能引发一个人人都认为正确的共同联想。"}, {"en": "", "zh": "近些年来，由德国心理学家组成的几个研究小组都曾对远隔联想测验作过研究，对认知放松问题的研究取得了重大进展。其中一个小组提出了两个问题：在人们知道答案是什么之前，能否感知随意三个词是否有一个共同的联想意义？心情对这项任务有何影响？为了弄清这些问题，他们首先让受试者花几分钟时间回想一下自己生活中那些快乐或是悲伤的片段，这个回想的过程使一些受试者感到快乐，而让另外一些人感到悲伤。然后，他们向受试者展示一连串三个为一组的词语，这些组词语中有50%是组内的词语有一定联系的（比如潜水、灯光、火箭），而其余50%的组内词语则没有什么联系（例如梦、球、书）。随后，实验人员要求受试者快速按下两个键中的一个来表明词语是否有共同联系，按键时间限定在两秒以内。如此短的时间内，这些受试者根本无法找到问题的答案。"}, {"en": "", "zh": "实验带来了很多惊人的发现。第一个令人惊讶的地方是，参与上述实验的受试者猜测所给问题答案的准确率要比他们随便选出答案的准确率高很多。这个结果很让人吃惊。很明显，认知放松感被联想机制中一个微弱的信号激发起来，这个信号在组内三个词语的关联得到还原之前就已经“知道”它们是相关的（有共同的联系）。认知放松在这种判断中起到的作用也在另一个德国小组所做的实验中得到证实：提高认知放松（启动、清晰的字体、事先看到词）的操作同样能增加人们将词视为相互联系的可能性。"}, {"en": "", "zh": "另一个重大发现是，人的心情在这项直觉性任务中产生了重要影响。实验人员用电脑编写了一个“直觉参数”用于检测准确性。他们发现，通过让受试者想一些愉快的事，使他们在测试之前有好心情的话，猜测的准确率会提高一倍。一个更引人注目的结果是，心情不好的受试者完全无法准确地完成这个直觉性任务，他们的猜测还没有随便选择的准确率高。心情显然能够影响系统1的运行：当我们不舒服和不开心时，就会丧失自己的直觉。"}, {"en": "", "zh": "这些发现进一步证实，好心情、直觉、创造力、轻信以及对系统1不断增强的依赖性形成了一个关联群集。悲伤、警觉、怀疑、分析方法以及不断增强的努力程度等因素之间也是相互联系的。好心情使系统2放松对行为的控制：当人们心情好时，直觉和创造力会增强，但也会放松警惕，易犯逻辑性错误，这种关联与曝光效应一样，在生理上也讲得通。好心情是事情进展顺利的信号，周围的环境是安全的，卸下防备并没有什么影响；坏心情则说明事情进展不那么顺利，有可能存在威胁，必须要保持警觉。认知放松与愉快的感觉互为因果。"}, {"en": "", "zh": "除了认知放松和积极情感的关系之外，我们还可以从远隔联想测验中了解到更多信息。请简单考虑一下下面两组词："}, {"en": "", "zh": "睡觉；邮件；开关"}, {"en": "", "zh": "盐深；泡沫"}, {"en": "", "zh": "在读第二组词时，你的脸上可能会露出一丝微笑，这是因为第二组词能引起一个共同的联想（答案就是“大海”）。你当然不可能知道自己的这一反应，但是只要对你的面部肌肉的电活动进行测量就能发现这一点。这种微笑反应出现在那些对于共同关联事物还并不了解的受试者的脸上。实验人员仅仅是给他们看了纵向排列的三个词语，然后指示他们看完后按下空格键。看到有共同联想意义的三个词而产生的认知放松似乎本身就能令人心情舒畅。"}, {"en": "", "zh": "正如很多科学家所言，虽然我们证实了好心情、认知放松和对连贯性的直觉之间是相互关联的，但这种联系并不是必然的因果关系。虽然认知放松与微笑同时出现，但一定是好心情引发了连贯的直觉反应吗？答案是肯定的。证据源自一个巧妙的实验方法，这种方法现在越来越受欢迎。在这个实验中，一些受试者听到了实验人员讲的一个封面故事，也许正是这个故事给他们带来了好心情：他们都戴着耳机，听着音乐。实验人员告诉他们：“先前的研究显示，现在播放的音乐会对人的情绪反应产生影响。”这个故事完全使人丧失了对相关性的觉察。这一发现证明，在看到三个词（如果三个词相关则感到愉快，不相关则不愉快）后，短暂的情绪反应事实上是对相关性判断的基础。没有什么是系统1做不到的。情感变化现在是可以预料到的，正因为这些变化不足为奇，我们才不会随意将情绪变化归因于词语。"}, {"en": "", "zh": "这项心理研究是迄今为止最为成功的一例，其成功之处在于将实验技巧与实验结果巧妙结合在一起，而这两者都是特色鲜明且极为惊人的。在过去几十年里，我们已经掌握了许多关于系统1自动运作的知识。我们现在掌握的很多知识听起来像是三四十年前的科幻小说。无论是模糊的字体会影响人们对真理的判断，还是提高认知能力，或是人们对每组三个词的认知放松感引起的情感回应会唤起他们头脑中的连贯印象，这些都不再难以想象。心理学研究已经取得了长足的发展。"}, {"en": "", "zh": "示例：认知放松\n“不要只是因为字体不清楚就否定他们的商务计划。”\n“我们一定愿意相信这个观点，因为总有人这样想，但还是三思而后行吧。”\n“熟悉了，就会喜欢，这就是一种曝光效应。”\n“我今天心情很好，我的系统2也比平时懒惰，我得格外小心了。”"}, {"en": "", "zh": "第6章 意料之外与情理之中"}, {"en": "", "zh": "前面已经介绍了系统1和系统2的主要特点及功能，尤其是系统1，其介绍更为详细。我将我们的大脑比喻成一台功能非常强大的电脑，虽然按传统硬件标准来看，它的运行速度很慢，但通过不同想法联结而成的巨大网络上的相关联结，也能为我们展现这个世界的构造。而且，联想机制的不断激活也是自动完成的。我们（系统2）具备某种能力去控制记忆的搜寻活动，也能对其进行编辑，这样一来，在特定情况下我们才可以集中精力去追踪某个事件。接下来我们将对系统1的非凡之处及其不足之处作更详细的介绍。"}, {"en": "", "zh": "从第一次的惊喜到第二次的习以为常"}, {"en": "", "zh": "系统1的主要功能是维护并更新你个人世界的模式，它呈现的都是常态下的思维模式。这个模式由许多联想和结果共同构成，这些联想由情境、事件、行为等概念引发，而结果则总是伴随某种规律出现，有可能是两者同时出现，也有可能出现时间只差那么一点点。随着这些联系的形成和加强，联想概念的模式逐渐展现出发生在你生活中的各种事件的结构，这一模式还将决定你对当下的理解和对未来的期望。"}, {"en": "", "zh": "对惊喜的承受能力是你精神生活的一个重要方面，而且惊喜本身也是最敏感的指示，它可以表明我们如何理解这个世界，我们希望从这个世界中得到什么。惊喜主要有两种形式。有些期望是积极、有意识的，你知道你正在等待某件特别的事情发生。当时间迫近时，听到敲门声，你会期望是你的孩子放学回家了；打开门时，你期望听到自己熟悉的声音。如果非常期望的事情没有发生，你会很惊讶。不过，你不怎么期盼的事情也很多。你不会等待这些事情发生，但如果真的发生了，你也不会惊讶。因为这些事在某种情境下是正常的，尽管可能不是你欣然盼望的。"}, {"en": "", "zh": "一个插曲如果反复出现就可能不那么令人惊喜了。几年前，我和我的妻子在澳大利亚大堡礁的一座小岛上度假，岛上只有40间客房。我们去吃饭时，竟然遇见了一位老朋友，心理学家乔恩，我们当时感到很意外。朋友间相互问候，都觉得很巧。第二天乔恩就离开了度假村。大约两个星期后，我们去伦敦的一家剧院看电影。剧场关灯之后，一位来迟的人坐到了我旁边。幕间休息时，我发现我旁边坐着的竟是乔恩。我和妻子事后说起这两件事时，我们两人都意识到了两个事实：第一，这次碰面比上次更巧；第二，第二次碰到乔恩时我们的感受不如第一次那么惊讶。显然，第一次碰面在不知不觉中改变了乔恩在我们大脑中的印象，他现在是“只要我们外出旅行就会碰见的心理学家”。我们（系统2）知道这样想很可笑，但系统1却使大脑认为在陌生的地方碰到乔恩是件正常的事。如果我们在伦敦的那家剧院里碰到的是其他熟人，我们会比遇到乔恩感觉更惊讶。如果单纯从可能性来看的话，在剧院里碰到乔恩的概率比碰到我们那几百个熟人中的任何一个的概率都要小得多，然而现在看来，在那里碰到乔恩却似乎更正常。"}, {"en": "", "zh": "在某些情况下，消极的期望很快会变成积极的，就像我们在又一次巧合中发现的那样。几年前，一个周日的傍晚，我们驱车从纽约赶往普林斯顿，很长一段时间以来，我们每周都会这样穿梭于两个城市之间。那天我们看见了不同寻常的景象：路旁有辆车着火了。我们第二周到达那段路时，又有一辆车着火了。我们发现与第一次相比，第二次遇到这种情况时明显表现得不那么惊讶了。这个地方现在就是“车着火的地方”。因为事件发生的情景相同，第二次事件引起了积极的期盼：每当走到这个路段时，我们都会想起着火的车，而且自己已经作好再看到一次的心理准备（当然，我们没有再看见过），几个月也好，几年也好，我们都有足够的心理准备。"}, {"en": "", "zh": "心理学家戴尔·米勒（Dale Miller）和我曾经合写了一篇文章，在文中我们试图解释为什么我们觉得很多事情是正常或是不正常的。接下来我会引用那篇文章中我们用来描述“常态理论”的一个例子，不过我对这个例子稍稍作了改动："}, {"en": "", "zh": "在一家高级餐厅，一位观察者随意观察着邻桌的顾客。他发现第一位品汤的顾客往后退了一下，好像有些痛苦。接下来的一大堆事都因这个动作而发生了变化。一位服务生不小心碰到了一位喝汤的顾客时，这位顾客吓了一跳，而这根本没什么可惊讶的；另外一个顾客也喝了从同一个碗中盛来的汤，喝后他强忍着没有叫出来，对此我们也没有感到惊讶。这些事和其他种种事情本应是不正常的，但现在却显得正常了。因为这些事是对之前那些预期的肯定。这些事之所以看上去正常是因为它们重复了原来的情节，记忆中的这些情节相互联系，对这几个事件作出了解释。"}, {"en": "", "zh": "试想你就是餐厅中的那位观察者，第一次看到顾客对汤的反应时你感到惊讶，服务生在碰他时他吓了一跳，你也会感到惊讶。然而，第二次非正常事件会提取你对第一次事件的记忆，两件事联系起来似乎就合乎情理了。这两件事都符合一个模式，模式中的顾客是个特别容易紧张的人。另外，如果第一位顾客表现出痛苦状后，另一位顾客拒绝喝这种汤，这两件意外的事也会被联系起来，说明这碗汤肯定有问题。"}, {"en": "", "zh": "“摩西上方舟时，每种动物各带了多少？”发觉这个问题有问题的人太少了，因而有人将此称为“摩西错觉”。摩西并没有带动物上方舟，带动物上方舟的是诺亚。就像那位往后退的喝汤顾客一样，摩西错觉可以通过常态理论来解释。动物登上方舟给人们营造了《圣经》的文化背景，而摩西也出现在这个背景中，虽然你对他并没有什么特别期待，但对他的名字你也不会感到惊讶。况且，摩西和诺亚这两个名字的英文元音和音节数都是相同的，这也容易使人将二人混淆。就像那些三个一组的词语会令人产生认知放松一样，你在不知不觉中就将“摩西”和“方舟”联系在了一起，很快地接受了这一提问。但如果句中的摩西换成乔治.W·布什的话，你就会认为这是一个很蹩脚的政治笑话。"}, {"en": "", "zh": "若“关于水泥”这种说法与当前被激活观点的情境不搭，系统就会察觉到这一反常现象，就像你刚才的感受一样。你本来对“关于”之后是什么并无具体概念，但当“水泥”一词出现时，你就知道这个句子有点不对劲儿了。对大脑反应的许多研究表明，系统对违反常态的问题的察觉速度是惊人的，察觉过程也是微妙的。在最近的一次实验中，当人们听到“地球每年绕着麻烦转”这个句子时，听到“麻烦”这一莫名其妙的词之后不到0.2秒，对大脑活动进行检测就会发现一个特殊的图谱。更值得注意的是，当一个男声说“我确信我怀孕了，因为我每天早晨都想吐”，或者当有人操着上流社会的腔调在说“我后背上有一个很大的
